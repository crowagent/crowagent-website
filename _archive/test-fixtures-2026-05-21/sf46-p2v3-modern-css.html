<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SF46 P2v3 modern-CSS fixture</title>
<link rel="stylesheet" href="../../crowagent-brand-tokens.css">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { padding: 24px; background: var(--bg); color: var(--cloud); }
  section { margin-bottom: 48px; }
  #cq-host { width: 480px; resize: horizontal; overflow: auto; border: 1px dashed var(--mist); padding: 16px; }
</style>
</head>
<body>

<section>
  <h2>Q1 Container queries</h2>
  <div id="cq-host" style="container-type: inline-size; container-name: section;">
    <article class="sv-card sv-card--interactive ca-card-v2--cq" id="cq-card">
      <h3 class="ca-card-v2__title" id="cq-title">CQ card title</h3>
      <p>Body.</p>
    </article>
  </div>
</section>

<section>
  <h2>Q2 :has() — form with error</h2>
  <form id="form-with-err">
    <input type="email" required value="not-email" aria-invalid="true">
    <span class="ca-error">Invalid email</span>
  </form>
  <form id="form-ok">
    <input type="email" required value="ok@test.com">
  </form>
</section>

<section>
  <h2>Q4/Q5 OKLCH + color-mix() tokens resolve</h2>
  <div id="oklch-probe" data-tok="--teal-oklch"></div>
  <div id="mix-probe" data-tok="--teal-mix-12"></div>
  <div id="hover-bg-probe" data-tok="--hover-bg"></div>
</section>

<section>
  <h2>Q6 field-sizing</h2>
  <textarea class="ca-input form-textarea" id="auto-textarea">Some content</textarea>
</section>

<section>
  <h2>Q7 inert</h2>
  <button id="inert-btn" inert>Inert button</button>
</section>

</body>
</html>
