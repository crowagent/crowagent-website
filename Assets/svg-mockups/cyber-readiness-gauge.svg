    <text x="752" y="20" class="b steel" font-size="11">Auto-updates enabled · 14-day high-severity SLA · vendor support</text>
    <rect x="752" y="30" width="354" height="12" rx="6" fill="#0D2847"/>
    <rect x="752" y="30" width="177" height="12" rx="6" fill="#EF4444"/>
    <text x="1126" text-anchor="middle" class="m cloud" font-size="12" font-weight="700">2/4</text>
