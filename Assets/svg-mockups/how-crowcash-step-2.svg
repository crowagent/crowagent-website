<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="cashStep2Title" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="cashStep2Title">CrowCash Step 2: Configure chase cadences</title>
  <defs>
    <style>
      .bg { fill: #0A1422; }
      .c1 { fill: #0F1B2E; }
      .c2 { fill: #11243F; }
      .hair { stroke: rgba(255,255,255,0.08); stroke-width: 1; fill: none; }
      .cloud { fill: #E8EEF7; }
      .mist { fill: #8A9DB8; }
      .teal { fill: #0CC9A8; }
      .amber { fill: #F59E0B; }
      .red { fill: #EF4444; }
      .digit { font-variant-numeric: tabular-nums; }

      .tone { opacity: 0; }
      .tone-1 { animation: tone-in 6s ease-out infinite; animation-delay: 0.3s; }
      .tone-2 { animation: tone-in 6s ease-out infinite; animation-delay: 0.5s; }
      .tone-3 { animation: tone-in 6s ease-out infinite; animation-delay: 0.7s; }
      @keyframes tone-in {
        0%, 4%   { opacity: 0; transform: translateY(6px); }
        14%, 95% { opacity: 1; transform: translateY(0); }
        100%     { opacity: 0; }
      }

      .selected { animation: select-pulse 1.8s cubic-bezier(0.4,0,0.2,1) infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes select-pulse {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.02); }
      }

      .step-pop { opacity: 0; }
      .step-1 { animation: step-in 6s ease-out infinite; animation-delay: 1.4s; }
      .step-2 { animation: step-in 6s ease-out infinite; animation-delay: 1.8s; }
      .step-3 { animation: step-in 6s ease-out infinite; animation-delay: 2.2s; }
      .step-4 { animation: step-in 6s ease-out infinite; animation-delay: 2.6s; }
      @keyframes step-in {
        0%, 18%  { opacity: 0; transform: translateX(-4px); }
        30%, 95% { opacity: 1; transform: translateX(0); }
        100%     { opacity: 0; }
      }

      .conn { stroke: #0CC9A8; stroke-width: 1.5; fill: none; stroke-dasharray: 4 6; stroke-dashoffset: 200; animation: conn-flow 4s linear infinite; }
      @keyframes conn-flow { to { stroke-dashoffset: 0; } }

      @media (prefers-reduced-motion: reduce) {
        .tone, .tone-1, .tone-2, .tone-3, .selected, .step-pop, .step-1, .step-2, .step-3, .step-4, .conn {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
        .conn { stroke-dashoffset: 0 !important; }
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="620"/>

  <!-- Header -->
  <g transform="translate(40, 40)">
    <text x="0" y="14" class="teal" font-size="11" font-weight="600" letter-spacing="1.5">STEP 2, CONFIGURE</text>
    <text x="0" y="46" class="cloud" font-size="22" font-weight="600">Pick the tone, set the cadence</text>
    <text x="0" y="68" class="mist" font-size="13">Polite, standard, or firm sequence, all Late Payment Act compliant</text>
  </g>

  <!-- Tone selector cards -->
  <g transform="translate(40, 140)">
    <g class="tone tone-1">
      <rect class="c1" x="0" y="0" width="220" height="92" rx="14"/>
      <text x="20" y="32" class="cloud" font-size="14" font-weight="600">Polite</text>
      <text x="20" y="56" class="mist" font-size="11">Friendly reminder language</text>
      <text x="20" y="74" class="mist digit" font-size="10">Avg recovery, 14 days</text>
    </g>
    <g class="tone tone-2" transform="translate(240, 0)">
      <g class="selected">
        <rect x="-2" y="-2" width="224" height="96" rx="15" fill="rgba(12,201,168,0.10)" stroke="#0CC9A8" stroke-width="2"/>
      </g>
      <text x="20" y="32" class="cloud" font-size="14" font-weight="600">Standard</text>
      <text x="20" y="56" class="mist" font-size="11">Direct, professional</text>
      <text x="20" y="74" class="teal digit" font-size="10" font-weight="600">Avg recovery, 9 days</text>
      <text x="200" y="22" class="teal" font-size="10" text-anchor="end" font-weight="600">SELECTED</text>
    </g>
    <g class="tone tone-3" transform="translate(480, 0)">
      <rect class="c1" x="0" y="0" width="220" height="92" rx="14"/>
      <text x="20" y="32" class="cloud" font-size="14" font-weight="600">Firm</text>
      <text x="20" y="56" class="mist" font-size="11">Legal escalation prep</text>
      <text x="20" y="74" class="mist digit" font-size="10">Avg recovery, 6 days</text>
    </g>
  </g>

  <!-- Cadence flow -->
  <g transform="translate(40, 260)">
    <rect class="c1" x="0" y="0" width="1000" height="250" rx="16"/>
    <text x="20" y="32" class="cloud" font-size="13" font-weight="600">Standard cadence, applied to 142 invoices</text>
    <line x1="20" y1="50" x2="980" y2="50" class="hair"/>

    <!-- Steps along a horizontal timeline -->
    <line x1="120" y1="150" x2="880" y2="150" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <path class="conn" d="M180 150 L240 150"/>
    <path class="conn" d="M380 150 L440 150"/>
    <path class="conn" d="M580 150 L640 150"/>
    <path class="conn" d="M780 150 L840 150"/>

    <!-- Step 1 -->
    <g class="step-pop step-1" transform="translate(120, 80)">
      <rect class="c2" x="0" y="0" width="180" height="80" rx="12"/>
      <text x="14" y="22" class="teal" font-size="10" font-weight="600" letter-spacing="0.6">DAY 0</text>
      <text x="14" y="44" class="cloud" font-size="12" font-weight="600">Polite reminder</text>
      <text x="14" y="62" class="mist" font-size="11">Email to AP contact</text>
      <circle cx="90" cy="120" r="9" fill="#0CC9A8"/>
      <text x="90" y="124" fill="#0A1422" font-size="10" font-weight="700" text-anchor="middle">1</text>
    </g>
    <!-- Step 2 -->
    <g class="step-pop step-2" transform="translate(320, 80)">
      <rect class="c2" x="0" y="0" width="180" height="80" rx="12"/>
      <text x="14" y="22" class="teal" font-size="10" font-weight="600" letter-spacing="0.6">DAY 7</text>
      <text x="14" y="44" class="cloud" font-size="12" font-weight="600">Statutory letter</text>
      <text x="14" y="62" class="mist" font-size="11">Interest accrual notice</text>
      <circle cx="90" cy="120" r="9" fill="#0CC9A8"/>
      <text x="90" y="124" fill="#0A1422" font-size="10" font-weight="700" text-anchor="middle">2</text>
    </g>
    <!-- Step 3 -->
    <g class="step-pop step-3" transform="translate(520, 80)">
      <rect class="c2" x="0" y="0" width="180" height="80" rx="12"/>
      <text x="14" y="22" class="amber" font-size="10" font-weight="600" letter-spacing="0.6">DAY 14</text>
      <text x="14" y="44" class="cloud" font-size="12" font-weight="600">Final demand</text>
      <text x="14" y="62" class="mist" font-size="11">Fixed-fee tier applied</text>
      <circle cx="90" cy="120" r="9" fill="#F59E0B"/>
      <text x="90" y="124" fill="#0A1422" font-size="10" font-weight="700" text-anchor="middle">3</text>
    </g>
    <!-- Step 4 -->
    <g class="step-pop step-4" transform="translate(720, 80)">
      <rect class="c2" x="0" y="0" width="180" height="80" rx="12"/>
      <text x="14" y="22" class="red" font-size="10" font-weight="600" letter-spacing="0.6">DAY 30</text>
      <text x="14" y="44" class="cloud" font-size="12" font-weight="600">Escalate</text>
      <text x="14" y="62" class="mist" font-size="11">Hand off to collections</text>
      <circle cx="90" cy="120" r="9" fill="#EF4444"/>
      <text x="90" y="124" fill="#0A1422" font-size="10" font-weight="700" text-anchor="middle">4</text>
    </g>

    <text x="20" y="230" class="mist digit" font-size="10">Cadence respects bank holidays, 8 percent + base interest accrues automatically after day 30</text>
  </g>

  <line x1="40" y1="552" x2="1040" y2="552" class="hair"/>
  <g transform="translate(40, 580)">
    <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.4">Each step uses Late Payment of Commercial Debts (Interest) Act 1998 language and tier</text>
  </g>
</svg>
