<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1067" role="img" aria-label="Abstract flowing gradient curves in CrowAgent teal, sky and deep navy" preserveAspectRatio="xMidYMid slice">
  <title>CrowAgent contact — abstract gradient artwork</title>
  <desc>Stripe/Linear-style abstract: layered flowing curves in brand teal #0CC9A8, sky #5BC8FF, deep navy #0A1F3A. Decorative; no data.</desc>
  <defs>
    <!-- Deep base wash -->
    <linearGradient id="baseGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A1F3A"/>
      <stop offset="0.55" stop-color="#0D2847"/>
      <stop offset="1" stop-color="#061525"/>
    </linearGradient>

    <!-- Teal/sky ribbon (foreground) -->
    <linearGradient id="ribbon1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0CC9A8" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#5BC8FF" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#0CC9A8" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Sky-to-teal ribbon (mid) -->
    <linearGradient id="ribbon2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5BC8FF" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#5BC8FF" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#0CC9A8" stop-opacity="0.18"/>
    </linearGradient>

    <!-- Teal glow ribbon (back) -->
    <linearGradient id="ribbon3" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#0CC9A8" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#0CC9A8" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Radial glow used as light source -->
    <radialGradient id="glowTeal" cx="0.18" cy="0.28" r="0.55">
      <stop offset="0" stop-color="#0CC9A8" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#0CC9A8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowSky" cx="0.85" cy="0.78" r="0.6">
      <stop offset="0" stop-color="#5BC8FF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#5BC8FF" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft blur for the ribbons -->
    <filter id="softBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="hardBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <style>
    @keyframes sf23ax-ribbon-drift{0%,100%{transform:translateX(0) translateY(0)}25%{transform:translateX(8px) translateY(-4px)}50%{transform:translateX(0) translateY(2px)}75%{transform:translateX(-8px) translateY(-4px)}}
    @keyframes sf23ax-ribbon-fade{0%,100%{opacity:.85}50%{opacity:1}}
    @keyframes sf23ax-glow-shift{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.78;transform:scale(1.04)}}
    path[fill^="url(#ribbon"]{animation:sf23ax-ribbon-drift 14s ease-in-out infinite,sf23ax-ribbon-fade 8s ease-in-out infinite;transform-origin:center}
    rect[fill="url(#glowTeal)"],rect[fill="url(#glowSky)"]{animation:sf23ax-glow-shift 9s ease-in-out infinite;transform-origin:center}
    @media (prefers-reduced-motion:reduce){*{animation:none!important;transform:none!important}}
  </style>

  <!-- Base -->
  <rect width="1600" height="1067" fill="url(#baseGrad)"/>

  <!-- Atmospheric glows -->
  <rect width="1600" height="1067" fill="url(#glowTeal)"/>
  <rect width="1600" height="1067" fill="url(#glowSky)"/>

  <!-- Background ribbon (very soft, large) -->
  <path d="M -100 760
           C 260 560, 560 980, 940 700
           S 1480 360, 1750 540
           L 1750 1167
           L -100 1167 Z"
        fill="url(#ribbon3)" filter="url(#hardBlur)" opacity="0.9"/>

  <!-- Mid ribbon -->
  <path d="M -120 540
           C 220 300, 540 760, 900 520
           S 1380 220, 1720 360
           L 1720 720
           C 1380 600, 1080 880, 740 740
           S 240 540, -120 700 Z"
        fill="url(#ribbon2)" filter="url(#softBlur)" opacity="0.95"/>

  <!-- Foreground ribbon (sharper, the hero curve) -->
  <path d="M -80 420
           C 240 200, 560 620, 920 360
           S 1420 140, 1700 260
           L 1700 360
           C 1420 280, 1140 520, 880 480
           S 320 360, -80 540 Z"
        fill="url(#ribbon1)" opacity="0.92"/>

  <!-- Thin accent line, hand-drawn feel -->
  <path d="M -40 480
           C 260 280, 560 700, 920 440
           S 1420 220, 1700 320"
        stroke="#0CC9A8" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.55"/>

  <!-- Secondary accent line, sky -->
  <path d="M -40 660
           C 260 460, 580 880, 940 620
           S 1440 400, 1720 500"
        stroke="#5BC8FF" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- Distant horizon curve at top, deep -->
  <path d="M -40 220
           C 320 80, 720 320, 1080 180
           S 1480 60, 1720 140"
        stroke="#5BC8FF" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.18"/>

  <!-- Particle dots — subtle, scattered -->
  <g fill="#0CC9A8" opacity="0.55">
    <circle cx="180" cy="200" r="2"/>
    <circle cx="420" cy="120" r="1.5"/>
    <circle cx="760" cy="260" r="2"/>
    <circle cx="1180" cy="180" r="1.5"/>
    <circle cx="1340" cy="280" r="2"/>
    <circle cx="280" cy="880" r="1.5"/>
    <circle cx="640" cy="920" r="2"/>
    <circle cx="1040" cy="860" r="1.5"/>
    <circle cx="1420" cy="940" r="2"/>
  </g>
  <g fill="#5BC8FF" opacity="0.45">
    <circle cx="220" cy="420" r="1.5"/>
    <circle cx="500" cy="380" r="1"/>
    <circle cx="900" cy="780" r="1.5"/>
    <circle cx="1240" cy="640" r="1"/>
    <circle cx="1480" cy="500" r="1.5"/>
  </g>

  <!-- Bottom darkening so foreground card UI can sit on top legibly -->
  <rect x="0" y="780" width="1600" height="287" fill="url(#baseGrad)" opacity="0.35"/>
</svg>
