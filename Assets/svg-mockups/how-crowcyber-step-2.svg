<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="cyberStep2Title" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="cyberStep2Title">CrowCyber Step 2: Run the five-control assessment</title>
  <defs>
    <style>
      .bg { fill: #0A1422; }
      .c1 { fill: #0F1B2E; }
      .c2 { fill: #11243F; }
      .hair { stroke: rgba(255,255,255,0.08); stroke-width: 1; fill: none; }
      .cloud { fill: #E8EEF7; }
      .mist { fill: #8A9DB8; }
      .teal { fill: #0CC9A8; }
      .green { fill: #22C55E; }
      .amber { fill: #F59E0B; }
      .digit { font-variant-numeric: tabular-nums; }

      .control-card { opacity: 0; }
      .ctrl-1 { animation: ctrl-in 6s ease-out infinite; animation-delay: 0.3s; }
      .ctrl-2 { animation: ctrl-in 6s ease-out infinite; animation-delay: 0.5s; }
      .ctrl-3 { animation: ctrl-in 6s ease-out infinite; animation-delay: 0.7s; }
      .ctrl-4 { animation: ctrl-in 6s ease-out infinite; animation-delay: 0.9s; }
      .ctrl-5 { animation: ctrl-in 6s ease-out infinite; animation-delay: 1.1s; }
      @keyframes ctrl-in {
        0%, 4%   { opacity: 0; transform: translateY(8px); }
        15%, 95% { opacity: 1; transform: translateY(0); }
        100%     { opacity: 0; }
      }

      .qrow { opacity: 0; }
      .qrow-1 { animation: qrow-in 6s ease-out infinite; animation-delay: 2.0s; }
      .qrow-2 { animation: qrow-in 6s ease-out infinite; animation-delay: 2.3s; }
      .qrow-3 { animation: qrow-in 6s ease-out infinite; animation-delay: 2.6s; }
      .qrow-4 { animation: qrow-in 6s ease-out infinite; animation-delay: 2.9s; }
      @keyframes qrow-in {
        0%, 30%  { opacity: 0; transform: translateX(-4px); }
        45%, 95% { opacity: 1; transform: translateX(0); }
        100%     { opacity: 0; }
      }

      .progress-fill { animation: progress 6s cubic-bezier(0.4,0,0.2,1) infinite; transform-origin: left; }
      @keyframes progress {
        0%, 15%  { transform: scaleX(0); }
        85%, 100% { transform: scaleX(0.82); }
      }

      @media (prefers-reduced-motion: reduce) {
        .control-card, .qrow, .progress-fill,
        .ctrl-1, .ctrl-2, .ctrl-3, .ctrl-4, .ctrl-5,
        .qrow-1, .qrow-2, .qrow-3, .qrow-4 {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
        .progress-fill { transform: scaleX(0.82) !important; }
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="620"/>

  <!-- Header -->
  <g transform="translate(40, 40)">
    <text x="0" y="14" class="teal" font-size="11" font-weight="600" letter-spacing="1.5">STEP 2, ASSESS</text>
    <text x="0" y="46" class="cloud" font-size="22" font-weight="600">Five-control assessment, guided</text>
    <text x="0" y="68" class="mist" font-size="13">Cyber Essentials v3.3 (Danzell), AI-suggested answers per control</text>
  </g>

  <!-- Five control pills -->
  <g transform="translate(40, 130)">
    <g class="control-card ctrl-1">
      <rect class="c1" x="0" y="0" width="190" height="58" rx="12" ry="12"/>
      <circle cx="22" cy="29" r="11" fill="#1B2F4D" stroke="#0CC9A8" stroke-width="1.5"/>
      <path d="M16 29 L21 34 L29 25" stroke="#0CC9A8" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="42" y="26" class="cloud" font-size="12" font-weight="600">Firewalls</text>
      <text x="42" y="42" class="mist digit" font-size="10">8 of 8 done</text>
    </g>
    <g class="control-card ctrl-2" transform="translate(200, 0)">
      <rect class="c1" x="0" y="0" width="190" height="58" rx="12" ry="12"/>
      <circle cx="22" cy="29" r="11" fill="#1B2F4D" stroke="#0CC9A8" stroke-width="1.5"/>
      <path d="M16 29 L21 34 L29 25" stroke="#0CC9A8" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="42" y="26" class="cloud" font-size="12" font-weight="600">Secure config</text>
      <text x="42" y="42" class="mist digit" font-size="10">9 of 9 done</text>
    </g>
    <g class="control-card ctrl-3" transform="translate(400, 0)">
      <rect class="c1" x="0" y="0" width="190" height="58" rx="12" ry="12"/>
      <circle cx="22" cy="29" r="11" fill="#1B2F4D" stroke="#0CC9A8" stroke-width="1.5"/>
      <path d="M16 29 L21 34 L29 25" stroke="#0CC9A8" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="42" y="26" class="cloud" font-size="12" font-weight="600">User access</text>
      <text x="42" y="42" class="mist digit" font-size="10">10 of 10 done</text>
    </g>
    <g class="control-card ctrl-4" transform="translate(600, 0)">
      <rect class="c1" x="0" y="0" width="190" height="58" rx="12" ry="12"/>
      <circle cx="22" cy="29" r="11" fill="rgba(245,158,11,0.18)" stroke="#F59E0B" stroke-width="1.5"/>
      <text x="22" y="33" class="amber digit" font-size="10" font-weight="700" text-anchor="middle">3</text>
      <text x="42" y="26" class="cloud" font-size="12" font-weight="600">Malware</text>
      <text x="42" y="42" class="mist digit" font-size="10">5 of 8 done</text>
    </g>
    <g class="control-card ctrl-5" transform="translate(800, 0)">
      <rect class="c1" x="0" y="0" width="190" height="58" rx="12" ry="12"/>
      <circle cx="22" cy="29" r="11" fill="rgba(245,158,11,0.18)" stroke="#F59E0B" stroke-width="1.5"/>
      <text x="22" y="33" class="amber digit" font-size="10" font-weight="700" text-anchor="middle">2</text>
      <text x="42" y="26" class="cloud" font-size="12" font-weight="600">Patching</text>
      <text x="42" y="42" class="mist digit" font-size="10">7 of 9 done</text>
    </g>
  </g>

  <!-- Question pane -->
  <g transform="translate(40, 220)">
    <rect class="c1" x="0" y="0" width="640" height="290" rx="16" ry="16"/>
    <rect class="hair" x="0" y="0" width="640" height="290" rx="16" ry="16"/>
    <text x="24" y="32" class="cloud" font-size="13" font-weight="600">A4.2, Are all user accounts assigned to a named individual?</text>
    <text x="24" y="52" class="mist" font-size="11">Mapped to Cyber Essentials v3.3, User access control</text>
    <line x1="24" y1="68" x2="616" y2="68" class="hair"/>

    <g class="qrow qrow-1" transform="translate(24, 92)">
      <rect x="0" y="0" width="592" height="38" rx="10" fill="#11243F"/>
      <circle cx="20" cy="19" r="8" fill="#1B2F4D" stroke="#0CC9A8" stroke-width="1.6"/>
      <circle cx="20" cy="19" r="3.5" fill="#0CC9A8"/>
      <text x="40" y="23" class="cloud" font-size="12">Yes, every account is owned by a named user</text>
      <text x="540" y="23" class="teal digit" font-size="10" text-anchor="end" font-weight="600">AI suggested</text>
    </g>
    <g class="qrow qrow-2" transform="translate(24, 138)">
      <rect x="0" y="0" width="592" height="38" rx="10" fill="#11243F" opacity="0.6"/>
      <circle cx="20" cy="19" r="8" fill="#1B2F4D" stroke="rgba(255,255,255,0.25)" stroke-width="1.6"/>
      <text x="40" y="23" class="mist" font-size="12">Mostly, but a few shared accounts exist</text>
    </g>
    <g class="qrow qrow-3" transform="translate(24, 184)">
      <rect x="0" y="0" width="592" height="38" rx="10" fill="#11243F" opacity="0.6"/>
      <circle cx="20" cy="19" r="8" fill="#1B2F4D" stroke="rgba(255,255,255,0.25)" stroke-width="1.6"/>
      <text x="40" y="23" class="mist" font-size="12">No, shared logins are common</text>
    </g>
    <g class="qrow qrow-4" transform="translate(24, 230)">
      <text x="0" y="14" class="mist digit" font-size="10">Evidence cited, Entra ID export, 2026-05-12</text>
      <text x="592" y="14" class="teal digit" font-size="10" text-anchor="end" font-weight="600">Q 28 of 44</text>
    </g>
  </g>

  <!-- Right summary pane -->
  <g transform="translate(700, 220)">
    <rect class="c1" x="0" y="0" width="340" height="290" rx="16" ry="16"/>
    <rect class="hair" x="0" y="0" width="340" height="290" rx="16" ry="16"/>
    <text x="20" y="32" class="cloud" font-size="13" font-weight="600">Overall progress</text>
    <text x="20" y="52" class="mist" font-size="11">39 of 44 questions answered</text>
    <rect x="20" y="70" width="300" height="10" rx="5" fill="#1B2F4D"/>
    <rect class="progress-fill" x="20" y="70" width="300" height="10" rx="5" fill="#0CC9A8"/>
    <text x="20" y="98" class="teal digit" font-size="11" font-weight="600">82%</text>

    <line x1="20" y1="118" x2="320" y2="118" class="hair"/>
    <text x="20" y="140" class="mist" font-size="11" letter-spacing="0.4">FRAMEWORK</text>
    <text x="20" y="160" class="cloud" font-size="12" font-weight="600">Cyber Essentials v3.3</text>
    <text x="20" y="178" class="mist" font-size="11">IASME accreditation body</text>

    <text x="20" y="210" class="mist" font-size="11" letter-spacing="0.4">EST. SUBMISSION READY</text>
    <text x="20" y="232" class="cloud" font-size="12" font-weight="600">4 hours</text>
    <text x="20" y="250" class="mist" font-size="11">if you finish the 5 open items today</text>
  </g>

  <!-- Footer hairline -->
  <line x1="40" y1="552" x2="1040" y2="552" class="hair"/>
  <g transform="translate(40, 580)">
    <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.4">Every answer is mapped to a specific Cyber Essentials control and stored as evidence</text>
  </g>
</svg>
