<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Retrofit scenario planner mockup with three side-by-side scenarios comparing CapEx, NPV and payback period">
  <title>Retrofit scenario planner</title>
  <desc>Three retrofit scenarios (Low Cost, Balanced, Premium) compared on CapEx, 25-year NPV and payback period. Synthetic figures for illustration.</desc>
  <defs>
    <linearGradient id="bgG3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#040E1A"/>
      <stop offset="1" stop-color="#061525"/>
    </linearGradient>
  </defs>
  <style>
    .f { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    .b { font-family: 'Inter', system-ui, sans-serif; }
    .m { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  </style>

  <rect width="1600" height="900" fill="url(#bgG3)"/>

  <!-- Window chrome -->
  <rect x="0" y="0" width="1600" height="44" fill="#0A1F3A"/>
  <circle cx="22" cy="22" r="6" fill="#EF4444"/>
  <circle cx="44" cy="22" r="6" fill="#F59E0B"/>
  <circle cx="66" cy="22" r="6" fill="#0CC9A8"/>
  <rect x="600" y="11" width="400" height="22" rx="11" fill="#040E1A"/>
  <text x="800" y="26" text-anchor="middle" class="b" font-size="11" fill="#8A9DB8">app.crowagent.ai/dashboard/core/retrofit</text>

  <!-- Top bar -->
  <rect x="0" y="44" width="1600" height="64" fill="#0A1F3A"/>
  <line x1="0" y1="108" x2="1600" y2="108" stroke="#0D2847"/>
  <circle cx="44" cy="76" r="14" fill="#0CC9A8"/>
  <path d="M37 76 L43 82 L52 71" stroke="#040E1A" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="68" y="81" class="f" font-size="17" font-weight="700" fill="#E8F0FA">CrowAgent Core</text>

  <!-- Breadcrumb -->
  <text x="68" y="146" class="b" font-size="12" fill="#8A9DB8">Properties / 12 Mill Street, MK9 1AA / Retrofit planner</text>

  <!-- Header -->
  <text x="68" y="186" class="f" font-size="26" font-weight="700" fill="#E8F0FA">Retrofit scenarios</text>
  <text x="68" y="212" class="b" font-size="13" fill="#8A9DB8">EPC F → C · Three options modelled to HM Treasury Green Book 3.5% NPV over 25 years</text>

  <!-- Compare-tabs -->
  <rect x="68" y="232" width="320" height="34" rx="6" fill="#0D2847"/>
  <rect x="68" y="232" width="160" height="34" rx="6" fill="#0CC9A8" fill-opacity="0.16" stroke="#0CC9A8"/>
  <text x="148" y="253" text-anchor="middle" class="b" font-size="12" font-weight="600" fill="#0CC9A8">Side by side</text>
  <text x="308" y="253" text-anchor="middle" class="b" font-size="12" fill="#8A9DB8">Detailed</text>

  <!-- Scenario card 1: Low Cost -->
  <g>
    <rect x="68" y="290" width="468" height="540" rx="14" fill="#0A1F3A" stroke="#0D2847"/>
    <rect x="68" y="290" width="468" height="6" rx="3" fill="#5BC8FF"/>
    <text x="92" y="328" class="f" font-size="11" font-weight="700" fill="#5BC8FF">SCENARIO A</text>
    <text x="92" y="358" class="f" font-size="22" font-weight="700" fill="#E8F0FA">Low Cost</text>
    <text x="92" y="380" class="b" font-size="12" fill="#8A9DB8">LED + draft-proofing + smart heating</text>

    <!-- KPIs -->
    <line x1="92" y1="402" x2="512" y2="402" stroke="#0D2847"/>
    <text x="92" y="430" class="b" font-size="11" font-weight="600" fill="#8A9DB8">CAPEX</text>
    <text x="92" y="462" class="f" font-size="22" font-weight="700" fill="#E8F0FA">£25,000</text>

    <text x="92" y="498" class="b" font-size="11" font-weight="600" fill="#8A9DB8">25-YR NPV</text>
