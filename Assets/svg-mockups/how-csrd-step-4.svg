<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="csrdStep4Title" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="csrdStep4Title">CSRD Checker Step 4: Share or email your result</title>
  <defs>
    <style>
      .bg { fill: #0A1422; }
      .c1 { fill: #0F1B2E; }
      .c2 { fill: #11243F; }
      .hair { stroke: rgba(255,255,255,0.08); stroke-width: 1; fill: none; }
      .cloud { fill: #E8EEF7; }
      .mist { fill: #8A9DB8; }
      .teal { fill: #0CC9A8; }
      .green { fill: #22C55E; }
      .digit { font-variant-numeric: tabular-nums; }

      .channel { opacity: 0; }
      .ch-1 { animation: ch-in 6s ease-out infinite; animation-delay: 0.4s; }
      .ch-2 { animation: ch-in 6s ease-out infinite; animation-delay: 0.7s; }
      .ch-3 { animation: ch-in 6s ease-out infinite; animation-delay: 1.0s; }
      .ch-4 { animation: ch-in 6s ease-out infinite; animation-delay: 1.3s; }
      @keyframes ch-in {
        0%, 4%   { opacity: 0; transform: translateY(8px); }
        18%, 95% { opacity: 1; transform: translateY(0); }
        100%     { opacity: 0; }
      }

      .send-pulse { animation: send-pulse 1.8s cubic-bezier(0.4,0,0.2,1) infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes send-pulse {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.05); }
      }

      .doc-line { opacity: 0; }
      .dl-1 { animation: dl-in 6s ease-out infinite; animation-delay: 1.8s; }
      .dl-2 { animation: dl-in 6s ease-out infinite; animation-delay: 2.0s; }
      .dl-3 { animation: dl-in 6s ease-out infinite; animation-delay: 2.2s; }
      .dl-4 { animation: dl-in 6s ease-out infinite; animation-delay: 2.4s; }
      .dl-5 { animation: dl-in 6s ease-out infinite; animation-delay: 2.6s; }
      @keyframes dl-in {
        0%, 28%  { opacity: 0; transform: translateX(-3px); }
        40%, 95% { opacity: 1; transform: translateX(0); }
        100%     { opacity: 0; }
      }

      .progress { transform-origin: left; animation: progress 6s cubic-bezier(0.4,0,0.2,1) infinite; }
      @keyframes progress {
        0%, 6%   { transform: scaleX(0); }
        30%, 95% { transform: scaleX(1); }
        100%     { transform: scaleX(1); }
      }

      @media (prefers-reduced-motion: reduce) {
        .channel, .ch-1, .ch-2, .ch-3, .ch-4, .send-pulse, .doc-line, .dl-1, .dl-2, .dl-3, .dl-4, .dl-5, .progress {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
        .progress { transform: scaleX(1) !important; }
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="620"/>

  <!-- Header -->
  <g transform="translate(40, 40)">
    <text x="0" y="14" class="teal" font-size="11" font-weight="600" letter-spacing="1.5">STEP 4 OF 4, SHARE</text>
    <text x="0" y="46" class="cloud" font-size="22" font-weight="600">Email, share, or download</text>
    <text x="0" y="68" class="mist" font-size="13">Send the verdict to your compliance lead, the board, or your auditor</text>
  </g>

  <!-- Wizard progress -->
  <g transform="translate(40, 120)">
    <rect x="0" y="0" width="1000" height="6" rx="3" fill="#1B2F4D"/>
    <rect class="progress" x="0" y="0" width="1000" height="6" rx="3" fill="#0CC9A8"/>
    <text x="0" y="26" class="teal digit" font-size="11" font-weight="600">Step 4 of 4, complete</text>
    <text x="1000" y="26" class="green digit" font-size="11" text-anchor="end" font-weight="600">✓ Done</text>
  </g>

  <!-- Share channels -->
  <g transform="translate(40, 170)">
    <rect class="c1" x="0" y="0" width="540" height="340" rx="16" ry="16"/>
    <text x="20" y="32" class="cloud" font-size="13" font-weight="600">Pick a channel</text>
    <text x="20" y="52" class="mist" font-size="11">Recipient gets a PDF plus the methodology note</text>
    <line x1="20" y1="68" x2="520" y2="68" class="hair"/>

    <!-- Email -->
    <g class="channel ch-1" transform="translate(20, 90)">
      <rect x="0" y="0" width="240" height="100" rx="12" fill="rgba(12,201,168,0.10)" stroke="#0CC9A8" stroke-width="1.2"/>
      <g class="send-pulse" transform="translate(28, 36)">
        <path d="M0 0 L24 14 L0 28 L4 14 Z" fill="#0CC9A8"/>
      </g>
      <text x="68" y="42" class="cloud" font-size="13" font-weight="600">Email PDF</text>
      <text x="68" y="60" class="mist" font-size="11">To your inbox or a colleague</text>
      <text x="68" y="80" class="teal digit" font-size="10" font-weight="600">SELECTED</text>
    </g>
    <!-- LinkedIn -->
    <g class="channel ch-2" transform="translate(280, 90)">
      <rect x="0" y="0" width="240" height="100" rx="12" fill="#11243F"/>
      <g transform="translate(20, 26)">
        <rect x="0" y="0" width="38" height="38" rx="8" fill="#0A66C2"/>
        <text x="19" y="26" fill="#FFFFFF" font-size="20" font-weight="700" text-anchor="middle">in</text>
      </g>
      <text x="72" y="42" class="cloud" font-size="13" font-weight="600">Share on LinkedIn</text>
      <text x="72" y="60" class="mist" font-size="11">Card with redacted figures</text>
    </g>
    <!-- Download -->
    <g class="channel ch-3" transform="translate(20, 210)">
      <rect x="0" y="0" width="240" height="100" rx="12" fill="#11243F"/>
      <g transform="translate(28, 36)">
        <path d="M12 0 L12 18 M4 12 L12 20 L20 12 M0 28 L24 28" stroke="#0CC9A8" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="68" y="42" class="cloud" font-size="13" font-weight="600">Download PDF</text>
      <text x="68" y="60" class="mist" font-size="11">Verdict plus methodology</text>
    </g>
    <!-- Copy link -->
    <g class="channel ch-4" transform="translate(280, 210)">
      <rect x="0" y="0" width="240" height="100" rx="12" fill="#11243F"/>
      <g transform="translate(28, 36)">
        <path d="M2 14 L8 14 M22 14 L16 14" stroke="#0CC9A8" stroke-width="2" stroke-linecap="round"/>
        <path d="M2 14 Q-4 14 -4 8 Q-4 2 2 2 L8 2 Q14 2 14 8 Q14 14 8 14" fill="none" stroke="#0CC9A8" stroke-width="2"/>
        <path d="M22 14 Q28 14 28 20 Q28 26 22 26 L16 26 Q10 26 10 20 Q10 14 16 14" fill="none" stroke="#0CC9A8" stroke-width="2"/>
      </g>
      <text x="68" y="42" class="cloud" font-size="13" font-weight="600">Copy result link</text>
      <text x="68" y="60" class="mist" font-size="11">Shareable, read-only URL</text>
    </g>
  </g>

  <!-- Right: doc preview -->
  <g transform="translate(600, 170)">
    <rect class="c1" x="0" y="0" width="440" height="340" rx="16" ry="16"/>
    <text x="20" y="32" class="cloud" font-size="13" font-weight="600">Preview, CSRD Verdict.pdf</text>
    <line x1="20" y1="50" x2="420" y2="50" class="hair"/>

    <!-- doc -->
    <g transform="translate(60, 76)">
      <rect x="0" y="0" width="320" height="234" rx="10" fill="#11243F" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
      <text x="20" y="32" class="cloud" font-size="12" font-weight="700">CSRD Applicability Verdict</text>
      <text x="20" y="50" class="mist digit" font-size="10">CrowAgent, 18 May 2026</text>
      <line x1="20" y1="62" x2="300" y2="62" stroke="#1B2F4D" stroke-width="1"/>

      <g class="doc-line dl-1">
        <line x1="20" y1="82" x2="280" y2="82" stroke="#8A9DB8" stroke-width="1.5"/>
      </g>
      <g class="doc-line dl-2">
        <line x1="20" y1="96" x2="240" y2="96" stroke="#8A9DB8" stroke-width="1.5"/>
      </g>
      <g class="doc-line dl-3">
        <rect x="20" y="112" width="120" height="44" rx="6" fill="rgba(34,197,94,0.18)"/>
        <text x="80" y="130" class="green" font-size="10" font-weight="700" text-anchor="middle">IN SCOPE</text>
        <text x="80" y="146" class="green digit" font-size="9" text-anchor="middle">FY 2027</text>
      </g>
      <g class="doc-line dl-4">
        <line x1="150" y1="120" x2="280" y2="120" stroke="#8A9DB8" stroke-width="1.5"/>
        <line x1="150" y1="134" x2="280" y2="134" stroke="#8A9DB8" stroke-width="1.5"/>
        <line x1="150" y1="148" x2="240" y2="148" stroke="#8A9DB8" stroke-width="1.5"/>
      </g>
      <g class="doc-line dl-5">
        <line x1="20" y1="180" x2="280" y2="180" stroke="#8A9DB8" stroke-width="1.5"/>
        <line x1="20" y1="194" x2="240" y2="194" stroke="#8A9DB8" stroke-width="1.5"/>
        <line x1="20" y1="208" x2="260" y2="208" stroke="#8A9DB8" stroke-width="1.5"/>
      </g>
    </g>
  </g>

  <line x1="40" y1="552" x2="1040" y2="552" class="hair"/>
  <g transform="translate(40, 580)">
    <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.4">Free forever, no account required, your data never leaves the browser</text>
  </g>
</svg>
