  <title>CrowESG framework matrix</title>
  <desc>Five-framework metric coverage grid (GRI 2021, TCFD, CSRD/ESRS, ISSB IFRS S1+S2, UK SDR) by four reporting dimensions (Governance, Strategy, Risk Mgmt, Metrics &amp; Targets). Cells show complete, in-progress, cross-mapped and not-started states. Synthetic figures for illustration only.</desc>
