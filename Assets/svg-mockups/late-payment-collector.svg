  <text x="84" y="266" class="f" font-size="24" font-weight="700" fill="#E8F0FA">62 days</text>

  <rect x="262" y="208" width="180" height="80" rx="10" fill="#0A1F3A" stroke="#0D2847"/>
  <text x="278" y="232" class="b" font-size="11" font-weight="600" fill="#8A9DB8">OUTSTANDING</text>
