<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="esgStep4Title" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="esgStep4Title">CrowESG Step 4: Report everywhere</title>
  <defs>
    <style>
      .bg { fill: #0A1422; }
      .c1 { fill: #0F1B2E; }
      .c2 { fill: #11243F; }
      .hair { stroke: rgba(255,255,255,0.08); stroke-width: 1; fill: none; }
      .cloud { fill: #E8EEF7; }
      .mist { fill: #8A9DB8; }
      .teal { fill: #0CC9A8; }
      .green { fill: #22C55E; }
      .digit { font-variant-numeric: tabular-nums; }

      .doc { opacity: 0; }
      .doc-1 { animation: doc-in 6s ease-out infinite; animation-delay: 0.4s; }
      .doc-2 { animation: doc-in 6s ease-out infinite; animation-delay: 0.7s; }
      .doc-3 { animation: doc-in 6s ease-out infinite; animation-delay: 1.0s; }
      .doc-4 { animation: doc-in 6s ease-out infinite; animation-delay: 1.3s; }
      @keyframes doc-in {
        0%, 4%   { opacity: 0; transform: translateY(8px); }
        15%, 95% { opacity: 1; transform: translateY(0); }
        100%     { opacity: 0; }
      }

      .doc-line { opacity: 0; }
      .dl-1 { animation: dl-in 6s ease-out infinite; animation-delay: 0.8s; }
      .dl-2 { animation: dl-in 6s ease-out infinite; animation-delay: 1.0s; }
      .dl-3 { animation: dl-in 6s ease-out infinite; animation-delay: 1.2s; }
      .dl-4 { animation: dl-in 6s ease-out infinite; animation-delay: 1.4s; }
      .dl-5 { animation: dl-in 6s ease-out infinite; animation-delay: 1.6s; }
      .dl-6 { animation: dl-in 6s ease-out infinite; animation-delay: 1.8s; }
      .dl-7 { animation: dl-in 6s ease-out infinite; animation-delay: 2.0s; }
      .dl-8 { animation: dl-in 6s ease-out infinite; animation-delay: 2.2s; }
      @keyframes dl-in {
        0%, 12%  { opacity: 0; transform: scaleX(0.2); transform-origin: left; }
        24%, 95% { opacity: 1; transform: scaleX(1); }
        100%     { opacity: 0; }
      }

      .trail-row { opacity: 0; }
      .tr-1 { animation: tr-in 6s ease-out infinite; animation-delay: 2.6s; }
      .tr-2 { animation: tr-in 6s ease-out infinite; animation-delay: 2.9s; }
      .tr-3 { animation: tr-in 6s ease-out infinite; animation-delay: 3.2s; }
      @keyframes tr-in {
        0%, 40%  { opacity: 0; transform: translateX(-4px); }
        52%, 95% { opacity: 1; transform: translateX(0); }
        100%     { opacity: 0; }
      }

      @media (prefers-reduced-motion: reduce) {
        .doc, .doc-1, .doc-2, .doc-3, .doc-4,
        .doc-line, .dl-1, .dl-2, .dl-3, .dl-4, .dl-5, .dl-6, .dl-7, .dl-8,
        .trail-row, .tr-1, .tr-2, .tr-3 {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="620"/>

  <!-- Header -->
  <g transform="translate(40, 40)">
    <text x="0" y="14" class="teal" font-size="11" font-weight="600" letter-spacing="1.5">STEP 4, REPORT</text>
    <text x="0" y="46" class="cloud" font-size="22" font-weight="600">One workspace, every report</text>
    <text x="0" y="68" class="mist" font-size="13">GRI index, TCFD pillars, ESRS datapoints, ISSB narrative, all auto-built</text>
  </g>

  <!-- Four report docs -->
  <g transform="translate(40, 140)">
    <!-- Doc 1: GRI -->
    <g class="doc doc-1">
      <rect x="0" y="0" width="170" height="220" rx="12" fill="#11243F" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
      <text x="16" y="28" class="teal" font-size="10" font-weight="700" letter-spacing="0.6">GRI 2021</text>
      <text x="16" y="48" class="cloud" font-size="11" font-weight="600">Content index</text>
      <line x1="16" y1="60" x2="154" y2="60" class="hair"/>
      <line class="doc-line dl-1" x1="16" y1="80" x2="138" y2="80" stroke="#8A9DB8" stroke-width="1.5"/>
      <line class="doc-line dl-2" x1="16" y1="98" x2="110" y2="98" stroke="#8A9DB8" stroke-width="1.5"/>
      <line class="doc-line dl-3" x1="16" y1="116" x2="138" y2="116" stroke="#8A9DB8" stroke-width="1.5"/>
      <line class="doc-line dl-4" x1="16" y1="134" x2="92" y2="134" stroke="#8A9DB8" stroke-width="1.5"/>
      <line class="doc-line dl-5" x1="16" y1="152" x2="138" y2="152" stroke="#8A9DB8" stroke-width="1.5"/>
      <line class="doc-line dl-6" x1="16" y1="170" x2="120" y2="170" stroke="#8A9DB8" stroke-width="1.5"/>
      <text x="154" y="206" class="green digit" font-size="10" text-anchor="end" font-weight="600">✓ Built</text>
    </g>
    <!-- Doc 2: TCFD -->
    <g class="doc doc-2" transform="translate(190, 0)">
      <rect x="0" y="0" width="170" height="220" rx="12" fill="#11243F" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
      <text x="16" y="28" class="teal" font-size="10" font-weight="700" letter-spacing="0.6">TCFD</text>
      <text x="16" y="48" class="cloud" font-size="11" font-weight="600">4-pillar disclosure</text>
      <line x1="16" y1="60" x2="154" y2="60" class="hair"/>
      <g transform="translate(16, 80)">
        <rect x="0" y="0" width="60" height="58" rx="6" fill="rgba(12,201,168,0.15)"/>
        <text x="30" y="22" class="teal" font-size="9" text-anchor="middle">Gov</text>
        <text x="30" y="42" class="cloud digit" font-size="10" text-anchor="middle" font-weight="700">3/3</text>
        <rect x="68" y="0" width="60" height="58" rx="6" fill="rgba(12,201,168,0.15)"/>
        <text x="98" y="22" class="teal" font-size="9" text-anchor="middle">Strat</text>
        <text x="98" y="42" class="cloud digit" font-size="10" text-anchor="middle" font-weight="700">3/3</text>
        <rect x="0" y="66" width="60" height="58" rx="6" fill="rgba(12,201,168,0.15)"/>
        <text x="30" y="88" class="teal" font-size="9" text-anchor="middle">Risk</text>
        <text x="30" y="108" class="cloud digit" font-size="10" text-anchor="middle" font-weight="700">3/3</text>
        <rect x="68" y="66" width="60" height="58" rx="6" fill="rgba(12,201,168,0.15)"/>
        <text x="98" y="88" class="teal" font-size="9" text-anchor="middle">Metrics</text>
        <text x="98" y="108" class="cloud digit" font-size="10" text-anchor="middle" font-weight="700">2/2</text>
      </g>
      <text x="154" y="206" class="green digit" font-size="10" text-anchor="end" font-weight="600">✓ Built</text>
    </g>
    <!-- Doc 3: ESRS -->
    <g class="doc doc-3" transform="translate(380, 0)">
      <rect x="0" y="0" width="170" height="220" rx="12" fill="#11243F" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
      <text x="16" y="28" class="teal" font-size="10" font-weight="700" letter-spacing="0.6">ESRS</text>
      <text x="16" y="48" class="cloud" font-size="11" font-weight="600">Datapoint set</text>
      <line x1="16" y1="60" x2="154" y2="60" class="hair"/>
      <g class="doc-line dl-1" transform="translate(16, 78)">
        <text x="0" y="10" class="mist" font-size="10">E1 Climate</text>
        <text x="138" y="10" class="cloud digit" font-size="10" text-anchor="end">218</text>
      </g>
      <g class="doc-line dl-2" transform="translate(16, 98)">
        <text x="0" y="10" class="mist" font-size="10">E2 Pollution</text>
        <text x="138" y="10" class="cloud digit" font-size="10" text-anchor="end">82</text>
      </g>
      <g class="doc-line dl-3" transform="translate(16, 118)">
        <text x="0" y="10" class="mist" font-size="10">E5 Resource use</text>
        <text x="138" y="10" class="cloud digit" font-size="10" text-anchor="end">96</text>
      </g>
      <g class="doc-line dl-4" transform="translate(16, 138)">
        <text x="0" y="10" class="mist" font-size="10">S1 Own workforce</text>
        <text x="138" y="10" class="cloud digit" font-size="10" text-anchor="end">142</text>
      </g>
      <g class="doc-line dl-5" transform="translate(16, 158)">
        <text x="0" y="10" class="mist" font-size="10">G1 Conduct</text>
        <text x="138" y="10" class="cloud digit" font-size="10" text-anchor="end">38</text>
      </g>
      <text x="154" y="206" class="green digit" font-size="10" text-anchor="end" font-weight="600">✓ Built</text>
    </g>
    <!-- Doc 4: ISSB -->
    <g class="doc doc-4" transform="translate(570, 0)">
      <rect x="0" y="0" width="170" height="220" rx="12" fill="#11243F" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
      <text x="16" y="28" class="teal" font-size="10" font-weight="700" letter-spacing="0.6">ISSB IFRS</text>
      <text x="16" y="48" class="cloud" font-size="11" font-weight="600">S1 / S2 narrative</text>
      <line x1="16" y1="60" x2="154" y2="60" class="hair"/>
      <line class="doc-line dl-1" x1="16" y1="80" x2="138" y2="80" stroke="#8A9DB8" stroke-width="1.5"/>
      <line class="doc-line dl-2" x1="16" y1="98" x2="120" y2="98" stroke="#8A9DB8" stroke-width="1.5"/>
      <line class="doc-line dl-3" x1="16" y1="116" x2="138" y2="116" stroke="#8A9DB8" stroke-width="1.5"/>
      <line class="doc-line dl-4" x1="16" y1="134" x2="100" y2="134" stroke="#8A9DB8" stroke-width="1.5"/>
      <line class="doc-line dl-5" x1="16" y1="152" x2="138" y2="152" stroke="#8A9DB8" stroke-width="1.5"/>
      <line class="doc-line dl-6" x1="16" y1="170" x2="124" y2="170" stroke="#8A9DB8" stroke-width="1.5"/>
      <text x="154" y="206" class="green digit" font-size="10" text-anchor="end" font-weight="600">✓ Built</text>
    </g>
  </g>

  <!-- Audit trail panel -->
  <g transform="translate(800, 140)">
    <rect class="c1" x="0" y="0" width="240" height="220" rx="14" ry="14"/>
    <text x="20" y="30" class="cloud" font-size="13" font-weight="600">Audit trail</text>
    <text x="20" y="50" class="mist" font-size="11">Every value, every source</text>
    <line x1="20" y1="66" x2="220" y2="66" class="hair"/>

    <g class="trail-row tr-1" transform="translate(20, 84)">
      <circle cx="6" cy="6" r="4" class="teal"/>
      <text x="18" y="10" class="cloud" font-size="11">Source captured</text>
      <text x="18" y="26" class="mist digit" font-size="9">SAP, May 16 2026</text>
    </g>
    <g class="trail-row tr-2" transform="translate(20, 124)">
      <circle cx="6" cy="6" r="4" class="teal"/>
      <text x="18" y="10" class="cloud" font-size="11">Reviewer signed off</text>
      <text x="18" y="26" class="mist digit" font-size="9">A. Singh, May 17 2026</text>
    </g>
    <g class="trail-row tr-3" transform="translate(20, 164)">
      <circle cx="6" cy="6" r="4" class="teal"/>
      <text x="18" y="10" class="cloud" font-size="11">Published to report</text>
      <text x="18" y="26" class="mist digit" font-size="9">All 4 frameworks</text>
    </g>
  </g>

  <!-- Summary footer -->
  <g transform="translate(40, 388)">
    <rect class="c1" x="0" y="0" width="1000" height="120" rx="16" ry="16"/>
    <text x="20" y="32" class="cloud" font-size="13" font-weight="600">One push, four reports out the door</text>
    <text x="20" y="52" class="mist" font-size="11">Reports stay in sync as your source data changes, no double-keying ever</text>
    <line x1="20" y1="68" x2="980" y2="68" class="hair"/>

    <g transform="translate(20, 92)">
      <text x="0" y="0" class="mist" font-size="11">Last published</text>
      <text x="980" y="0" class="teal digit" font-size="12" font-weight="700" text-anchor="end">18 May 2026, 09:42</text>
    </g>
  </g>

  <line x1="40" y1="552" x2="1040" y2="552" class="hair"/>
  <g transform="translate(40, 580)">
    <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.4">Assurance-grade audit trail behind every metric, every framework, every time</text>
  </g>
</svg>
