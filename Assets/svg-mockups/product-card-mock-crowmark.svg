<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360" preserveAspectRatio="xMidYMid meet" role="img" aria-label="CrowMark PPN 002 social value score circle filling from sixty five to ninety two percent">
  <title>CrowMark dashboard preview</title>
  <defs>
    <linearGradient id="mkBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A1F3A"/>
      <stop offset="1" stop-color="#040E1A"/>
    </linearGradient>
    <linearGradient id="mkAcc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0CC9A8"/>
      <stop offset="1" stop-color="#C2FF57"/>
    </linearGradient>
  </defs>
  <style>@media (prefers-reduced-motion: reduce){animate,animateTransform{display:none}}</style>
  <rect width="600" height="360" rx="14" fill="url(#mkBg)"/>
  <rect x="1" y="1" width="598" height="358" rx="13" fill="none" stroke="#0CC9A8" stroke-opacity="0.18"/>

  <!-- chrome -->
  <circle cx="24" cy="24" r="4" fill="#8A9DB8" fill-opacity="0.4"/>
  <circle cx="40" cy="24" r="4" fill="#8A9DB8" fill-opacity="0.4"/>
  <circle cx="56" cy="24" r="4" fill="#8A9DB8" fill-opacity="0.4"/>
  <rect x="80" y="18" width="170" height="12" rx="6" fill="#0F2D52"/>
  <text x="540" y="28" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8A9DB8" text-anchor="end">PPN 002 · Oxford SVB</text>

  <text x="32" y="78" font-family="Plus Jakarta Sans,system-ui,sans-serif" font-size="14" fill="#B8CCE0" font-weight="600">Social value score</text>
  <text x="32" y="98" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8A9DB8">Bid: Manchester CC framework lot 3</text>

  <!-- big percentage ring -->
  <g transform="translate(155,230)">
    <!-- 393 ≈ 2 * PI * 62.5 -->
    <circle r="62.5" fill="none" stroke="#0F2D52" stroke-width="12"/>
    <circle r="62.5" fill="none" stroke="url(#mkAcc)" stroke-width="12" stroke-linecap="round" stroke-dasharray="393" stroke-dashoffset="138" transform="rotate(-90)">
      <animate attributeName="stroke-dashoffset" values="138;108;82;58;42;31" dur="4s" repeatCount="indefinite"/>
    </circle>

    <g font-family="Plus Jakarta Sans,system-ui,sans-serif" font-weight="700" fill="#E8F0FA" text-anchor="middle">
      <g font-size="44">
        <text y="6" opacity="0">65%<animate attributeName="opacity" values="1;0;0;0;0;0" dur="4s" repeatCount="indefinite"/></text>
        <text y="6" opacity="0">72%<animate attributeName="opacity" values="0;1;0;0;0;0" dur="4s" repeatCount="indefinite"/></text>
        <text y="6" opacity="0">78%<animate attributeName="opacity" values="0;0;1;0;0;0" dur="4s" repeatCount="indefinite"/></text>
        <text y="6" opacity="0">84%<animate attributeName="opacity" values="0;0;0;1;0;0" dur="4s" repeatCount="indefinite"/></text>
        <text y="6" opacity="0">89%<animate attributeName="opacity" values="0;0;0;0;1;0" dur="4s" repeatCount="indefinite"/></text>
        <text y="6" opacity="0">92%<animate attributeName="opacity" values="0;0;0;0;0;1" dur="4s" repeatCount="indefinite"/></text>
      </g>
    </g>
    <text y="32" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8A9DB8" text-anchor="middle">vs 10% floor</text>
  </g>

  <!-- right side: TOMs measure rows lighting up -->
  <g transform="translate(280,130)" font-family="Inter,system-ui,sans-serif" font-size="11">
    <text fill="#B8CCE0" font-weight="600">TOMs measures matched</text>

    <g transform="translate(0,18)">
      <rect width="280" height="28" rx="6" fill="#0F2D52"/>
      <rect width="280" height="28" rx="6" fill="#0CC9A8" opacity="0">
        <animate attributeName="opacity" values="0;0.18;0.18;0.18;0.18;0.18" dur="4s" repeatCount="indefinite"/>
      </rect>
      <circle cx="14" cy="14" r="6" fill="#0CC9A8"/>
      <text x="28" y="18" fill="#E8F0FA">NT1 jobs for under-25s</text>
      <text x="272" y="18" fill="#8A9DB8" text-anchor="end">+12.4</text>
    </g>

    <g transform="translate(0,52)">
      <rect width="280" height="28" rx="6" fill="#0F2D52"/>
      <rect width="280" height="28" rx="6" fill="#0CC9A8" opacity="0">
        <animate attributeName="opacity" values="0;0;0.18;0.18;0.18;0.18" dur="4s" repeatCount="indefinite"/>
      </rect>
      <circle cx="14" cy="14" r="6" fill="#0F2D52" stroke="#0CC9A8" stroke-opacity="0.4">
        <animate attributeName="fill" values="#0F2D52;#0F2D52;#0CC9A8;#0CC9A8;#0CC9A8;#0CC9A8" dur="4s" repeatCount="indefinite"/>
      </circle>
      <text x="28" y="18" fill="#E8F0FA">NT12 local SME spend</text>
      <text x="272" y="18" fill="#8A9DB8" text-anchor="end">+18.1</text>
    </g>

    <g transform="translate(0,86)">
      <rect width="280" height="28" rx="6" fill="#0F2D52"/>
      <rect width="280" height="28" rx="6" fill="#0CC9A8" opacity="0">
        <animate attributeName="opacity" values="0;0;0;0.18;0.18;0.18" dur="4s" repeatCount="indefinite"/>
      </rect>
      <circle cx="14" cy="14" r="6" fill="#0F2D52" stroke="#0CC9A8" stroke-opacity="0.4">
        <animate attributeName="fill" values="#0F2D52;#0F2D52;#0F2D52;#0CC9A8;#0CC9A8;#0CC9A8" dur="4s" repeatCount="indefinite"/>
      </circle>
      <text x="28" y="18" fill="#E8F0FA">NT19 carbon reduction</text>
      <text x="272" y="18" fill="#8A9DB8" text-anchor="end">+9.6</text>
    </g>

    <g transform="translate(0,120)">
      <rect width="280" height="28" rx="6" fill="#0F2D52"/>
      <rect width="280" height="28" rx="6" fill="#0CC9A8" opacity="0">
        <animate attributeName="opacity" values="0;0;0;0;0.18;0.18" dur="4s" repeatCount="indefinite"/>
      </rect>
      <circle cx="14" cy="14" r="6" fill="#0F2D52" stroke="#0CC9A8" stroke-opacity="0.4">
        <animate attributeName="fill" values="#0F2D52;#0F2D52;#0F2D52;#0F2D52;#0CC9A8;#0CC9A8" dur="4s" repeatCount="indefinite"/>
      </circle>
      <text x="28" y="18" fill="#E8F0FA">NT5 community wellbeing</text>
      <text x="272" y="18" fill="#8A9DB8" text-anchor="end">+7.3</text>
    </g>

    <g transform="translate(0,154)">
      <rect width="280" height="28" rx="6" fill="#0F2D52"/>
      <rect width="280" height="28" rx="6" fill="#0CC9A8" opacity="0">
        <animate attributeName="opacity" values="0;0;0;0;0;0.18" dur="4s" repeatCount="indefinite"/>
      </rect>
      <circle cx="14" cy="14" r="6" fill="#0F2D52" stroke="#0CC9A8" stroke-opacity="0.4">
        <animate attributeName="fill" values="#0F2D52;#0F2D52;#0F2D52;#0F2D52;#0F2D52;#0CC9A8" dur="4s" repeatCount="indefinite"/>
      </circle>
      <text x="28" y="18" fill="#E8F0FA">NT26 apprenticeships</text>
      <text x="272" y="18" fill="#8A9DB8" text-anchor="end">+4.6</text>
    </g>
  </g>

  <!-- live indicator -->
  <circle cx="556" cy="78" r="4" fill="#0CC9A8">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="546" y="82" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#8A9DB8" text-anchor="end">Live</text>
</svg>
