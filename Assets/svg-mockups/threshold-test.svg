<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="CSRD Checker threshold test mockup with sliders, calculation breakdown and result band">
  <title>CSRD threshold test</title>
  <desc>Slider-based threshold test for CSRD scope showing live calculation against the Omnibus I 1,000-employee and €450M turnover gates.</desc>
  <defs><linearGradient id="bgTT" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#040E1A"/><stop offset="1" stop-color="#061525"/></linearGradient></defs>
  <style>
    .f { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    .b { font-family: 'Inter', system-ui, sans-serif; }
    .m { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  </style>
  <rect width="1600" height="900" fill="url(#bgTT)"/>
  <rect x="0" y="0" width="1600" height="44" fill="#0A1F3A"/>
  <circle cx="22" cy="22" r="6" fill="#EF4444"/><circle cx="44" cy="22" r="6" fill="#F59E0B"/><circle cx="66" cy="22" r="6" fill="#0CC9A8"/>
  <rect x="600" y="11" width="400" height="22" rx="11" fill="#040E1A"/>
  <text x="800" y="26" text-anchor="middle" class="b" font-size="11" fill="#8A9DB8">app.crowagent.ai/csrd/threshold-test</text>
  <rect x="0" y="44" width="1600" height="64" fill="#0A1F3A"/>
  <line x1="0" y1="108" x2="1600" y2="108" stroke="#0D2847"/>
  <circle cx="44" cy="76" r="14" fill="#5BC8FF"/>
  <text x="44" y="82" text-anchor="middle" class="f" font-size="14" font-weight="700" fill="#040E1A">€</text>
  <text x="68" y="81" class="f" font-size="17" font-weight="700" fill="#E8F0FA">CSRD Checker · Threshold test</text>

  <text x="68" y="160" class="f" font-size="26" font-weight="700" fill="#E8F0FA">Live threshold test</text>
  <text x="68" y="184" class="b" font-size="13" fill="#8A9DB8">Adjust the sliders to see how the Omnibus I gates apply to your group</text>

  <!-- Inputs -->
  <rect x="68" y="216" width="940" height="380" rx="14" fill="#0A1F3A" stroke="#0D2847"/>
  <text x="92" y="252" class="f" font-size="14" font-weight="700" fill="#E8F0FA">Group financials</text>

  <!-- Headcount slider -->
  <text x="92" y="296" class="b" font-size="12" font-weight="600" fill="#E8F0FA">Average employees (last FY)</text>
  <text x="984" y="296" text-anchor="end" class="m" font-size="14" font-weight="700" fill="#5BC8FF">1,250</text>
  <rect x="92" y="306" width="892" height="6" rx="3" fill="#0D2847"/>
  <rect x="92" y="306" width="446" height="6" rx="3" fill="#5BC8FF"/>
  <circle cx="538" cy="309" r="10" fill="#5BC8FF" stroke="#040E1A" stroke-width="2"/>
  <line x1="442" y1="296" x2="442" y2="324" stroke="#F59E0B" stroke-width="2"/>
  <text x="442" y="346" text-anchor="middle" class="m" font-size="10" font-weight="700" fill="#F59E0B">1,000 GATE</text>
  <text x="92" y="346" class="m" font-size="10" fill="#8A9DB8">0</text>
  <text x="984" y="346" text-anchor="end" class="m" font-size="10" fill="#8A9DB8">2,500</text>

  <!-- Turnover slider -->
  <text x="92" y="396" class="b" font-size="12" font-weight="600" fill="#E8F0FA">Annual EU consolidated turnover</text>
  <text x="984" y="396" text-anchor="end" class="m" font-size="14" font-weight="700" fill="#5BC8FF">€620M</text>
  <rect x="92" y="406" width="892" height="6" rx="3" fill="#0D2847"/>
  <rect x="92" y="406" width="552" height="6" rx="3" fill="#5BC8FF"/>
  <circle cx="644" cy="409" r="10" fill="#5BC8FF" stroke="#040E1A" stroke-width="2"/>
  <line x1="468" y1="396" x2="468" y2="424" stroke="#F59E0B" stroke-width="2"/>
  <text x="468" y="446" text-anchor="middle" class="m" font-size="10" font-weight="700" fill="#F59E0B">€450M GATE</text>
  <text x="92" y="446" class="m" font-size="10" fill="#8A9DB8">€0</text>
  <text x="984" y="446" text-anchor="end" class="m" font-size="10" fill="#8A9DB8">€1B</text>

  <!-- Balance-sheet -->
  <text x="92" y="496" class="b" font-size="12" font-weight="600" fill="#E8F0FA">Balance-sheet total</text>
  <text x="984" y="496" text-anchor="end" class="m" font-size="14" font-weight="700" fill="#5BC8FF">€312M</text>
  <rect x="92" y="506" width="892" height="6" rx="3" fill="#0D2847"/>
  <rect x="92" y="506" width="320" height="6" rx="3" fill="#5BC8FF"/>
  <circle cx="412" cy="509" r="10" fill="#5BC8FF" stroke="#040E1A" stroke-width="2"/>
  <line x1="246" y1="496" x2="246" y2="524" stroke="#8A9DB8" stroke-width="2" stroke-dasharray="3 3"/>
  <text x="246" y="546" text-anchor="middle" class="m" font-size="10" fill="#8A9DB8">€225M (info only)</text>
  <text x="92" y="546" class="m" font-size="10" fill="#8A9DB8">€0</text>
  <text x="984" y="546" text-anchor="end" class="m" font-size="10" fill="#8A9DB8">€1B</text>

  <text x="92" y="582" class="b" font-size="11" fill="#8A9DB8">Both employees AND turnover gates must exceed for in-scope · balance-sheet shown for context</text>

  <!-- Right: gate logic -->
  <rect x="1024" y="216" width="536" height="380" rx="14" fill="#0A1F3A" stroke="#0D2847"/>
  <text x="1048" y="252" class="f" font-size="14" font-weight="700" fill="#E8F0FA">Gate logic</text>
  <text x="1048" y="270" class="b" font-size="11" fill="#8A9DB8">Article 19a(1) · Directive (EU) 2026/470</text>

  <!-- Gate 1 -->
  <rect x="1048" y="294" width="488" height="76" rx="10" fill="#0CC9A8" fill-opacity="0.12" stroke="#0CC9A8"/>
  <circle cx="1080" cy="332" r="16" fill="#0CC9A8"/>
  <path d="M1072 332 L1078 338 L1090 326" stroke="#040E1A" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1108" y="324" class="b" font-size="13" font-weight="700" fill="#E8F0FA">EMPLOYEES gate · &gt; 1,000</text>
  <text x="1108" y="344" class="m" font-size="13" fill="#0CC9A8">1,250 &gt; 1,000 ✓</text>
  <text x="1108" y="362" class="b" font-size="11" fill="#B8CCE0">Exceeds by 250 (25% headroom)</text>

  <!-- Gate 2 -->
  <rect x="1048" y="384" width="488" height="76" rx="10" fill="#0CC9A8" fill-opacity="0.12" stroke="#0CC9A8"/>
  <circle cx="1080" cy="422" r="16" fill="#0CC9A8"/>
  <path d="M1072 422 L1078 428 L1090 416" stroke="#040E1A" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1108" y="414" class="b" font-size="13" font-weight="700" fill="#E8F0FA">TURNOVER gate · &gt; €450M</text>
  <text x="1108" y="434" class="m" font-size="13" fill="#0CC9A8">€620M &gt; €450M ✓</text>
  <text x="1108" y="452" class="b" font-size="11" fill="#B8CCE0">Exceeds by €170M (38% headroom)</text>

  <!-- Result -->
  <rect x="1048" y="486" width="488" height="92" rx="10" fill="#0CC9A8"/>
  <text x="1064" y="516" class="b" font-size="11" font-weight="700" fill="#040E1A">PROVISIONAL RESULT</text>
  <text x="1064" y="546" class="f" font-size="22" font-weight="700" fill="#040E1A">In scope · ESRS reporting required</text>
  <text x="1064" y="566" class="b" font-size="11" fill="#040E1A">First report due FY2027 reporting on FY2026 data</text>

  <!-- Result panel -->
  <rect x="68" y="616" width="1492" height="224" rx="14" fill="#0A1F3A" stroke="#0D2847"/>
  <text x="92" y="652" class="f" font-size="16" font-weight="700" fill="#E8F0FA">What this means for you</text>

  <!-- Step columns -->
  <rect x="92" y="676" width="340" height="140" rx="10" fill="#0D2847"/>
  <rect x="92" y="676" width="4" height="140" fill="#0CC9A8"/>
  <text x="116" y="704" class="b" font-size="11" font-weight="700" fill="#0CC9A8">STEP 1 · NOW</text>
  <text x="116" y="730" class="b" font-size="14" font-weight="600" fill="#E8F0FA">Double materiality assessment</text>
  <text x="116" y="752" class="b" font-size="11" fill="#B8CCE0">Identify material impacts, risks and</text>
  <text x="116" y="768" class="b" font-size="11" fill="#B8CCE0">opportunities (ESRS 1 + ESRS 2)</text>
  <rect x="116" y="784" width="160" height="22" rx="11" fill="#0CC9A8"/>
  <text x="196" y="800" text-anchor="middle" class="b" font-size="11" font-weight="700" fill="#040E1A">Open in CrowESG →</text>

  <rect x="450" y="676" width="340" height="140" rx="10" fill="#0D2847"/>
  <rect x="450" y="676" width="4" height="140" fill="#5BC8FF"/>
  <text x="474" y="704" class="b" font-size="11" font-weight="700" fill="#5BC8FF">STEP 2 · Q3 2026</text>
  <text x="474" y="730" class="b" font-size="14" font-weight="600" fill="#E8F0FA">Map metrics to ESRS data points</text>
  <text x="474" y="752" class="b" font-size="11" fill="#B8CCE0">CrowESG cross-maps to GRI, TCFD,</text>
  <text x="474" y="768" class="b" font-size="11" fill="#B8CCE0">ISSB and UK SDR automatically</text>
  <text x="474" y="800" class="b" font-size="11" font-weight="600" fill="#5BC8FF">CrowESG launches Q3 2026 · join waitlist</text>

  <rect x="808" y="676" width="340" height="140" rx="10" fill="#0D2847"/>
  <rect x="808" y="676" width="4" height="140" fill="#A78BFA"/>
  <text x="832" y="704" class="b" font-size="11" font-weight="700" fill="#A78BFA">STEP 3 · FY2027</text>
  <text x="832" y="730" class="b" font-size="14" font-weight="600" fill="#E8F0FA">Publish first ESRS report</text>
  <text x="832" y="752" class="b" font-size="11" fill="#B8CCE0">Filed alongside annual report ·</text>
  <text x="832" y="768" class="b" font-size="11" fill="#B8CCE0">limited assurance required</text>
  <text x="832" y="800" class="b" font-size="11" font-weight="600" fill="#A78BFA">Audit-ready evidence trail</text>

  <rect x="1166" y="676" width="370" height="140" rx="10" fill="#040E1A" stroke="#5BC8FF" stroke-opacity="0.4"/>
  <text x="1186" y="704" class="b" font-size="11" font-weight="700" fill="#5BC8FF">CITATION</text>
  <text x="1186" y="730" class="b" font-size="13" font-weight="600" fill="#E8F0FA">Directive (EU) 2026/470</text>
  <text x="1186" y="748" class="b" font-size="11" fill="#B8CCE0">Omnibus I · in force 18 Mar 2026</text>
  <text x="1186" y="766" class="b" font-size="11" fill="#B8CCE0">Replaces 2022/2464 thresholds</text>
  <rect x="1186" y="780" width="200" height="26" rx="13" fill="#0D2847"/>
  <text x="1286" y="797" text-anchor="middle" class="b" font-size="11" font-weight="600" fill="#5BC8FF">Read article →</text>
</svg>
