      <rect x="590" y="642" width="34" height="24" rx="4" fill="#EF4444"/>
      <text x="607" y="659" text-anchor="middle" class="f" font-size="13" font-weight="700" fill="#040E1A">F</text>
      <path d="M630 654 L648 654" stroke="#8A9DB8" stroke-width="1.5"/>
      <path d="M644 650 L648 654 L644 658" stroke="#8A9DB8" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="654" y="642" width="34" height="24" rx="4" fill="#0CC9A8"/>
      <text x="671" y="659" text-anchor="middle" class="f" font-size="13" font-weight="700" fill="#040E1A">B</text>
    </g>

