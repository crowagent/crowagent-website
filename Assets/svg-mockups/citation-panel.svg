  <text x="116" y="396" class="b" font-size="14" font-weight="700" fill="#E8F0FA">Omnibus I · CSRD scope amendment</text>
  <text x="116" y="416" class="b" font-size="11" fill="#B8CCE0">Article 19a(1) — narrows scope to large undertakings exceeding 1,000 employees AND €450M turnover</text>
