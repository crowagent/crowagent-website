      <path d="M146 658 L150 662 L146 666" stroke="#8A9DB8" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="156" y="650" width="34" height="24" rx="4" fill="#0CC9A8"/>
      <text x="173" y="667" text-anchor="middle" class="f" font-size="13" font-weight="700" fill="#040E1A">C</text>
    </g>

