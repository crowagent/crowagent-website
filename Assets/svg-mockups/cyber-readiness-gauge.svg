  <text x="156" y="768" class="b steel" font-size="11">Mostly evidence uploads · est. 2.5 hours of work</text>
  <text x="92" y="804" class="b steel" font-size="10" font-weight="600">NEXT STEP</text>
  <text x="92" y="822" class="b cloud" font-size="11">Resume access control questions 9 – 14 · MFA evidence due</text>
  <rect x="538" y="788" width="138" height="36" rx="8" class="teal"/>
  <text x="607" y="811" text-anchor="middle" class="b" font-size="12" font-weight="700" fill="#040E1A">Resume →</text>
  <!-- RIGHT: per-theme breakdown -->
