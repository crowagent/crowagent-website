  <!-- Measure 1 -->
  <rect x="92" y="412" width="572" height="74" rx="8" fill="#0D2847"/>
  <rect x="92" y="412" width="3" height="74" fill="#A78BFA"/>
  <text x="108" y="434" class="b" font-size="11" font-weight="600" fill="#A78BFA">NT24 · Wellbeing</text>
  <text x="108" y="454" class="b" font-size="13" font-weight="600" fill="#E8F0FA">Hours of training delivered to local SMEs</text>
  <text x="108" y="474" class="b" font-size="11" fill="#8A9DB8">Oxford SVB proxy: £24.18 · Selected target 480 hr · Δ £11,606</text>
  <rect x="600" y="436" width="50" height="22" rx="11" fill="#0CC9A8" fill-opacity="0.18"/>
  <path d="M615 446 L620 451 L630 442" stroke="#0CC9A8" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="640" y="450" class="b" font-size="10" font-weight="600" fill="#0CC9A8">In</text>

