<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="markStep4Title" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="markStep4Title">CrowMark Step 4: Track evidence post-win</title>
  <defs>
    <style>
      .bg { fill: #0A1422; }
      .c1 { fill: #0F1B2E; }
      .c2 { fill: #11243F; }
      .hair { stroke: rgba(255,255,255,0.08); stroke-width: 1; fill: none; }
      .cloud { fill: #E8EEF7; }
      .mist { fill: #8A9DB8; }
      .teal { fill: #0CC9A8; }
      .green { fill: #22C55E; }
      .amber { fill: #F59E0B; }
      .digit { font-variant-numeric: tabular-nums; }

      .commit-row { opacity: 0; }
      .cr-1 { animation: cr-in 6s ease-out infinite; animation-delay: 0.4s; }
      .cr-2 { animation: cr-in 6s ease-out infinite; animation-delay: 0.7s; }
      .cr-3 { animation: cr-in 6s ease-out infinite; animation-delay: 1.0s; }
      .cr-4 { animation: cr-in 6s ease-out infinite; animation-delay: 1.3s; }
      .cr-5 { animation: cr-in 6s ease-out infinite; animation-delay: 1.6s; }
      @keyframes cr-in {
        0%, 4%   { opacity: 0; transform: translateY(4px); }
        15%, 95% { opacity: 1; transform: translateY(0); }
        100%     { opacity: 0; }
      }

      .progress-fill { transform-origin: left; animation: pf 6s cubic-bezier(0.4,0,0.2,1) infinite; }
      .pf-1 { animation-delay: 0.6s; }
      .pf-2 { animation-delay: 0.9s; }
      .pf-3 { animation-delay: 1.2s; }
      .pf-4 { animation-delay: 1.5s; }
      .pf-5 { animation-delay: 1.8s; }
      @keyframes pf {
        0%, 12%  { transform: scaleX(0); }
        55%, 100% { transform: scaleX(1); }
      }

      .report-stamp { opacity: 0; transform-origin: center; transform-box: fill-box; animation: stamp-in 6s ease-out infinite; animation-delay: 2.8s; }
      @keyframes stamp-in {
        0%, 38%  { opacity: 0; transform: scale(1.3) rotate(-6deg); }
        52%, 95% { opacity: 1; transform: scale(1) rotate(-6deg); }
        100%     { opacity: 0; }
      }

      .calendar-tick { opacity: 0; }
      .ct-1 { animation: ct-in 6s ease-out infinite; animation-delay: 3.4s; }
      .ct-2 { animation: ct-in 6s ease-out infinite; animation-delay: 3.7s; }
      .ct-3 { animation: ct-in 6s ease-out infinite; animation-delay: 4.0s; }
      @keyframes ct-in {
        0%, 52%  { opacity: 0; }
        62%, 95% { opacity: 1; }
        100%     { opacity: 0; }
      }

      @media (prefers-reduced-motion: reduce) {
        .commit-row, .cr-1, .cr-2, .cr-3, .cr-4, .cr-5,
        .progress-fill, .pf-1, .pf-2, .pf-3, .pf-4, .pf-5,
        .report-stamp, .calendar-tick, .ct-1, .ct-2, .ct-3 {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
        .progress-fill { transform: scaleX(1) !important; }
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="620"/>

  <!-- Header -->
  <g transform="translate(40, 40)">
    <text x="0" y="14" class="teal" font-size="11" font-weight="600" letter-spacing="1.5">STEP 4, TRACK</text>
    <text x="0" y="46" class="cloud" font-size="22" font-weight="600">Evidence delivery, post-win</text>
    <text x="0" y="68" class="mist" font-size="13">Commitments tracked monthly, audit-ready reports auto-generated</text>
  </g>

  <!-- Commitments tracker -->
  <g transform="translate(40, 140)">
    <rect class="c1" x="0" y="0" width="640" height="370" rx="16" ry="16"/>
    <text x="20" y="32" class="cloud" font-size="13" font-weight="600">Live commitments tracker</text>
    <text x="20" y="52" class="mist" font-size="11">Borough of Camden Highways, year 1 of 4</text>
    <line x1="20" y1="68" x2="620" y2="68" class="hair"/>

    <g transform="translate(20, 86)">
      <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.6">COMMITMENT</text>
      <text x="320" y="0" class="mist" font-size="10" letter-spacing="0.6">DELIVERED</text>
      <text x="500" y="0" class="mist" font-size="10" letter-spacing="0.6">STATUS</text>
      <line x1="0" y1="12" x2="600" y2="12" class="hair"/>
    </g>

    <g transform="translate(20, 110)">
      <g class="commit-row cr-1">
        <text x="0" y="14" class="cloud" font-size="12">Local hires</text>
        <text x="320" y="14" class="cloud digit" font-size="12">9 of 12</text>
        <rect x="400" y="6" width="80" height="10" rx="5" fill="#1B2F4D"/>
        <rect class="progress-fill pf-1" x="400" y="6" width="60" height="10" rx="5" fill="#22C55E"/>
        <text x="600" y="14" class="green digit" font-size="11" text-anchor="end" font-weight="600">On track</text>
      </g>
      <g class="commit-row cr-2" transform="translate(0, 36)">
        <text x="0" y="14" class="cloud" font-size="12">Apprenticeship starts</text>
        <text x="320" y="14" class="cloud digit" font-size="12">3 of 4</text>
        <rect x="400" y="6" width="80" height="10" rx="5" fill="#1B2F4D"/>
        <rect class="progress-fill pf-2" x="400" y="6" width="60" height="10" rx="5" fill="#22C55E"/>
        <text x="600" y="14" class="green digit" font-size="11" text-anchor="end" font-weight="600">On track</text>
      </g>
      <g class="commit-row cr-3" transform="translate(0, 72)">
        <text x="0" y="14" class="cloud" font-size="12">Local supply spend</text>
        <text x="320" y="14" class="cloud digit" font-size="12">£68k of £82k</text>
        <rect x="400" y="6" width="80" height="10" rx="5" fill="#1B2F4D"/>
        <rect class="progress-fill pf-3" x="400" y="6" width="66" height="10" rx="5" fill="#22C55E"/>
        <text x="600" y="14" class="green digit" font-size="11" text-anchor="end" font-weight="600">On track</text>
      </g>
      <g class="commit-row cr-4" transform="translate(0, 108)">
        <text x="0" y="14" class="cloud" font-size="12">Carbon reduction (tCO2e)</text>
        <text x="320" y="14" class="cloud digit" font-size="12">128 of 184</text>
        <rect x="400" y="6" width="80" height="10" rx="5" fill="#1B2F4D"/>
        <rect class="progress-fill pf-4" x="400" y="6" width="56" height="10" rx="5" fill="#F59E0B"/>
        <text x="600" y="14" class="amber digit" font-size="11" text-anchor="end" font-weight="600">Watch</text>
      </g>
      <g class="commit-row cr-5" transform="translate(0, 144)">
        <text x="0" y="14" class="cloud" font-size="12">Volunteer hours</text>
        <text x="320" y="14" class="cloud digit" font-size="12">418 of 500</text>
        <rect x="400" y="6" width="80" height="10" rx="5" fill="#1B2F4D"/>
        <rect class="progress-fill pf-5" x="400" y="6" width="66" height="10" rx="5" fill="#22C55E"/>
        <text x="600" y="14" class="green digit" font-size="11" text-anchor="end" font-weight="600">On track</text>
      </g>
    </g>

    <line x1="20" y1="298" x2="620" y2="298" class="hair"/>
    <text x="20" y="324" class="mist" font-size="11">Social value delivered to date</text>
    <text x="620" y="324" class="teal digit" font-size="13" font-weight="700" text-anchor="end">£146,820</text>
    <text x="20" y="346" class="mist digit" font-size="10">82% of contract year 1 target</text>
  </g>

  <!-- Right, monthly report stamp -->
  <g transform="translate(700, 140)">
    <rect class="c1" x="0" y="0" width="340" height="370" rx="16" ry="16"/>
    <text x="20" y="32" class="cloud" font-size="13" font-weight="600">Monthly report, May 2026</text>
    <text x="20" y="52" class="mist" font-size="11">Auto-compiled, ready for client</text>
    <line x1="20" y1="68" x2="320" y2="68" class="hair"/>

    <!-- mini doc preview -->
    <g transform="translate(60, 100)">
      <rect x="0" y="0" width="220" height="160" rx="10" fill="#11243F" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
      <line x1="20" y1="26" x2="200" y2="26" stroke="#8A9DB8" stroke-width="1"/>
      <line x1="20" y1="44" x2="160" y2="44" stroke="#8A9DB8" stroke-width="1"/>
      <line x1="20" y1="62" x2="180" y2="62" stroke="#8A9DB8" stroke-width="1"/>
      <rect x="20" y="80" width="80" height="50" rx="4" fill="rgba(12,201,168,0.18)"/>
      <line x1="110" y1="86" x2="200" y2="86" stroke="#8A9DB8" stroke-width="1"/>
      <line x1="110" y1="100" x2="200" y2="100" stroke="#8A9DB8" stroke-width="1"/>
      <line x1="110" y1="114" x2="180" y2="114" stroke="#8A9DB8" stroke-width="1"/>
      <line x1="20" y1="146" x2="100" y2="146" stroke="#8A9DB8" stroke-width="1"/>
    </g>

    <!-- Approved stamp -->
    <g class="report-stamp" transform="translate(220, 130)">
      <circle cx="0" cy="0" r="44" fill="none" stroke="#22C55E" stroke-width="2.5"/>
      <text x="0" y="-4" class="green" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="0.5">EVIDENCE</text>
      <text x="0" y="12" class="green" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="0.5">VERIFIED</text>
    </g>

    <!-- Mini calendar -->
    <g transform="translate(40, 280)">
      <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.6">REPORTING CADENCE</text>
      <g class="calendar-tick ct-1" transform="translate(0, 14)">
        <rect x="0" y="0" width="48" height="34" rx="6" fill="#11243F"/>
        <text x="24" y="14" class="mist" font-size="9" text-anchor="middle">MAR</text>
        <text x="24" y="28" class="green digit" font-size="12" font-weight="700" text-anchor="middle">✓</text>
      </g>
      <g class="calendar-tick ct-2" transform="translate(56, 14)">
        <rect x="0" y="0" width="48" height="34" rx="6" fill="#11243F"/>
        <text x="24" y="14" class="mist" font-size="9" text-anchor="middle">APR</text>
        <text x="24" y="28" class="green digit" font-size="12" font-weight="700" text-anchor="middle">✓</text>
      </g>
      <g class="calendar-tick ct-3" transform="translate(112, 14)">
        <rect x="0" y="0" width="48" height="34" rx="6" fill="rgba(12,201,168,0.18)" stroke="#0CC9A8" stroke-width="1"/>
        <text x="24" y="14" class="teal" font-size="9" text-anchor="middle">MAY</text>
        <text x="24" y="28" class="teal digit" font-size="12" font-weight="700" text-anchor="middle">●</text>
      </g>
      <g transform="translate(168, 14)">
        <rect x="0" y="0" width="48" height="34" rx="6" fill="#11243F" opacity="0.6"/>
        <text x="24" y="14" class="mist" font-size="9" text-anchor="middle">JUN</text>
      </g>
    </g>
  </g>

  <line x1="40" y1="552" x2="1040" y2="552" class="hair"/>
  <g transform="translate(40, 580)">
    <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.4">Every commitment links back to its TOMs measure and the source bid narrative</text>
  </g>
</svg>
