<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1067" role="img" aria-label="Diamond network with connection lines in CrowAgent teal and sky" preserveAspectRatio="xMidYMid slice">
  <title>CrowAgent partners, connected network abstract</title>
  <desc>Translucent diamond nodes joined by faint connection lines suggesting a partner network. Decorative; no data.</desc>
  <defs>
    <linearGradient id="ptDmdA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0CC9A8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0CC9A8" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="ptDmdB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5BC8FF" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#5BC8FF" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="ptDmdC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5BC8FF" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#0CC9A8" stop-opacity="0.08"/>
    </linearGradient>
    <symbol id="ptDmd" viewBox="-50 -50 100 100">
      <polygon points="0,-50 50,0 0,50 -50,0" stroke-width="1.6" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <style>
    @keyframes pt-drift{0%,100%{transform:translate(0,0)}50%{transform:translate(6px,-4px)}}
    @keyframes pt-drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-6px,4px)}}
    @keyframes pt-pulse{0%,100%{opacity:.65}50%{opacity:1}}
    @keyframes pt-glow{0%,100%{stroke-opacity:.55}50%{stroke-opacity:.95}}
    @keyframes pt-tw{0%,100%{opacity:.4}50%{opacity:.9}}
    .pt-cluster-a{animation:pt-drift 38s ease-in-out infinite;transform-origin:center}
    .pt-cluster-b{animation:pt-drift2 42s ease-in-out infinite;transform-origin:center}
    .pt-link{animation:pt-pulse 36s ease-in-out infinite}
    .pt-link:nth-of-type(2n){animation-duration:42s}
    .pt-bright{animation:pt-glow 34s ease-in-out infinite}
    .pt-tw{animation:pt-tw 36s ease-in-out infinite}
    .pt-tw:nth-child(2n){animation-duration:44s}
    @media (prefers-reduced-motion:reduce){*{animation:none!important;transform:none!important}}
  </style>

  <!-- Connection lines first so diamonds sit on top -->
  <g stroke-linecap="round" fill="none">
    <line class="pt-link" x1="300" y1="280" x2="560" y2="430" stroke="#5BC8FF" stroke-width="1.2" stroke-opacity="0.6"/>
    <line class="pt-link" x1="560" y1="430" x2="820" y2="280" stroke="#0CC9A8" stroke-width="1.2" stroke-opacity="0.65"/>
    <line class="pt-link" x1="820" y1="280" x2="1080" y2="430" stroke="#5BC8FF" stroke-width="1.2" stroke-opacity="0.6"/>
    <line class="pt-link" x1="1080" y1="430" x2="1340" y2="280" stroke="#0CC9A8" stroke-width="1.2" stroke-opacity="0.65"/>
    <line class="pt-link" x1="300" y1="280" x2="420" y2="640" stroke="#0CC9A8" stroke-width="1" stroke-opacity="0.5"/>
    <line class="pt-link" x1="560" y1="430" x2="700" y2="720" stroke="#5BC8FF" stroke-width="1" stroke-opacity="0.5"/>
    <line class="pt-link" x1="820" y1="280" x2="940" y2="640" stroke="#0CC9A8" stroke-width="1" stroke-opacity="0.5"/>
    <line class="pt-link" x1="1080" y1="430" x2="1220" y2="720" stroke="#5BC8FF" stroke-width="1" stroke-opacity="0.5"/>
    <line class="pt-link" x1="1340" y1="280" x2="1460" y2="640" stroke="#0CC9A8" stroke-width="1" stroke-opacity="0.5"/>
    <line class="pt-link" x1="420" y1="640" x2="700" y2="720" stroke="#5BC8FF" stroke-width="1.2" stroke-opacity="0.6"/>
    <line class="pt-link" x1="700" y1="720" x2="940" y2="640" stroke="#0CC9A8" stroke-width="1.2" stroke-opacity="0.65"/>
    <line class="pt-link" x1="940" y1="640" x2="1220" y2="720" stroke="#5BC8FF" stroke-width="1.2" stroke-opacity="0.6"/>
    <line class="pt-link" x1="1220" y1="720" x2="1460" y2="640" stroke="#0CC9A8" stroke-width="1.2" stroke-opacity="0.65"/>
  </g>

  <!-- Top row diamonds (cluster A) -->
  <g class="pt-cluster-a">
    <use href="#ptDmd" x="240" y="220" width="120" height="120" fill="url(#ptDmdA)" stroke="#0CC9A8" stroke-opacity="0.7"/>
    <use href="#ptDmd" x="500" y="370" width="120" height="120" fill="url(#ptDmdB)" stroke="#5BC8FF" stroke-opacity="0.65"/>
    <use href="#ptDmd" x="760" y="220" width="120" height="120" fill="url(#ptDmdC)" stroke="#C2FF57" stroke-opacity="0.85" class="pt-bright"/>
    <use href="#ptDmd" x="1020" y="370" width="120" height="120" fill="url(#ptDmdA)" stroke="#0CC9A8" stroke-opacity="0.7"/>
    <use href="#ptDmd" x="1280" y="220" width="120" height="120" fill="url(#ptDmdB)" stroke="#5BC8FF" stroke-opacity="0.65"/>
  </g>

  <!-- Bottom row diamonds (cluster B) -->
  <g class="pt-cluster-b">
    <use href="#ptDmd" x="360" y="580" width="120" height="120" fill="url(#ptDmdB)" stroke="#5BC8FF" stroke-opacity="0.6"/>
    <use href="#ptDmd" x="640" y="660" width="120" height="120" fill="url(#ptDmdA)" stroke="#0CC9A8" stroke-opacity="0.7" class="pt-bright"/>
    <use href="#ptDmd" x="880" y="580" width="120" height="120" fill="url(#ptDmdC)" stroke="#5BC8FF" stroke-opacity="0.6"/>
    <use href="#ptDmd" x="1160" y="660" width="120" height="120" fill="url(#ptDmdA)" stroke="#0CC9A8" stroke-opacity="0.65"/>
    <use href="#ptDmd" x="1400" y="580" width="120" height="120" fill="url(#ptDmdB)" stroke="#5BC8FF" stroke-opacity="0.6"/>
  </g>

  <!-- Connector dots at node centres (pulse highlights) -->
  <g fill="#E8F0FA" opacity="0.95">
    <circle cx="300" cy="280" r="2.4"/>
    <circle cx="560" cy="430" r="2.4"/>
    <circle cx="820" cy="280" r="3" fill="#C2FF57"/>
    <circle cx="1080" cy="430" r="2.4"/>
    <circle cx="1340" cy="280" r="2.4"/>
    <circle cx="420" cy="640" r="2.4"/>
    <circle cx="700" cy="720" r="3" fill="#0CC9A8"/>
    <circle cx="940" cy="640" r="2.4"/>
    <circle cx="1220" cy="720" r="2.4"/>
    <circle cx="1460" cy="640" r="2.4"/>
  </g>

  <!-- Background sparkles -->
  <g fill="#E8F0FA">
    <circle class="pt-tw" cx="160" cy="160" r="1.3" opacity="0.45"/>
    <circle class="pt-tw" cx="480" cy="120" r="1.2" opacity="0.4"/>
    <circle class="pt-tw" cx="880" cy="120" r="1.4" opacity="0.45"/>
    <circle class="pt-tw" cx="1240" cy="100" r="1.2" opacity="0.4"/>
    <circle class="pt-tw" cx="1500" cy="160" r="1.3" opacity="0.45"/>
    <circle class="pt-tw" cx="160" cy="860" r="1.3" opacity="0.45"/>
    <circle class="pt-tw" cx="540" cy="900" r="1.2" opacity="0.4"/>
    <circle class="pt-tw" cx="900" cy="900" r="1.4" opacity="0.45"/>
    <circle class="pt-tw" cx="1280" cy="880" r="1.2" opacity="0.4"/>
    <circle class="pt-tw" cx="1520" cy="860" r="1.3" opacity="0.45"/>
  </g>
</svg>
