<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Mercury Beam | CrowAgent Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    :root {
      --bg: var(--ca-c-000000);
      --teal: var(--teal);
    }
    body {
      background-color: var(--bg);
      color: white;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }
    /* High-velocity beam simulation */
    .beam-container {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: -1;
    }
    .mercury-beam {
      position: absolute;
      width: 200vw;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--teal), var(--white), var(--teal), transparent);
      opacity: 0.8;
      filter: drop-shadow(0 0 10px var(--teal));
      transform: rotate(-15deg);
      top: 50%;
      left: -50%;
    }
    .h1-beam {
      font-size: 8rem;
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 0.8;
      text-transform: uppercase;
      background: linear-gradient(180deg, var(--white) 0%, var(--ca-c-333333) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      mix-blend-mode: exclusion;
    }
    .visual-stack {
      position: relative;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 1px;
      overflow: hidden;
    }
    .visual-inner {
      background: var(--ca-c-000000);
      padding: 4rem;
      border-radius: 19px;
    }
    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--teal);
      opacity: 0.5;
      box-shadow: 0 0 20px var(--teal);
    }
  </style>
</head>
<body>
  <div class="beam-container">
    <div id="beam" class="mercury-beam"></div>
  </div>

  <main class="relative z-10 h-screen flex flex-col items-center justify-center">
    <div class="text-center mb-24">
      <h1 class="h1-beam mb-12">
        Statutory<br>
        Velocity.
      </h1>
      <p class="text-xl text-white/40 tracking-[0.2em] font-black uppercase">Built for UK SMEs</p>
    </div>

    <div class="visual-stack max-w-4xl w-full">
      <div id="scanner" class="scan-line"></div>
      <div class="visual-inner">
        <div class="flex justify-between items-end">
          <div>
            <div class="text-[10px] font-mono text-teal-400 mb-2">LATENCY: 12ms</div>
            <div class="text-4xl font-black">£150,000</div>
            <div class="text-[10px] font-mono text-white/30 uppercase mt-2">Maximum Statutory Penalty</div>
          </div>
          <div class="text-right">
             <div class="text-[10px] font-mono text-white/30 mb-2">THRESHOLD</div>
             <div class="text-2xl font-bold">10% PPN 002</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    gsap.to("#beam", {
      y: "100vh",
      duration: 3,
      repeat: -1,
      ease: "power2.inOut",
      yoyo: true
    });
    
    gsap.to("#scanner", {
      top: "100%",
      duration: 4,
      repeat: -1,
      ease: "none"
    });

    gsap.from(".h1-beam", { scale: 1.2, opacity: 0, duration: 2, ease: "expo.out" });
  </script>
</body>
</html>
