<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refractive Engine | CrowAgent Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    :root {
      --bg: var(--bg-deep);
      --teal: var(--teal);
    }
    body {
      background-color: var(--bg);
      color: white;
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow: hidden;
    }
    /* Technical Grid */
    .tech-grid {
      position: absolute;
      inset: 0;
      background-image: 
        radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
      background-size: 40px 40px;
      mask-image: radial-gradient(circle at center, black, transparent 80%);
      z-index: -1;
    }
    /* Central Refractive Core */
    .engine-core {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(circle at center, rgba(12, 201, 168, 0.03) 0%, transparent 70%);
      pointer-events: none;
    }
    .h1-engine {
      font-size: 5rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      line-height: 1;
      text-transform: uppercase;
      background: linear-gradient(to right, var(--white), var(--ca-c-888888));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .ghost-ui {
      background: rgba(255,255,255,0.01);
      border: 1px solid rgba(255,255,255,0.05);
      backdrop-filter: blur(40px);
      border-radius: 40px;
      padding: 6rem;
      box-shadow: 
        inset 0 1px 1px rgba(255,255,255,0.1),
        0 60px 120px rgba(0,0,0,0.5);
    }
    .statute-pill {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 6px 16px;
      background: rgba(12, 201, 168, 0.1);
      border: 1px solid rgba(12, 201, 168, 0.2);
      color: var(--teal);
      border-radius: 100px;
    }
  </style>
</head>
<body>
  <div class="tech-grid"></div>
  <div class="engine-core"></div>

  <main class="relative z-10 h-screen flex items-center justify-center">
    <div class="ghost-ui max-w-5xl w-full text-center">
      <div class="flex gap-4 justify-center mb-12">
        <span class="statute-pill">SI 2015/962</span>
        <span class="statute-pill">PPN 002</span>
        <span class="statute-pill">OMNIBUS I</span>
      </div>

      <h1 class="h1-engine mb-12">
        Statute-Cited<br>
        <span class="text-teal-400">Intelligence.</span>
      </h1>

      <p class="text-xl text-white/40 mb-12 font-light max-w-2xl mx-auto leading-relaxed">
        Level the playing field with deterministic UK compliance. Our engine translates regulation into business advantage.
      </p>

      <div class="flex gap-8 justify-center">
        <button class="px-12 py-6 bg-white text-black font-black rounded-2xl hover:bg-teal-400 transition-colors shadow-2xl">
          Launch Engine
        </button>
      </div>
    </div>
  </main>

  <script>
    gsap.from(".ghost-ui", { scale: 1.05, opacity: 0, duration: 2, ease: "expo.out" });
    gsap.to(".engine-core", { 
      scale: 1.2, 
      opacity: 0.5, 
      duration: 10, 
      repeat: -1, 
      yoyo: true, 
      ease: "sine.inOut" 
    });
  </script>
</body>
</html>
