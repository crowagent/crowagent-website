<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="cashStep4Title" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="cashStep4Title">CrowCash Step 4: Recover faster</title>
  <defs>
    <style>
      .bg { fill: #0A1422; }
      .c1 { fill: #0F1B2E; }
      .c2 { fill: #11243F; }
      .hair { stroke: rgba(255,255,255,0.08); stroke-width: 1; fill: none; }
      .cloud { fill: #E8EEF7; }
      .mist { fill: #8A9DB8; }
      .teal { fill: #0CC9A8; }
      .green { fill: #22C55E; }
      .digit { font-variant-numeric: tabular-nums; }

      .dso-num { opacity: 0; animation: dso-in 6s ease-out infinite; animation-delay: 1.4s; }
      @keyframes dso-in {
        0%, 22%  { opacity: 0; transform: translateY(8px); }
        36%, 95% { opacity: 1; transform: translateY(0); }
        100%     { opacity: 0; }
      }

      .line-draw { stroke-dasharray: 600; stroke-dashoffset: 600; animation: line-draw 6s cubic-bezier(0.4,0,0.2,1) infinite; }
      @keyframes line-draw {
        0%, 8%   { stroke-dashoffset: 600; }
        65%, 95% { stroke-dashoffset: 0; }
        100%     { stroke-dashoffset: 0; }
      }

      .area-fade { opacity: 0; animation: area-fade 6s ease-out infinite; animation-delay: 0.4s; }
      @keyframes area-fade {
        0%, 10%  { opacity: 0; }
        70%, 95% { opacity: 0.35; }
        100%     { opacity: 0; }
      }

      .paid-row { opacity: 0; }
      .paid-1 { animation: paid-in 6s ease-out infinite; animation-delay: 2.6s; }
      .paid-2 { animation: paid-in 6s ease-out infinite; animation-delay: 3.0s; }
      .paid-3 { animation: paid-in 6s ease-out infinite; animation-delay: 3.4s; }
      @keyframes paid-in {
        0%, 38%  { opacity: 0; transform: translateX(-6px); }
        50%, 95% { opacity: 1; transform: translateX(0); }
        100%     { opacity: 0; }
      }

      .conf-pop { animation: conf-pop 1.8s cubic-bezier(0.4,0,0.2,1) infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes conf-pop {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.1); }
      }

      @media (prefers-reduced-motion: reduce) {
        .dso-num, .line-draw, .area-fade, .paid-row, .paid-1, .paid-2, .paid-3, .conf-pop {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
        .line-draw { stroke-dashoffset: 0 !important; }
        .area-fade { opacity: 0.35 !important; }
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="620"/>

  <!-- Header -->
  <g transform="translate(40, 40)">
    <text x="0" y="14" class="teal" font-size="11" font-weight="600" letter-spacing="1.5">STEP 4, RECOVER</text>
    <text x="0" y="46" class="cloud" font-size="22" font-weight="600">DSO down, cash in</text>
    <text x="0" y="68" class="mist" font-size="13">Statutory interest auto-applied, ledger reconciled in real time</text>
  </g>

  <!-- Left, DSO trend chart -->
  <g transform="translate(40, 140)">
    <rect class="c1" x="0" y="0" width="640" height="370" rx="16" ry="16"/>
    <text x="20" y="32" class="cloud" font-size="13" font-weight="600">Days Sales Outstanding</text>
    <text x="20" y="52" class="mist" font-size="11">Last 6 months, trailing average</text>

    <g class="dso-num" transform="translate(20, 100)">
      <text x="0" y="0" class="cloud digit" font-size="42" font-weight="700">28.4</text>
      <text x="110" y="-2" class="mist digit" font-size="11">days, from 41.6</text>
      <g transform="translate(110, 8)">
        <rect x="0" y="0" width="76" height="20" rx="10" fill="rgba(34,197,94,0.18)"/>
        <text x="38" y="14" class="green digit" font-size="11" font-weight="700" text-anchor="middle">- 32%</text>
      </g>
    </g>

    <!-- chart axes -->
    <g transform="translate(40, 160)">
      <line x1="0" y1="180" x2="560" y2="180" class="hair"/>
      <line x1="0" y1="0" x2="0" y2="180" class="hair"/>
      <!-- y labels -->
      <text x="-8" y="6" class="mist digit" font-size="9" text-anchor="end">50</text>
      <text x="-8" y="66" class="mist digit" font-size="9" text-anchor="end">40</text>
      <text x="-8" y="126" class="mist digit" font-size="9" text-anchor="end">30</text>
      <text x="-8" y="186" class="mist digit" font-size="9" text-anchor="end">20</text>
      <!-- x labels -->
      <text x="40" y="196" class="mist digit" font-size="9" text-anchor="middle">Dec</text>
      <text x="130" y="196" class="mist digit" font-size="9" text-anchor="middle">Jan</text>
      <text x="220" y="196" class="mist digit" font-size="9" text-anchor="middle">Feb</text>
      <text x="310" y="196" class="mist digit" font-size="9" text-anchor="middle">Mar</text>
      <text x="400" y="196" class="mist digit" font-size="9" text-anchor="middle">Apr</text>
      <text x="490" y="196" class="mist digit" font-size="9" text-anchor="middle">May</text>

      <!-- Area fill -->
      <path class="area-fade" d="M 40 50 L 130 60 L 220 78 L 310 96 L 400 118 L 490 130 L 490 180 L 40 180 Z" fill="#0CC9A8"/>

      <!-- Line -->
      <path class="line-draw" d="M 40 50 L 130 60 L 220 78 L 310 96 L 400 118 L 490 130" stroke="#0CC9A8" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Endpoint dot -->
      <circle cx="490" cy="130" r="5" fill="#0CC9A8"/>
      <circle cx="490" cy="130" r="9" fill="rgba(12,201,168,0.25)"/>
    </g>
  </g>

  <!-- Right, payments inbox -->
  <g transform="translate(700, 140)">
    <rect class="c1" x="0" y="0" width="340" height="370" rx="16" ry="16"/>
    <text x="20" y="32" class="cloud" font-size="13" font-weight="600">Payments landed today</text>
    <text x="20" y="52" class="mist" font-size="11">Reconciled against your ledger</text>
    <line x1="20" y1="68" x2="320" y2="68" class="hair"/>

    <g class="paid-row paid-1" transform="translate(20, 92)">
      <rect x="0" y="0" width="300" height="60" rx="10" fill="#11243F"/>
      <g class="conf-pop" transform="translate(14, 22)">
        <circle cx="0" cy="0" r="10" fill="#22C55E"/>
        <path d="M-4 0 L-1 3 L4 -3" stroke="#0A1422" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="38" y="22" class="cloud" font-size="12" font-weight="600">Evergreen FM</text>
      <text x="38" y="42" class="mist digit" font-size="11">INV 4150, +£24,600.00</text>
      <text x="288" y="22" class="green digit" font-size="11" text-anchor="end" font-weight="600">PAID</text>
    </g>
    <g class="paid-row paid-2" transform="translate(20, 164)">
      <rect x="0" y="0" width="300" height="60" rx="10" fill="#11243F"/>
      <g transform="translate(14, 22)">
        <circle cx="0" cy="0" r="10" fill="#22C55E"/>
        <path d="M-4 0 L-1 3 L4 -3" stroke="#0A1422" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="38" y="22" class="cloud" font-size="12" font-weight="600">Acme Holdings Ltd</text>
      <text x="38" y="42" class="mist digit" font-size="11">INV 4128 + £100 fee, +£18,500</text>
      <text x="288" y="22" class="green digit" font-size="11" text-anchor="end" font-weight="600">PAID</text>
    </g>
    <g class="paid-row paid-3" transform="translate(20, 236)">
      <rect x="0" y="0" width="300" height="60" rx="10" fill="#11243F"/>
      <g transform="translate(14, 22)">
        <circle cx="0" cy="0" r="10" fill="#22C55E"/>
        <path d="M-4 0 L-1 3 L4 -3" stroke="#0A1422" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="38" y="22" class="cloud" font-size="12" font-weight="600">Capricorn Retail</text>
      <text x="38" y="42" class="mist digit" font-size="11">INV 4144, +£12,810.00</text>
      <text x="288" y="22" class="green digit" font-size="11" text-anchor="end" font-weight="600">PAID</text>
    </g>

    <text x="20" y="324" class="mist" font-size="11">Cleared today</text>
    <text x="320" y="324" class="teal digit" font-size="13" font-weight="700" text-anchor="end">£55,910</text>
  </g>

  <line x1="40" y1="552" x2="1040" y2="552" class="hair"/>
  <g transform="translate(40, 580)">
    <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.4">Interest at 8 percent over Bank of England base, plus £40 / £70 / £100 fixed fees per Late Payment Act</text>
  </g>
</svg>
