  <rect x="600" y="608" width="50" height="22" rx="11" fill="#0CC9A8" fill-opacity="0.18"/>
  <path d="M615 618 L620 623 L630 614" stroke="#0CC9A8" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
