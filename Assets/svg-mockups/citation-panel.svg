  <text x="116" y="484" class="m" font-size="11" font-weight="700" fill="#5BC8FF">Directive (EU) 2022/2464</text>
  <rect x="280" y="470" width="100" height="20" rx="10" fill="#F59E0B" fill-opacity="0.18"/>
  <text x="330" y="484" text-anchor="middle" class="b" font-size="10" font-weight="700" fill="#F59E0B">Superseded</text>
