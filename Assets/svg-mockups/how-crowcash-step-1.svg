<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="cashStep1Title" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="cashStep1Title">CrowCash Step 1: Import invoices</title>
  <defs>
    <style>
      .bg { fill: #0A1422; }
      .c1 { fill: #0F1B2E; }
      .c2 { fill: #11243F; }
      .hair { stroke: rgba(255,255,255,0.08); stroke-width: 1; fill: none; }
      .cloud { fill: #E8EEF7; }
      .mist { fill: #8A9DB8; }
      .teal { fill: #0CC9A8; }
      .green { fill: #22C55E; }
      .amber { fill: #F59E0B; }
      .digit { font-variant-numeric: tabular-nums; }

      .source { opacity: 0; }
      .src-1 { animation: src-in 6s ease-out infinite; animation-delay: 0.3s; }
      .src-2 { animation: src-in 6s ease-out infinite; animation-delay: 0.5s; }
      .src-3 { animation: src-in 6s ease-out infinite; animation-delay: 0.7s; }
      @keyframes src-in {
        0%, 4%   { opacity: 0; transform: translateX(-6px); }
        15%, 95% { opacity: 1; transform: translateX(0); }
        100%     { opacity: 0; }
      }

      .conn { stroke: #0CC9A8; stroke-width: 2; fill: none; stroke-dasharray: 4 6; stroke-dashoffset: 200; animation: conn-flow 4s linear infinite; }
      @keyframes conn-flow { to { stroke-dashoffset: 0; } }

      .row { opacity: 0; }
      .row-1 { animation: row-in 6s ease-out infinite; animation-delay: 1.5s; }
      .row-2 { animation: row-in 6s ease-out infinite; animation-delay: 1.8s; }
      .row-3 { animation: row-in 6s ease-out infinite; animation-delay: 2.1s; }
      .row-4 { animation: row-in 6s ease-out infinite; animation-delay: 2.4s; }
      .row-5 { animation: row-in 6s ease-out infinite; animation-delay: 2.7s; }
      .row-6 { animation: row-in 6s ease-out infinite; animation-delay: 3.0s; }
      @keyframes row-in {
        0%, 20%  { opacity: 0; transform: translateY(4px); }
        32%, 95% { opacity: 1; transform: translateY(0); }
        100%     { opacity: 0; }
      }

      .total-up { opacity: 0; animation: total-in 6s ease-out infinite; animation-delay: 3.4s; }
      @keyframes total-in {
        0%, 52%  { opacity: 0; }
        62%, 100% { opacity: 1; }
      }

      @media (prefers-reduced-motion: reduce) {
        .source, .src-1, .src-2, .src-3, .conn, .row, .row-1, .row-2, .row-3, .row-4, .row-5, .row-6, .total-up {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
        .conn { stroke-dashoffset: 0 !important; }
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="620"/>

  <!-- Header -->
  <g transform="translate(40, 40)">
    <text x="0" y="14" class="teal" font-size="11" font-weight="600" letter-spacing="1.5">STEP 1, IMPORT</text>
    <text x="0" y="46" class="cloud" font-size="22" font-weight="600">Bring your invoices in</text>
    <text x="0" y="68" class="mist" font-size="13">Xero, QuickBooks, or CSV, parsed in under a minute</text>
  </g>

  <!-- Sources column -->
  <g transform="translate(40, 150)">
    <g class="source src-1">
      <rect class="c1" x="0" y="0" width="220" height="76" rx="12"/>
      <g transform="translate(20, 20)">
        <rect x="0" y="0" width="36" height="36" rx="8" fill="#13B5EA"/>
        <text x="18" y="24" fill="#FFFFFF" font-size="14" font-weight="700" text-anchor="middle">x</text>
      </g>
      <text x="68" y="32" class="cloud" font-size="13" font-weight="600">Xero</text>
      <text x="68" y="52" class="mist digit" font-size="11">142 invoices, last 90 days</text>
    </g>
    <g class="source src-2" transform="translate(0, 96)">
      <rect class="c1" x="0" y="0" width="220" height="76" rx="12"/>
      <g transform="translate(20, 20)">
        <rect x="0" y="0" width="36" height="36" rx="8" fill="#2CA01C"/>
        <text x="18" y="24" fill="#FFFFFF" font-size="14" font-weight="700" text-anchor="middle">Q</text>
      </g>
      <text x="68" y="32" class="cloud" font-size="13" font-weight="600">QuickBooks</text>
      <text x="68" y="52" class="mist digit" font-size="11">88 invoices, last 90 days</text>
    </g>
    <g class="source src-3" transform="translate(0, 192)">
      <rect class="c1" x="0" y="0" width="220" height="76" rx="12"/>
      <g transform="translate(20, 20)">
        <rect x="0" y="0" width="36" height="36" rx="8" fill="#1B2F4D" stroke="#0CC9A8" stroke-width="1.5"/>
        <text x="18" y="24" class="teal" font-size="11" font-weight="700" text-anchor="middle">CSV</text>
      </g>
      <text x="68" y="32" class="cloud" font-size="13" font-weight="600">CSV upload</text>
      <text x="68" y="52" class="mist digit" font-size="11">debtors-may26.csv, 28 rows</text>
    </g>
  </g>

  <!-- Connector lines into ledger -->
  <path class="conn" d="M260 188 Q360 188 460 200"/>
  <path class="conn" d="M260 284 Q360 284 460 270"/>
  <path class="conn" d="M260 380 Q360 350 460 320"/>

  <!-- Right ledger table -->
  <g transform="translate(460, 150)">
    <rect class="c1" x="0" y="0" width="580" height="372" rx="16" ry="16"/>
    <text x="20" y="32" class="cloud" font-size="13" font-weight="600">Open invoices, deduplicated</text>
    <text x="20" y="52" class="mist" font-size="11">258 unique invoices, 14 customers</text>
    <line x1="20" y1="68" x2="560" y2="68" class="hair"/>

    <!-- Headers -->
    <g transform="translate(20, 86)">
      <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.6">CUSTOMER</text>
      <text x="220" y="0" class="mist" font-size="10" letter-spacing="0.6">INVOICE</text>
      <text x="340" y="0" class="mist" font-size="10" letter-spacing="0.6">AMOUNT</text>
      <text x="460" y="0" class="mist" font-size="10" letter-spacing="0.6">DAYS</text>
      <line x1="0" y1="12" x2="540" y2="12" class="hair"/>
    </g>

    <!-- Rows -->
    <g transform="translate(20, 112)" font-size="12">
      <g class="row row-1">
        <text x="0" y="14" class="cloud">Acme Holdings Ltd</text>
        <text x="220" y="14" class="cloud digit">INV 4128</text>
        <text x="340" y="14" class="cloud digit">£18,400</text>
        <text x="460" y="14" class="amber digit" font-weight="600">42</text>
      </g>
      <g class="row row-2" transform="translate(0, 32)">
        <text x="0" y="14" class="cloud">Beltway Logistics</text>
        <text x="220" y="14" class="cloud digit">INV 4131</text>
        <text x="340" y="14" class="cloud digit">£6,250</text>
        <text x="460" y="14" class="amber digit" font-weight="600">38</text>
      </g>
      <g class="row row-3" transform="translate(0, 64)">
        <text x="0" y="14" class="cloud">Capricorn Retail</text>
        <text x="220" y="14" class="cloud digit">INV 4144</text>
        <text x="340" y="14" class="cloud digit">£12,810</text>
        <text x="460" y="14" class="cloud digit">22</text>
      </g>
      <g class="row row-4" transform="translate(0, 96)">
        <text x="0" y="14" class="cloud">Daystar Print Co</text>
        <text x="220" y="14" class="cloud digit">INV 4147</text>
        <text x="340" y="14" class="cloud digit">£3,400</text>
        <text x="460" y="14" class="cloud digit">12</text>
      </g>
      <g class="row row-5" transform="translate(0, 128)">
        <text x="0" y="14" class="cloud">Evergreen FM</text>
        <text x="220" y="14" class="cloud digit">INV 4150</text>
        <text x="340" y="14" class="cloud digit">£24,600</text>
        <text x="460" y="14" class="cloud digit">8</text>
      </g>
      <g class="row row-6" transform="translate(0, 160)">
        <text x="0" y="14" class="cloud">Foreland Group</text>
        <text x="220" y="14" class="cloud digit">INV 4159</text>
        <text x="340" y="14" class="cloud digit">£9,940</text>
        <text x="460" y="14" class="cloud digit">3</text>
      </g>
    </g>

    <line x1="20" y1="318" x2="560" y2="318" class="hair"/>
    <g class="total-up" transform="translate(20, 340)">
      <text x="0" y="0" class="mist" font-size="11">Total receivable</text>
      <text x="540" y="0" class="teal digit" font-size="13" font-weight="700" text-anchor="end">£74,400</text>
      <text x="0" y="20" class="mist digit" font-size="10">Average days outstanding, 21</text>
    </g>
  </g>

  <line x1="40" y1="552" x2="1040" y2="552" class="hair"/>
  <g transform="translate(40, 580)">
    <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.4">Duplicates removed, currencies normalised to GBP at the invoice date rate</text>
  </g>
</svg>
