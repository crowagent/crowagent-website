<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1067" role="img" aria-label="Book stack and cascading documents in CrowAgent teal and sky" preserveAspectRatio="xMidYMid slice">
  <title>CrowAgent resources, document stack abstract</title>
  <desc>A book-stack motif and a fanned cascade of document silhouettes. Decorative; no data.</desc>
  <defs>
    <linearGradient id="rsCardA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0CC9A8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0CC9A8" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="rsCardB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5BC8FF" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#5BC8FF" stop-opacity="0.1"/>
    </linearGradient>
    <symbol id="rsDoc" viewBox="0 0 240 320">
      <rect x="0" y="0" width="240" height="320" rx="12" fill="none" stroke="#5BC8FF" stroke-opacity="0.65" stroke-width="1.6"/>
      <rect x="0" y="0" width="240" height="56" rx="12" fill="url(#rsCardB)"/>
      <rect x="20" y="90" width="200" height="6" rx="3" fill="#5BC8FF" fill-opacity="0.55"/>
      <rect x="20" y="110" width="160" height="6" rx="3" fill="#5BC8FF" fill-opacity="0.4"/>
      <rect x="20" y="140" width="200" height="4" rx="2" fill="#E8F0FA" fill-opacity="0.35"/>
      <rect x="20" y="156" width="180" height="4" rx="2" fill="#E8F0FA" fill-opacity="0.32"/>
      <rect x="20" y="172" width="200" height="4" rx="2" fill="#E8F0FA" fill-opacity="0.32"/>
      <rect x="20" y="220" width="200" height="4" rx="2" fill="#E8F0FA" fill-opacity="0.28"/>
      <rect x="20" y="236" width="170" height="4" rx="2" fill="#E8F0FA" fill-opacity="0.28"/>
    </symbol>
    <symbol id="rsDocAlt" viewBox="0 0 240 320">
      <rect x="0" y="0" width="240" height="320" rx="12" fill="none" stroke="#0CC9A8" stroke-opacity="0.65" stroke-width="1.6"/>
      <rect x="0" y="0" width="240" height="56" rx="12" fill="url(#rsCardA)"/>
      <rect x="20" y="90" width="200" height="6" rx="3" fill="#0CC9A8" fill-opacity="0.55"/>
      <rect x="20" y="110" width="160" height="6" rx="3" fill="#0CC9A8" fill-opacity="0.4"/>
      <rect x="20" y="140" width="200" height="4" rx="2" fill="#E8F0FA" fill-opacity="0.35"/>
      <rect x="20" y="156" width="180" height="4" rx="2" fill="#E8F0FA" fill-opacity="0.32"/>
      <rect x="20" y="172" width="200" height="4" rx="2" fill="#E8F0FA" fill-opacity="0.32"/>
      <rect x="20" y="220" width="200" height="4" rx="2" fill="#E8F0FA" fill-opacity="0.28"/>
    </symbol>
  </defs>

  <style>
    @keyframes rs-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes rs-float2{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    @keyframes rs-fan{0%,100%{transform:rotate(0)}50%{transform:rotate(0.6deg)}}
    @keyframes rs-glow{0%,100%{opacity:.85}50%{opacity:1}}
    @keyframes rs-tw{0%,100%{opacity:.4}50%{opacity:.9}}
    .rs-doc-a{animation:rs-float 36s ease-in-out infinite;transform-origin:center}
    .rs-doc-b{animation:rs-float2 42s ease-in-out -8s infinite;transform-origin:center}
    .rs-doc-c{animation:rs-fan 44s ease-in-out infinite;transform-origin:200px 800px}
    .rs-spine{animation:rs-glow 34s ease-in-out infinite}
    .rs-tw{animation:rs-tw 36s ease-in-out infinite}
    .rs-tw:nth-child(2n){animation-duration:44s}
    @media (prefers-reduced-motion:reduce){*{animation:none!important;transform:none!important}}
  </style>

  <!-- Book stack base (left corner) -->
  <g class="rs-spine">
    <rect x="120" y="780" width="320" height="36" rx="6" fill="#0CC9A8" fill-opacity="0.6" stroke="#0CC9A8" stroke-opacity="0.85" stroke-width="1.4"/>
    <rect x="100" y="820" width="340" height="36" rx="6" fill="#5BC8FF" fill-opacity="0.55" stroke="#5BC8FF" stroke-opacity="0.8" stroke-width="1.4"/>
    <rect x="140" y="860" width="300" height="36" rx="6" fill="#0CC9A8" fill-opacity="0.5" stroke="#0CC9A8" stroke-opacity="0.7" stroke-width="1.4"/>
    <rect x="80"  y="900" width="380" height="36" rx="6" fill="#5BC8FF" fill-opacity="0.45" stroke="#5BC8FF" stroke-opacity="0.65" stroke-width="1.4"/>
    <rect x="120" y="940" width="320" height="36" rx="6" fill="#0CC9A8" fill-opacity="0.4" stroke="#0CC9A8" stroke-opacity="0.6" stroke-width="1.4"/>
  </g>

  <!-- Cascading documents fanning up-right -->
  <g transform="rotate(-22 200 800)" class="rs-doc-c">
    <use href="#rsDocAlt" x="220" y="380" width="240" height="320" opacity="0.95"/>
  </g>
  <g transform="rotate(-14 200 800)">
    <use href="#rsDoc" x="420" y="320" width="240" height="320" opacity="0.95" class="rs-doc-a"/>
  </g>
  <g transform="rotate(-6 200 800)">
    <use href="#rsDocAlt" x="640" y="280" width="240" height="320" opacity="0.95" class="rs-doc-b"/>
  </g>
  <g transform="rotate(2 200 800)">
    <use href="#rsDoc" x="860" y="260" width="240" height="320" opacity="0.95" class="rs-doc-a"/>
  </g>
  <g transform="rotate(10 200 800)">
    <use href="#rsDocAlt" x="1080" y="280" width="240" height="320" opacity="0.95" class="rs-doc-b"/>
  </g>
  <g transform="rotate(18 200 800)">
    <use href="#rsDoc" x="1280" y="320" width="240" height="320" opacity="0.85" class="rs-doc-a"/>
  </g>

  <!-- Bookmark accent on lead doc -->
  <rect x="640" y="280" width="14" height="40" rx="2" fill="#C2FF57" opacity="0.9" transform="rotate(-6 200 800)"/>

  <!-- Particle accents (sparkles) -->
  <g fill="#E8F0FA">
    <circle class="rs-tw" cx="200" cy="200" r="1.5" opacity="0.5"/>
    <circle class="rs-tw" cx="380" cy="160" r="1.3" opacity="0.45"/>
    <circle class="rs-tw" cx="640" cy="160" r="1.6" opacity="0.5"/>
    <circle class="rs-tw" cx="940" cy="140" r="1.3" opacity="0.45"/>
    <circle class="rs-tw" cx="1280" cy="180" r="1.5" opacity="0.5"/>
    <circle class="rs-tw" cx="1480" cy="240" r="1.3" opacity="0.45"/>
    <circle class="rs-tw" cx="80" cy="500" r="1.3" opacity="0.4"/>
    <circle class="rs-tw" cx="1520" cy="500" r="1.3" opacity="0.4"/>
    <circle class="rs-tw" cx="540" cy="80" r="1.2" opacity="0.4"/>
    <circle class="rs-tw" cx="1140" cy="80" r="1.2" opacity="0.4"/>
  </g>
</svg>
