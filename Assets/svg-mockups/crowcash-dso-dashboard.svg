<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="CrowCash DSO trend dashboard mockup with weekly KPIs, ageing buckets, recovery rate and a 30-day trend chart">
  <title>CrowCash DSO trend dashboard</title>
  <desc>Days Sales Outstanding trend with weekly recovery KPIs, ageing buckets (0-30, 31-60, 61-90, 90+), and a 30-day trendline chart with synthetic figures for illustration.</desc>
  <defs>
    <linearGradient id="bgDSO" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#040E1A"/>
      <stop offset="1" stop-color="#061525"/>
    </linearGradient>
    <linearGradient id="dsoArea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0CC9A8" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#0CC9A8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <style>
    .f { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    .b { font-family: 'Inter', system-ui, sans-serif; }
    .m { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    @keyframes sf23ax-soft{0%,100%{opacity:1}50%{opacity:.78}}
    @keyframes sf23ax-blink{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes sf23ax-march{from{stroke-dashoffset:0}to{stroke-dashoffset:-32}}
    @keyframes sf23ax-breathe{0%,100%{opacity:1}50%{opacity:.88}}
    rect[fill="#0CC9A8"]:not([fill-opacity]){animation:sf23ax-soft 3.8s ease-in-out infinite}
    rect[fill="#F59E0B"]:not([fill-opacity]){animation:sf23ax-soft 2.6s ease-in-out infinite}
    rect[fill="#EF4444"]:not([fill-opacity]){animation:sf23ax-blink 2s ease-in-out infinite}
    rect[fill="#5BC8FF"]:not([fill-opacity]){animation:sf23ax-soft 4.4s ease-in-out infinite}
    circle[fill="#0CC9A8"]{animation:sf23ax-soft 3.8s ease-in-out infinite}
    circle[fill="#F59E0B"]{animation:sf23ax-soft 2.6s ease-in-out infinite}
    circle[fill="#EF4444"]{animation:sf23ax-blink 2s ease-in-out infinite}
    circle[fill="#5BC8FF"]{animation:sf23ax-soft 4.4s ease-in-out infinite}
    polyline{stroke-dasharray:8 6;animation:sf23ax-march 2.4s linear infinite}
    text[font-size="20"],text[font-size="22"],text[font-size="24"],text[font-size="26"],text[font-size="28"],text[font-size="32"],text[font-size="34"],text[font-size="56"],text[font-size="92"]{animation:sf23ax-breathe 5.4s ease-in-out infinite}
    @media (prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>

  <rect width="1600" height="900" fill="url(#bgDSO)"/>

  <rect x="0" y="0" width="1600" height="44" fill="#0A1F3A"/>
  <circle cx="22" cy="22" r="6" fill="#EF4444"/>
  <circle cx="44" cy="22" r="6" fill="#F59E0B"/>
  <circle cx="66" cy="22" r="6" fill="#0CC9A8"/>
  <rect x="600" y="11" width="400" height="22" rx="11" fill="#040E1A"/>
  <text x="800" y="26" text-anchor="middle" class="b" font-size="11" fill="#8A9DB8">app.crowagent.ai/crowcash/dashboard</text>

  <rect x="0" y="44" width="1600" height="64" fill="#0A1F3A"/>
  <line x1="0" y1="108" x2="1600" y2="108" stroke="#0D2847"/>
  <circle cx="44" cy="76" r="14" fill="#0CC9A8"/>
  <text x="44" y="82" text-anchor="middle" class="f" font-size="14" font-weight="700" fill="#040E1A">£</text>
  <text x="68" y="81" class="f" font-size="17" font-weight="700" fill="#E8F0FA">CrowCash</text>
  <text x="170" y="81" class="b" font-size="13" fill="#8A9DB8">DSO trend · weekly KPIs · ageing analytics</text>

  <text x="68" y="158" class="f" font-size="26" font-weight="700" fill="#E8F0FA">Receivables overview</text>
  <text x="68" y="184" class="b" font-size="13" fill="#8A9DB8">Last 30 days · Meridian Estates Ltd · synthetic data</text>

  <!-- Top KPI strip -->
  <rect x="68" y="210" width="332" height="118" rx="12" fill="#0A1F3A" stroke="#0D2847"/>
  <text x="92" y="240" class="b" font-size="11" fill="#8A9DB8" letter-spacing="1">DSO</text>
  <text x="92" y="282" class="f" font-size="36" font-weight="800" fill="#0CC9A8">38</text>
  <text x="174" y="280" class="b" font-size="14" fill="#B8CCE0">days</text>
  <text x="92" y="312" class="b" font-size="12" fill="#22C55E">▾ 6 days vs last month</text>

  <rect x="416" y="210" width="332" height="118" rx="12" fill="#0A1F3A" stroke="#0D2847"/>
  <text x="440" y="240" class="b" font-size="11" fill="#8A9DB8" letter-spacing="1">OUTSTANDING</text>
  <text x="440" y="282" class="f" font-size="32" font-weight="800" fill="#E8F0FA">£74,500</text>
  <text x="440" y="312" class="b" font-size="12" fill="#8A9DB8">12 invoices · 5 customers</text>

  <rect x="764" y="210" width="332" height="118" rx="12" fill="#0A1F3A" stroke="#0D2847"/>
  <text x="788" y="240" class="b" font-size="11" fill="#8A9DB8" letter-spacing="1">RECOVERED · 30D</text>
  <text x="788" y="282" class="f" font-size="32" font-weight="800" fill="#0CC9A8">£25,000</text>
  <text x="788" y="312" class="b" font-size="12" fill="#22C55E">▴ 18% vs last month</text>

  <rect x="1112" y="210" width="420" height="118" rx="12" fill="#0A1F3A" stroke="#0D2847"/>
  <text x="1136" y="240" class="b" font-size="11" fill="#8A9DB8" letter-spacing="1">STATUTORY INT. (LATE PAYMENT ACT 1998)</text>
  <text x="1136" y="282" class="f" font-size="32" font-weight="800" fill="#F59E0B">£1,892</text>
  <text x="1136" y="312" class="b" font-size="12" fill="#8A9DB8">BoE 5.25% + 8% · accrued YTD</text>

  <!-- Ageing buckets bar -->
  <text x="68" y="372" class="f" font-size="16" font-weight="700" fill="#E8F0FA">Ageing buckets</text>
  <rect x="68" y="392" width="1464" height="48" rx="8" fill="#0A1F3A" stroke="#0D2847"/>
  <rect x="76" y="400" width="540" height="32" rx="6" fill="#22C55E" opacity="0.85"/>
  <text x="92" y="421" class="b" font-size="12" font-weight="600" fill="#040E1A">0–30 days · £36,200</text>
  <rect x="624" y="400" width="380" height="32" rx="6" fill="#0CC9A8" opacity="0.85"/>
  <text x="640" y="421" class="b" font-size="12" font-weight="600" fill="#040E1A">31–60 · £21,300</text>
  <rect x="1012" y="400" width="260" height="32" rx="6" fill="#F59E0B" opacity="0.85"/>
  <text x="1028" y="421" class="b" font-size="12" font-weight="600" fill="#040E1A">61–90 · £12,000</text>
  <rect x="1280" y="400" width="244" height="32" rx="6" fill="#EF4444" opacity="0.85"/>
  <text x="1296" y="421" class="b" font-size="12" font-weight="600" fill="#E8F0FA">90+ · £5,000</text>

  <!-- DSO trend chart -->
  <text x="68" y="490" class="f" font-size="16" font-weight="700" fill="#E8F0FA">DSO trend · 30 days</text>
  <rect x="68" y="510" width="1464" height="340" rx="12" fill="#0A1F3A" stroke="#0D2847"/>

  <!-- Gridlines -->
  <line x1="120" y1="560" x2="1480" y2="560" stroke="#0D2847" stroke-dasharray="2 4"/>
  <line x1="120" y1="640" x2="1480" y2="640" stroke="#0D2847" stroke-dasharray="2 4"/>
  <line x1="120" y1="720" x2="1480" y2="720" stroke="#0D2847" stroke-dasharray="2 4"/>
  <line x1="120" y1="800" x2="1480" y2="800" stroke="#0D2847"/>

  <text x="100" y="565" text-anchor="end" class="m" font-size="11" fill="#8A9DB8">50</text>
  <text x="100" y="645" text-anchor="end" class="m" font-size="11" fill="#8A9DB8">44</text>
  <text x="100" y="725" text-anchor="end" class="m" font-size="11" fill="#8A9DB8">38</text>
  <text x="100" y="805" text-anchor="end" class="m" font-size="11" fill="#8A9DB8">32</text>

  <!-- DSO area + line -->
  <path d="M 120 600 L 235 612 L 350 600 L 465 624 L 580 612 L 695 636 L 810 648 L 925 660 L 1040 684 L 1155 700 L 1270 712 L 1385 720 L 1480 720 L 1480 800 L 120 800 Z" fill="url(#dsoArea)"/>
  <path d="M 120 600 L 235 612 L 350 600 L 465 624 L 580 612 L 695 636 L 810 648 L 925 660 L 1040 684 L 1155 700 L 1270 712 L 1385 720 L 1480 720" fill="none" stroke="#0CC9A8" stroke-width="2.5"/>

  <!-- Dots -->
  <circle cx="120" cy="600" r="4" fill="#0CC9A8"/>
  <circle cx="465" cy="624" r="4" fill="#0CC9A8"/>
  <circle cx="810" cy="648" r="4" fill="#0CC9A8"/>
  <circle cx="1155" cy="700" r="4" fill="#0CC9A8"/>
  <circle cx="1480" cy="720" r="5" fill="#0CC9A8" stroke="#040E1A" stroke-width="2"/>

  <!-- X-axis labels -->
  <text x="120" y="828" text-anchor="middle" class="m" font-size="11" fill="#8A9DB8">30d ago</text>
  <text x="465" y="828" text-anchor="middle" class="m" font-size="11" fill="#8A9DB8">22d</text>
  <text x="810" y="828" text-anchor="middle" class="m" font-size="11" fill="#8A9DB8">15d</text>
  <text x="1155" y="828" text-anchor="middle" class="m" font-size="11" fill="#8A9DB8">7d</text>
  <text x="1480" y="828" text-anchor="middle" class="m" font-size="11" fill="#8A9DB8">today</text>

  <!-- Trend pill -->
  <rect x="1300" y="528" width="170" height="32" rx="16" fill="#0CC9A8" opacity="0.15"/>
  <text x="1385" y="549" text-anchor="middle" class="b" font-size="12" font-weight="700" fill="#0CC9A8">DSO improving · ▾ 6d</text>
</svg>
