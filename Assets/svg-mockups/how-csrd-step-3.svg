<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="csrdStep3Title" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="csrdStep3Title">CSRD Checker Step 3: See your verdict</title>
  <defs>
    <style>
      .bg { fill: #0A1422; }
      .c1 { fill: #0F1B2E; }
      .c2 { fill: #11243F; }
      .hair { stroke: rgba(255,255,255,0.08); stroke-width: 1; fill: none; }
      .cloud { fill: #E8EEF7; }
      .mist { fill: #8A9DB8; }
      .teal { fill: #0CC9A8; }
      .green { fill: #22C55E; }
      .amber { fill: #F59E0B; }
      .digit { font-variant-numeric: tabular-nums; }

      .verdict-pop { opacity: 0; transform-origin: center; transform-box: fill-box; animation: verdict-in 6s cubic-bezier(0.4,0,0.2,1) infinite; animation-delay: 1.4s; }
      @keyframes verdict-in {
        0%, 22%  { opacity: 0; transform: scale(0.75); }
        38%, 95% { opacity: 1; transform: scale(1); }
        100%     { opacity: 0; }
      }

      .verdict-ring { animation: ring-pulse 1.8s cubic-bezier(0.4,0,0.2,1) infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes ring-pulse {
        0%, 100% { transform: scale(1); opacity: 0.85; }
        50%      { transform: scale(1.05); opacity: 1; }
      }

      .test-row { opacity: 0; }
      .tr-1 { animation: tr-in 6s ease-out infinite; animation-delay: 0.3s; }
      .tr-2 { animation: tr-in 6s ease-out infinite; animation-delay: 0.6s; }
      .tr-3 { animation: tr-in 6s ease-out infinite; animation-delay: 0.9s; }
      @keyframes tr-in {
        0%, 4%   { opacity: 0; transform: translateX(-4px); }
        15%, 95% { opacity: 1; transform: translateX(0); }
        100%     { opacity: 0; }
      }

      .progress { transform-origin: left; animation: progress 6s cubic-bezier(0.4,0,0.2,1) infinite; }
      @keyframes progress {
        0%, 6%   { transform: scaleX(0); }
        30%, 95% { transform: scaleX(0.75); }
        100%     { transform: scaleX(0.75); }
      }

      @media (prefers-reduced-motion: reduce) {
        .verdict-pop, .verdict-ring, .test-row, .tr-1, .tr-2, .tr-3, .progress {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
        .progress { transform: scaleX(0.75) !important; }
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="620"/>

  <!-- Header -->
  <g transform="translate(40, 40)">
    <text x="0" y="14" class="teal" font-size="11" font-weight="600" letter-spacing="1.5">STEP 3 OF 4, VERDICT</text>
    <text x="0" y="46" class="cloud" font-size="22" font-weight="600">Here is your applicability verdict</text>
    <text x="0" y="68" class="mist" font-size="13">Based on Omnibus I, Directive (EU) 2026/470</text>
  </g>

  <!-- Wizard progress -->
  <g transform="translate(40, 120)">
    <rect x="0" y="0" width="1000" height="6" rx="3" fill="#1B2F4D"/>
    <rect class="progress" x="0" y="0" width="1000" height="6" rx="3" fill="#0CC9A8"/>
    <text x="0" y="26" class="teal digit" font-size="11" font-weight="600">Step 3 of 4</text>
    <text x="1000" y="26" class="mist digit" font-size="11" text-anchor="end">1 step remaining</text>
  </g>

  <!-- Verdict card (left) -->
  <g transform="translate(40, 170)">
    <rect class="c1" x="0" y="0" width="600" height="340" rx="16" ry="16"/>

    <g class="verdict-pop" transform="translate(300, 156)">
      <g class="verdict-ring">
        <circle cx="0" cy="0" r="92" fill="rgba(34,197,94,0.12)" stroke="#22C55E" stroke-width="3"/>
        <circle cx="0" cy="0" r="76" fill="rgba(34,197,94,0.08)"/>
      </g>
      <text x="0" y="-12" class="green" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="0.8">VERDICT</text>
      <text x="0" y="20" class="cloud" font-size="32" font-weight="700" text-anchor="middle">In scope</text>
    </g>

    <text x="300" y="290" class="mist" font-size="12" text-anchor="middle">First reporting period, FY 2027, filed 2028</text>
    <text x="300" y="310" class="mist digit" font-size="11" text-anchor="middle">Audit-grade methodology, no account required</text>
  </g>

  <!-- Test breakdown (right) -->
  <g transform="translate(660, 170)">
    <rect class="c1" x="0" y="0" width="380" height="340" rx="16" ry="16"/>
    <text x="20" y="32" class="cloud" font-size="13" font-weight="600">Threshold test results</text>
    <text x="20" y="52" class="mist" font-size="11">Must exceed 2 of 3 to be in scope</text>
    <line x1="20" y1="68" x2="360" y2="68" class="hair"/>

    <g class="test-row tr-1" transform="translate(20, 92)">
      <rect x="0" y="0" width="340" height="64" rx="10" fill="#11243F"/>
      <g transform="translate(18, 32)">
        <circle cx="0" cy="0" r="11" fill="rgba(34,197,94,0.25)"/>
        <path d="M-5 0 L-1 4 L5 -4" stroke="#22C55E" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="40" y="24" class="cloud" font-size="12" font-weight="600">Headcount, &gt; 1,000 FTE</text>
      <text x="40" y="44" class="mist digit" font-size="11">1,284 FTE</text>
      <text x="324" y="38" class="green digit" font-size="11" text-anchor="end" font-weight="600">PASS</text>
    </g>
    <g class="test-row tr-2" transform="translate(20, 168)">
      <rect x="0" y="0" width="340" height="64" rx="10" fill="#11243F"/>
      <g transform="translate(18, 32)">
        <circle cx="0" cy="0" r="11" fill="rgba(34,197,94,0.25)"/>
        <path d="M-5 0 L-1 4 L5 -4" stroke="#22C55E" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="40" y="24" class="cloud" font-size="12" font-weight="600">Turnover, &gt; €450M</text>
      <text x="40" y="44" class="mist digit" font-size="11">€612M</text>
      <text x="324" y="38" class="green digit" font-size="11" text-anchor="end" font-weight="600">PASS</text>
    </g>
    <g class="test-row tr-3" transform="translate(20, 244)">
      <rect x="0" y="0" width="340" height="64" rx="10" fill="#11243F"/>
      <g transform="translate(18, 32)">
        <circle cx="0" cy="0" r="11" fill="rgba(245,158,11,0.22)"/>
        <text x="0" y="4" class="amber" font-size="14" font-weight="700" text-anchor="middle">?</text>
      </g>
      <text x="40" y="24" class="cloud" font-size="12" font-weight="600">Balance sheet, &gt; €225M</text>
      <text x="40" y="44" class="mist digit" font-size="11">Not provided</text>
      <text x="324" y="38" class="amber digit" font-size="11" text-anchor="end" font-weight="600">SKIP</text>
    </g>
  </g>

  <line x1="40" y1="552" x2="1040" y2="552" class="hair"/>
  <g transform="translate(40, 580)">
    <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.4">Verdict reflects 2026 Omnibus I thresholds, results indicative not legal advice</text>
  </g>
</svg>
