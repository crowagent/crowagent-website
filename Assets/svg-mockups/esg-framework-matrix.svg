    @keyframes sf23ax-soft{0%,100%{opacity:1}50%{opacity:.78}}
    @keyframes sf23ax-blink{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes sf23ax-march{from{stroke-dashoffset:0}to{stroke-dashoffset:-32}}
    @keyframes sf23ax-breathe{0%,100%{opacity:1}50%{opacity:.88}}
    rect[fill="#0CC9A8"]:not([fill-opacity]){animation:sf23ax-soft 3.8s ease-in-out infinite}
    rect[fill="#F59E0B"]:not([fill-opacity]){animation:sf23ax-soft 2.6s ease-in-out infinite}
    rect[fill="#EF4444"]:not([fill-opacity]){animation:sf23ax-blink 2s ease-in-out infinite}
    rect[fill="#5BC8FF"]:not([fill-opacity]){animation:sf23ax-soft 4.4s ease-in-out infinite}
    rect.teal{animation:sf23ax-soft 3.8s ease-in-out infinite}
    rect.sky{animation:sf23ax-soft 4.4s ease-in-out infinite}
    rect.mark{animation:sf23ax-breathe 5s ease-in-out infinite}
    circle[fill="#0CC9A8"]{animation:sf23ax-soft 3.8s ease-in-out infinite}
    circle[fill="#F59E0B"]{animation:sf23ax-soft 2.6s ease-in-out infinite}
    circle[fill="#EF4444"]{animation:sf23ax-blink 2s ease-in-out infinite}
    circle[fill="#5BC8FF"]{animation:sf23ax-soft 4.4s ease-in-out infinite}
    polyline{stroke-dasharray:8 6;animation:sf23ax-march 2.4s linear infinite}
    text[font-size="20"],text[font-size="22"],text[font-size="24"],text[font-size="26"],text[font-size="28"],text[font-size="32"],text[font-size="34"],text[font-size="56"],text[font-size="92"]{animation:sf23ax-breathe 5.4s ease-in-out infinite}
    @media (prefers-reduced-motion:reduce){*{animation:none!important}}
