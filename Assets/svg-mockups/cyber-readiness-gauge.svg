    <g transform="translate(1248,-10)">
      <rect width="10" height="14" rx="2" fill="#F59E0B"/><rect x="13" width="10" height="14" rx="2" fill="#F59E0B"/><rect x="26" width="10" height="14" rx="2" fill="#F59E0B"/><rect x="39" width="10" height="14" rx="2" fill="#0D2847"/><rect x="52" width="10" height="14" rx="2" fill="#0D2847"/>
    </g>
