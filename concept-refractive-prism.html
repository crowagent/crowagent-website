<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refractive Prism Concept | CrowAgent Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    :root {
      --bg: var(--ca-c-000000);
      --teal: var(--teal);
    }
    body {
      background-color: var(--bg);
      color: white;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }
    /* Animated Prism Background */
    .prism-background {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, var(--ca-c-111111), var(--ca-c-000000));
      z-index: 0;
    }
    .prism-light {
      position: absolute;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: conic-gradient(
        from 180deg at 50% 50%,
        transparent 0deg,
        rgba(12, 201, 168, 0.1) 60deg,
        rgba(167, 139, 250, 0.1) 120deg,
        transparent 180deg
      );
      filter: blur(100px);
      animation: rotate 20s infinite linear;
    }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .shiny-heading {
      font-size: 5rem;
      font-weight: 900;
      letter-spacing: -0.07em;
      text-transform: uppercase;
      background: linear-gradient(to bottom, var(--white), var(--ca-c-888888));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }
    .reflective-container {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 40px;
      padding: 4rem;
      box-shadow: 
        inset 0 0 20px rgba(255,255,255,0.05),
        0 40px 100px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      position: relative;
      z-index: 10;
    }
    @media (max-width: 768px) {
      .shiny-heading { font-size: 3.5rem; }
      .reflective-container { padding: 2rem; }
    }
  </style>
</head>
<body>
  <div class="prism-background">
    <div class="prism-light"></div>
  </div>

  <main class="relative z-10 h-screen flex flex-col items-center justify-center px-6">
    <div class="reflective-container max-w-5xl text-center">
      <span class="text-xs font-black uppercase tracking-[0.4em] text-teal-400 mb-8 block">Absolute Determinism</span>
      
      <h1 class="shiny-heading mb-12">
        Win.<br>
        Earn.<br>
        Comply.
      </h1>

      <p class="text-xl md:text-2xl text-white/40 mb-12 font-light tracking-wide max-w-2xl mx-auto">
        The enforcement-ready platform for UK SMEs. Level the playing field with consultancy-grade intelligence.
      </p>

      <div class="flex gap-8 justify-center">
        <button class="px-10 py-5 bg-teal-500 text-black font-black rounded-full hover:shadow-[0_0_50px_rgba(12,201,168,0.5)] transition-all">
          Explore the Stack
        </button>
      </div>
    </div>
  </main>

  <script>
    window.addEventListener('load', () => {
      gsap.from(".reflective-container", { scale: 0.9, opacity: 0, duration: 2, ease: "expo.out" });
      gsap.from(".shiny-heading", { y: 50, opacity: 0, duration: 1.5, ease: "power4.out", delay: 0.5 });
    });
  </script>
</body>
</html>
