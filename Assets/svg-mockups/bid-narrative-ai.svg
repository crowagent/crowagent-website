  <line x1="368" y1="697" x2="380" y2="697" stroke="#A78BFA" stroke-width="2" stroke-linecap="round"/>
  <line x1="374" y1="691" x2="374" y2="703" stroke="#A78BFA" stroke-width="2" stroke-linecap="round"/>
  <text x="386" y="702" class="b" font-size="12" font-weight="600" fill="#A78BFA">Add measure from library (387 available)</text>

