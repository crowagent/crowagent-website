<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="CrowESG double materiality matrix mockup with topic bubbles plotted by impact materiality and financial materiality">
  <title>CrowESG double materiality matrix</title>
  <desc>Double materiality scatter plot with sustainability topic bubbles sized by stakeholder weight and coloured by ESRS theme.</desc>
  <defs><linearGradient id="bgMA" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#040E1A"/><stop offset="1" stop-color="#061525"/></linearGradient></defs>
  <style>
    .f { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    .b { font-family: 'Inter', system-ui, sans-serif; }
    .m { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  </style>
  <rect width="1600" height="900" fill="url(#bgMA)"/>
  <rect x="0" y="0" width="1600" height="44" fill="#0A1F3A"/>
  <circle cx="22" cy="22" r="6" fill="#EF4444"/><circle cx="44" cy="22" r="6" fill="#F59E0B"/><circle cx="66" cy="22" r="6" fill="#0CC9A8"/>
  <rect x="600" y="11" width="400" height="22" rx="11" fill="#040E1A"/>
  <text x="800" y="26" text-anchor="middle" class="b" font-size="11" fill="#8A9DB8">app.crowagent.ai/crowesg/materiality</text>
  <rect x="0" y="44" width="1600" height="64" fill="#0A1F3A"/>
  <line x1="0" y1="108" x2="1600" y2="108" stroke="#0D2847"/>
  <circle cx="44" cy="76" r="14" fill="#F59E0B"/>
  <text x="68" y="81" class="f" font-size="17" font-weight="700" fill="#E8F0FA">CrowESG · Materiality</text>
  <rect x="200" y="64" width="120" height="22" rx="11" fill="#F59E0B" fill-opacity="0.18"/>
  <text x="260" y="80" text-anchor="middle" class="b" font-size="11" font-weight="700" fill="#F59E0B">Coming Q3 2026</text>

  <text x="68" y="160" class="f" font-size="26" font-weight="700" fill="#E8F0FA">Double materiality matrix</text>
  <text x="68" y="184" class="b" font-size="13" fill="#8A9DB8">Plot sustainability topics by impact and financial materiality (ESRS 1 §3, EFRAG IG 1)</text>

  <!-- Matrix card -->
  <rect x="68" y="216" width="940" height="624" rx="14" fill="#0A1F3A" stroke="#0D2847"/>

  <!-- Quadrant background -->
  <rect x="156" y="284" width="800" height="492" rx="6" fill="#040E1A"/>
  <line x1="156" y1="530" x2="956" y2="530" stroke="#0D2847" stroke-width="2"/>
  <line x1="556" y1="284" x2="556" y2="776" stroke="#0D2847" stroke-width="2"/>

  <!-- Quadrant labels -->
  <text x="356" y="310" text-anchor="middle" class="b" font-size="11" fill="#8A9DB8">Lower priority</text>
  <text x="756" y="310" text-anchor="middle" class="b" font-size="11" font-weight="700" fill="#5BC8FF">Watch · monitor</text>
  <text x="356" y="760" text-anchor="middle" class="b" font-size="11" font-weight="700" fill="#F59E0B">Manage</text>
  <text x="756" y="760" text-anchor="middle" class="b" font-size="11" font-weight="700" fill="#0CC9A8">DISCLOSE · ESRS material</text>

  <!-- Axes -->
  <text x="92" y="540" text-anchor="middle" class="b" font-size="12" font-weight="700" fill="#E8F0FA" transform="rotate(-90 92 540)">FINANCIAL MATERIALITY →</text>
  <text x="556" y="810" text-anchor="middle" class="b" font-size="12" font-weight="700" fill="#E8F0FA">IMPACT MATERIALITY →</text>

  <!-- Bubbles. Size = stakeholder weight. Colour = ESRS theme.
       Top-right quadrant = ESRS material -->
  <!-- E1 Climate change (large, top-right) -->
  <circle cx="800" cy="370" r="40" fill="#0CC9A8" fill-opacity="0.6" stroke="#0CC9A8" stroke-width="2"/>
  <text x="800" y="375" text-anchor="middle" class="f" font-size="13" font-weight="700" fill="#040E1A">E1</text>

  <!-- E2 Pollution -->
  <circle cx="640" cy="430" r="22" fill="#0CC9A8" fill-opacity="0.45" stroke="#0CC9A8"/>
  <text x="640" y="435" text-anchor="middle" class="f" font-size="11" font-weight="700" fill="#040E1A">E2</text>

  <!-- E3 Water -->
  <circle cx="700" cy="490" r="18" fill="#0CC9A8" fill-opacity="0.45" stroke="#0CC9A8"/>
  <text x="700" y="494" text-anchor="middle" class="f" font-size="10" font-weight="700" fill="#040E1A">E3</text>

  <!-- S1 Own workforce (top-right, large) -->
  <circle cx="860" cy="450" r="34" fill="#5BC8FF" fill-opacity="0.5" stroke="#5BC8FF" stroke-width="2"/>
  <text x="860" y="455" text-anchor="middle" class="f" font-size="12" font-weight="700" fill="#040E1A">S1</text>

  <!-- S2 Workers in value chain -->
  <circle cx="720" cy="400" r="20" fill="#5BC8FF" fill-opacity="0.4" stroke="#5BC8FF"/>
  <text x="720" y="404" text-anchor="middle" class="f" font-size="10" font-weight="700" fill="#040E1A">S2</text>

  <!-- S4 Consumers -->
  <circle cx="600" cy="560" r="18" fill="#5BC8FF" fill-opacity="0.35" stroke="#5BC8FF"/>
  <text x="600" y="564" text-anchor="middle" class="f" font-size="10" font-weight="700" fill="#040E1A">S4</text>

  <!-- G1 Business conduct -->
  <circle cx="880" cy="380" r="24" fill="#A78BFA" fill-opacity="0.5" stroke="#A78BFA"/>
  <text x="880" y="384" text-anchor="middle" class="f" font-size="11" font-weight="700" fill="#040E1A">G1</text>

  <!-- E4 Biodiversity (lower-left = manage) -->
  <circle cx="380" cy="600" r="18" fill="#0CC9A8" fill-opacity="0.35" stroke="#0CC9A8"/>
  <text x="380" y="604" text-anchor="middle" class="f" font-size="10" font-weight="700" fill="#040E1A">E4</text>

  <!-- E5 Resource use (lower-left) -->
  <circle cx="440" cy="660" r="20" fill="#0CC9A8" fill-opacity="0.35" stroke="#0CC9A8"/>
  <text x="440" y="664" text-anchor="middle" class="f" font-size="10" font-weight="700" fill="#040E1A">E5</text>

  <!-- S3 Affected communities (top-left = watch) -->
  <circle cx="280" cy="380" r="16" fill="#5BC8FF" fill-opacity="0.3" stroke="#5BC8FF"/>
  <text x="280" y="384" text-anchor="middle" class="f" font-size="10" font-weight="700" fill="#040E1A">S3</text>

  <!-- Threshold line -->
  <line x1="156" y1="530" x2="956" y2="530" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="556" y1="284" x2="556" y2="776" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="950" y="544" text-anchor="end" class="m" font-size="10" font-weight="700" fill="#F59E0B">ESRS materiality threshold</text>

  <!-- Right: legend + recommendation -->
  <rect x="1024" y="216" width="536" height="624" rx="14" fill="#0A1F3A" stroke="#0D2847"/>
  <text x="1048" y="252" class="f" font-size="14" font-weight="700" fill="#E8F0FA">ESRS topic legend</text>

  <!-- Environmental -->
  <text x="1048" y="290" class="b" font-size="11" font-weight="700" fill="#0CC9A8">ENVIRONMENTAL</text>
  <circle cx="1060" cy="316" r="6" fill="#0CC9A8" fill-opacity="0.6"/>
  <text x="1080" y="320" class="b" font-size="12" fill="#E8F0FA">E1 · Climate change</text>
  <text x="1380" y="320" text-anchor="end" class="m" font-size="11" font-weight="700" fill="#0CC9A8">DISCLOSE</text>

  <circle cx="1060" cy="346" r="6" fill="#0CC9A8" fill-opacity="0.45"/>
  <text x="1080" y="350" class="b" font-size="12" fill="#E8F0FA">E2 · Pollution</text>
  <text x="1380" y="350" text-anchor="end" class="m" font-size="11" font-weight="700" fill="#5BC8FF">Watch</text>

  <circle cx="1060" cy="376" r="6" fill="#0CC9A8" fill-opacity="0.45"/>
  <text x="1080" y="380" class="b" font-size="12" fill="#E8F0FA">E3 · Water</text>
  <text x="1380" y="380" text-anchor="end" class="m" font-size="11" font-weight="700" fill="#5BC8FF">Watch</text>

  <circle cx="1060" cy="406" r="6" fill="#0CC9A8" fill-opacity="0.35"/>
  <text x="1080" y="410" class="b" font-size="12" fill="#E8F0FA">E4 · Biodiversity</text>
  <text x="1380" y="410" text-anchor="end" class="m" font-size="11" font-weight="700" fill="#F59E0B">Manage</text>

  <circle cx="1060" cy="436" r="6" fill="#0CC9A8" fill-opacity="0.35"/>
  <text x="1080" y="440" class="b" font-size="12" fill="#E8F0FA">E5 · Resource use</text>
  <text x="1380" y="440" text-anchor="end" class="m" font-size="11" font-weight="700" fill="#F59E0B">Manage</text>

  <!-- Social -->
  <text x="1048" y="478" class="b" font-size="11" font-weight="700" fill="#5BC8FF">SOCIAL</text>
  <circle cx="1060" cy="504" r="6" fill="#5BC8FF" fill-opacity="0.5"/>
  <text x="1080" y="508" class="b" font-size="12" fill="#E8F0FA">S1 · Own workforce</text>
  <text x="1380" y="508" text-anchor="end" class="m" font-size="11" font-weight="700" fill="#0CC9A8">DISCLOSE</text>

  <circle cx="1060" cy="534" r="6" fill="#5BC8FF" fill-opacity="0.4"/>
  <text x="1080" y="538" class="b" font-size="12" fill="#E8F0FA">S2 · Value-chain workers</text>
  <text x="1380" y="538" text-anchor="end" class="m" font-size="11" font-weight="700" fill="#5BC8FF">Watch</text>

  <circle cx="1060" cy="564" r="6" fill="#5BC8FF" fill-opacity="0.3"/>
  <text x="1080" y="568" class="b" font-size="12" fill="#E8F0FA">S3 · Affected communities</text>
  <text x="1380" y="568" text-anchor="end" class="m" font-size="11" font-weight="700" fill="#5BC8FF">Watch</text>

  <circle cx="1060" cy="594" r="6" fill="#5BC8FF" fill-opacity="0.35"/>
  <text x="1080" y="598" class="b" font-size="12" fill="#E8F0FA">S4 · Consumers</text>
  <text x="1380" y="598" text-anchor="end" class="m" font-size="11" font-weight="700" fill="#F59E0B">Manage</text>

  <!-- Governance -->
  <text x="1048" y="636" class="b" font-size="11" font-weight="700" fill="#A78BFA">GOVERNANCE</text>
  <circle cx="1060" cy="662" r="6" fill="#A78BFA" fill-opacity="0.5"/>
  <text x="1080" y="666" class="b" font-size="12" fill="#E8F0FA">G1 · Business conduct</text>
  <text x="1380" y="666" text-anchor="end" class="m" font-size="11" font-weight="700" fill="#0CC9A8">DISCLOSE</text>

  <!-- Recommendation -->
  <line x1="1048" y1="700" x2="1536" y2="700" stroke="#0D2847"/>
  <text x="1048" y="730" class="b" font-size="11" font-weight="700" fill="#8A9DB8">RECOMMENDATION</text>
  <text x="1048" y="754" class="b" font-size="14" font-weight="600" fill="#E8F0FA">3 topics ESRS-material · 12 disclosures required</text>

  <rect x="1048" y="772" width="240" height="40" rx="8" fill="#0CC9A8"/>
  <text x="1168" y="797" text-anchor="middle" class="b" font-size="13" font-weight="700" fill="#040E1A">Open disclosure builder →</text>

  <rect x="1300" y="772" width="240" height="40" rx="8" fill="#0D2847"/>
  <text x="1420" y="797" text-anchor="middle" class="b" font-size="13" font-weight="600" fill="#5BC8FF">Export matrix · PNG/PDF</text>
</svg>
