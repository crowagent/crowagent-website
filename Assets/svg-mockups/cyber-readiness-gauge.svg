    <text x="1076" y="844" text-anchor="middle">Thu</text>
    <text x="1184" y="844" text-anchor="middle">Fri</text>
    <text x="1292" y="844" text-anchor="middle">Sat</text>
    <text x="1400" y="844" text-anchor="middle">Sun</text>
    <text x="1508" y="844" text-anchor="end">Today</text>
