<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1067" role="img" aria-label="Ascending bar columns with a teal threshold line in CrowAgent teal and sky" preserveAspectRatio="xMidYMid slice">
  <title>CrowAgent pricing, ascending bars abstract</title>
  <desc>A sequence of ascending vertical bars crossed by a teal threshold line. Decorative; no data.</desc>
  <defs>
    <linearGradient id="prBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0CC9A8" stop-opacity="0"/>
      <stop offset="0.35" stop-color="#0CC9A8" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#0CC9A8" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="prBarAlt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5BC8FF" stop-opacity="0"/>
      <stop offset="0.35" stop-color="#5BC8FF" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#5BC8FF" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="prThresh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0CC9A8" stop-opacity="0"/>
      <stop offset="0.15" stop-color="#0CC9A8" stop-opacity="0.85"/>
      <stop offset="0.85" stop-color="#0CC9A8" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#0CC9A8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes pr-rise{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes pr-rise2{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes pr-thresh{0%,100%{opacity:.85;transform:translateX(0)}50%{opacity:1;transform:translateX(8px)}}
    @keyframes pr-tw{0%,100%{opacity:.4}50%{opacity:.95}}
    .pr-bar-a{animation:pr-rise 36s ease-in-out infinite;transform-origin:bottom}
    .pr-bar-b{animation:pr-rise2 42s ease-in-out -8s infinite;transform-origin:bottom}
    .pr-thresh{animation:pr-thresh 40s ease-in-out infinite}
    .pr-tw{animation:pr-tw 34s ease-in-out infinite}
    .pr-tw:nth-child(2n){animation-duration:42s}
    @media (prefers-reduced-motion:reduce){*{animation:none!important;transform:none!important}}
  </style>

  <!-- Ascending bars: each column gets taller -->
  <g>
    <rect class="pr-bar-a" x="120"  y="780" width="60" height="120" fill="url(#prBarAlt)" opacity="0.65"/>
    <rect class="pr-bar-b" x="220"  y="720" width="60" height="180" fill="url(#prBar)" opacity="0.65"/>
    <rect class="pr-bar-a" x="320"  y="650" width="60" height="250" fill="url(#prBarAlt)" opacity="0.65"/>
    <rect class="pr-bar-b" x="420"  y="580" width="60" height="320" fill="url(#prBar)" opacity="0.65"/>
    <rect class="pr-bar-a" x="520"  y="500" width="60" height="400" fill="url(#prBarAlt)" opacity="0.65"/>
    <rect class="pr-bar-b" x="620"  y="420" width="60" height="480" fill="url(#prBar)" opacity="0.65"/>
    <rect class="pr-bar-a" x="720"  y="340" width="60" height="560" fill="url(#prBarAlt)" opacity="0.65"/>
    <rect class="pr-bar-b" x="820"  y="280" width="60" height="620" fill="url(#prBar)" opacity="0.7"/>
    <rect class="pr-bar-a" x="920"  y="220" width="60" height="680" fill="url(#prBarAlt)" opacity="0.65"/>
    <rect class="pr-bar-b" x="1020" y="180" width="60" height="720" fill="url(#prBar)" opacity="0.7"/>
    <rect class="pr-bar-a" x="1120" y="160" width="60" height="740" fill="url(#prBarAlt)" opacity="0.65"/>
    <rect class="pr-bar-b" x="1220" y="140" width="60" height="760" fill="url(#prBar)" opacity="0.7"/>
    <rect class="pr-bar-a" x="1320" y="160" width="60" height="740" fill="url(#prBarAlt)" opacity="0.5"/>
    <rect class="pr-bar-b" x="1420" y="200" width="60" height="700" fill="url(#prBar)" opacity="0.4"/>
  </g>

  <!-- Teal threshold line (price ceiling marker) -->
  <g class="pr-thresh">
    <line x1="0" y1="420" x2="1600" y2="420" stroke="url(#prThresh)" stroke-width="2.4"/>
    <line x1="0" y1="420" x2="1600" y2="420" stroke="#0CC9A8" stroke-width="1.2" stroke-dasharray="4 6" stroke-opacity="0.7"/>
    <circle cx="800" cy="420" r="6" fill="#C2FF57" opacity="0.95"/>
    <circle cx="800" cy="420" r="14" fill="none" stroke="#0CC9A8" stroke-width="1.2" stroke-opacity="0.7"/>
  </g>

  <!-- Particle accents (sparkles) -->
  <g fill="#E8F0FA">
    <circle class="pr-tw" cx="200" cy="320" r="1.5" opacity="0.45"/>
    <circle class="pr-tw" cx="380" cy="240" r="1.3" opacity="0.4"/>
    <circle class="pr-tw" cx="560" cy="180" r="1.6" opacity="0.45"/>
    <circle class="pr-tw" cx="760" cy="140" r="1.3" opacity="0.4"/>
    <circle class="pr-tw" cx="980" cy="100" r="1.5" opacity="0.45"/>
    <circle class="pr-tw" cx="1180" cy="80" r="1.3" opacity="0.4"/>
    <circle class="pr-tw" cx="1380" cy="120" r="1.5" opacity="0.45"/>
    <circle class="pr-tw" cx="280" cy="500" r="1.3" opacity="0.4"/>
    <circle class="pr-tw" cx="1480" cy="500" r="1.3" opacity="0.4"/>
  </g>

  <!-- Baseline -->
  <line x1="0" y1="900" x2="1600" y2="900" stroke="#5BC8FF" stroke-width="1.2" stroke-opacity="0.45"/>
</svg>
