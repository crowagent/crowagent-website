    <text x="590" y="454" class="f" font-size="22" font-weight="700" fill="#E8F0FA">£50,000</text>

    <text x="590" y="490" class="b" font-size="11" font-weight="600" fill="#8A9DB8">25-YR NPV</text>
    <text x="590" y="522" class="f" font-size="22" font-weight="700" fill="#0CC9A8">£118,000</text>

    <text x="590" y="558" class="b" font-size="11" font-weight="600" fill="#8A9DB8">PAYBACK</text>
    <text x="590" y="590" class="f" font-size="22" font-weight="700" fill="#E8F0FA">8.4 yrs</text>

    <text x="590" y="626" class="b" font-size="11" font-weight="600" fill="#8A9DB8">EPC OUTCOME</text>
