  <circle cx="124" cy="754" r="18" fill="#F59E0B" fill-opacity="0.18"/>
  <line x1="124" y1="744" x2="124" y2="758" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
  <line x1="124" y1="763" x2="124" y2="765" stroke="#F59E0B" stroke-width="3" stroke-linecap="round"/>
