  <rect x="92" y="312" width="280" height="46" rx="8" fill="#A78BFA" fill-opacity="0.16" stroke="#A78BFA"/>
  <rect x="100" y="324" width="22" height="22" rx="4" fill="#A78BFA"/>
  <text x="111" y="340" text-anchor="middle" class="f" font-size="11" font-weight="700" fill="#040E1A">M1</text>
  <text x="132" y="332" class="b" font-size="12" font-weight="600" fill="#E8F0FA">Mission 1 · Wellbeing</text>
