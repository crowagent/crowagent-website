<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="CrowCash statutory demand letter generator mockup under the Late Payment of Commercial Debts (Interest) Act 1998">
  <title>CrowCash statutory letter generator</title>
  <desc>Late Payment Act 1998 statutory demand letter generator showing interest at Bank of England base rate plus 8 percentage points and tiered fixed compensation of forty, seventy, or one hundred pounds per overdue invoice. Synthetic figures for illustration.</desc>
  <defs>
    <linearGradient id="bgLT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#040E1A"/>
      <stop offset="1" stop-color="#061525"/>
    </linearGradient>
  </defs>
  <style>
    .f { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    .b { font-family: 'Inter', system-ui, sans-serif; }
    .m { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    @keyframes sf23ax-soft{0%,100%{opacity:1}50%{opacity:.78}}
    @keyframes sf23ax-blink{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes sf23ax-march{from{stroke-dashoffset:0}to{stroke-dashoffset:-32}}
    @keyframes sf23ax-breathe{0%,100%{opacity:1}50%{opacity:.88}}
    rect[fill="#0CC9A8"]:not([fill-opacity]){animation:sf23ax-soft 3.8s ease-in-out infinite}
    rect[fill="#F59E0B"]:not([fill-opacity]){animation:sf23ax-soft 2.6s ease-in-out infinite}
    rect[fill="#EF4444"]:not([fill-opacity]){animation:sf23ax-blink 2s ease-in-out infinite}
    rect[fill="#5BC8FF"]:not([fill-opacity]){animation:sf23ax-soft 4.4s ease-in-out infinite}
    circle[fill="#0CC9A8"]{animation:sf23ax-soft 3.8s ease-in-out infinite}
    circle[fill="#F59E0B"]{animation:sf23ax-soft 2.6s ease-in-out infinite}
    circle[fill="#EF4444"]{animation:sf23ax-blink 2s ease-in-out infinite}
    circle[fill="#5BC8FF"]{animation:sf23ax-soft 4.4s ease-in-out infinite}
    polyline{stroke-dasharray:8 6;animation:sf23ax-march 2.4s linear infinite}
    text[font-size="20"],text[font-size="22"],text[font-size="24"],text[font-size="26"],text[font-size="28"],text[font-size="32"],text[font-size="34"],text[font-size="56"],text[font-size="92"]{animation:sf23ax-breathe 5.4s ease-in-out infinite}
    @media (prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>

  <rect width="1600" height="900" fill="url(#bgLT)"/>

  <rect x="0" y="0" width="1600" height="44" fill="#0A1F3A"/>
  <circle cx="22" cy="22" r="6" fill="#EF4444"/>
  <circle cx="44" cy="22" r="6" fill="#F59E0B"/>
  <circle cx="66" cy="22" r="6" fill="#0CC9A8"/>
  <rect x="600" y="11" width="400" height="22" rx="11" fill="#040E1A"/>
  <text x="800" y="26" text-anchor="middle" class="b" font-size="11" fill="#8A9DB8">app.crowagent.ai/crowcash/letters/draft</text>

  <rect x="0" y="44" width="1600" height="64" fill="#0A1F3A"/>
  <line x1="0" y1="108" x2="1600" y2="108" stroke="#0D2847"/>
  <circle cx="44" cy="76" r="14" fill="#0CC9A8"/>
  <text x="44" y="82" text-anchor="middle" class="f" font-size="14" font-weight="700" fill="#040E1A">£</text>
  <text x="68" y="81" class="f" font-size="17" font-weight="700" fill="#E8F0FA">CrowCash</text>
  <text x="170" y="81" class="b" font-size="13" fill="#8A9DB8">Statutory demand · Late Payment Act 1998</text>

  <text x="68" y="158" class="f" font-size="26" font-weight="700" fill="#E8F0FA">Demand letter · INV-2026-0162</text>
  <text x="68" y="184" class="b" font-size="13" fill="#8A9DB8">Meridian Estates Ltd · 42 days overdue · ready to send</text>

  <!-- Left: form / inputs -->
  <rect x="68" y="210" width="560" height="640" rx="14" fill="#0A1F3A" stroke="#0D2847"/>
  <text x="92" y="248" class="b" font-size="11" fill="#8A9DB8" letter-spacing="1">DEBTOR</text>
  <text x="92" y="276" class="f" font-size="18" font-weight="700" fill="#E8F0FA">Meridian Estates Ltd</text>
  <text x="92" y="298" class="b" font-size="13" fill="#B8CCE0">finance@meridian-estates.example</text>

  <line x1="92" y1="318" x2="604" y2="318" stroke="#0D2847"/>

  <text x="92" y="350" class="b" font-size="11" fill="#8A9DB8" letter-spacing="1">PRINCIPAL DEBT</text>
  <text x="92" y="384" class="f" font-size="28" font-weight="800" fill="#E8F0FA">£18,400.00</text>

  <text x="92" y="420" class="b" font-size="11" fill="#8A9DB8" letter-spacing="1">DAYS OVERDUE</text>
  <text x="92" y="450" class="f" font-size="22" font-weight="800" fill="#F59E0B">42 days</text>

  <text x="92" y="490" class="b" font-size="11" fill="#8A9DB8" letter-spacing="1">DUE DATE</text>
  <text x="92" y="514" class="b" font-size="14" fill="#E8F0FA">10 March 2026</text>

  <text x="92" y="552" class="b" font-size="11" fill="#8A9DB8" letter-spacing="1">CONTRACT TYPE</text>
  <rect x="92" y="566" width="180" height="34" rx="6" fill="#040E1A" stroke="#0D2847"/>
  <text x="108" y="588" class="b" font-size="13" fill="#E8F0FA">B2B · commercial</text>

  <text x="92" y="640" class="b" font-size="11" fill="#8A9DB8" letter-spacing="1">CITED STATUTE</text>
  <text x="92" y="664" class="b" font-size="13" font-weight="600" fill="#E8F0FA">Late Payment of Commercial Debts</text>
  <text x="92" y="684" class="b" font-size="13" font-weight="600" fill="#E8F0FA">(Interest) Act 1998 (as amended)</text>
  <text x="92" y="708" class="b" font-size="12" fill="#8A9DB8">+ Statutory Instrument 2002/1674</text>

  <rect x="92" y="744" width="240" height="44" rx="8" fill="#0CC9A8"/>
  <text x="212" y="772" text-anchor="middle" class="f" font-size="14" font-weight="800" fill="#040E1A">Generate &amp; send letter</text>
  <rect x="346" y="744" width="180" height="44" rx="8" fill="none" stroke="#0CC9A8" stroke-width="1.5"/>
  <text x="436" y="772" text-anchor="middle" class="f" font-size="13" font-weight="700" fill="#0CC9A8">Preview PDF</text>

  <!-- Right: calculated breakdown -->
  <rect x="652" y="210" width="880" height="640" rx="14" fill="#0A1F3A" stroke="#0D2847"/>
  <text x="676" y="248" class="b" font-size="11" fill="#8A9DB8" letter-spacing="1">STATUTORY CALCULATION</text>
  <text x="676" y="280" class="f" font-size="18" font-weight="700" fill="#E8F0FA">Total recoverable</text>

  <text x="1508" y="282" text-anchor="end" class="f" font-size="32" font-weight="800" fill="#0CC9A8">£18,665.69</text>

  <line x1="676" y1="306" x2="1508" y2="306" stroke="#0D2847"/>

  <!-- Breakdown rows -->
  <text x="676" y="346" class="b" font-size="13" fill="#B8CCE0">Principal debt</text>
  <text x="1508" y="346" text-anchor="end" class="m" font-size="14" font-weight="600" fill="#E8F0FA">£18,400.00</text>

  <text x="676" y="382" class="b" font-size="13" fill="#B8CCE0">Statutory interest · 42 days @ 13.25% pa</text>
  <text x="676" y="402" class="b" font-size="11" fill="#8A9DB8">(BoE base rate 5.25% + 8 percentage points)</text>
  <text x="1508" y="382" text-anchor="end" class="m" font-size="14" font-weight="600" fill="#E8F0FA">£278.69</text>

  <text x="676" y="438" class="b" font-size="13" fill="#B8CCE0">Fixed compensation · invoice ≥ £10,000</text>
  <text x="676" y="458" class="b" font-size="11" fill="#8A9DB8">(s.5A · tier 3 · £100 per invoice)</text>
  <text x="1508" y="438" text-anchor="end" class="m" font-size="14" font-weight="600" fill="#E8F0FA">£100.00</text>

  <text x="676" y="494" class="b" font-size="13" fill="#B8CCE0">Recovery costs (reasonable)</text>
  <text x="676" y="514" class="b" font-size="11" fill="#8A9DB8">(s.5A(2A) · solicitor letter @ £113.00 - £100 fixed)</text>
  <text x="1508" y="494" text-anchor="end" class="m" font-size="14" font-weight="600" fill="#E8F0FA">£0.00</text>

  <line x1="676" y1="540" x2="1508" y2="540" stroke="#0D2847"/>

  <!-- Compensation tier reference -->
  <text x="676" y="582" class="b" font-size="11" fill="#8A9DB8" letter-spacing="1">FIXED COMPENSATION TIERS</text>

  <rect x="676" y="600" width="270" height="60" rx="8" fill="#040E1A"/>
  <text x="690" y="624" class="f" font-size="13" font-weight="700" fill="#E8F0FA">£40</text>
  <text x="690" y="644" class="b" font-size="11" fill="#8A9DB8">debt up to £999.99</text>

  <rect x="958" y="600" width="270" height="60" rx="8" fill="#040E1A"/>
  <text x="972" y="624" class="f" font-size="13" font-weight="700" fill="#E8F0FA">£70</text>
  <text x="972" y="644" class="b" font-size="11" fill="#8A9DB8">debt £1,000 – £9,999.99</text>

  <rect x="1240" y="600" width="268" height="60" rx="8" fill="#0CC9A8" opacity="0.18"/>
  <text x="1254" y="624" class="f" font-size="13" font-weight="700" fill="#0CC9A8">£100 · active</text>
  <text x="1254" y="644" class="b" font-size="11" fill="#B8CCE0">debt £10,000 or more</text>

  <!-- Delivery channels -->
  <text x="676" y="708" class="b" font-size="11" fill="#8A9DB8" letter-spacing="1">DELIVERY</text>
  <rect x="676" y="722" width="160" height="44" rx="22" fill="#0CC9A8" opacity="0.18"/>
  <text x="756" y="749" text-anchor="middle" class="b" font-size="12" font-weight="700" fill="#0CC9A8">✓ Email</text>
  <rect x="850" y="722" width="160" height="44" rx="22" fill="#0CC9A8" opacity="0.18"/>
  <text x="930" y="749" text-anchor="middle" class="b" font-size="12" font-weight="700" fill="#0CC9A8">✓ Royal Mail signed</text>
  <rect x="1024" y="722" width="160" height="44" rx="22" fill="#040E1A" stroke="#0D2847"/>
  <text x="1104" y="749" text-anchor="middle" class="b" font-size="12" fill="#8A9DB8">Portal upload</text>

  <text x="676" y="804" class="b" font-size="11" fill="#8A9DB8">Letter cites statute. Recoverable interest accrues until full payment is received under the Act.</text>
</svg>
