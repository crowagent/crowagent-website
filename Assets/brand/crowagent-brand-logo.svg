<?xml version="1.0" encoding="UTF-8"?>
<!--
  CrowAgent canonical brand logo — locked 2026-05-10
  Mirrors the brand image supplied by Bhavesh (founder).
  Layout: 4 ascending bars (navy → teal gradient) + teal underline,
          followed by "CrowAgent" wordmark with "Crow" in cloud +
          "Agent" in teal, with "Sustainability Intelligence"
          tagline below in mist.
  Brand tokens used:
    --bg          #040E1A   (NOT used — logo is on a dark navy nav/footer)
    --surf        #0A1F3A   (1st bar — deepest navy)
    --surf2       #0D3558   (2nd bar — mid navy)
    --teal-d      #0AA88C   (3rd bar — dark teal)
    --teal        #0CC9A8   (4th bar + Agent + underline)
    --cloud       #E8F0FA   (Crow text)
    --mist        #8A9DB8   (tagline)
  DO NOT MODIFY without founder sign-off.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 280" role="img" aria-label="CrowAgent — Sustainability Intelligence">
  <title>CrowAgent — Sustainability Intelligence</title>
  <!-- 4 ascending bars -->
  <g>
    <rect x="20"  y="160" width="46" height="80"  rx="10" fill="#0A1F3A"/>
    <rect x="78"  y="120" width="46" height="120" rx="10" fill="#0D3558"/>
    <rect x="136" y="80"  width="46" height="160" rx="10" fill="#0AA88C"/>
    <rect x="194" y="40"  width="46" height="200" rx="10" fill="#0CC9A8"/>
    <!-- Teal underline -->
    <rect x="14" y="252" width="232" height="6" rx="3" fill="#0CC9A8"/>
  </g>
  <!-- "CrowAgent" wordmark -->
  <text x="300" y="140" font-family="Plus Jakarta Sans, system-ui, -apple-system, sans-serif" font-weight="800" font-size="120" letter-spacing="-2">
    <tspan fill="#E8F0FA">Crow</tspan><tspan fill="#0CC9A8">Agent</tspan>
  </text>
  <!-- Tagline -->
  <text x="304" y="208" font-family="Plus Jakarta Sans, system-ui, -apple-system, sans-serif" font-weight="500" font-size="44" letter-spacing="0.5" fill="#8A9DB8">Sustainability Intelligence</text>
</svg>
