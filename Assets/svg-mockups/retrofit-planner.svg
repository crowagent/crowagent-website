    <text x="92" y="566" class="b" font-size="11" font-weight="600" fill="#8A9DB8">PAYBACK</text>
    <text x="92" y="598" class="f" font-size="22" font-weight="700" fill="#E8F0FA">6.2 yrs</text>

    <text x="92" y="634" class="b" font-size="11" font-weight="600" fill="#8A9DB8">EPC OUTCOME</text>
