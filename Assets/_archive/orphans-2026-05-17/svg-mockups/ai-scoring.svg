<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="CrowCash AI payment-likelihood scoring mockup with invoice-by-invoice score, signal weights and chase recommendation">
