<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="cashStep3Title" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="cashStep3Title">CrowCash Step 3: Score and prioritise</title>
  <defs>
    <style>
      .bg { fill: #0A1422; }
      .c1 { fill: #0F1B2E; }
      .c2 { fill: #11243F; }
      .hair { stroke: rgba(255,255,255,0.08); stroke-width: 1; fill: none; }
      .cloud { fill: #E8EEF7; }
      .mist { fill: #8A9DB8; }
      .teal { fill: #0CC9A8; }
      .green { fill: #22C55E; }
      .amber { fill: #F59E0B; }
      .red { fill: #EF4444; }
      .digit { font-variant-numeric: tabular-nums; }

      .row { opacity: 0; }
      .row-1 { animation: row-in 6s ease-out infinite; animation-delay: 0.4s; }
      .row-2 { animation: row-in 6s ease-out infinite; animation-delay: 0.6s; }
      .row-3 { animation: row-in 6s ease-out infinite; animation-delay: 0.8s; }
      .row-4 { animation: row-in 6s ease-out infinite; animation-delay: 1.0s; }
      .row-5 { animation: row-in 6s ease-out infinite; animation-delay: 1.2s; }
      .row-6 { animation: row-in 6s ease-out infinite; animation-delay: 1.4s; }
      @keyframes row-in {
        0%, 4%   { opacity: 0; transform: translateX(-4px); }
        15%, 95% { opacity: 1; transform: translateX(0); }
        100%     { opacity: 0; }
      }

      .score-fill { transform-origin: left; animation: score-fill 6s cubic-bezier(0.4,0,0.2,1) infinite; }
      .sf-1 { animation-delay: 0.6s; }
      .sf-2 { animation-delay: 0.8s; }
      .sf-3 { animation-delay: 1.0s; }
      .sf-4 { animation-delay: 1.2s; }
      .sf-5 { animation-delay: 1.4s; }
      .sf-6 { animation-delay: 1.6s; }
      @keyframes score-fill {
        0%, 10%  { transform: scaleX(0); }
        45%, 100% { transform: scaleX(1); }
      }

      .bucket { opacity: 0; }
      .bk-1 { animation: bk-in 6s ease-out infinite; animation-delay: 2.5s; }
      .bk-2 { animation: bk-in 6s ease-out infinite; animation-delay: 2.8s; }
      .bk-3 { animation: bk-in 6s ease-out infinite; animation-delay: 3.1s; }
      .bk-4 { animation: bk-in 6s ease-out infinite; animation-delay: 3.4s; }
      @keyframes bk-in {
        0%, 38%  { opacity: 0; transform: translateY(4px); }
        50%, 95% { opacity: 1; transform: translateY(0); }
        100%     { opacity: 0; }
      }

      @media (prefers-reduced-motion: reduce) {
        .row, .score-fill, .bucket,
        .row-1, .row-2, .row-3, .row-4, .row-5, .row-6,
        .sf-1, .sf-2, .sf-3, .sf-4, .sf-5, .sf-6,
        .bk-1, .bk-2, .bk-3, .bk-4 {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
        .score-fill { transform: scaleX(1) !important; }
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="620"/>

  <!-- Header -->
  <g transform="translate(40, 40)">
    <text x="0" y="14" class="teal" font-size="11" font-weight="600" letter-spacing="1.5">STEP 3, PRIORITISE</text>
    <text x="0" y="46" class="cloud" font-size="22" font-weight="600">AI scoring, ranked by likelihood to pay</text>
    <text x="0" y="68" class="mist" font-size="13">Chase the debts that will actually clear, not just the noisy ones</text>
  </g>

  <!-- Left: ranked debtor list -->
  <g transform="translate(40, 140)">
    <rect class="c1" x="0" y="0" width="640" height="370" rx="16" ry="16"/>
    <text x="20" y="32" class="cloud" font-size="13" font-weight="600">Ranked debtor queue</text>
    <text x="20" y="52" class="mist" font-size="11">Recovery score combines payment history, ageing, and dispute flags</text>
    <line x1="20" y1="68" x2="620" y2="68" class="hair"/>

    <g transform="translate(20, 86)">
      <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.6">CUSTOMER</text>
      <text x="220" y="0" class="mist" font-size="10" letter-spacing="0.6">AMOUNT</text>
      <text x="340" y="0" class="mist" font-size="10" letter-spacing="0.6">SCORE</text>
      <text x="560" y="0" class="mist" font-size="10" letter-spacing="0.6">RANK</text>
      <line x1="0" y1="12" x2="600" y2="12" class="hair"/>
    </g>

    <g transform="translate(20, 110)">
      <g class="row row-1">
        <text x="0" y="14" class="cloud" font-size="12">Evergreen FM</text>
        <text x="220" y="14" class="cloud digit" font-size="12">£24,600</text>
        <rect x="340" y="6" width="160" height="10" rx="5" fill="#1B2F4D"/>
        <rect class="score-fill sf-1" x="340" y="6" width="152" height="10" rx="5" fill="#22C55E"/>
        <text x="510" y="14" class="green digit" font-size="11" font-weight="600">95</text>
        <text x="560" y="14" class="cloud digit" font-size="12" font-weight="700">1</text>
      </g>
      <g class="row row-2" transform="translate(0, 34)">
        <text x="0" y="14" class="cloud" font-size="12">Acme Holdings Ltd</text>
        <text x="220" y="14" class="cloud digit" font-size="12">£18,400</text>
        <rect x="340" y="6" width="160" height="10" rx="5" fill="#1B2F4D"/>
        <rect class="score-fill sf-2" x="340" y="6" width="140" height="10" rx="5" fill="#22C55E"/>
        <text x="510" y="14" class="green digit" font-size="11" font-weight="600">87</text>
        <text x="560" y="14" class="cloud digit" font-size="12" font-weight="700">2</text>
      </g>
      <g class="row row-3" transform="translate(0, 68)">
        <text x="0" y="14" class="cloud" font-size="12">Capricorn Retail</text>
        <text x="220" y="14" class="cloud digit" font-size="12">£12,810</text>
        <rect x="340" y="6" width="160" height="10" rx="5" fill="#1B2F4D"/>
        <rect class="score-fill sf-3" x="340" y="6" width="118" height="10" rx="5" fill="#0CC9A8"/>
        <text x="510" y="14" class="teal digit" font-size="11" font-weight="600">74</text>
        <text x="560" y="14" class="cloud digit" font-size="12" font-weight="700">3</text>
      </g>
      <g class="row row-4" transform="translate(0, 102)">
        <text x="0" y="14" class="cloud" font-size="12">Foreland Group</text>
        <text x="220" y="14" class="cloud digit" font-size="12">£9,940</text>
        <rect x="340" y="6" width="160" height="10" rx="5" fill="#1B2F4D"/>
        <rect class="score-fill sf-4" x="340" y="6" width="104" height="10" rx="5" fill="#0CC9A8"/>
        <text x="510" y="14" class="teal digit" font-size="11" font-weight="600">65</text>
        <text x="560" y="14" class="cloud digit" font-size="12" font-weight="700">4</text>
      </g>
      <g class="row row-5" transform="translate(0, 136)">
        <text x="0" y="14" class="cloud" font-size="12">Beltway Logistics</text>
        <text x="220" y="14" class="cloud digit" font-size="12">£6,250</text>
        <rect x="340" y="6" width="160" height="10" rx="5" fill="#1B2F4D"/>
        <rect class="score-fill sf-5" x="340" y="6" width="72" height="10" rx="5" fill="#F59E0B"/>
        <text x="510" y="14" class="amber digit" font-size="11" font-weight="600">45</text>
        <text x="560" y="14" class="cloud digit" font-size="12" font-weight="700">5</text>
      </g>
      <g class="row row-6" transform="translate(0, 170)">
        <text x="0" y="14" class="cloud" font-size="12">Daystar Print Co</text>
        <text x="220" y="14" class="cloud digit" font-size="12">£3,400</text>
        <rect x="340" y="6" width="160" height="10" rx="5" fill="#1B2F4D"/>
        <rect class="score-fill sf-6" x="340" y="6" width="40" height="10" rx="5" fill="#EF4444"/>
        <text x="510" y="14" class="red digit" font-size="11" font-weight="600">25</text>
        <text x="560" y="14" class="cloud digit" font-size="12" font-weight="700">6</text>
      </g>
    </g>

    <line x1="20" y1="328" x2="620" y2="328" class="hair"/>
    <text x="20" y="350" class="mist digit" font-size="10">Showing 6 of 142, weights from your past collection success</text>
  </g>

  <!-- Right: ageing buckets -->
  <g transform="translate(700, 140)">
    <rect class="c1" x="0" y="0" width="340" height="370" rx="16" ry="16"/>
    <text x="20" y="32" class="cloud" font-size="13" font-weight="600">Ageing buckets</text>
    <text x="20" y="52" class="mist" font-size="11">Total receivable, £74,400</text>
    <line x1="20" y1="68" x2="320" y2="68" class="hair"/>

    <g class="bucket bk-1" transform="translate(20, 92)">
      <rect x="0" y="0" width="300" height="56" rx="10" fill="#11243F"/>
      <rect x="0" y="0" width="6" height="56" rx="3" class="green"/>
      <text x="20" y="22" class="cloud" font-size="12" font-weight="600">0 to 30 days</text>
      <text x="20" y="44" class="mist digit" font-size="11">£37,940, 51%</text>
    </g>
    <g class="bucket bk-2" transform="translate(20, 160)">
      <rect x="0" y="0" width="300" height="56" rx="10" fill="#11243F"/>
      <rect x="0" y="0" width="6" height="56" rx="3" class="teal"/>
      <text x="20" y="22" class="cloud" font-size="12" font-weight="600">31 to 60 days</text>
      <text x="20" y="44" class="mist digit" font-size="11">£24,650, 33%</text>
    </g>
    <g class="bucket bk-3" transform="translate(20, 228)">
      <rect x="0" y="0" width="300" height="56" rx="10" fill="#11243F"/>
      <rect x="0" y="0" width="6" height="56" rx="3" class="amber"/>
      <text x="20" y="22" class="cloud" font-size="12" font-weight="600">61 to 90 days</text>
      <text x="20" y="44" class="mist digit" font-size="11">£8,410, 11%</text>
    </g>
    <g class="bucket bk-4" transform="translate(20, 296)">
      <rect x="0" y="0" width="300" height="56" rx="10" fill="#11243F"/>
      <rect x="0" y="0" width="6" height="56" rx="3" class="red"/>
      <text x="20" y="22" class="cloud" font-size="12" font-weight="600">90 days plus</text>
      <text x="20" y="44" class="mist digit" font-size="11">£3,400, 5%</text>
    </g>
  </g>

  <line x1="40" y1="552" x2="1040" y2="552" class="hair"/>
  <g transform="translate(40, 580)">
    <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.4">Scores refresh hourly, ranking re-flows automatically as payments land</text>
  </g>
</svg>
