  <text x="116" y="620" class="b" font-size="14" font-weight="700" fill="#E8F0FA">ESRS Set 1 · sector-agnostic standards</text>
  <text x="116" y="640" class="b" font-size="11" fill="#B8CCE0">12 standards covering general (ESRS 1, ESRS 2), environmental (E1–E5), social (S1–S4), governance (G1)</text>
  <text x="116" y="658" class="b" font-size="11" fill="#8A9DB8">Adopted 31 July 2023 · binding on in-scope undertakings</text>
