<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="CrowCyber readiness gauge mockup showing 74 percent overall readiness with five Cyber Essentials control-theme bars">
  <title>CrowCyber readiness gauge</title>
  <desc>Cyber Essentials readiness with circular gauge at 74 percent and five control-theme readiness bars (Firewalls, Secure Configuration, Access Control, Malware Protection, Patch Management).</desc>
  <defs>
    <linearGradient id="bgG5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#040E1A"/>
      <stop offset="1" stop-color="#061525"/>
    </linearGradient>
    <linearGradient id="gaugeG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0CC9A8"/>
      <stop offset="1" stop-color="#5BC8FF"/>
    </linearGradient>
  </defs>
  <style>
    .f { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    .b { font-family: 'Inter', system-ui, sans-serif; }
    .m { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  </style>

  <rect width="1600" height="900" fill="url(#bgG5)"/>

  <!-- Window chrome -->
  <rect x="0" y="0" width="1600" height="44" fill="#0A1F3A"/>
  <circle cx="22" cy="22" r="6" fill="#EF4444"/>
  <circle cx="44" cy="22" r="6" fill="#F59E0B"/>
  <circle cx="66" cy="22" r="6" fill="#0CC9A8"/>
  <rect x="600" y="11" width="400" height="22" rx="11" fill="#040E1A"/>
  <text x="800" y="26" text-anchor="middle" class="b" font-size="11" fill="#8A9DB8">app.crowagent.ai/crowcyber/assessment</text>

  <!-- Top bar -->
  <rect x="0" y="44" width="1600" height="64" fill="#0A1F3A"/>
  <line x1="0" y1="108" x2="1600" y2="108" stroke="#0D2847"/>
  <circle cx="44" cy="76" r="14" fill="#0CC9A8"/>
  <path d="M44 67 L44 85 M44 67 C40 67 36 70 36 74 C36 78 40 80 44 80 C48 80 52 82 52 86" stroke="#040E1A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="68" y="81" class="f" font-size="17" font-weight="700" fill="#E8F0FA">CrowCyber</text>
  <text x="170" y="81" class="b" font-size="13" fill="#8A9DB8">Cyber Essentials v3.3 readiness</text>

  <!-- Page header -->
  <text x="68" y="158" class="f" font-size="26" font-weight="700" fill="#E8F0FA">Readiness assessment</text>
  <text x="68" y="184" class="b" font-size="13" fill="#8A9DB8">Coastal Properties Ltd · 44 self-assessment questions · last updated today</text>

  <!-- Gauge card -->
  <rect x="68" y="216" width="640" height="624" rx="14" fill="#0A1F3A" stroke="#0D2847"/>
  <text x="92" y="248" class="f" font-size="14" font-weight="700" fill="#E8F0FA">Overall readiness</text>
  <text x="92" y="266" class="b" font-size="11" fill="#8A9DB8">Weighted across all five Cyber Essentials themes</text>

  <!-- Circular gauge centered at (388, 470), radius 168 -->
  <!-- Background arc -->
  <path d="M 220 470 A 168 168 0 1 1 556 470" fill="none" stroke="#0D2847" stroke-width="20" stroke-linecap="round"/>
  <!-- Foreground arc — 74% of 180° sweep starting at 180°. Length 0.74 * π * 168 = 390 -->
  <path d="M 220 470 A 168 168 0 1 1 556 470" fill="none" stroke="url(#gaugeG)" stroke-width="20" stroke-linecap="round" stroke-dasharray="390 1056" stroke-dashoffset="0"/>
  <!-- Inner ring -->
  <circle cx="388" cy="470" r="124" fill="#040E1A"/>
  <text x="388" y="464" text-anchor="middle" class="f" font-size="64" font-weight="700" fill="#E8F0FA">74%</text>
  <text x="388" y="494" text-anchor="middle" class="b" font-size="13" fill="#8A9DB8">ready to certify</text>
  <text x="388" y="518" text-anchor="middle" class="b" font-size="11" fill="#0CC9A8">+12 pts vs last week</text>

  <!-- Gauge dial labels -->
  <text x="200" y="500" text-anchor="middle" class="m" font-size="10" fill="#8A9DB8">0</text>
  <text x="388" y="284" text-anchor="middle" class="m" font-size="10" fill="#8A9DB8">50</text>
  <text x="576" y="500" text-anchor="middle" class="m" font-size="10" fill="#8A9DB8">100</text>

  <!-- Zone bands underneath -->
  <text x="92" y="620" class="b" font-size="11" font-weight="600" fill="#8A9DB8">CERTIFICATION GATE</text>

  <rect x="92" y="638" width="544" height="24" rx="12" fill="#0D2847"/>
  <rect x="92" y="638" width="217" height="24" rx="12" fill="#EF4444" fill-opacity="0.4"/>
  <rect x="92" y="638" width="402" height="24" rx="12" fill="#F59E0B" fill-opacity="0.45"/>
  <rect x="92" y="638" width="402" height="24" rx="12" fill="url(#gaugeG)"/>
  <line x1="494" y1="630" x2="494" y2="670" stroke="#E8F0FA" stroke-width="2"/>
  <text x="494" y="688" text-anchor="middle" class="b" font-size="11" font-weight="700" fill="#E8F0FA">74%</text>
  <line x1="488" y1="638" x2="488" y2="662" stroke="#0CC9A8" stroke-width="3" stroke-dasharray="1 4"/>

  <text x="100" y="708" class="b" font-size="10" fill="#EF4444">Not ready (0–40)</text>
  <text x="280" y="708" class="b" font-size="10" fill="#F59E0B">Gaps (40–80)</text>
  <text x="540" y="708" text-anchor="end" class="b" font-size="10" fill="#0CC9A8">Ready (80+)</text>

  <!-- Action panel -->
  <rect x="92" y="734" width="544" height="74" rx="8" fill="#040E1A" stroke="#F59E0B" stroke-opacity="0.4"/>
  <circle cx="124" cy="772" r="16" fill="#F59E0B" fill-opacity="0.18"/>
  <line x1="124" y1="764" x2="124" y2="776" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="124" y1="780" x2="124" y2="782" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round"/>
  <text x="156" y="763" class="b" font-size="12" font-weight="700" fill="#E8F0FA">6 controls remaining for certification</text>
  <text x="156" y="781" class="b" font-size="11" fill="#8A9DB8">Most are evidence uploads · est. 2.5 hours of work</text>
  <rect x="500" y="752" width="120" height="36" rx="8" fill="#0CC9A8"/>
  <text x="560" y="775" text-anchor="middle" class="b" font-size="12" font-weight="700" fill="#040E1A">Resume →</text>

  <!-- Right: Themes -->
  <rect x="728" y="216" width="804" height="624" rx="14" fill="#0A1F3A" stroke="#0D2847"/>
  <text x="752" y="248" class="f" font-size="14" font-weight="700" fill="#E8F0FA">Control themes</text>
  <text x="752" y="266" class="b" font-size="11" fill="#8A9DB8">Five required NCSC themes · click any bar for evidence</text>

  <!-- Theme 1: Firewalls 94% -->
  <text x="752" y="312" class="b" font-size="13" font-weight="600" fill="#E8F0FA">Firewalls and routers</text>
  <text x="1490" y="312" text-anchor="end" class="m" font-size="13" font-weight="700" fill="#0CC9A8">94%</text>
  <rect x="752" y="324" width="754" height="14" rx="7" fill="#0D2847"/>
  <rect x="752" y="324" width="709" height="14" rx="7" fill="#0CC9A8"/>
  <text x="752" y="356" class="b" font-size="11" fill="#8A9DB8">8 of 9 questions answered · evidence current</text>

  <!-- Theme 2: Secure Configuration 86% -->
  <text x="752" y="408" class="b" font-size="13" font-weight="600" fill="#E8F0FA">Secure configuration</text>
  <text x="1490" y="408" text-anchor="end" class="m" font-size="13" font-weight="700" fill="#0CC9A8">86%</text>
  <rect x="752" y="420" width="754" height="14" rx="7" fill="#0D2847"/>
  <rect x="752" y="420" width="649" height="14" rx="7" fill="#0CC9A8"/>
  <text x="752" y="452" class="b" font-size="11" fill="#8A9DB8">7 of 8 answered · BIOS baseline pending</text>

  <!-- Theme 3: Access Control 64% -->
  <text x="752" y="504" class="b" font-size="13" font-weight="600" fill="#E8F0FA">Access control</text>
  <text x="1490" y="504" text-anchor="end" class="m" font-size="13" font-weight="700" fill="#F59E0B">64%</text>
  <rect x="752" y="516" width="754" height="14" rx="7" fill="#0D2847"/>
  <rect x="752" y="516" width="483" height="14" rx="7" fill="#F59E0B"/>
  <text x="752" y="548" class="b" font-size="11" fill="#8A9DB8">9 of 14 answered · MFA + privileged-account evidence due</text>

  <!-- Theme 4: Malware 89% -->
  <text x="752" y="600" class="b" font-size="13" font-weight="600" fill="#E8F0FA">Malware protection</text>
  <text x="1490" y="600" text-anchor="end" class="m" font-size="13" font-weight="700" fill="#0CC9A8">89%</text>
  <rect x="752" y="612" width="754" height="14" rx="7" fill="#0D2847"/>
  <rect x="752" y="612" width="671" height="14" rx="7" fill="#0CC9A8"/>
  <text x="752" y="644" class="b" font-size="11" fill="#8A9DB8">8 of 9 answered · BYOD policy pending</text>

  <!-- Theme 5: Patch 50% -->
  <text x="752" y="696" class="b" font-size="13" font-weight="600" fill="#E8F0FA">Patch management</text>
  <text x="1490" y="696" text-anchor="end" class="m" font-size="13" font-weight="700" fill="#EF4444">50%</text>
  <rect x="752" y="708" width="754" height="14" rx="7" fill="#0D2847"/>
  <rect x="752" y="708" width="377" height="14" rx="7" fill="#EF4444"/>
  <text x="752" y="740" class="b" font-size="11" fill="#8A9DB8">2 of 4 answered · automated-update policy required</text>

  <!-- Bottom CTA -->
  <line x1="752" y1="772" x2="1508" y2="772" stroke="#0D2847"/>
  <text x="752" y="804" class="b" font-size="11" fill="#8A9DB8">Last sync · 6 evidence files · 1 reminder due in 9 days</text>
  <rect x="1340" y="784" width="170" height="32" rx="16" fill="#0CC9A8"/>
  <text x="1425" y="805" text-anchor="middle" class="b" font-size="12" font-weight="700" fill="#040E1A">Export PPN 014/21 pack</text>
</svg>
