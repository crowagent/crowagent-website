  <rect x="752" y="336" width="756" height="9" rx="2" fill="#B8CCE0" opacity="0.85"/>
  <rect x="752" y="352" width="720" height="9" rx="2" fill="#B8CCE0" opacity="0.85"/>
  <rect x="752" y="368" width="688" height="9" rx="2" fill="#B8CCE0" opacity="0.85"/>
  <rect x="752" y="384" width="640" height="9" rx="2" fill="#B8CCE0" opacity="0.85"/>

