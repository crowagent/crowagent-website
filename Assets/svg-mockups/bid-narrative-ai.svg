<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="CrowMark bid narrative builder mockup with TOMs measure picker on the left and AI-drafted narrative on the right">
  <title>CrowMark bid narrative builder</title>
  <desc>Split layout with PPN 002 mission selector and TOMs measure picker on the left, AI-generated narrative streaming on the right.</desc>
  <defs>
    <linearGradient id="bgG4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#040E1A"/>
      <stop offset="1" stop-color="#061525"/>
    </linearGradient>
    <linearGradient id="aiGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#A78BFA" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#0CC9A8" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <style>
    .f { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    .b { font-family: 'Inter', system-ui, sans-serif; }
    .m { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  </style>

  <rect width="1600" height="900" fill="url(#bgG4)"/>

  <!-- Window chrome -->
  <rect x="0" y="0" width="1600" height="44" fill="#0A1F3A"/>
  <circle cx="22" cy="22" r="6" fill="#EF4444"/>
  <circle cx="44" cy="22" r="6" fill="#F59E0B"/>
  <circle cx="66" cy="22" r="6" fill="#0CC9A8"/>
  <rect x="600" y="11" width="400" height="22" rx="11" fill="#040E1A"/>
  <text x="800" y="26" text-anchor="middle" class="b" font-size="11" fill="#8A9DB8">app.crowagent.ai/crowmark/contracts/draft</text>

  <!-- Top bar -->
  <rect x="0" y="44" width="1600" height="64" fill="#0A1F3A"/>
  <line x1="0" y1="108" x2="1600" y2="108" stroke="#0D2847"/>
  <circle cx="44" cy="76" r="14" fill="#A78BFA"/>
  <text x="44" y="81" text-anchor="middle" class="f" font-size="14" font-weight="700" fill="#040E1A">M</text>
  <text x="68" y="81" class="f" font-size="17" font-weight="700" fill="#E8F0FA">CrowMark</text>
  <text x="160" y="81" class="b" font-size="13" fill="#8A9DB8">PPN 002 social-value workspace</text>

  <!-- Page header -->
  <text x="68" y="148" class="b" font-size="11" font-weight="600" fill="#8A9DB8">CONTRACT DRAFT · NCS-2026-471</text>
  <text x="68" y="180" class="f" font-size="24" font-weight="700" fill="#E8F0FA">School catering services · West Midlands</text>
  <text x="68" y="206" class="b" font-size="13" fill="#8A9DB8">Value £2.4M · Duration 36 mo · 10% social-value weighting required</text>

  <!-- Save / Export controls -->
  <rect x="1380" y="160" width="100" height="34" rx="17" fill="#0D2847"/>
  <text x="1430" y="181" text-anchor="middle" class="b" font-size="12" fill="#E8F0FA">Save draft</text>
  <rect x="1490" y="160" width="100" height="34" rx="17" fill="#A78BFA"/>
  <text x="1540" y="181" text-anchor="middle" class="b" font-size="12" font-weight="700" fill="#040E1A">Export PDF</text>

