<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iridescent Mesh Concept | CrowAgent Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    :root {
      --bg: var(--ca-c-050505);
      --teal: var(--teal);
      --pink: var(--ca-c-f472b6);
    }
    body {
      background-color: var(--bg);
      color: white;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }
    /* Iridescent Mesh Gradient */
    .mesh-gradient {
      position: absolute;
      inset: 0;
      background-image: 
        radial-gradient(at 0% 0%, rgba(12, 201, 168, 0.15) 0, transparent 50%),
        radial-gradient(at 100% 0%, rgba(244, 114, 182, 0.1) 0, transparent 50%),
        radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.15) 0, transparent 50%),
        radial-gradient(at 0% 100%, rgba(12, 201, 168, 0.1) 0, transparent 50%);
      filter: blur(40px);
      animation: mesh-pulse 10s infinite alternate;
    }
    @keyframes mesh-pulse {
      0% { transform: scale(1); }
      100% { transform: scale(1.1); }
    }
    .h1-premium {
      font-size: 6rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      color: white;
      text-shadow: 0 0 20px rgba(255,255,255,0.2);
    }
    .gloss-btn {
      background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }
    .gloss-btn::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
      transform: rotate(45deg);
      transition: all 0.5s;
      left: -150%;
    }
    .gloss-btn:hover::after {
      left: 150%;
    }
  </style>
</head>
<body>
  <div class="mesh-gradient"></div>

  <main class="relative z-10 h-screen flex flex-col items-center justify-center px-6">
    <div class="max-w-6xl w-full">
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
        <div class="lg:col-span-7">
          <h1 class="h1-premium mb-8">
            UK Built.<br>
            Statute Cited.<br>
            <span class="text-teal-400">London Based.</span>
          </h1>
          <p class="text-xl text-white/40 mb-12 max-w-xl">
            CrowAgent translates complex UK statutes into deterministic business intelligence. Engineered for accuracy, built for SMEs.
          </p>
          <div class="flex gap-4">
            <button class="gloss-btn px-8 py-4 rounded-xl font-bold">Launch Platform</button>
            <button class="px-8 py-4 text-white/60 hover:text-white transition-colors">Learn more &rarr;</button>
          </div>
        </div>
        <div class="lg:col-span-5 relative">
          <!-- Premium Card UI Representation -->
          <div class="w-full aspect-[4/5] bg-white/[0.02] border border-white/10 rounded-[40px] p-8 shadow-2xl relative overflow-hidden group">
            <div class="absolute inset-0 bg-gradient-to-br from-teal-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
            <div class="relative z-10">
              <div class="w-12 h-12 bg-teal-500 rounded-xl mb-8 flex items-center justify-center text-black font-black">CA</div>
              <h3 class="text-2xl font-bold mb-4">CrowAgent Core</h3>
              <p class="text-sm text-white/40 leading-relaxed">Deterministic MEES risk analysis for commercial property portfolios. SI 2015/962 compliant calculations.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    gsap.from(".h1-premium", { opacity: 0, y: 30, duration: 1.2, ease: "power3.out" });
    gsap.from(".lg:col-span-5", { opacity: 0, scale: 0.8, rotateY: 20, duration: 2, ease: "expo.out", delay: 0.5 });
  </script>
</body>
</html>
