<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="CrowAgent">
  <title>CrowAgent</title>
  <defs>
    <linearGradient id="caMarkBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="caMarkTeal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="caMarkShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.6" flood-color="#0b1220" flood-opacity="0.18"/>
    </filter>
  </defs>
  <!-- Rounded-square tile: near-white with soft shadow -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="#FCFDFF" stroke="rgba(15,23,42,.20)" stroke-width="1.5" filter="url(#caMarkShadow)"/>
  <!-- Faint baseline rule -->
  <rect x="15" y="48.4" width="34" height="1.2" rx="0.6" fill="#94a3b8" opacity="0.35"/>
  <!-- Four ascending bars (heights 0.42 / 0.60 / 0.78 / 1.00 of inner height) -->
  <rect x="15" y="34.72" width="6" height="14.28" rx="2" fill="url(#caMarkBlue)"/>
  <rect x="24.33" y="28.6" width="6" height="20.4" rx="2" fill="url(#caMarkBlue)"/>
  <rect x="33.67" y="22.48" width="6" height="26.52" rx="2" fill="url(#caMarkTeal)"/>
  <rect x="43" y="15" width="6" height="34" rx="2" fill="url(#caMarkTeal)"/>
</svg>
