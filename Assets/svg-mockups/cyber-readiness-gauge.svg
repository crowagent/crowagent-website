  <rect x="92" y="616" width="592" height="24" rx="12" fill="#0D2847"/>
  <rect x="92" y="616" width="438" height="24" rx="12" fill="url(#cyG)"/>
  <line x1="566" y1="608" x2="566" y2="650" stroke="#E8F0FA" stroke-width="2"/>
  <text x="566" y="670" text-anchor="middle" class="b cloud" font-size="11" font-weight="700">80% target</text>
  <text x="100" y="694" class="b" font-size="10" fill="#EF4444">Not ready 0–40</text>
  <text x="330" y="694" class="b" font-size="10" fill="#F59E0B">Gaps 40–80</text>
  <text x="676" y="694" text-anchor="end" class="b teal" font-size="10">Ready 80+</text>
