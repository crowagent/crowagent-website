<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="CrowESG launching Q3 2026 placeholder mockup with framework pills, build progress and waitlist call-to-action">
  <title>CrowESG · Q3 2026 launch</title>
  <desc>Launch placeholder for CrowESG showing six supported frameworks at launch, build progress milestones and waitlist sign-up CTA.</desc>
  <defs>
    <linearGradient id="bgQ3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#040E1A"/><stop offset="1" stop-color="#061525"/></linearGradient>
    <linearGradient id="warnGlow" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#F59E0B" stop-opacity="0.4"/><stop offset="1" stop-color="#0CC9A8" stop-opacity="0.4"/></linearGradient>
  </defs>
  <style>
    .f { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    .b { font-family: 'Inter', system-ui, sans-serif; }
    .m { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  </style>
  <rect width="1600" height="900" fill="url(#bgQ3)"/>
  <rect x="0" y="0" width="1600" height="44" fill="#0A1F3A"/>
  <circle cx="22" cy="22" r="6" fill="#EF4444"/><circle cx="44" cy="22" r="6" fill="#F59E0B"/><circle cx="66" cy="22" r="6" fill="#0CC9A8"/>
  <rect x="600" y="11" width="400" height="22" rx="11" fill="#040E1A"/>
  <text x="800" y="26" text-anchor="middle" class="b" font-size="11" fill="#8A9DB8">app.crowagent.ai/crowesg</text>
  <rect x="0" y="44" width="1600" height="64" fill="#0A1F3A"/>
  <line x1="0" y1="108" x2="1600" y2="108" stroke="#0D2847"/>
  <circle cx="44" cy="76" r="14" fill="#F59E0B"/>
  <text x="68" y="81" class="f" font-size="17" font-weight="700" fill="#E8F0FA">CrowESG</text>

  <!-- Centerpiece -->
  <text x="800" y="220" text-anchor="middle" class="b" font-size="13" font-weight="700" fill="#F59E0B">LAUNCHING Q3 2026</text>

  <text x="800" y="280" text-anchor="middle" class="f" font-size="48" font-weight="700" fill="#E8F0FA">Multi-framework ESG reporting</text>
  <text x="800" y="320" text-anchor="middle" class="f" font-size="48" font-weight="700" fill="#0CC9A8">finally without the spreadsheets</text>

  <text x="800" y="370" text-anchor="middle" class="b" font-size="15" fill="#B8CCE0">One platform · one double materiality · audit-ready evidence trail</text>

  <!-- Framework pills row -->
  <g transform="translate(160, 420)">
    <rect x="0" y="0" width="200" height="58" rx="8" fill="#0A1F3A" stroke="#0CC9A8"/>
    <text x="100" y="22" text-anchor="middle" class="b" font-size="11" font-weight="700" fill="#0CC9A8">ENVIRONMENTAL</text>
    <text x="100" y="44" text-anchor="middle" class="f" font-size="16" font-weight="700" fill="#E8F0FA">GRI 2021</text>

    <rect x="220" y="0" width="200" height="58" rx="8" fill="#0A1F3A" stroke="#5BC8FF"/>
    <text x="320" y="22" text-anchor="middle" class="b" font-size="11" font-weight="700" fill="#5BC8FF">CLIMATE</text>
    <text x="320" y="44" text-anchor="middle" class="f" font-size="16" font-weight="700" fill="#E8F0FA">TCFD</text>

    <rect x="440" y="0" width="200" height="58" rx="8" fill="#0A1F3A" stroke="#A78BFA"/>
    <text x="540" y="22" text-anchor="middle" class="b" font-size="11" font-weight="700" fill="#A78BFA">EU MANDATORY</text>
    <text x="540" y="44" text-anchor="middle" class="f" font-size="16" font-weight="700" fill="#E8F0FA">CSRD / ESRS</text>

    <rect x="660" y="0" width="200" height="58" rx="8" fill="#0A1F3A" stroke="#5BC8FF"/>
    <text x="760" y="22" text-anchor="middle" class="b" font-size="11" font-weight="700" fill="#5BC8FF">GLOBAL</text>
    <text x="760" y="44" text-anchor="middle" class="f" font-size="16" font-weight="700" fill="#E8F0FA">ISSB IFRS S1</text>

    <rect x="880" y="0" width="200" height="58" rx="8" fill="#0A1F3A" stroke="#5BC8FF"/>
    <text x="980" y="22" text-anchor="middle" class="b" font-size="11" font-weight="700" fill="#5BC8FF">GLOBAL</text>
    <text x="980" y="44" text-anchor="middle" class="f" font-size="16" font-weight="700" fill="#E8F0FA">ISSB IFRS S2</text>

    <rect x="1100" y="0" width="200" height="58" rx="8" fill="#0A1F3A" stroke="#0CC9A8"/>
    <text x="1200" y="22" text-anchor="middle" class="b" font-size="11" font-weight="700" fill="#0CC9A8">UK</text>
    <text x="1200" y="44" text-anchor="middle" class="f" font-size="16" font-weight="700" fill="#E8F0FA">UK SDR</text>
  </g>

  <!-- Build timeline -->
  <text x="800" y="540" text-anchor="middle" class="b" font-size="11" font-weight="700" fill="#8A9DB8">BUILD PROGRESS</text>

  <!-- Track -->
  <line x1="220" y1="592" x2="1380" y2="592" stroke="#0D2847" stroke-width="3"/>
  <line x1="220" y1="592" x2="900" y2="592" stroke="url(#warnGlow)" stroke-width="3"/>
  <line x1="220" y1="592" x2="900" y2="592" stroke="#F59E0B" stroke-width="3"/>

  <!-- Milestone 1 done -->
  <circle cx="220" cy="592" r="14" fill="#0CC9A8"/>
  <path d="M214 592 L218 596 L226 587" stroke="#040E1A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="220" y="568" text-anchor="middle" class="b" font-size="11" font-weight="600" fill="#0CC9A8">Q4 2025</text>
  <text x="220" y="624" text-anchor="middle" class="b" font-size="12" font-weight="600" fill="#E8F0FA">Discovery</text>
  <text x="220" y="640" text-anchor="middle" class="b" font-size="10" fill="#8A9DB8">15 customer interviews</text>

  <!-- Milestone 2 done -->
  <circle cx="510" cy="592" r="14" fill="#0CC9A8"/>
  <path d="M504 592 L508 596 L516 587" stroke="#040E1A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="510" y="568" text-anchor="middle" class="b" font-size="11" font-weight="600" fill="#0CC9A8">Q1 2026</text>
  <text x="510" y="624" text-anchor="middle" class="b" font-size="12" font-weight="600" fill="#E8F0FA">Framework engine</text>
  <text x="510" y="640" text-anchor="middle" class="b" font-size="10" fill="#8A9DB8">Cross-framework metric mapping</text>

  <!-- Milestone 3 in-progress -->
  <circle cx="800" cy="592" r="16" fill="#F59E0B"/>
  <text x="800" y="597" text-anchor="middle" class="f" font-size="13" font-weight="700" fill="#040E1A">3</text>
  <text x="800" y="566" text-anchor="middle" class="b" font-size="11" font-weight="700" fill="#F59E0B">Q2 2026 · NOW</text>
  <text x="800" y="624" text-anchor="middle" class="b" font-size="12" font-weight="600" fill="#E8F0FA">Materiality + disclosure UI</text>
  <text x="800" y="640" text-anchor="middle" class="b" font-size="10" fill="#8A9DB8">Building this quarter</text>

  <!-- Milestone 4 pending -->
  <circle cx="1090" cy="592" r="14" fill="#0D2847" stroke="#8A9DB8"/>
  <text x="1090" y="597" text-anchor="middle" class="f" font-size="13" font-weight="700" fill="#8A9DB8">4</text>
  <text x="1090" y="568" text-anchor="middle" class="b" font-size="11" font-weight="600" fill="#8A9DB8">Q3 2026</text>
  <text x="1090" y="624" text-anchor="middle" class="b" font-size="12" font-weight="600" fill="#E8F0FA">Closed beta</text>
  <text x="1090" y="640" text-anchor="middle" class="b" font-size="10" fill="#8A9DB8">25 waitlist members</text>

  <!-- Milestone 5 pending -->
  <circle cx="1380" cy="592" r="14" fill="#0D2847" stroke="#8A9DB8"/>
  <text x="1380" y="597" text-anchor="middle" class="f" font-size="13" font-weight="700" fill="#8A9DB8">5</text>
  <text x="1380" y="568" text-anchor="middle" class="b" font-size="11" font-weight="600" fill="#8A9DB8">Q3 2026</text>
  <text x="1380" y="624" text-anchor="middle" class="b" font-size="12" font-weight="600" fill="#E8F0FA">Public launch</text>
  <text x="1380" y="640" text-anchor="middle" class="b" font-size="10" fill="#8A9DB8">From £249/month</text>

  <!-- Waitlist CTA -->
