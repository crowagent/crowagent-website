<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="esgStep2Title" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="esgStep2Title">CrowESG Step 2: Map metrics once</title>
  <defs>
    <style>
      .bg { fill: #0A1422; }
      .c1 { fill: #0F1B2E; }
      .c2 { fill: #11243F; }
      .hair { stroke: rgba(255,255,255,0.08); stroke-width: 1; fill: none; }
      .cloud { fill: #E8EEF7; }
      .mist { fill: #8A9DB8; }
      .teal { fill: #0CC9A8; }
      .digit { font-variant-numeric: tabular-nums; }

      .source-node { animation: src-pulse 1.8s cubic-bezier(0.4,0,0.2,1) infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes src-pulse {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.04); }
      }

      .map-line { stroke-dasharray: 4 6; stroke-dashoffset: 200; animation: flow 4s linear infinite; }
      @keyframes flow { to { stroke-dashoffset: 0; } }

      .target-tag { opacity: 0; }
      .tg-1 { animation: tg-in 6s ease-out infinite; animation-delay: 1.6s; }
      .tg-2 { animation: tg-in 6s ease-out infinite; animation-delay: 1.9s; }
      .tg-3 { animation: tg-in 6s ease-out infinite; animation-delay: 2.2s; }
      .tg-4 { animation: tg-in 6s ease-out infinite; animation-delay: 2.5s; }
      .tg-5 { animation: tg-in 6s ease-out infinite; animation-delay: 2.8s; }
      @keyframes tg-in {
        0%, 24%  { opacity: 0; transform: translateX(8px); }
        38%, 95% { opacity: 1; transform: translateX(0); }
        100%     { opacity: 0; }
      }

      .source-row { opacity: 0; }
      .sr-1 { animation: sr-in 6s ease-out infinite; animation-delay: 0.3s; }
      .sr-2 { animation: sr-in 6s ease-out infinite; animation-delay: 0.6s; }
      .sr-3 { animation: sr-in 6s ease-out infinite; animation-delay: 0.9s; }
      @keyframes sr-in {
        0%, 4%   { opacity: 0; transform: translateX(-6px); }
        16%, 95% { opacity: 1; transform: translateX(0); }
        100%     { opacity: 0; }
      }

      @media (prefers-reduced-motion: reduce) {
        .source-node, .map-line, .target-tag, .tg-1, .tg-2, .tg-3, .tg-4, .tg-5, .source-row, .sr-1, .sr-2, .sr-3 {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
        .map-line { stroke-dashoffset: 0 !important; }
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="620"/>

  <!-- Header -->
  <g transform="translate(40, 40)">
    <text x="0" y="14" class="teal" font-size="11" font-weight="600" letter-spacing="1.5">STEP 2, MAP</text>
    <text x="0" y="46" class="cloud" font-size="22" font-weight="600">Define each metric once, satisfy every framework</text>
    <text x="0" y="68" class="mist" font-size="13">One energy figure maps to GRI 302, TCFD, ESRS E1, ISSB S2 at the same time</text>
  </g>

  <!-- Left: source metrics -->
  <g transform="translate(40, 140)">
    <rect class="c1" x="0" y="0" width="320" height="370" rx="16" ry="16"/>
    <text x="20" y="32" class="cloud" font-size="13" font-weight="600">Your metrics, defined once</text>
    <text x="20" y="52" class="mist" font-size="11">3 of 184 shown</text>
    <line x1="20" y1="68" x2="300" y2="68" class="hair"/>

    <g class="source-row sr-1" transform="translate(20, 92)">
      <rect x="0" y="0" width="280" height="84" rx="12" fill="rgba(12,201,168,0.10)" stroke="#0CC9A8" stroke-width="1.2"/>
      <g class="source-node" transform="translate(28, 42)">
        <circle cx="0" cy="0" r="14" fill="#0CC9A8"/>
        <path d="M-6 0 L-6 -4 L-2 -8 L2 -8 L6 -4 L6 0 L6 4 L2 8 L-2 8 L-6 4 Z" fill="#0A1422"/>
      </g>
      <text x="54" y="34" class="cloud" font-size="13" font-weight="600">Scope 1 emissions</text>
      <text x="54" y="52" class="mist digit" font-size="11">tCO2e, gross</text>
      <text x="54" y="70" class="teal digit" font-size="11" font-weight="600">12,840 tCO2e</text>
    </g>

    <g class="source-row sr-2" transform="translate(20, 192)">
      <rect x="0" y="0" width="280" height="84" rx="12" fill="rgba(12,201,168,0.10)" stroke="#0CC9A8" stroke-width="1.2"/>
      <g class="source-node" transform="translate(28, 42)">
        <circle cx="0" cy="0" r="14" fill="#0CC9A8"/>
        <path d="M0 -8 L6 -2 L4 4 L-4 4 L-6 -2 Z" fill="#0A1422"/>
      </g>
      <text x="54" y="34" class="cloud" font-size="13" font-weight="600">Energy consumption</text>
      <text x="54" y="52" class="mist digit" font-size="11">MWh, total</text>
      <text x="54" y="70" class="teal digit" font-size="11" font-weight="600">48,200 MWh</text>
    </g>

    <g class="source-row sr-3" transform="translate(20, 292)">
      <rect x="0" y="0" width="280" height="64" rx="12" fill="rgba(12,201,168,0.10)" stroke="#0CC9A8" stroke-width="1.2"/>
      <g class="source-node" transform="translate(28, 32)">
        <circle cx="0" cy="0" r="14" fill="#0CC9A8"/>
        <path d="M-6 -2 L-2 -6 L6 2 L2 6 Z M-3 1 L1 -3" stroke="#0A1422" stroke-width="2" fill="#0A1422"/>
      </g>
      <text x="54" y="28" class="cloud" font-size="13" font-weight="600">Female board %</text>
      <text x="54" y="48" class="teal digit" font-size="11" font-weight="600">42%</text>
    </g>
  </g>

  <!-- Centre: mapping lines -->
  <g transform="translate(0, 0)">
    <path class="map-line" d="M 360 182 Q 480 182 600 162" stroke="#0CC9A8" stroke-width="1.6" fill="none"/>
    <path class="map-line" d="M 360 200 Q 480 200 600 222" stroke="#0CC9A8" stroke-width="1.6" fill="none"/>
    <path class="map-line" d="M 360 218 Q 480 218 600 282" stroke="#0CC9A8" stroke-width="1.6" fill="none"/>

    <path class="map-line" d="M 360 296 Q 480 296 600 342" stroke="#0CC9A8" stroke-width="1.6" fill="none"/>
    <path class="map-line" d="M 360 314 Q 480 314 600 402" stroke="#0CC9A8" stroke-width="1.6" fill="none"/>

    <path class="map-line" d="M 360 410 Q 480 410 600 462" stroke="#0CC9A8" stroke-width="1.6" fill="none"/>
  </g>

  <!-- Right: target tags grouped per source -->
  <g transform="translate(600, 140)">
    <rect class="c1" x="0" y="0" width="440" height="370" rx="16" ry="16"/>
    <text x="20" y="32" class="cloud" font-size="13" font-weight="600">Framework targets, auto-populated</text>
    <text x="20" y="52" class="mist" font-size="11">Same source value, multiple disclosure slots</text>
    <line x1="20" y1="68" x2="420" y2="68" class="hair"/>

    <!-- Scope 1 targets -->
    <g class="target-tag tg-1" transform="translate(20, 90)">
      <rect x="0" y="0" width="400" height="24" rx="6" fill="#11243F"/>
      <text x="12" y="16" class="cloud" font-size="11">GRI 305-1, Direct GHG emissions</text>
      <text x="388" y="16" class="teal digit" font-size="10" text-anchor="end" font-weight="600">12,840</text>
    </g>
    <g class="target-tag tg-2" transform="translate(20, 120)">
      <rect x="0" y="0" width="400" height="24" rx="6" fill="#11243F"/>
      <text x="12" y="16" class="cloud" font-size="11">ESRS E1-6, Gross Scope 1 emissions</text>
      <text x="388" y="16" class="teal digit" font-size="10" text-anchor="end" font-weight="600">12,840</text>
    </g>
    <g class="target-tag tg-3" transform="translate(20, 150)">
      <rect x="0" y="0" width="400" height="24" rx="6" fill="#11243F"/>
      <text x="12" y="16" class="cloud" font-size="11">ISSB S2-29(a), Scope 1 gross</text>
      <text x="388" y="16" class="teal digit" font-size="10" text-anchor="end" font-weight="600">12,840</text>
    </g>

    <!-- Energy targets -->
    <g class="target-tag tg-3" transform="translate(20, 192)">
      <rect x="0" y="0" width="400" height="24" rx="6" fill="#11243F"/>
      <text x="12" y="16" class="cloud" font-size="11">GRI 302-1, Energy within the org</text>
      <text x="388" y="16" class="teal digit" font-size="10" text-anchor="end" font-weight="600">48,200</text>
    </g>
    <g class="target-tag tg-4" transform="translate(20, 222)">
      <rect x="0" y="0" width="400" height="24" rx="6" fill="#11243F"/>
      <text x="12" y="16" class="cloud" font-size="11">ESRS E1-5, Energy consumption</text>
      <text x="388" y="16" class="teal digit" font-size="10" text-anchor="end" font-weight="600">48,200</text>
    </g>

    <!-- Board diversity targets -->
    <g class="target-tag tg-5" transform="translate(20, 264)">
      <rect x="0" y="0" width="400" height="24" rx="6" fill="#11243F"/>
      <text x="12" y="16" class="cloud" font-size="11">GRI 405-1, Board diversity</text>
      <text x="388" y="16" class="teal digit" font-size="10" text-anchor="end" font-weight="600">42%</text>
    </g>
    <g class="target-tag tg-5" transform="translate(20, 294)">
      <rect x="0" y="0" width="400" height="24" rx="6" fill="#11243F"/>
      <text x="12" y="16" class="cloud" font-size="11">ESRS G1-3, Board composition</text>
      <text x="388" y="16" class="teal digit" font-size="10" text-anchor="end" font-weight="600">42%</text>
    </g>

    <line x1="20" y1="334" x2="420" y2="334" class="hair"/>
    <text x="20" y="354" class="mist digit" font-size="10">3 source metrics, 7 framework disclosures, zero duplication</text>
  </g>

  <line x1="40" y1="552" x2="1040" y2="552" class="hair"/>
  <g transform="translate(40, 580)">
    <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.4">Define once, satisfy every framework, with a full audit trail per value</text>
  </g>
</svg>
