<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="step4Title" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="step4Title">Step 4: Export to auditor, regulator, board</title>
  <defs>
    <style>
      .bg { fill: #0A1422; }
      .c1 { fill: #0F1B2E; }
      .c2 { fill: #11243F; }
      .hair { stroke: rgba(255,255,255,0.08); stroke-width: 1; fill: none; }
      .cloud { fill: #E8EEF7; }
      .mist { fill: #8A9DB8; }
      .teal { fill: #0CC9A8; }
      .teal-stroke { stroke: #0CC9A8; stroke-width: 2; fill: none; }
      .green-fill { fill: #22C55E; }

      .arc { stroke-dasharray: 320; stroke-dashoffset: 320; }
      .arc-1 { animation: arc-draw 6s cubic-bezier(0.2,0.8,0.2,1) infinite; animation-delay: 0.4s; }
      .arc-2 { animation: arc-draw 6s cubic-bezier(0.2,0.8,0.2,1) infinite; animation-delay: 0.7s; }
      .arc-3 { animation: arc-draw 6s cubic-bezier(0.2,0.8,0.2,1) infinite; animation-delay: 1.0s; }
      @keyframes arc-draw {
        0%, 7%   { stroke-dashoffset: 320; }
        30%, 100% { stroke-dashoffset: 0; }
      }

      .pulse-dot {
        offset-rotate: 0deg;
      }
      .pulse-dot-1 { animation: pulse-1 3s linear infinite; animation-delay: 1.4s; }
      .pulse-dot-2 { animation: pulse-2 3s linear infinite; animation-delay: 1.7s; }
      .pulse-dot-3 { animation: pulse-3 3s linear infinite; animation-delay: 2.0s; }
      @keyframes pulse-1 {
        0%   { offset-distance: 0%; opacity: 0; }
        20%  { opacity: 1; }
        80%  { opacity: 1; }
        100% { offset-distance: 100%; opacity: 0; }
      }
      @keyframes pulse-2 {
        0%   { offset-distance: 0%; opacity: 0; }
        20%  { opacity: 1; }
        80%  { opacity: 1; }
        100% { offset-distance: 100%; opacity: 0; }
      }
      @keyframes pulse-3 {
        0%   { offset-distance: 0%; opacity: 0; }
        20%  { opacity: 1; }
        80%  { opacity: 1; }
        100% { offset-distance: 100%; opacity: 0; }
      }

      .received { opacity: 0; }
      .received-1 { animation: received-in 6s ease-out infinite; animation-delay: 2.4s; }
      .received-2 { animation: received-in 6s ease-out infinite; animation-delay: 2.8s; }
      .received-3 { animation: received-in 6s ease-out infinite; animation-delay: 3.2s; }
      @keyframes received-in {
        0%, 40%  { opacity: 0; transform: scale(0.6); }
        55%, 95% { opacity: 1; transform: scale(1); }
        100%     { opacity: 0; }
      }

      @media (prefers-reduced-motion: reduce) {
        .arc, .arc-1, .arc-2, .arc-3,
        .pulse-dot, .pulse-dot-1, .pulse-dot-2, .pulse-dot-3,
        .received, .received-1, .received-2, .received-3 {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
        .arc { stroke-dashoffset: 0 !important; }
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="620"/>

  <!-- Header -->
  <g transform="translate(40, 40)">
    <text x="0" y="14" class="teal" font-size="11" font-weight="600" letter-spacing="1.5">STEP 4, EXPORT</text>
    <text x="0" y="46" class="cloud" font-size="22" font-weight="600">Ship to every stakeholder</text>
    <text x="0" y="68" class="mist" font-size="13">One source of truth, three formats, secure delivery</text>
  </g>

  <!-- Source card (left, centred y) -->
  <g transform="translate(60, 200)">
    <rect class="c1" x="0" y="0" width="300" height="220" rx="16" ry="16"/>
    <rect class="c1 hair" x="0" y="0" width="300" height="220" rx="16" ry="16"/>

    <!-- Header strip with traffic dots -->
    <g transform="translate(20, 20)">
      <circle cx="6" cy="6" r="4" fill="#EF4444"/>
      <circle cx="20" cy="6" r="4" fill="#F59E0B"/>
      <circle cx="34" cy="6" r="4" fill="#22C55E"/>
    </g>

    <text x="20" y="62" class="cloud" font-size="15" font-weight="600">Approved report</text>
    <text x="20" y="82" class="mist" font-size="12">CrowAgent, CSRD FY25</text>

    <g transform="translate(20, 110)">
      <circle cx="9" cy="9" r="9" class="green-fill"/>
      <path d="M5 10 L8 13 L14 7" stroke="#0A1422" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(0, -1)"/>
      <text x="26" y="14" fill="#22C55E" font-size="12" font-weight="600">Approved by Alex Patel</text>
    </g>

    <g transform="translate(20, 142)">
      <rect x="0" y="0" width="260" height="48" rx="10" fill="#1B2F4D"/>
      <text x="14" y="20" class="mist" font-size="10" letter-spacing="0.4">SIGNED OFF</text>
      <text x="14" y="38" class="cloud" font-size="12" font-weight="600">17 Mar 2026, 14:24 GMT</text>
    </g>
  </g>

  <!-- Three destination cards (right) -->
  <g transform="translate(700, 140)">
    <!-- 1. Audit firm -->
    <g transform="translate(0, 0)">
      <rect class="c2" x="0" y="0" width="320" height="100" rx="12" ry="12"/>
      <rect class="c2 hair" x="0" y="0" width="320" height="100" rx="12" ry="12"/>
      <g transform="translate(20, 24)">
        <!-- briefcase icon -->
        <rect x="0" y="6" width="40" height="32" rx="4" fill="#1B2F4D" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
        <rect x="14" y="0" width="12" height="8" rx="2" fill="none" stroke="#8A9DB8" stroke-width="1"/>
      </g>
      <text x="76" y="40" class="cloud" font-size="14" font-weight="600">Audit firm</text>
      <text x="76" y="58" class="mist" font-size="11">Secure data room, encrypted at rest</text>
      <text x="76" y="76" class="mist" font-size="10">PDF, XBRL, supporting evidence</text>
      <g class="received received-1" transform="translate(284, 18)">
        <circle cx="0" cy="0" r="14" class="green-fill"/>
        <path d="M-5 1 L-1 5 L6 -3" stroke="#0A1422" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>

    <!-- 2. Regulator -->
    <g transform="translate(0, 120)">
      <rect class="c2" x="0" y="0" width="320" height="100" rx="12" ry="12"/>
      <rect class="c2 hair" x="0" y="0" width="320" height="100" rx="12" ry="12"/>
      <g transform="translate(20, 24)">
        <!-- regulator icon (building columns) -->
        <path d="M0 8 L24 0 L48 8 L48 12 L0 12 Z" fill="#1B2F4D" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
        <rect x="6" y="16" width="4" height="20" fill="#1B2F4D" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
        <rect x="22" y="16" width="4" height="20" fill="#1B2F4D" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
        <rect x="38" y="16" width="4" height="20" fill="#1B2F4D" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
        <rect x="0" y="38" width="48" height="4" fill="#1B2F4D" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
      </g>
      <text x="76" y="40" class="cloud" font-size="14" font-weight="600">Regulator</text>
      <text x="76" y="58" class="mist" font-size="11">FCA-ready filing format</text>
      <text x="76" y="76" class="mist" font-size="10">ESEF XBRL tagged, IXBRL inline</text>
      <g class="received received-2" transform="translate(284, 18)">
        <circle cx="0" cy="0" r="14" class="green-fill"/>
        <path d="M-5 1 L-1 5 L6 -3" stroke="#0A1422" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>

    <!-- 3. Board pack -->
    <g transform="translate(0, 240)">
      <rect class="c2" x="0" y="0" width="320" height="100" rx="12" ry="12"/>
      <rect class="c2 hair" x="0" y="0" width="320" height="100" rx="12" ry="12"/>
      <g transform="translate(20, 24)">
        <!-- presentation icon -->
        <rect x="0" y="2" width="48" height="32" rx="3" fill="#1B2F4D" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
        <line x1="20" y1="34" x2="20" y2="42" stroke="#8A9DB8" stroke-width="1"/>
        <line x1="10" y1="42" x2="30" y2="42" stroke="#8A9DB8" stroke-width="1"/>
        <polyline points="6 26 16 18 24 22 38 10" fill="none" stroke="#0CC9A8" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
      </g>
      <text x="76" y="40" class="cloud" font-size="14" font-weight="600">Board pack</text>
      <text x="76" y="58" class="mist" font-size="11">Executive summary plus appendices</text>
      <text x="76" y="76" class="mist" font-size="10">PDF, PPTX, charted KPIs</text>
      <g class="received received-3" transform="translate(284, 18)">
        <circle cx="0" cy="0" r="14" class="green-fill"/>
        <path d="M-5 1 L-1 5 L6 -3" stroke="#0A1422" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>
  </g>

  <!-- Arcs from source-right (x=360, y=310) to destination-left (x=700) -->
  <!-- Arc 1 to Audit firm (target y=190) -->
  <path class="arc arc-1 teal-stroke" d="M 360 280 Q 530 200 700 190" stroke="#0CC9A8" stroke-width="2" fill="none"/>
  <!-- Arc 2 to Regulator (target y=310) -->
  <path class="arc arc-2" d="M 360 310 Q 530 310 700 310" stroke="#0CC9A8" stroke-width="2" fill="none"/>
  <!-- Arc 3 to Board pack (target y=430) -->
  <path class="arc arc-3" d="M 360 340 Q 530 420 700 430" stroke="#0CC9A8" stroke-width="2" fill="none"/>

  <!-- Pulse dots travelling along each arc -->
  <circle class="pulse-dot pulse-dot-1" r="4" fill="#0CC9A8" style="offset-path: path('M 360 280 Q 530 200 700 190');"/>
  <circle class="pulse-dot pulse-dot-2" r="4" fill="#0CC9A8" style="offset-path: path('M 360 310 Q 530 310 700 310');"/>
  <circle class="pulse-dot pulse-dot-3" r="4" fill="#0CC9A8" style="offset-path: path('M 360 340 Q 530 420 700 430');"/>

  <!-- Footer note -->
  <line x1="40" y1="552" x2="1040" y2="552" class="hair"/>
  <text x="40" y="580" class="mist" font-size="10" letter-spacing="0.4">Encrypted in transit and at rest, full audit trail per delivery</text>
</svg>
