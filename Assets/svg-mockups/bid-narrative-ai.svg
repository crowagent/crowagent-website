  <text x="108" y="560" class="b" font-size="11" fill="#8A9DB8">Oxford SVB proxy: £18,453 · Selected target 4 · Δ £73,812</text>
  <rect x="600" y="522" width="50" height="22" rx="11" fill="#0CC9A8" fill-opacity="0.18"/>
  <path d="M615 532 L620 537 L630 528" stroke="#0CC9A8" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="640" y="536" class="b" font-size="10" font-weight="600" fill="#0CC9A8">In</text>

