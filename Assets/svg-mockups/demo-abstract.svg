<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1067" role="img" aria-label="Floating play triangles, progress bars and a dashed orbit in CrowAgent teal and sky" preserveAspectRatio="xMidYMid slice">
  <title>CrowAgent demo, preview and play abstract</title>
  <desc>Several abstract play-triangle silhouettes float at different scales above soft progress bars, ringed by a dashed orbit. Decorative; no data.</desc>
  <defs>
    <linearGradient id="dmTri" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0CC9A8" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#5BC8FF" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="dmTriAlt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5BC8FF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0CC9A8" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="dmBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0CC9A8" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#5BC8FF" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="dmCore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0CC9A8" stop-opacity="0.6"/>
      <stop offset="0.55" stop-color="#5BC8FF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#0CC9A8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    @keyframes dm-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @keyframes dm-float2{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
    @keyframes dm-pulse{0%,100%{opacity:.9;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
    @keyframes dm-loop{0%{stroke-dashoffset:0}100%{stroke-dashoffset:-240}}
    @keyframes dm-prog{0%{transform:scaleX(0.05)}50%{transform:scaleX(1)}100%{transform:scaleX(0.05)}}
    @keyframes dm-tw{0%,100%{opacity:.4}50%{opacity:.9}}
    .dm-tri-a{animation:dm-float 38s ease-in-out infinite;transform-origin:center}
    .dm-tri-b{animation:dm-float2 44s ease-in-out -10s infinite;transform-origin:center}
    #dm-tri-core{transform-origin:800px 533px;animation:dm-pulse 34s ease-in-out infinite}
    .dm-ring{stroke-dasharray:6 8;animation:dm-loop 48s linear infinite}
    .dm-bar-fill{transform-origin:left center;animation:dm-prog 38s ease-in-out infinite}
    .dm-bar-fill:nth-of-type(2){animation-duration:44s;animation-delay:-10s}
    .dm-bar-fill:nth-of-type(3){animation-duration:40s;animation-delay:-18s}
    .dm-tw{animation:dm-tw 34s ease-in-out infinite}
    .dm-tw:nth-child(2n){animation-duration:42s}
    @media (prefers-reduced-motion:reduce){*{animation:none!important;transform:none!important}}
  </style>

  <!-- Outer play triangle silhouettes (drift) -->
  <g class="dm-tri-b" opacity="0.65">
    <polygon points="280,300 280,520 470,410" fill="url(#dmTriAlt)" stroke="#5BC8FF" stroke-opacity="0.7" stroke-width="1.6" stroke-linejoin="round"/>
  </g>
  <g class="dm-tri-a" opacity="0.6">
    <polygon points="1180,220 1180,400 1340,310" fill="url(#dmTri)" stroke="#0CC9A8" stroke-opacity="0.7" stroke-width="1.6" stroke-linejoin="round"/>
  </g>
  <g class="dm-tri-b" opacity="0.55">
    <polygon points="1240,640 1240,840 1410,740" fill="url(#dmTriAlt)" stroke="#5BC8FF" stroke-opacity="0.65" stroke-width="1.6" stroke-linejoin="round"/>
  </g>
  <g class="dm-tri-a" opacity="0.5">
    <polygon points="160,640 160,820 320,730" fill="url(#dmTri)" stroke="#0CC9A8" stroke-opacity="0.65" stroke-width="1.6" stroke-linejoin="round"/>
  </g>

  <!-- Central orbit (dashed) -->
  <g fill="none">
    <circle class="dm-ring" cx="800" cy="533" r="220" stroke="#5BC8FF" stroke-width="1.4" stroke-opacity="0.7"/>
    <circle cx="800" cy="533" r="170" stroke="#0CC9A8" stroke-width="1.2" stroke-opacity="0.65"/>
    <circle cx="800" cy="533" r="270" stroke="#5BC8FF" stroke-width="1.2" stroke-opacity="0.55"/>
  </g>

  <!-- Core play triangle (pulse) -->
  <g id="dm-tri-core">
    <circle cx="800" cy="533" r="160" fill="url(#dmCore)"/>
    <circle cx="800" cy="533" r="110" fill="none" stroke="#0CC9A8" stroke-width="1.8" stroke-opacity="0.95"/>
    <polygon points="770,475 770,591 880,533" fill="#C2FF57" fill-opacity="0.95" stroke="#0CC9A8" stroke-opacity="0.95" stroke-width="1.6" stroke-linejoin="round"/>
  </g>

  <!-- Progress bars below -->
  <g>
    <rect x="420" y="820" width="760" height="6" rx="3" fill="#E8F0FA" fill-opacity="0.25"/>
    <rect class="dm-bar-fill" x="420" y="820" width="760" height="6" rx="3" fill="url(#dmBar)"/>

    <rect x="500" y="860" width="600" height="4" rx="2" fill="#E8F0FA" fill-opacity="0.2"/>
    <rect class="dm-bar-fill" x="500" y="860" width="600" height="4" rx="2" fill="url(#dmBar)" opacity="0.7"/>

    <rect x="560" y="894" width="480" height="4" rx="2" fill="#E8F0FA" fill-opacity="0.18"/>
    <rect class="dm-bar-fill" x="560" y="894" width="480" height="4" rx="2" fill="url(#dmBar)" opacity="0.55"/>
  </g>

  <!-- Background sparkles -->
  <g fill="#E8F0FA">
    <circle class="dm-tw" cx="220" cy="200" r="1.4" opacity="0.5"/>
    <circle class="dm-tw" cx="480" cy="160" r="1.3" opacity="0.45"/>
    <circle class="dm-tw" cx="880" cy="180" r="1.5" opacity="0.5"/>
    <circle class="dm-tw" cx="1180" cy="140" r="1.3" opacity="0.45"/>
    <circle class="dm-tw" cx="1420" cy="200" r="1.4" opacity="0.5"/>
    <circle class="dm-tw" cx="260" cy="960" r="1.3" opacity="0.45"/>
    <circle class="dm-tw" cx="540" cy="980" r="1.4" opacity="0.45"/>
    <circle class="dm-tw" cx="1060" cy="980" r="1.3" opacity="0.45"/>
    <circle class="dm-tw" cx="1360" cy="960" r="1.4" opacity="0.5"/>
    <circle class="dm-tw" cx="160" cy="500" r="1.2" opacity="0.4"/>
    <circle class="dm-tw" cx="1480" cy="500" r="1.2" opacity="0.4"/>
  </g>
</svg>
