<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="CrowCash 12-week cash-flow forecast mockup with stacked bar chart, ageing buckets and DSO trend">
  <title>CrowCash cash-flow forecast</title>
