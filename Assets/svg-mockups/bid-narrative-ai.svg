  <rect x="92" y="752" width="572" height="48" rx="8" fill="url(#aiGlow)"/>
  <rect x="92" y="752" width="572" height="48" rx="8" fill="#A78BFA" fill-opacity="0.4"/>
  <path d="M324 770 L320 776 L324 776 L320 786 L334 778 L330 778 L334 770 Z" fill="#E8F0FA"/>
  <text x="345" y="781" class="b" font-size="13" font-weight="700" fill="#E8F0FA">Generate narrative with AI</text>

  <text x="92" y="828" class="b" font-size="10" fill="#8A9DB8">Powered by Google Gemini · server-side · Oxford SVB 2023–24 proxy values</text>

