<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="CrowCash collections workspace mockup with overdue invoice list, statutory interest column, chase cadence pills and a cashflow forecast chart">
  <title>CrowCash collections workspace</title>
  <desc>Overdue invoice list with synthetic invoice numbers, days overdue, statutory interest under Late Payment Act 1998, polite/standard/firm chase cadence pills, and an inline cashflow forecast chart.</desc>
  <defs>
    <linearGradient id="bgG6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#040E1A"/>
      <stop offset="1" stop-color="#061525"/>
    </linearGradient>
    <linearGradient id="cashArea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0CC9A8" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#0CC9A8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <style>
    .f { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    .b { font-family: 'Inter', system-ui, sans-serif; }
    .m { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  </style>

  <rect width="1600" height="900" fill="url(#bgG6)"/>

  <!-- Window chrome -->
