<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360" preserveAspectRatio="xMidYMid meet" role="img" aria-label="CrowESG framework chips fanning out from a single core dataset toward GRI TCFD CSRD ISSB and SDR">
  <title>CrowESG dashboard preview</title>
  <defs>
    <linearGradient id="esBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A1F3A"/>
      <stop offset="1" stop-color="#040E1A"/>
    </linearGradient>
    <linearGradient id="esAcc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0CC9A8"/>
      <stop offset="1" stop-color="#5BC8FF"/>
    </linearGradient>
    <radialGradient id="esGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0CC9A8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#0CC9A8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>@media (prefers-reduced-motion: reduce){animate,animateTransform{display:none}}</style>
  <rect width="600" height="360" rx="14" fill="url(#esBg)"/>
  <rect x="1" y="1" width="598" height="358" rx="13" fill="none" stroke="#0CC9A8" stroke-opacity="0.18"/>

  <!-- chrome -->
  <circle cx="24" cy="24" r="4" fill="#8A9DB8" fill-opacity="0.4"/>
  <circle cx="40" cy="24" r="4" fill="#8A9DB8" fill-opacity="0.4"/>
  <circle cx="56" cy="24" r="4" fill="#8A9DB8" fill-opacity="0.4"/>
  <rect x="80" y="18" width="170" height="12" rx="6" fill="#0F2D52"/>
  <text x="540" y="28" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8A9DB8" text-anchor="end">Q3 2026 · waitlist</text>

  <text x="32" y="74" font-family="Plus Jakarta Sans,system-ui,sans-serif" font-size="14" fill="#B8CCE0" font-weight="600">One dataset, five frameworks</text>
  <text x="32" y="92" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8A9DB8">Map metrics once; render anywhere</text>

  <!-- breathing glow behind core -->
  <circle cx="300" cy="216" r="120" fill="url(#esGlow)">
    <animate attributeName="r" values="100;130;100" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- connector lines -->
  <g stroke="#0CC9A8" stroke-opacity="0.18" stroke-width="1">
    <line x1="300" y1="216" x2="120" y2="180"/>
    <line x1="300" y1="216" x2="198" y2="128"/>
    <line x1="300" y1="216" x2="300" y2="112"/>
    <line x1="300" y1="216" x2="402" y2="128"/>
    <line x1="300" y1="216" x2="480" y2="180"/>
  </g>

  <!-- core node -->
  <g transform="translate(300,216)">
    <circle r="38" fill="#0F2D52" stroke="#0CC9A8" stroke-width="2"/>
    <circle r="38" fill="none" stroke="#0CC9A8" stroke-opacity="0.35" stroke-width="2">
      <animate attributeName="r" values="38;58;38" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text y="-2" text-anchor="middle" font-family="Plus Jakarta Sans,system-ui,sans-serif" font-size="11" fill="#E8F0FA" font-weight="700">Core</text>
    <text y="14" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#8A9DB8">dataset</text>
  </g>

  <!-- 5 framework chips fanning out and back, looped via keyTimes -->
  <g font-family="Plus Jakarta Sans,system-ui,sans-serif" font-size="13" font-weight="700">
    <g>
      <animateTransform attributeName="transform" type="translate" dur="5s" repeatCount="indefinite"
        keyTimes="0;0.1;0.6;0.8;1"
        values="300,216; 300,216; 120,180; 120,180; 300,216"/>
      <rect x="-36" y="-16" width="72" height="32" rx="16" fill="#0CC9A8"/>
      <text text-anchor="middle" y="5" fill="#040E1A">GRI</text>
    </g>

    <g>
      <animateTransform attributeName="transform" type="translate" dur="5s" repeatCount="indefinite"
        keyTimes="0;0.15;0.6;0.8;1"
        values="300,216; 300,216; 198,128; 198,128; 300,216"/>
      <rect x="-40" y="-16" width="80" height="32" rx="16" fill="#5BC8FF"/>
      <text text-anchor="middle" y="5" fill="#040E1A">TCFD</text>
    </g>

    <g>
      <animateTransform attributeName="transform" type="translate" dur="5s" repeatCount="indefinite"
        keyTimes="0;0.2;0.6;0.8;1"
        values="300,216; 300,216; 300,112; 300,112; 300,216"/>
      <rect x="-50" y="-16" width="100" height="32" rx="16" fill="#C2FF57"/>
      <text text-anchor="middle" y="5" fill="#040E1A">CSRD/ESRS</text>
    </g>

    <g>
      <animateTransform attributeName="transform" type="translate" dur="5s" repeatCount="indefinite"
        keyTimes="0;0.25;0.6;0.8;1"
        values="300,216; 300,216; 402,128; 402,128; 300,216"/>
      <rect x="-36" y="-16" width="72" height="32" rx="16" fill="#A78BFA"/>
      <text text-anchor="middle" y="5" fill="#040E1A">ISSB</text>
    </g>

    <g>
      <animateTransform attributeName="transform" type="translate" dur="5s" repeatCount="indefinite"
        keyTimes="0;0.3;0.6;0.8;1"
        values="300,216; 300,216; 480,180; 480,180; 300,216"/>
      <rect x="-44" y="-16" width="88" height="32" rx="16" fill="#DAA520"/>
      <text text-anchor="middle" y="5" fill="#040E1A">UK SDR</text>
    </g>
  </g>

  <!-- bottom progress strip -->
  <g transform="translate(32,316)" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8A9DB8">
    <text>Mapping</text>
    <rect x="64" y="-9" width="380" height="8" rx="4" fill="#0F2D52"/>
    <rect x="64" y="-9" width="0" height="8" rx="4" fill="url(#esAcc)">
      <animate attributeName="width" values="0;90;180;270;340;380;380" dur="5s" repeatCount="indefinite"/>
    </rect>
    <g font-family="Inter,system-ui,sans-serif" font-size="11" fill="#0CC9A8">
      <text x="456" y="0" opacity="0">23%<animate attributeName="opacity" values="1;0;0;0;0;0;0" dur="5s" repeatCount="indefinite"/></text>
      <text x="456" y="0" opacity="0">47%<animate attributeName="opacity" values="0;1;0;0;0;0;0" dur="5s" repeatCount="indefinite"/></text>
      <text x="456" y="0" opacity="0">71%<animate attributeName="opacity" values="0;0;1;0;0;0;0" dur="5s" repeatCount="indefinite"/></text>
      <text x="456" y="0" opacity="0">89%<animate attributeName="opacity" values="0;0;0;1;0;0;0" dur="5s" repeatCount="indefinite"/></text>
      <text x="456" y="0" opacity="0">100%<animate attributeName="opacity" values="0;0;0;0;1;1;1" dur="5s" repeatCount="indefinite"/></text>
    </g>
  </g>

  <!-- live indicator -->
  <circle cx="556" cy="78" r="4" fill="#0CC9A8">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="546" y="82" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#8A9DB8" text-anchor="end">Live</text>
</svg>
