<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="cyberStep1Title" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="cyberStep1Title">CrowCyber Step 1: Connect your tenant</title>
  <defs>
    <style>
      .bg { fill: #0A1422; }
      .c1 { fill: #0F1B2E; }
      .c2 { fill: #11243F; }
      .hair { stroke: rgba(255,255,255,0.08); stroke-width: 1; fill: none; }
      .cloud { fill: #E8EEF7; }
      .mist { fill: #8A9DB8; }
      .teal { fill: #0CC9A8; }
      .teal-stroke { stroke: #0CC9A8; fill: none; }
      .green { fill: #22C55E; }
      .digit { font-variant-numeric: tabular-nums; }

      .link-line { stroke: #0CC9A8; stroke-width: 2; fill: none; stroke-dasharray: 4 6; stroke-dashoffset: 200; animation: link-flow 4s linear infinite; }
      @keyframes link-flow { to { stroke-dashoffset: 0; } }

      .tenant-card { opacity: 0; }
      .tenant-1 { animation: card-in 6s ease-out infinite; animation-delay: 0.4s; }
      .tenant-2 { animation: card-in 6s ease-out infinite; animation-delay: 0.7s; }
      .tenant-3 { animation: card-in 6s ease-out infinite; animation-delay: 1.0s; }
      @keyframes card-in {
        0%, 5%   { opacity: 0; transform: translateY(6px); }
        15%, 95% { opacity: 1; transform: translateY(0); }
        100%     { opacity: 0; }
      }

      .tick-dot { opacity: 0; }
      .tick-1 { animation: tick-in 6s ease-out infinite; animation-delay: 2.4s; }
      .tick-2 { animation: tick-in 6s ease-out infinite; animation-delay: 2.7s; }
      .tick-3 { animation: tick-in 6s ease-out infinite; animation-delay: 3.0s; }
      @keyframes tick-in {
        0%, 35%  { opacity: 0; }
        50%, 95% { opacity: 1; }
        100%     { opacity: 0; }
      }

      .pulse { animation: pulse 1.8s cubic-bezier(0.4,0,0.2,1) infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.06); }
      }

      @media (prefers-reduced-motion: reduce) {
        .link-line, .tenant-card, .tick-dot, .tenant-1, .tenant-2, .tenant-3,
        .tick-1, .tick-2, .tick-3, .pulse {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
        .link-line { stroke-dashoffset: 0 !important; }
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="620"/>

  <!-- Header -->
  <g transform="translate(40, 40)">
    <text x="0" y="14" class="teal" font-size="11" font-weight="600" letter-spacing="1.5">STEP 1, CONNECT</text>
    <text x="0" y="46" class="cloud" font-size="22" font-weight="600">Link your tenant in one click</text>
    <text x="0" y="68" class="mist" font-size="13">Microsoft 365, Google Workspace, or AWS, OAuth secured</text>
  </g>

  <!-- Central CrowCyber shield -->
  <g transform="translate(490, 270)">
    <g class="pulse">
      <circle cx="50" cy="50" r="50" fill="#0F1B2E" stroke="#0CC9A8" stroke-width="2"/>
      <path d="M50 22 L72 32 L72 54 Q72 70 50 80 Q28 70 28 54 L28 32 Z" fill="#11243F" stroke="#0CC9A8" stroke-width="1.5"/>
      <path d="M40 50 L48 58 L62 42" stroke="#0CC9A8" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="50" y="124" class="cloud" font-size="12" font-weight="600" text-anchor="middle">CrowCyber</text>
  </g>

  <!-- Connector lines from tenants to centre -->
  <path class="link-line" d="M260 320 Q400 320 490 320"/>
  <path class="link-line" d="M260 200 Q400 240 490 300"/>
  <path class="link-line" d="M260 440 Q400 400 490 340"/>

  <!-- Tenant card 1: Microsoft 365 -->
  <g class="tenant-card tenant-1" transform="translate(60, 170)">
    <rect class="c1" x="0" y="0" width="200" height="76" rx="12" ry="12"/>
    <rect class="hair" x="0" y="0" width="200" height="76" rx="12" ry="12"/>
    <g transform="translate(20, 22)">
      <rect x="0" y="0" width="14" height="14" fill="#F25022"/>
      <rect x="16" y="0" width="14" height="14" fill="#7FBA00"/>
      <rect x="0" y="16" width="14" height="14" fill="#00A4EF"/>
      <rect x="16" y="16" width="14" height="14" fill="#FFB900"/>
    </g>
    <text x="68" y="32" class="cloud" font-size="13" font-weight="600">Microsoft 365</text>
    <text x="68" y="52" class="mist digit" font-size="11">acme-uk.onmicrosoft.com</text>
    <circle class="tick-dot tick-1" cx="180" cy="38" r="7" fill="#22C55E"/>
    <path class="tick-dot tick-1" d="M177 38 L179 40 L183 36" stroke="#0A1422" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Tenant card 2: Google Workspace -->
  <g class="tenant-card tenant-2" transform="translate(60, 290)">
    <rect class="c1" x="0" y="0" width="200" height="76" rx="12" ry="12"/>
    <rect class="hair" x="0" y="0" width="200" height="76" rx="12" ry="12"/>
    <g transform="translate(22, 22)">
      <circle cx="14" cy="14" r="14" fill="#1B2F4D"/>
      <text x="14" y="19" fill="#4285F4" font-size="16" font-weight="700" text-anchor="middle">G</text>
    </g>
    <text x="68" y="32" class="cloud" font-size="13" font-weight="600">Google Workspace</text>
    <text x="68" y="52" class="mist digit" font-size="11">acmegroup.co.uk</text>
    <circle class="tick-dot tick-2" cx="180" cy="38" r="7" fill="#22C55E"/>
    <path class="tick-dot tick-2" d="M177 38 L179 40 L183 36" stroke="#0A1422" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Tenant card 3: AWS -->
  <g class="tenant-card tenant-3" transform="translate(60, 410)">
    <rect class="c1" x="0" y="0" width="200" height="76" rx="12" ry="12"/>
    <rect class="hair" x="0" y="0" width="200" height="76" rx="12" ry="12"/>
    <g transform="translate(20, 18)">
      <rect x="0" y="0" width="34" height="22" rx="3" fill="#1B2F4D"/>
      <text x="17" y="15" fill="#FF9900" font-size="11" font-weight="700" text-anchor="middle">aws</text>
    </g>
    <text x="68" y="32" class="cloud" font-size="13" font-weight="600">AWS Organisation</text>
    <text x="68" y="52" class="mist digit" font-size="11">acct 4129 8810 6602</text>
    <circle class="tick-dot tick-3" cx="180" cy="38" r="7" fill="#22C55E"/>
    <path class="tick-dot tick-3" d="M177 38 L179 40 L183 36" stroke="#0A1422" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Right pane: evidence ingest status -->
  <g transform="translate(720, 170)">
    <rect class="c1" x="0" y="0" width="320" height="316" rx="16" ry="16"/>
    <rect class="hair" x="0" y="0" width="320" height="316" rx="16" ry="16"/>
    <text x="20" y="32" class="cloud" font-size="13" font-weight="600">Live evidence ingest</text>
    <text x="20" y="52" class="mist" font-size="11">Pulled automatically, no screenshots</text>
    <line x1="20" y1="68" x2="300" y2="68" class="hair"/>

    <g transform="translate(20, 88)">
      <circle cx="6" cy="6" r="3" class="teal"/>
      <text x="18" y="10" class="cloud" font-size="12">MFA coverage, 247 of 252 users</text>
    </g>
    <g transform="translate(20, 118)">
      <circle cx="6" cy="6" r="3" class="teal"/>
      <text x="18" y="10" class="cloud" font-size="12">Patch state, 1,841 endpoints</text>
    </g>
    <g transform="translate(20, 148)">
      <circle cx="6" cy="6" r="3" class="teal"/>
      <text x="18" y="10" class="cloud" font-size="12">Admin accounts, 6 detected</text>
    </g>
    <g transform="translate(20, 178)">
      <circle cx="6" cy="6" r="3" class="teal"/>
      <text x="18" y="10" class="cloud" font-size="12">Firewall rules, 38 audited</text>
    </g>
    <g transform="translate(20, 208)">
      <circle cx="6" cy="6" r="3" class="teal"/>
      <text x="18" y="10" class="cloud" font-size="12">Malware protection, on</text>
    </g>
    <g transform="translate(20, 238)">
      <circle cx="6" cy="6" r="3" class="teal"/>
      <text x="18" y="10" class="cloud" font-size="12">Secure configuration baseline</text>
    </g>

    <text x="20" y="290" class="mist digit" font-size="10">Refreshed 12 seconds ago</text>
  </g>

  <!-- Footer hairline -->
  <line x1="40" y1="552" x2="1040" y2="552" class="hair"/>
  <g transform="translate(40, 580)">
    <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.4">OAuth tokens are read only, no admin password ever leaves your tenant</text>
  </g>
</svg>
