    <text x="92" y="708" class="b" font-size="11" font-weight="600" fill="#8A9DB8">CASHFLOW (5 YR)</text>
    <rect x="92" y="720" width="20" height="40" rx="2" fill="#5BC8FF" fill-opacity="0.4"/>
    <rect x="118" y="710" width="20" height="50" rx="2" fill="#5BC8FF" fill-opacity="0.5"/>
    <rect x="144" y="700" width="20" height="60" rx="2" fill="#5BC8FF" fill-opacity="0.6"/>
    <rect x="170" y="685" width="20" height="75" rx="2" fill="#5BC8FF" fill-opacity="0.8"/>
    <rect x="196" y="668" width="20" height="92" rx="2" fill="#5BC8FF"/>

