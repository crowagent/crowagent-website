<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deep Obsidian Reflective Concept | CrowAgent Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    :root {
      --bg: #000;
      --teal: #0CC9A8;
    }
    body {
      background-color: var(--bg);
      color: white;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }
    /* Infinite Floor Reflection */
    .obsidian-floor {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 40vh;
      background: linear-gradient(to top, #111 0%, transparent 100%);
      transform: perspective(1000px) rotateX(60deg);
      opacity: 0.5;
    }
    .obsidian-grid {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(12, 201, 168, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(12, 201, 168, 0.1) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: linear-gradient(to top, black, transparent);
    }
    .h1-mega {
      font-size: 8rem;
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 0.8;
      text-transform: uppercase;
      color: #fff;
      filter: drop-shadow(0 0 30px rgba(255,255,255,0.1));
    }
    .statute-tag {
      padding: 4px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--teal);
    }
    .gloss-card {
        background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
        border: 1px solid rgba(255,255,255,0.1);
        backdrop-filter: blur(10px);
        transition: border-color 0.3s;
    }
    .gloss-card:hover {
        border-color: var(--teal);
    }
  </style>
</head>
<body>
  <main class="relative z-10 h-screen flex flex-col items-center justify-center">
    <div class="max-w-4xl text-center mb-20">
      <div class="flex gap-4 justify-center mb-12">
        <span class="statute-tag">SI 2015/962</span>
        <span class="statute-tag">PPN 002</span>
        <span class="statute-tag">NCSC v3.3</span>
      </div>
      
      <h1 class="h1-mega mb-12">
        Intelligence<br>
        <span class="text-teal-400">By Engineers.</span>
      </h1>

      <p class="text-xl text-white/30 max-w-xl mx-auto leading-relaxed">
        Engineered for accuracy, built for SMEs. CrowAgent translates UK statute into business intelligence.
      </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 px-12 max-w-6xl w-full">
        <div class="gloss-card p-10 rounded-2xl">
            <h3 class="font-black mb-4">Core</h3>
            <p class="text-sm text-white/40">MEES property compliance.</p>
        </div>
        <div class="gloss-card p-10 rounded-2xl border-teal-500/30">
            <h3 class="font-black mb-4 text-teal-400">Mark</h3>
            <p class="text-sm text-white/40">PPN 002 Social Value.</p>
        </div>
        <div class="gloss-card p-10 rounded-2xl">
            <h3 class="font-black mb-4">Cyber</h3>
            <p class="text-sm text-white/40">NCSC Certified Ready.</p>
        </div>
    </div>
  </main>

  <div class="obsidian-floor">
    <div class="obsidian-grid"></div>
  </div>

  <script>
    gsap.from(".h1-mega", { scale: 1.1, opacity: 0, duration: 2, ease: "power4.out" });
    gsap.from(".gloss-card", { y: 50, opacity: 0, stagger: 0.1, duration: 1.2, ease: "expo.out", delay: 0.8 });
  </script>
</body>
</html>
