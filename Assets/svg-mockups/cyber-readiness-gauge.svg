    <text x="752" class="b cloud" font-size="13" font-weight="600">Secure configuration</text>
    <text x="752" y="20" class="b steel" font-size="11">BIOS baseline · disable services · auto-lock 15min</text>
    <rect x="752" y="30" width="354" height="12" rx="6" fill="#0D2847"/>
    <rect x="752" y="30" width="305" height="12" rx="6" fill="#0CC9A8"/>
    <text x="1126" text-anchor="middle" class="m cloud" font-size="12" font-weight="700">7/8</text>
    <g transform="translate(1248,-10)">
      <rect width="10" height="14" rx="2" fill="#0CC9A8"/><rect x="13" width="10" height="14" rx="2" fill="#0CC9A8"/><rect x="26" width="10" height="14" rx="2" fill="#0CC9A8"/><rect x="39" width="10" height="14" rx="2" fill="#0CC9A8"/><rect x="52" width="10" height="14" rx="2" fill="#0D2847"/>
    </g>
    <text x="1490" text-anchor="end" class="m teal" font-size="14" font-weight="700">86%</text>
