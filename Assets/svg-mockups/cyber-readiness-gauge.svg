<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" preserveAspectRatio="xMidYMid meet" role="img" aria-label="CrowCyber readiness gauge showing 74 percent big-number score, radial 5-control gauge and per-theme breakdown bars">
  <title>CrowCyber readiness gauge</title>
  <desc>Cyber Essentials readiness with a big 74 percent number, a 5-control radial gauge and per-theme breakdown for firewalls, secure configuration, access control, malware protection and patch management. Synthetic figures for illustration only.</desc>
  <defs>
    <linearGradient id="cyBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#040E1A"/>
      <stop offset="1" stop-color="#061525"/>
    </linearGradient>
    <linearGradient id="cyG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0CC9A8"/>
      <stop offset="1" stop-color="#5BC8FF"/>
    </linearGradient>
  </defs>
  <style>
    .f{font-family:'Plus Jakarta Sans',system-ui,sans-serif}
    .b{font-family:'Inter',system-ui,sans-serif}
    @keyframes sf23ax-soft{0%,100%{opacity:1}50%{opacity:.78}}
    @keyframes sf23ax-blink{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes sf23ax-march{from{stroke-dashoffset:0}to{stroke-dashoffset:-32}}
    @keyframes sf23ax-breathe{0%,100%{opacity:1}50%{opacity:.88}}
    @keyframes sf23ax-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes sf23ax-arc-pulse{0%,100%{stroke-opacity:1}50%{stroke-opacity:.55}}
    rect[fill="#0CC9A8"]:not([fill-opacity]){animation:sf23ax-soft 3.8s ease-in-out infinite}
    rect[fill="#F59E0B"]:not([fill-opacity]){animation:sf23ax-soft 2.6s ease-in-out infinite}
    rect[fill="#EF4444"]:not([fill-opacity]){animation:sf23ax-blink 2s ease-in-out infinite}
    rect[fill="#5BC8FF"]:not([fill-opacity]){animation:sf23ax-soft 4.4s ease-in-out infinite}
    rect.teal{animation:sf23ax-soft 3.8s ease-in-out infinite}
    rect.sky{animation:sf23ax-soft 4.4s ease-in-out infinite}
    rect.mark{animation:sf23ax-breathe 5s ease-in-out infinite}
    circle[fill="#0CC9A8"]{animation:sf23ax-soft 3.8s ease-in-out infinite}
    circle[fill="#F59E0B"]{animation:sf23ax-soft 2.6s ease-in-out infinite}
    circle[fill="#EF4444"]{animation:sf23ax-blink 2s ease-in-out infinite}
    circle[fill="#5BC8FF"]{animation:sf23ax-soft 4.4s ease-in-out infinite}
    circle[stroke="#0CC9A8"],circle[stroke="#F59E0B"],circle[stroke="#EF4444"]{animation:sf23ax-arc-pulse 3.4s ease-in-out infinite}
    polyline{stroke-dasharray:8 6;animation:sf23ax-march 2.4s linear infinite}
    text[font-size="20"],text[font-size="22"],text[font-size="24"],text[font-size="26"],text[font-size="28"],text[font-size="32"],text[font-size="34"],text[font-size="56"],text[font-size="92"]{animation:sf23ax-breathe 5.4s ease-in-out infinite}
    @media (prefers-reduced-motion:reduce){*{animation:none!important}}
    .m{font-family:'JetBrains Mono',ui-monospace,monospace}
    .teal{fill:#0CC9A8}
    .mark{fill:#A78BFA}
    .sky{fill:#5BC8FF}
    .cloud{fill:#E4ECF7}
    .steel{fill:#8A9DB8}
  </style>
  <rect width="1600" height="900" fill="url(#cyBg)"/>
  <!-- chrome -->
  <rect width="1600" height="44" fill="#0A1F3A"/>
  <circle cx="22" cy="22" r="6" fill="#EF4444"/>
  <circle cx="44" cy="22" r="6" fill="#F59E0B"/>
  <circle cx="66" cy="22" r="6" fill="#0CC9A8"/>
  <rect x="600" y="11" width="400" height="22" rx="11" fill="#040E1A"/>
  <text x="800" y="26" text-anchor="middle" class="b steel" font-size="11">app.crowagent.ai/crowcyber/assessment</text>
  <rect y="44" width="1600" height="64" fill="#0A1F3A"/>
  <line y1="108" x2="1600" y2="108" stroke="#0D2847"/>
  <circle cx="44" cy="76" r="14" class="teal"/>
  <path d="M44 67v18M44 67c-4 0-8 3-8 7s4 6 8 6 8 2 8 6" stroke="#040E1A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="68" y="81" class="f cloud" font-size="17" font-weight="700">CrowCyber</text>
  <text x="180" y="81" class="b steel" font-size="13">Cyber Essentials v3.3 readiness · Coastal Properties Ltd</text>
  <rect x="1394" y="60" width="138" height="32" rx="16" fill="#0D2847"/>
  <text x="1463" y="80" text-anchor="middle" class="b cloud" font-size="11" font-weight="600">Export PPN 014/21 pack</text>
  <!-- header -->
  <text x="68" y="150" class="f cloud" font-size="26" font-weight="700">Readiness assessment</text>
  <text x="68" y="174" class="b steel" font-size="13">44 self-assessment questions · last updated today · 6 controls outstanding</text>
  <!-- LEFT: big number + radial 5-control gauge -->
  <rect x="68" y="196" width="640" height="660" rx="14" fill="#0A1F3A" stroke="#0D2847"/>
  <text x="92" y="226" class="f cloud" font-size="14" font-weight="700">Overall readiness</text>
  <text x="92" y="246" class="b steel" font-size="11">Weighted across all five NCSC themes</text>
  <!-- Big number block left -->
  <text x="92" y="334" class="f cloud" font-size="92" font-weight="800">74%</text>
  <text x="92" y="368" class="b sky" font-size="13" font-weight="700">▲ +12 pts this week</text>
  <text x="92" y="392" class="b steel" font-size="12">Target: 80% to certify · 6 pts to go</text>
  <!-- Radial 5-control gauge: 5 concentric arcs at angles -->
  <g transform="translate(488,360)">
    <!-- background rings -->
    <circle r="160" fill="none" stroke="#0D2847" stroke-width="14"/>
    <circle r="132" fill="none" stroke="#0D2847" stroke-width="14"/>
    <circle r="104" fill="none" stroke="#0D2847" stroke-width="14"/>
    <circle r="76" fill="none" stroke="#0D2847" stroke-width="14"/>
    <circle r="48" fill="none" stroke="#0D2847" stroke-width="14"/>
    <!-- Foreground arcs from top (12 o'clock) clockwise. circumference = 2πr -->
    <!-- Firewalls 94% r=160 c=1005 dash 945 60 -->
    <circle r="160" fill="none" stroke="#0CC9A8" stroke-width="14" stroke-dasharray="945 60" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90)"/>
    <!-- Secure config 86% r=132 c=829 dash 713 116 -->
    <circle r="132" fill="none" stroke="#0CC9A8" stroke-width="14" stroke-dasharray="713 116" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90)"/>
    <!-- Access control 64% r=104 c=653 dash 418 235 -->
    <circle r="104" fill="none" stroke="#F59E0B" stroke-width="14" stroke-dasharray="418 235" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90)"/>
    <!-- Malware 89% r=76 c=478 dash 425 53 -->
    <circle r="76" fill="none" stroke="#0CC9A8" stroke-width="14" stroke-dasharray="425 53" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90)"/>
    <!-- Patch 50% r=48 c=302 dash 151 151 -->
    <circle r="48" fill="none" stroke="#EF4444" stroke-width="14" stroke-dasharray="151 151" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90)"/>
    <!-- centre label -->
    <circle r="32" fill="#040E1A"/>
    <text y="6" text-anchor="middle" class="m teal" font-size="14" font-weight="700">5 themes</text>
  </g>
  <!-- Legend for radial rings -->
  <g transform="translate(92,440)">
    <rect width="13" height="13" rx="3" fill="#0CC9A8"/><text x="22" y="11" class="b cloud" font-size="11" font-weight="600">Firewalls · 94%</text>
    <rect y="22" width="13" height="13" rx="3" fill="#0CC9A8"/><text x="22" y="33" class="b cloud" font-size="11" font-weight="600">Secure config · 86%</text>
    <rect y="44" width="13" height="13" rx="3" fill="#F59E0B"/><text x="22" y="55" class="b cloud" font-size="11" font-weight="600">Access ctrl · 64%</text>
    <rect y="66" width="13" height="13" rx="3" fill="#0CC9A8"/><text x="22" y="77" class="b cloud" font-size="11" font-weight="600">Malware · 89%</text>
    <rect y="88" width="13" height="13" rx="3" fill="#EF4444"/><text x="22" y="99" class="b cloud" font-size="11" font-weight="600">Patch mgmt · 50%</text>
