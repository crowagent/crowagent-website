<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holographic Shield | CrowAgent Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    :root {
      --bg: #000;
      --teal: #0CC9A8;
      --purple: #a78bfa;
    }
    body {
      background-color: var(--bg);
      color: white;
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow-x: hidden;
    }
    /* Holographic Shimmer Effect */
    .hologram-wrap {
      position: absolute;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at 50% 0%, #111 0%, #000 100%);
    }
    .hologram-shimmer {
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        45deg,
        transparent 0%,
        rgba(12, 201, 168, 0.05) 30%,
        rgba(167, 139, 250, 0.05) 50%,
        transparent 70%
      );
      animation: holographic 8s infinite linear;
      mix-blend-mode: overlay;
    }
    @keyframes holographic {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .h1-holo {
      font-size: 7rem;
      font-weight: 900;
      letter-spacing: -0.06em;
      line-height: 0.8;
      text-transform: uppercase;
      color: #fff;
    }
    .holo-mask {
      background: linear-gradient(to right, #fff, var(--teal), var(--purple), #fff);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: holo-text 5s infinite linear;
    }
    @keyframes holo-text {
      to { background-position: 200% center; }
    }
    .premium-badge {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      padding: 8px 24px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px;
      color: white;
    }
    .statute-card-premium {
      background: linear-gradient(135deg, rgba(255,255,255,0.02), transparent);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 24px;
      padding: 3rem;
      transition: all 0.4s;
    }
    .statute-card-premium:hover {
      border-color: var(--teal);
      background: rgba(12, 201, 168, 0.02);
    }
  </style>
</head>
<body>
  <div class="hologram-wrap">
    <div class="hologram-shimmer"></div>
  </div>

  <main class="relative z-10 min-h-screen flex flex-col items-center justify-center py-20 px-12">
    <div class="mb-16">
      <span class="premium-badge">Immutable Authority</span>
    </div>
    
    <div class="text-center mb-24">
      <h1 class="h1-holo mb-8">
        The<br>
        <span class="holo-mask">Compliance</span><br>
        Shield.
      </h1>
      <p class="text-2xl text-white/30 font-light max-w-xl mx-auto leading-relaxed">
        CrowAgent translates complex UK statutes into absolute business certainty.
      </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-6xl w-full">
      <div class="statute-card-premium text-center">
        <h3 class="font-bold text-lg mb-2">SI 2015/962</h3>
        <p class="text-xs text-white/40 uppercase tracking-widest">Property Mandate</p>
      </div>
      <div class="statute-card-premium text-center border-teal-500/20">
        <h3 class="font-bold text-lg mb-2">PPN 002</h3>
        <p class="text-xs text-white/40 uppercase tracking-widest text-teal-400">Procurement Floor</p>
      </div>
      <div class="statute-card-premium text-center">
        <h3 class="font-bold text-lg mb-2">NCSC v3.3</h3>
        <p class="text-xs text-white/40 uppercase tracking-widest">Cyber Standard</p>
      </div>
    </div>
  </main>

  <script>
    gsap.from(".h1-holo span", { opacity: 0, y: 100, stagger: 0.1, duration: 1.5, ease: "power4.out" });
  </script>
</body>
</html>
