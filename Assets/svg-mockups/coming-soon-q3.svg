  <text x="800" y="744" text-anchor="middle" class="f" font-size="22" font-weight="700" fill="#E8F0FA">Join the waitlist · lock in early-access pricing</text>
  <text x="800" y="770" text-anchor="middle" class="b" font-size="13" fill="#B8CCE0">First 25 sign-ups get 30% off the first 12 months of CrowESG · plus monthly product updates</text>

  <!-- Email + button -->
  <rect x="440" y="788" width="540" height="40" rx="8" fill="#040E1A" stroke="#0D2847"/>
  <text x="460" y="813" class="b" font-size="13" fill="#8A9DB8">your.email@example.co.uk</text>

  <rect x="990" y="788" width="170" height="40" rx="8" fill="#0CC9A8"/>
  <text x="1075" y="813" text-anchor="middle" class="b" font-size="13" font-weight="700" fill="#040E1A">Join the waitlist</text>
</svg>
