<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1067" role="img" aria-label="Concentric ripples emanating from a softly glowing core in CrowAgent teal and sky" preserveAspectRatio="xMidYMid slice">
  <title>CrowAgent FAQ, concentric ripples abstract</title>
  <desc>Pond-style concentric rings ripple outward from a softly glowing core. Decorative, no data.</desc>
  <defs>
    <radialGradient id="faqCore" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0CC9A8" stop-opacity="0.6"/>
      <stop offset="0.55" stop-color="#5BC8FF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#0CC9A8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    @keyframes fq-ripple{0%{transform:scale(0.55);opacity:0}10%{opacity:0.95}100%{transform:scale(1.85);opacity:0}}
    @keyframes fq-pulse{0%,100%{opacity:.9;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
    @keyframes fq-tw{0%,100%{opacity:.4}50%{opacity:.95}}
    .fq-ring{transform-origin:800px 533px;animation:fq-ripple 40s ease-out infinite}
    .fq-ring:nth-of-type(2){animation-delay:-8s}
    .fq-ring:nth-of-type(3){animation-delay:-16s}
    .fq-ring:nth-of-type(4){animation-delay:-24s}
    .fq-ring:nth-of-type(5){animation-delay:-32s}
    #fq-core{transform-origin:800px 533px;animation:fq-pulse 36s ease-in-out infinite}
    .fq-tw{animation:fq-tw 32s ease-in-out infinite}
    .fq-tw:nth-child(2n){animation-duration:40s}
    .fq-tw:nth-child(3n){animation-duration:44s}
    @media (prefers-reduced-motion:reduce){*{animation:none!important;transform:none!important}}
  </style>

  <!-- Concentric expanding ripples (each scales up + fades) -->
  <g fill="none" stroke-linecap="round">
    <circle class="fq-ring" cx="800" cy="533" r="220" stroke="#0CC9A8" stroke-width="1.8" stroke-opacity="0.85"/>
    <circle class="fq-ring" cx="800" cy="533" r="220" stroke="#5BC8FF" stroke-width="1.4" stroke-opacity="0.75"/>
    <circle class="fq-ring" cx="800" cy="533" r="220" stroke="#0CC9A8" stroke-width="1.8" stroke-opacity="0.85"/>
    <circle class="fq-ring" cx="800" cy="533" r="220" stroke="#5BC8FF" stroke-width="1.4" stroke-opacity="0.75"/>
    <circle class="fq-ring" cx="800" cy="533" r="220" stroke="#0CC9A8" stroke-width="1.8" stroke-opacity="0.85"/>
  </g>

  <!-- Static reference rings (so static fallback still looks like rings) -->
  <g fill="none">
    <circle cx="800" cy="533" r="180" stroke="#5BC8FF" stroke-width="1.2" stroke-opacity="0.6"/>
    <circle cx="800" cy="533" r="280" stroke="#0CC9A8" stroke-width="1.2" stroke-opacity="0.58"/>
    <circle cx="800" cy="533" r="380" stroke="#5BC8FF" stroke-width="1.2" stroke-opacity="0.55"/>
    <circle cx="800" cy="533" r="480" stroke="#0CC9A8" stroke-width="1" stroke-opacity="0.5"/>
  </g>

  <!-- Glowing core (no glyph) -->
  <g id="fq-core">
    <circle cx="800" cy="533" r="180" fill="url(#faqCore)"/>
    <circle cx="800" cy="533" r="64" fill="none" stroke="#0CC9A8" stroke-width="1.6" stroke-opacity="0.9"/>
    <circle cx="800" cy="533" r="28" fill="#0CC9A8" opacity="0.6"/>
    <circle cx="800" cy="533" r="10" fill="#C2FF57" opacity="0.95"/>
  </g>

  <!-- Surrounding sparkles -->
  <g fill="#E8F0FA">
    <circle class="fq-tw" cx="320" cy="220" r="1.5" opacity="0.5"/>
    <circle class="fq-tw" cx="520" cy="160" r="1.3" opacity="0.45"/>
    <circle class="fq-tw" cx="720" cy="240" r="1.5" opacity="0.5"/>
    <circle class="fq-tw" cx="1080" cy="180" r="1.3" opacity="0.45"/>
    <circle class="fq-tw" cx="1280" cy="260" r="1.5" opacity="0.5"/>
    <circle class="fq-tw" cx="280" cy="820" r="1.5" opacity="0.45"/>
    <circle class="fq-tw" cx="480" cy="900" r="1.3" opacity="0.4"/>
    <circle class="fq-tw" cx="720" cy="860" r="1.5" opacity="0.5"/>
    <circle class="fq-tw" cx="1080" cy="900" r="1.3" opacity="0.45"/>
    <circle class="fq-tw" cx="1320" cy="820" r="1.5" opacity="0.5"/>
    <circle class="fq-tw" cx="160" cy="500" r="1.3" opacity="0.4"/>
    <circle class="fq-tw" cx="1480" cy="500" r="1.3" opacity="0.4"/>
  </g>
</svg>
