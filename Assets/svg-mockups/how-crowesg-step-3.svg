<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="esgStep3Title" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="esgStep3Title">CrowESG Step 3: Run double materiality</title>
  <defs>
    <style>
      .bg { fill: #0A1422; }
      .c1 { fill: #0F1B2E; }
      .c2 { fill: #11243F; }
      .hair { stroke: rgba(255,255,255,0.08); stroke-width: 1; fill: none; }
      .cloud { fill: #E8EEF7; }
      .mist { fill: #8A9DB8; }
      .teal { fill: #0CC9A8; }
      .green { fill: #22C55E; }
      .amber { fill: #F59E0B; }
      .red { fill: #EF4444; }
      .digit { font-variant-numeric: tabular-nums; }

      .topic { opacity: 0; transform-origin: center; transform-box: fill-box; }
      .tp-1 { animation: tp-in 6s ease-out infinite; animation-delay: 0.6s; }
      .tp-2 { animation: tp-in 6s ease-out infinite; animation-delay: 0.9s; }
      .tp-3 { animation: tp-in 6s ease-out infinite; animation-delay: 1.2s; }
      .tp-4 { animation: tp-in 6s ease-out infinite; animation-delay: 1.5s; }
      .tp-5 { animation: tp-in 6s ease-out infinite; animation-delay: 1.8s; }
      .tp-6 { animation: tp-in 6s ease-out infinite; animation-delay: 2.1s; }
      .tp-7 { animation: tp-in 6s ease-out infinite; animation-delay: 2.4s; }
      @keyframes tp-in {
        0%, 9%   { opacity: 0; transform: scale(0.6); }
        22%, 95% { opacity: 1; transform: scale(1); }
        100%     { opacity: 0; }
      }

      .axis-fade { opacity: 0; animation: axis-in 6s ease-out infinite; animation-delay: 0.2s; }
      @keyframes axis-in {
        0%, 4%   { opacity: 0; }
        14%, 100% { opacity: 1; }
      }

      .summary-row { opacity: 0; }
      .sr-1 { animation: sr-in 6s ease-out infinite; animation-delay: 2.8s; }
      .sr-2 { animation: sr-in 6s ease-out infinite; animation-delay: 3.1s; }
      .sr-3 { animation: sr-in 6s ease-out infinite; animation-delay: 3.4s; }
      @keyframes sr-in {
        0%, 44%  { opacity: 0; transform: translateY(4px); }
        56%, 95% { opacity: 1; transform: translateY(0); }
        100%     { opacity: 0; }
      }

      @media (prefers-reduced-motion: reduce) {
        .topic, .tp-1, .tp-2, .tp-3, .tp-4, .tp-5, .tp-6, .tp-7, .axis-fade, .summary-row, .sr-1, .sr-2, .sr-3 {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="620"/>

  <!-- Header -->
  <g transform="translate(40, 40)">
    <text x="0" y="14" class="teal" font-size="11" font-weight="600" letter-spacing="1.5">STEP 3, MATERIALITY</text>
    <text x="0" y="46" class="cloud" font-size="22" font-weight="600">Impact and financial, per ESRS</text>
    <text x="0" y="68" class="mist" font-size="13">Stakeholder weighted scoring, plotted on the double-materiality matrix</text>
  </g>

  <!-- Matrix (left) -->
  <g transform="translate(40, 140)">
    <rect class="c1" x="0" y="0" width="640" height="370" rx="16" ry="16"/>
    <text x="20" y="32" class="cloud" font-size="13" font-weight="600">Double materiality matrix</text>
    <text x="20" y="52" class="mist" font-size="11">Bubble size, stakeholder confidence</text>

    <!-- Axes -->
    <g class="axis-fade" transform="translate(80, 90)">
      <!-- y axis -->
      <line x1="0" y1="0" x2="0" y2="280" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
      <line x1="-4" y1="0" x2="4" y2="0" stroke="rgba(255,255,255,0.4)"/>
      <line x1="-4" y1="140" x2="4" y2="140" stroke="rgba(255,255,255,0.4)" stroke-dasharray="2 4"/>
      <line x1="-4" y1="280" x2="4" y2="280" stroke="rgba(255,255,255,0.4)"/>
      <!-- x axis -->
      <line x1="0" y1="280" x2="520" y2="280" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
      <line x1="260" y1="276" x2="260" y2="284" stroke="rgba(255,255,255,0.4)" stroke-dasharray="2 4"/>
      <line x1="520" y1="276" x2="520" y2="284" stroke="rgba(255,255,255,0.4)"/>

      <!-- axis labels -->
      <text x="-12" y="0" class="mist digit" font-size="9" text-anchor="end">High</text>
      <text x="-12" y="284" class="mist digit" font-size="9" text-anchor="end">Low</text>
      <text x="260" y="304" class="mist" font-size="10" text-anchor="middle" letter-spacing="0.5">FINANCIAL MATERIALITY</text>
      <text x="-32" y="160" class="mist" font-size="10" text-anchor="middle" letter-spacing="0.5" transform="rotate(-90 -32 160)">IMPACT MATERIALITY</text>
    </g>

    <!-- Bubbles -->
    <g transform="translate(80, 90)">
      <!-- Climate, top-right (high/high) -->
      <g class="topic tp-1" transform="translate(420, 40)">
        <circle cx="0" cy="0" r="28" fill="rgba(239,68,68,0.20)" stroke="#EF4444" stroke-width="2"/>
        <text x="0" y="4" class="cloud" font-size="11" font-weight="700" text-anchor="middle">Climate</text>
      </g>
      <!-- Energy -->
      <g class="topic tp-2" transform="translate(360, 90)">
        <circle cx="0" cy="0" r="22" fill="rgba(239,68,68,0.18)" stroke="#EF4444" stroke-width="2"/>
        <text x="0" y="4" class="cloud" font-size="10" font-weight="700" text-anchor="middle">Energy</text>
      </g>
      <!-- Workforce -->
      <g class="topic tp-3" transform="translate(280, 120)">
        <circle cx="0" cy="0" r="22" fill="rgba(245,158,11,0.20)" stroke="#F59E0B" stroke-width="2"/>
        <text x="0" y="4" class="cloud" font-size="10" font-weight="700" text-anchor="middle">Workforce</text>
      </g>
      <!-- Biodiversity -->
      <g class="topic tp-4" transform="translate(160, 80)">
        <circle cx="0" cy="0" r="18" fill="rgba(245,158,11,0.18)" stroke="#F59E0B" stroke-width="2"/>
        <text x="0" y="4" class="cloud" font-size="9" font-weight="700" text-anchor="middle">Biodiv</text>
      </g>
      <!-- Water -->
      <g class="topic tp-5" transform="translate(220, 200)">
        <circle cx="0" cy="0" r="16" fill="rgba(12,201,168,0.20)" stroke="#0CC9A8" stroke-width="2"/>
        <text x="0" y="4" class="cloud" font-size="9" font-weight="700" text-anchor="middle">Water</text>
      </g>
      <!-- Governance -->
      <g class="topic tp-6" transform="translate(340, 200)">
        <circle cx="0" cy="0" r="16" fill="rgba(12,201,168,0.20)" stroke="#0CC9A8" stroke-width="2"/>
        <text x="0" y="4" class="cloud" font-size="9" font-weight="700" text-anchor="middle">Gov</text>
      </g>
      <!-- Communities, bottom-left -->
      <g class="topic tp-7" transform="translate(90, 240)">
        <circle cx="0" cy="0" r="13" fill="rgba(12,201,168,0.16)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
        <text x="0" y="4" class="mist" font-size="9" font-weight="600" text-anchor="middle">Com</text>
      </g>
    </g>
  </g>

  <!-- Right: material topics summary -->
  <g transform="translate(700, 140)">
    <rect class="c1" x="0" y="0" width="340" height="370" rx="16" ry="16"/>
    <text x="20" y="32" class="cloud" font-size="13" font-weight="600">Material topics, ranked</text>
    <text x="20" y="52" class="mist" font-size="11">Scoring feeds CSRD ESRS gap analysis</text>
    <line x1="20" y1="68" x2="320" y2="68" class="hair"/>

    <g class="summary-row sr-1" transform="translate(20, 92)">
      <rect x="0" y="0" width="300" height="56" rx="10" fill="#11243F"/>
      <rect x="0" y="0" width="6" height="56" rx="3" class="red"/>
      <text x="20" y="22" class="cloud" font-size="12" font-weight="600">Climate change (E1)</text>
      <text x="20" y="42" class="mist digit" font-size="11">Impact 4.6, Financial 4.4</text>
      <text x="280" y="32" class="red digit" font-size="11" text-anchor="end" font-weight="700">HIGH</text>
    </g>
    <g class="summary-row sr-2" transform="translate(20, 160)">
      <rect x="0" y="0" width="300" height="56" rx="10" fill="#11243F"/>
      <rect x="0" y="0" width="6" height="56" rx="3" class="amber"/>
      <text x="20" y="22" class="cloud" font-size="12" font-weight="600">Own workforce (S1)</text>
      <text x="20" y="42" class="mist digit" font-size="11">Impact 3.8, Financial 3.2</text>
      <text x="280" y="32" class="amber digit" font-size="11" text-anchor="end" font-weight="700">MED</text>
    </g>
    <g class="summary-row sr-3" transform="translate(20, 228)">
      <rect x="0" y="0" width="300" height="56" rx="10" fill="#11243F"/>
      <rect x="0" y="0" width="6" height="56" rx="3" class="teal"/>
      <text x="20" y="22" class="cloud" font-size="12" font-weight="600">Biodiversity (E4)</text>
      <text x="20" y="42" class="mist digit" font-size="11">Impact 3.1, Financial 2.4</text>
      <text x="280" y="32" class="teal digit" font-size="11" text-anchor="end" font-weight="700">LOW</text>
    </g>

    <line x1="20" y1="304" x2="320" y2="304" class="hair"/>
    <text x="20" y="326" class="mist" font-size="11">Material topics, 9 of 23</text>
    <text x="20" y="346" class="mist digit" font-size="10">Plotted from 142 stakeholder responses</text>
  </g>

  <line x1="40" y1="552" x2="1040" y2="552" class="hair"/>
  <g transform="translate(40, 580)">
    <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.4">Stakeholder input is weighted per ESRS, output feeds CSRD assessment directly</text>
  </g>
</svg>
