<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="csrdStep1Title" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="csrdStep1Title">CSRD Checker Step 1: Enter your headcount</title>
  <defs>
    <style>
      .bg { fill: #0A1422; }
      .c1 { fill: #0F1B2E; }
      .c2 { fill: #11243F; }
      .hair { stroke: rgba(255,255,255,0.08); stroke-width: 1; fill: none; }
      .cloud { fill: #E8EEF7; }
      .mist { fill: #8A9DB8; }
      .teal { fill: #0CC9A8; }
      .green { fill: #22C55E; }
      .digit { font-variant-numeric: tabular-nums; }

      .digit-roll { opacity: 0; animation: digit-roll 6s cubic-bezier(0.4,0,0.2,1) infinite; animation-delay: 1.0s; }
      @keyframes digit-roll {
        0%, 16%  { opacity: 0; transform: translateY(8px); }
        28%, 95% { opacity: 1; transform: translateY(0); }
        100%     { opacity: 0; }
      }

      .person-row { opacity: 0; }
      .pr-1 { animation: pr-in 6s ease-out infinite; animation-delay: 0.3s; }
      .pr-2 { animation: pr-in 6s ease-out infinite; animation-delay: 0.5s; }
      .pr-3 { animation: pr-in 6s ease-out infinite; animation-delay: 0.7s; }
      .pr-4 { animation: pr-in 6s ease-out infinite; animation-delay: 0.9s; }
      @keyframes pr-in {
        0%, 4%   { opacity: 0; transform: translateY(4px); }
        16%, 95% { opacity: 1; transform: translateY(0); }
        100%     { opacity: 0; }
      }

      .progress { transform-origin: left; animation: progress 6s cubic-bezier(0.4,0,0.2,1) infinite; }
      @keyframes progress {
        0%, 6%   { transform: scaleX(0); }
        30%, 95% { transform: scaleX(0.25); }
        100%     { transform: scaleX(0.25); }
      }

      .cursor { animation: blink 1s steps(2, end) infinite; }
      @keyframes blink {
        0%, 50%   { opacity: 1; }
        50.01%, 100% { opacity: 0; }
      }

      @media (prefers-reduced-motion: reduce) {
        .digit-roll, .person-row, .pr-1, .pr-2, .pr-3, .pr-4, .progress, .cursor {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
        .progress { transform: scaleX(0.25) !important; }
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="620"/>

  <!-- Header -->
  <g transform="translate(40, 40)">
    <text x="0" y="14" class="teal" font-size="11" font-weight="600" letter-spacing="1.5">STEP 1 OF 4, HEADCOUNT</text>
    <text x="0" y="46" class="cloud" font-size="22" font-weight="600">How many people, group-wide?</text>
    <text x="0" y="68" class="mist" font-size="13">Full-time equivalent, including subsidiaries</text>
  </g>

  <!-- Wizard progress -->
  <g transform="translate(40, 120)">
    <rect x="0" y="0" width="1000" height="6" rx="3" fill="#1B2F4D"/>
    <rect class="progress" x="0" y="0" width="1000" height="6" rx="3" fill="#0CC9A8"/>
    <text x="0" y="26" class="teal digit" font-size="11" font-weight="600">Step 1 of 4</text>
    <text x="1000" y="26" class="mist digit" font-size="11" text-anchor="end">3 steps remaining</text>
  </g>

  <!-- Left, input panel -->
  <g transform="translate(40, 170)">
    <rect class="c1" x="0" y="0" width="600" height="340" rx="16" ry="16"/>
    <text x="40" y="46" class="cloud" font-size="14" font-weight="600">Full-time equivalent employees</text>
    <text x="40" y="68" class="mist" font-size="11">Across the entire group, averaged over the financial year</text>

    <!-- Big numeric input -->
    <g transform="translate(40, 100)">
      <rect x="0" y="0" width="520" height="120" rx="14" fill="#11243F" stroke="#0CC9A8" stroke-width="1.5"/>
      <g class="digit-roll" transform="translate(40, 40)">
        <text x="0" y="64" class="cloud digit" font-size="72" font-weight="700">1,284</text>
        <text x="260" y="64" class="cloud digit" font-size="72" font-weight="700"><tspan class="cursor">|</tspan></text>
      </g>
      <text x="500" y="106" class="mist digit" font-size="11" text-anchor="end">FTE</text>
    </g>

    <!-- Helper -->
    <g transform="translate(40, 260)">
      <rect x="0" y="0" width="520" height="44" rx="10" fill="rgba(12,201,168,0.08)"/>
      <text x="16" y="20" class="teal" font-size="11" font-weight="600" letter-spacing="0.5">CSRD THRESHOLD CHECK</text>
      <text x="16" y="36" class="cloud" font-size="11">More than 1,000 FTE, you may be in scope under Omnibus I</text>
    </g>
  </g>

  <!-- Right, breakdown -->
  <g transform="translate(660, 170)">
    <rect class="c1" x="0" y="0" width="380" height="340" rx="16" ry="16"/>
    <text x="20" y="32" class="cloud" font-size="13" font-weight="600">Per entity breakdown</text>
    <text x="20" y="52" class="mist" font-size="11">Includes consolidated subsidiaries</text>
    <line x1="20" y1="68" x2="360" y2="68" class="hair"/>

    <g transform="translate(20, 90)">
      <g class="person-row pr-1">
        <text x="0" y="14" class="cloud" font-size="12">Parent Co (UK)</text>
        <text x="340" y="14" class="cloud digit" font-size="12" text-anchor="end">412</text>
      </g>
      <g class="person-row pr-2" transform="translate(0, 36)">
        <text x="0" y="14" class="cloud" font-size="12">European Sub (DE)</text>
        <text x="340" y="14" class="cloud digit" font-size="12" text-anchor="end">528</text>
      </g>
      <g class="person-row pr-3" transform="translate(0, 72)">
        <text x="0" y="14" class="cloud" font-size="12">Iberia Sub (ES)</text>
        <text x="340" y="14" class="cloud digit" font-size="12" text-anchor="end">214</text>
      </g>
      <g class="person-row pr-4" transform="translate(0, 108)">
        <text x="0" y="14" class="cloud" font-size="12">Nordic Sub (SE)</text>
        <text x="340" y="14" class="cloud digit" font-size="12" text-anchor="end">130</text>
      </g>
      <line x1="0" y1="156" x2="340" y2="156" class="hair"/>
      <g transform="translate(0, 158)">
        <text x="0" y="20" class="mist" font-size="11" letter-spacing="0.6">TOTAL</text>
        <text x="340" y="20" class="teal digit" font-size="14" font-weight="700" text-anchor="end">1,284</text>
      </g>
    </g>

    <text x="20" y="304" class="mist digit" font-size="10">Source, your last filed annual report</text>
  </g>

  <line x1="40" y1="552" x2="1040" y2="552" class="hair"/>
  <g transform="translate(40, 580)">
    <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.4">Headcount alone does not decide scope, the next step adds turnover</text>
  </g>
</svg>
