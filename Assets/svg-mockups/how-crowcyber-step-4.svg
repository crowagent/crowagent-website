<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="cyberStep4Title" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="cyberStep4Title">CrowCyber Step 4: Submit and maintain</title>
  <defs>
    <style>
      .bg { fill: #0A1422; }
      .c1 { fill: #0F1B2E; }
      .c2 { fill: #11243F; }
      .hair { stroke: rgba(255,255,255,0.08); stroke-width: 1; fill: none; }
      .cloud { fill: #E8EEF7; }
      .mist { fill: #8A9DB8; }
      .teal { fill: #0CC9A8; }
      .green { fill: #22C55E; }
      .amber { fill: #F59E0B; }
      .digit { font-variant-numeric: tabular-nums; }

      .stamp { opacity: 0; transform-origin: center; transform-box: fill-box; animation: stamp-in 6s ease-out infinite; animation-delay: 2.2s; }
      @keyframes stamp-in {
        0%, 30%   { opacity: 0; transform: scale(1.4) rotate(-8deg); }
        45%, 95% { opacity: 1; transform: scale(1) rotate(-8deg); }
        100%      { opacity: 0; }
      }

      .doc-row { opacity: 0; }
      .doc-1 { animation: doc-in 6s ease-out infinite; animation-delay: 0.3s; }
      .doc-2 { animation: doc-in 6s ease-out infinite; animation-delay: 0.5s; }
      .doc-3 { animation: doc-in 6s ease-out infinite; animation-delay: 0.7s; }
      .doc-4 { animation: doc-in 6s ease-out infinite; animation-delay: 0.9s; }
      .doc-5 { animation: doc-in 6s ease-out infinite; animation-delay: 1.1s; }
      @keyframes doc-in {
        0%, 4%   { opacity: 0; transform: translateY(4px); }
        16%, 95% { opacity: 1; transform: translateY(0); }
        100%     { opacity: 0; }
      }

      .alert-pulse { animation: alert-pulse 1.8s cubic-bezier(0.4,0,0.2,1) infinite; transform-origin: center; transform-box: fill-box; }
      @keyframes alert-pulse {
        0%, 100% { transform: scale(1); opacity: 0.85; }
        50%      { transform: scale(1.15); opacity: 1; }
      }

      .timeline-dot { opacity: 0; }
      .tl-1 { animation: tl-in 6s ease-out infinite; animation-delay: 3.4s; }
      .tl-2 { animation: tl-in 6s ease-out infinite; animation-delay: 3.7s; }
      .tl-3 { animation: tl-in 6s ease-out infinite; animation-delay: 4.0s; }
      @keyframes tl-in {
        0%, 52%  { opacity: 0; }
        62%, 95% { opacity: 1; }
        100%     { opacity: 0; }
      }

      @media (prefers-reduced-motion: reduce) {
        .stamp, .doc-row, .doc-1, .doc-2, .doc-3, .doc-4, .doc-5,
        .alert-pulse, .timeline-dot, .tl-1, .tl-2, .tl-3 {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="620"/>

  <!-- Header -->
  <g transform="translate(40, 40)">
    <text x="0" y="14" class="teal" font-size="11" font-weight="600" letter-spacing="1.5">STEP 4, SUBMIT AND MAINTAIN</text>
    <text x="0" y="46" class="cloud" font-size="22" font-weight="600">Evidence pack out, alerts in</text>
    <text x="0" y="68" class="mist" font-size="13">Bundle for IASME, then 12-month staleness alerts keep you certified</text>
  </g>

  <!-- Evidence pack (left) -->
  <g transform="translate(40, 140)">
    <rect class="c1" x="0" y="0" width="520" height="370" rx="16" ry="16"/>
    <text x="20" y="34" class="cloud" font-size="13" font-weight="600">Evidence pack, ready for IASME</text>
    <text x="20" y="54" class="mist" font-size="11">66 controls evidenced, 1 bundled PDF</text>
    <line x1="20" y1="70" x2="500" y2="70" class="hair"/>

    <g class="doc-row doc-1" transform="translate(20, 90)">
      <rect x="0" y="0" width="480" height="38" rx="8" fill="#11243F"/>
      <g transform="translate(12, 8)">
        <path d="M0 0 L18 0 L26 8 L26 22 L0 22 Z" fill="#1B2F4D" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
        <path d="M18 0 L18 8 L26 8" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
      </g>
      <text x="52" y="24" class="cloud" font-size="12">A1, Firewall rules export</text>
      <text x="470" y="24" class="green digit" font-size="11" text-anchor="end">Linked</text>
    </g>
    <g class="doc-row doc-2" transform="translate(20, 134)">
      <rect x="0" y="0" width="480" height="38" rx="8" fill="#11243F"/>
      <g transform="translate(12, 8)">
        <path d="M0 0 L18 0 L26 8 L26 22 L0 22 Z" fill="#1B2F4D" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
        <path d="M18 0 L18 8 L26 8" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
      </g>
      <text x="52" y="24" class="cloud" font-size="12">A2, Patch state report</text>
      <text x="470" y="24" class="green digit" font-size="11" text-anchor="end">Linked</text>
    </g>
    <g class="doc-row doc-3" transform="translate(20, 178)">
      <rect x="0" y="0" width="480" height="38" rx="8" fill="#11243F"/>
      <g transform="translate(12, 8)">
        <path d="M0 0 L18 0 L26 8 L26 22 L0 22 Z" fill="#1B2F4D" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
        <path d="M18 0 L18 8 L26 8" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
      </g>
      <text x="52" y="24" class="cloud" font-size="12">A3, Admin account audit</text>
      <text x="470" y="24" class="green digit" font-size="11" text-anchor="end">Linked</text>
    </g>
    <g class="doc-row doc-4" transform="translate(20, 222)">
      <rect x="0" y="0" width="480" height="38" rx="8" fill="#11243F"/>
      <g transform="translate(12, 8)">
        <path d="M0 0 L18 0 L26 8 L26 22 L0 22 Z" fill="#1B2F4D" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
        <path d="M18 0 L18 8 L26 8" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
      </g>
      <text x="52" y="24" class="cloud" font-size="12">A4, MFA enforcement screenshot</text>
      <text x="470" y="24" class="green digit" font-size="11" text-anchor="end">Linked</text>
    </g>
    <g class="doc-row doc-5" transform="translate(20, 266)">
      <rect x="0" y="0" width="480" height="38" rx="8" fill="#11243F"/>
      <g transform="translate(12, 8)">
        <path d="M0 0 L18 0 L26 8 L26 22 L0 22 Z" fill="#1B2F4D" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
        <path d="M18 0 L18 8 L26 8" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
      </g>
      <text x="52" y="24" class="cloud" font-size="12">A5, EDR policy export</text>
      <text x="470" y="24" class="green digit" font-size="11" text-anchor="end">Linked</text>
    </g>

    <text x="20" y="338" class="mist digit" font-size="10">Pack ID, CR-2026-118-04, generated 2 minutes ago</text>

    <!-- Stamp -->
    <g class="stamp" transform="translate(390, 320)">
      <circle cx="55" cy="0" r="44" fill="none" stroke="#22C55E" stroke-width="2.5"/>
      <text x="55" y="-4" class="green" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="0.5">READY TO</text>
      <text x="55" y="12" class="green" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="0.5">SUBMIT</text>
    </g>
  </g>

  <!-- Right panel: maintenance timeline -->
  <g transform="translate(590, 140)">
    <rect class="c1" x="0" y="0" width="450" height="370" rx="16" ry="16"/>
    <text x="20" y="34" class="cloud" font-size="13" font-weight="600">Maintenance and staleness alerts</text>
    <text x="20" y="54" class="mist" font-size="11">Renewal countdown, 12 months from cert date</text>
    <line x1="20" y1="70" x2="430" y2="70" class="hair"/>

    <!-- Timeline -->
    <line x1="50" y1="110" x2="50" y2="320" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>

    <g class="timeline-dot tl-1" transform="translate(0, 110)">
      <circle cx="50" cy="0" r="9" fill="#0CC9A8"/>
      <text x="74" y="-2" class="cloud" font-size="12" font-weight="600">Certificate issued</text>
      <text x="74" y="14" class="mist digit" font-size="10">12 May 2026, IASME</text>
    </g>
    <g class="timeline-dot tl-2" transform="translate(0, 190)">
      <g class="alert-pulse">
        <circle cx="50" cy="0" r="9" fill="#F59E0B"/>
      </g>
      <text x="74" y="-2" class="cloud" font-size="12" font-weight="600">90-day MFA refresh due</text>
      <text x="74" y="14" class="mist digit" font-size="10">10 Aug 2026, 2 endpoints flagged</text>
    </g>
    <g class="timeline-dot tl-3" transform="translate(0, 270)">
      <circle cx="50" cy="0" r="9" fill="rgba(255,255,255,0.25)"/>
      <text x="74" y="-2" class="cloud" font-size="12" font-weight="600">Renewal window opens</text>
      <text x="74" y="14" class="mist digit" font-size="10">12 Apr 2027, evidence pre-checked</text>
    </g>
  </g>

  <line x1="40" y1="552" x2="1040" y2="552" class="hair"/>
  <g transform="translate(40, 580)">
    <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.4">Renewal is never a fire drill, alerts queue work as evidence ages</text>
  </g>
</svg>
