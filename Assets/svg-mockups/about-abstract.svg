<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1067" role="img" aria-label="Orbital concentric arcs with a slow rotating constellation in CrowAgent teal and sky" preserveAspectRatio="xMidYMid slice">
  <title>CrowAgent about, orbital constellation abstract</title>
  <desc>Concentric orbital arcs around a soft teal core, with a slow rotating constellation of star dots. Decorative; no data.</desc>
  <defs>
    <linearGradient id="aboutArc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0CC9A8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#0CC9A8" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#5BC8FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aboutArc2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5BC8FF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#5BC8FF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0CC9A8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes ab-rot{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
    @keyframes ab-rot-rev{0%{transform:rotate(0)}100%{transform:rotate(-360deg)}}
    @keyframes ab-pulse{0%,100%{opacity:.85;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
    @keyframes ab-tw{0%,100%{opacity:.35}50%{opacity:.95}}
    #ab-orbit-slow{transform-origin:800px 533px;animation:ab-rot 45s linear infinite}
    #ab-orbit-fast{transform-origin:800px 533px;animation:ab-rot-rev 38s linear infinite}
    #ab-stars{transform-origin:800px 533px;animation:ab-rot 42s linear infinite}
    #ab-core{transform-origin:800px 533px;animation:ab-pulse 36s ease-in-out infinite}
    .ab-tw{animation:ab-tw 32s ease-in-out infinite}
    .ab-tw:nth-child(2n){animation-duration:38s}
    .ab-tw:nth-child(3n){animation-duration:44s}
    @media (prefers-reduced-motion:reduce){*{animation:none!important;transform:none!important}}
  </style>

  <!-- Soft core glow -->
  <g id="ab-core">
    <circle cx="800" cy="533" r="220" fill="#0CC9A8" opacity="0.18"/>
    <circle cx="800" cy="533" r="120" fill="#5BC8FF" opacity="0.18"/>
  </g>

  <!-- Outer orbit ring (slow) -->
  <g id="ab-orbit-slow" fill="none" stroke-linecap="round">
    <ellipse cx="800" cy="533" rx="620" ry="220" stroke="#5BC8FF" stroke-opacity="0.55" stroke-width="1.4"/>
    <ellipse cx="800" cy="533" rx="540" ry="180" stroke="#0CC9A8" stroke-opacity="0.6" stroke-width="1.4"/>
    <path d="M 220 533 A 540 180 0 0 1 1380 533" stroke="url(#aboutArc)" stroke-width="2.4" opacity="0.95"/>
    <circle cx="1340" cy="533" r="5" fill="#0CC9A8" opacity="0.95"/>
    <circle cx="260" cy="533" r="4" fill="#5BC8FF" opacity="0.85"/>
  </g>

  <!-- Inner orbit ring (fast, reverse) -->
  <g id="ab-orbit-fast" fill="none" stroke-linecap="round">
    <ellipse cx="800" cy="533" rx="420" ry="140" stroke="#5BC8FF" stroke-opacity="0.65" stroke-width="1.4"/>
    <ellipse cx="800" cy="533" rx="320" ry="100" stroke="#0CC9A8" stroke-opacity="0.7" stroke-width="1.4"/>
    <path d="M 480 533 A 320 100 0 0 0 1120 533" stroke="url(#aboutArc2)" stroke-width="2.2" opacity="0.9"/>
    <circle cx="480" cy="533" r="3.5" fill="#5BC8FF" opacity="0.9"/>
    <circle cx="1120" cy="533" r="3.5" fill="#0CC9A8" opacity="0.9"/>
  </g>

  <!-- Constellation (rotating star field) -->
  <g id="ab-stars" fill="#E8F0FA">
    <circle class="ab-tw" cx="280" cy="240" r="1.8" opacity="0.5"/>
    <circle class="ab-tw" cx="460" cy="180" r="1.4" opacity="0.45"/>
    <circle class="ab-tw" cx="640" cy="280" r="2" opacity="0.5"/>
    <circle class="ab-tw" cx="900" cy="160" r="1.5" opacity="0.45"/>
    <circle class="ab-tw" cx="1120" cy="240" r="1.7" opacity="0.5"/>
    <circle class="ab-tw" cx="1300" cy="320" r="1.4" opacity="0.45"/>
    <circle class="ab-tw" cx="220" cy="780" r="1.6" opacity="0.45"/>
    <circle class="ab-tw" cx="420" cy="860" r="1.8" opacity="0.5"/>
    <circle class="ab-tw" cx="680" cy="820" r="1.4" opacity="0.45"/>
    <circle class="ab-tw" cx="940" cy="900" r="1.7" opacity="0.5"/>
    <circle class="ab-tw" cx="1180" cy="780" r="1.5" opacity="0.45"/>
    <circle class="ab-tw" cx="1380" cy="860" r="1.6" opacity="0.5"/>
    <!-- Connecting hairlines (secondary) -->
    <line x1="280" y1="240" x2="460" y2="180" stroke="#5BC8FF" stroke-width="0.8" opacity="0.4"/>
    <line x1="460" y1="180" x2="640" y2="280" stroke="#5BC8FF" stroke-width="0.8" opacity="0.4"/>
    <line x1="900" y1="160" x2="1120" y2="240" stroke="#0CC9A8" stroke-width="0.8" opacity="0.4"/>
    <line x1="420" y1="860" x2="680" y2="820" stroke="#0CC9A8" stroke-width="0.8" opacity="0.4"/>
    <line x1="940" y1="900" x2="1180" y2="780" stroke="#5BC8FF" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Central marker (pulse highlight) -->
  <circle cx="800" cy="533" r="7" fill="#C2FF57" opacity="0.95"/>
  <circle cx="800" cy="533" r="15" fill="none" stroke="#0CC9A8" stroke-width="1.2" opacity="0.6"/>
  <circle cx="800" cy="533" r="28" fill="none" stroke="#0CC9A8" stroke-width="1" opacity="0.4"/>
</svg>
