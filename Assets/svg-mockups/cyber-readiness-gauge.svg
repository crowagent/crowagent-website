  <text x="1126" y="278" text-anchor="middle" class="b steel" font-size="10" font-weight="600">ANSWERED</text>
  <text x="1278" y="278" text-anchor="middle" class="b steel" font-size="10" font-weight="600">EVIDENCE</text>
  <text x="1490" y="278" text-anchor="end" class="b steel" font-size="10" font-weight="600">SCORE</text>
  <line x1="752" y1="286" x2="1508" y2="286" stroke="#0D2847"/>
  <!-- Row helper duplication: 5 rows -->
  <!-- 1 Firewalls 94% -->
  <g transform="translate(0,310)">
    <text x="752" class="b cloud" font-size="13" font-weight="600">Firewalls and routers</text>
    <text x="752" y="20" class="b steel" font-size="11">Boundary firewalls · default deny · admin password</text>
    <rect x="752" y="30" width="354" height="12" rx="6" fill="#0D2847"/>
    <rect x="752" y="30" width="333" height="12" rx="6" fill="#0CC9A8"/>
    <text x="1126" text-anchor="middle" class="m cloud" font-size="12" font-weight="700">8/9</text>
    <g transform="translate(1248,-10)">
      <rect width="10" height="14" rx="2" fill="#0CC9A8"/><rect x="13" width="10" height="14" rx="2" fill="#0CC9A8"/><rect x="26" width="10" height="14" rx="2" fill="#0CC9A8"/><rect x="39" width="10" height="14" rx="2" fill="#0CC9A8"/><rect x="52" width="10" height="14" rx="2" fill="#0CC9A8" fill-opacity="0.4"/>
    </g>
    <text x="1490" text-anchor="end" class="m teal" font-size="14" font-weight="700">94%</text>
  </g>
  <!-- 2 Secure config 86% -->
