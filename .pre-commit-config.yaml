# Pre-commit hooks for CrowAgent Website
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # ESLint (Task 34.5)
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.5.0
    hooks:
      - id: eslint
        files: \.(js)$
        exclude: (node_modules|\.min\.js)
        args: ['--fix', '--no-eslintrc', '--rule', '{"no-unused-vars": "warn", "no-undef": "off", "no-console": "off"}']
        additional_dependencies:
          - eslint@9.5.0

  # Stylelint (Task 34.5)
  - repo: local
    hooks:
      - id: stylelint
        name: Stylelint
        entry: npx stylelint --fix
        language: node
        files: \.(css)$
        exclude: (node_modules|\.min\.css)
        additional_dependencies:
          - stylelint@16.6.0
          - stylelint-config-standard@36.0.0

  # Prettier (Task 34.5)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [html, css, javascript, json]
        exclude: (node_modules|\.min\.)
        args: ['--write', '--single-quote', '--print-width', '120']

  # HTMLHint (Task 34.5)
  - repo: local
    hooks:
      - id: htmlhint
        name: HTMLHint
        entry: npx htmlhint
        language: node
        files: \.html$
        exclude: node_modules
        additional_dependencies:
          - htmlhint@1.1.4
