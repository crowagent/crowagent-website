<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360" preserveAspectRatio="xMidYMid meet" role="img" aria-label="CrowCash invoice ageing dashboard with overdue buckets compressing as recoveries land">
  <title>CrowCash dashboard preview</title>
  <defs>
    <linearGradient id="csBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A1F3A"/>
      <stop offset="1" stop-color="#040E1A"/>
    </linearGradient>
    <linearGradient id="csAcc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0CC9A8"/>
      <stop offset="1" stop-color="#5BC8FF"/>
    </linearGradient>
  </defs>
  <style>@media (prefers-reduced-motion: reduce){animate,animateTransform{display:none}}</style>
  <rect width="600" height="360" rx="14" fill="url(#csBg)"/>
  <rect x="1" y="1" width="598" height="358" rx="13" fill="none" stroke="#0CC9A8" stroke-opacity="0.18"/>

  <!-- chrome -->
  <circle cx="24" cy="24" r="4" fill="#8A9DB8" fill-opacity="0.4"/>
  <circle cx="40" cy="24" r="4" fill="#8A9DB8" fill-opacity="0.4"/>
  <circle cx="56" cy="24" r="4" fill="#8A9DB8" fill-opacity="0.4"/>
  <rect x="80" y="18" width="170" height="12" rx="6" fill="#0F2D52"/>
  <text x="540" y="28" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8A9DB8" text-anchor="end">Ledger ageing</text>

  <text x="32" y="78" font-family="Plus Jakarta Sans,system-ui,sans-serif" font-size="14" fill="#B8CCE0" font-weight="600">Days sales outstanding</text>

  <!-- DSO big number, descending -->
  <g font-family="Plus Jakarta Sans,system-ui,sans-serif" font-size="56" font-weight="700" fill="#E8F0FA">
    <text x="32" y="140" opacity="0">58<animate attributeName="opacity" values="1;0;0;0;0;0" dur="4.5s" repeatCount="indefinite"/></text>
    <text x="32" y="140" opacity="0">52<animate attributeName="opacity" values="0;1;0;0;0;0" dur="4.5s" repeatCount="indefinite"/></text>
    <text x="32" y="140" opacity="0">46<animate attributeName="opacity" values="0;0;1;0;0;0" dur="4.5s" repeatCount="indefinite"/></text>
    <text x="32" y="140" opacity="0">41<animate attributeName="opacity" values="0;0;0;1;0;0" dur="4.5s" repeatCount="indefinite"/></text>
    <text x="32" y="140" opacity="0">37<animate attributeName="opacity" values="0;0;0;0;1;0" dur="4.5s" repeatCount="indefinite"/></text>
    <text x="32" y="140" opacity="0">34<animate attributeName="opacity" values="0;0;0;0;0;1" dur="4.5s" repeatCount="indefinite"/></text>
  </g>
  <text x="142" y="140" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#8A9DB8">days</text>
  <text x="142" y="160" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#0CC9A8">recovering</text>

  <!-- right KPI: recovered total cycling up -->
  <g transform="translate(360,90)" font-family="Plus Jakarta Sans,system-ui,sans-serif" font-weight="700" fill="#E8F0FA">
    <text font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8A9DB8" font-weight="400">Recovered this quarter</text>
    <g font-size="36">
      <text y="34" opacity="0">£18,420<animate attributeName="opacity" values="1;0;0;0;0;0" dur="4.5s" repeatCount="indefinite"/></text>
      <text y="34" opacity="0">£28,650<animate attributeName="opacity" values="0;1;0;0;0;0" dur="4.5s" repeatCount="indefinite"/></text>
      <text y="34" opacity="0">£41,200<animate attributeName="opacity" values="0;0;1;0;0;0" dur="4.5s" repeatCount="indefinite"/></text>
      <text y="34" opacity="0">£54,180<animate attributeName="opacity" values="0;0;0;1;0;0" dur="4.5s" repeatCount="indefinite"/></text>
      <text y="34" opacity="0">£62,940<animate attributeName="opacity" values="0;0;0;0;1;0" dur="4.5s" repeatCount="indefinite"/></text>
      <text y="34" opacity="0">£71,500<animate attributeName="opacity" values="0;0;0;0;0;1" dur="4.5s" repeatCount="indefinite"/></text>
    </g>
  </g>

  <!-- ageing buckets: compressing -->
  <g font-family="Inter,system-ui,sans-serif" font-size="11" fill="#B8CCE0">
    <text x="32" y="200" font-weight="600" fill="#B8CCE0">Overdue ageing buckets</text>

    <g transform="translate(32,218)">
      <text x="0" y="11" fill="#8A9DB8">0 to 30 days</text>
      <rect x="120" y="2" width="300" height="14" rx="3" fill="#0F2D52"/>
      <rect x="120" y="2" width="180" height="14" rx="3" fill="#0CC9A8" opacity="0.85">
        <animate attributeName="width" values="180;160;140;120;100;90" dur="4.5s" repeatCount="indefinite"/>
      </rect>
      <text x="436" y="12" fill="#B8CCE0">
        <tspan opacity="0">£12.4k<animate attributeName="opacity" values="1;0;0;0;0;0" dur="4.5s" repeatCount="indefinite"/></tspan>
      </text>
      <text x="436" y="12" fill="#B8CCE0">
        <tspan opacity="0">£10.8k<animate attributeName="opacity" values="0;1;0;0;0;0" dur="4.5s" repeatCount="indefinite"/></tspan>
      </text>
      <text x="436" y="12" fill="#B8CCE0">
        <tspan opacity="0">£9.4k<animate attributeName="opacity" values="0;0;1;0;0;0" dur="4.5s" repeatCount="indefinite"/></tspan>
      </text>
      <text x="436" y="12" fill="#B8CCE0">
        <tspan opacity="0">£8.2k<animate attributeName="opacity" values="0;0;0;1;0;0" dur="4.5s" repeatCount="indefinite"/></tspan>
      </text>
      <text x="436" y="12" fill="#B8CCE0">
        <tspan opacity="0">£6.6k<animate attributeName="opacity" values="0;0;0;0;1;0" dur="4.5s" repeatCount="indefinite"/></tspan>
      </text>
      <text x="436" y="12" fill="#B8CCE0">
        <tspan opacity="0">£5.4k<animate attributeName="opacity" values="0;0;0;0;0;1" dur="4.5s" repeatCount="indefinite"/></tspan>
      </text>
    </g>

    <g transform="translate(32,244)">
      <text x="0" y="11" fill="#8A9DB8">31 to 60 days</text>
      <rect x="120" y="2" width="300" height="14" rx="3" fill="#0F2D52"/>
      <rect x="120" y="2" width="220" height="14" rx="3" fill="#DAA520" opacity="0.85">
        <animate attributeName="width" values="220;185;150;120;90;65" dur="4.5s" repeatCount="indefinite"/>
      </rect>
    </g>

    <g transform="translate(32,270)">
      <text x="0" y="11" fill="#8A9DB8">61 to 90 days</text>
      <rect x="120" y="2" width="300" height="14" rx="3" fill="#0F2D52"/>
      <rect x="120" y="2" width="160" height="14" rx="3" fill="#F87171" opacity="0.85">
        <animate attributeName="width" values="160;130;100;75;55;38" dur="4.5s" repeatCount="indefinite"/>
      </rect>
    </g>

    <g transform="translate(32,296)">
      <text x="0" y="11" fill="#8A9DB8">90+ days</text>
      <rect x="120" y="2" width="300" height="14" rx="3" fill="#0F2D52"/>
      <rect x="120" y="2" width="110" height="14" rx="3" fill="#F87171">
        <animate attributeName="width" values="110;85;65;45;28;15" dur="4.5s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- letter ping -->
  <g transform="translate(498,278)">
    <rect x="0" y="0" width="64" height="44" rx="6" fill="#0F2D52" stroke="#0CC9A8" stroke-opacity="0.4"/>
    <path d="M6 12 L32 28 L58 12" stroke="#0CC9A8" stroke-width="1.6" fill="none"/>
    <circle cx="56" cy="8" r="6" fill="#F87171">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- live indicator -->
  <circle cx="556" cy="78" r="4" fill="#0CC9A8">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="546" y="82" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#8A9DB8" text-anchor="end">Live</text>
</svg>
