<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <style>
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0A1F3A; }
      .bar1 { fill: #1A3A5C; }
      .bar2 { fill: #2A5580; }
      .bar3 { fill: #0AA88C; }
      .bar4 { fill: #0CC9A8; }
      .baseline { fill: #0CC9A8; }
    }
  </style>
  <rect class="bg" width="512" height="512" rx="96" fill="#FFFFFF"/>
  <!-- 4 ascending bars: navy → teal gradient -->
  <rect class="bar1" x="96"  y="320" width="64" height="96"  rx="12" fill="#0A1F3A"/>
  <rect class="bar2" x="184" y="240" width="64" height="176" rx="12" fill="#0D3558"/>
  <rect class="bar3" x="272" y="168" width="64" height="248" rx="12" fill="#0AA88C"/>
  <rect class="bar4" x="360" y="96"  width="64" height="320" rx="12" fill="#0CC9A8"/>
  <!-- Teal baseline -->
  <rect class="baseline" x="88" y="432" width="344" height="8" rx="4" fill="#0CC9A8"/>
</svg>
