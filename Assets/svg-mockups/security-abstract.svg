<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1067" role="img" aria-label="Geometric shield grid with a slow scanning beam in CrowAgent teal and sky" preserveAspectRatio="xMidYMid slice">
  <title>CrowAgent security, geometric shield abstract</title>
  <desc>A geometric shield lattice traversed by a slow teal scanning beam. Decorative; no data.</desc>
  <defs>
    <linearGradient id="secBeam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0CC9A8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#0CC9A8" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#0CC9A8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="secEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5BC8FF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#0CC9A8" stop-opacity="0.95"/>
    </linearGradient>
    <symbol id="secShield" viewBox="0 0 60 70">
      <path d="M30 4 L54 14 L54 36 C54 52 30 64 30 64 C30 64 6 52 6 36 L6 14 Z"
            fill="none" stroke="#5BC8FF" stroke-opacity="0.65" stroke-width="1.4"/>
    </symbol>
    <symbol id="secShieldBright" viewBox="0 0 60 70">
      <path d="M30 4 L54 14 L54 36 C54 52 30 64 30 64 C30 64 6 52 6 36 L6 14 Z"
            fill="none" stroke="url(#secEdge)" stroke-width="1.8"/>
    </symbol>
    <symbol id="secShieldLime" viewBox="0 0 60 70">
      <path d="M30 4 L54 14 L54 36 C54 52 30 64 30 64 C30 64 6 52 6 36 L6 14 Z"
            fill="none" stroke="#C2FF57" stroke-opacity="0.95" stroke-width="1.6"/>
    </symbol>
  </defs>

  <style>
    @keyframes sc-scan{0%{transform:translateX(-220px)}100%{transform:translateX(1820px)}}
    @keyframes sc-pulse{0%,100%{opacity:.55}50%{opacity:.95}}
    @keyframes sc-row{0%,100%{opacity:.6}50%{opacity:1}}
    #sc-beam{animation:sc-scan 40s linear infinite}
    .sc-bright{animation:sc-pulse 32s ease-in-out infinite}
    .sc-row-a{animation:sc-row 36s ease-in-out infinite}
    .sc-row-b{animation:sc-row 42s ease-in-out -8s infinite}
    @media (prefers-reduced-motion:reduce){*{animation:none!important;transform:none!important}}
  </style>

  <!-- Row 1 -->
  <g class="sc-row-a">
    <use href="#secShield" x="80"   y="100" width="60" height="70"/>
    <use href="#secShield" x="240"  y="100" width="60" height="70"/>
    <use href="#secShieldBright" x="400" y="100" width="60" height="70" class="sc-bright"/>
    <use href="#secShield" x="560"  y="100" width="60" height="70"/>
    <use href="#secShield" x="720"  y="100" width="60" height="70"/>
    <use href="#secShield" x="880"  y="100" width="60" height="70"/>
    <use href="#secShieldBright" x="1040" y="100" width="60" height="70" class="sc-bright"/>
    <use href="#secShield" x="1200" y="100" width="60" height="70"/>
    <use href="#secShield" x="1360" y="100" width="60" height="70"/>
  </g>

  <!-- Row 2 (offset) -->
  <g class="sc-row-b">
    <use href="#secShield" x="160"  y="220" width="60" height="70"/>
    <use href="#secShield" x="320"  y="220" width="60" height="70"/>
    <use href="#secShield" x="480"  y="220" width="60" height="70"/>
    <use href="#secShieldLime" x="640" y="220" width="60" height="70" class="sc-bright"/>
    <use href="#secShield" x="800"  y="220" width="60" height="70"/>
    <use href="#secShieldBright" x="960" y="220" width="60" height="70" class="sc-bright"/>
    <use href="#secShield" x="1120" y="220" width="60" height="70"/>
    <use href="#secShield" x="1280" y="220" width="60" height="70"/>
    <use href="#secShield" x="1440" y="220" width="60" height="70"/>
  </g>

  <!-- Row 3 -->
  <g class="sc-row-a">
    <use href="#secShield" x="80"   y="340" width="60" height="70"/>
    <use href="#secShieldBright" x="240" y="340" width="60" height="70" class="sc-bright"/>
    <use href="#secShield" x="400"  y="340" width="60" height="70"/>
    <use href="#secShield" x="560"  y="340" width="60" height="70"/>
    <use href="#secShieldBright" x="720" y="340" width="60" height="70" class="sc-bright"/>
    <use href="#secShield" x="880"  y="340" width="60" height="70"/>
    <use href="#secShield" x="1040" y="340" width="60" height="70"/>
    <use href="#secShield" x="1200" y="340" width="60" height="70"/>
    <use href="#secShieldLime" x="1360" y="340" width="60" height="70" class="sc-bright"/>
  </g>

  <!-- Row 4 (offset) -->
  <g class="sc-row-b">
    <use href="#secShield" x="160"  y="460" width="60" height="70"/>
    <use href="#secShield" x="320"  y="460" width="60" height="70"/>
    <use href="#secShieldBright" x="480" y="460" width="60" height="70" class="sc-bright"/>
    <use href="#secShield" x="640"  y="460" width="60" height="70"/>
    <use href="#secShield" x="800"  y="460" width="60" height="70"/>
    <use href="#secShield" x="960"  y="460" width="60" height="70"/>
    <use href="#secShield" x="1120" y="460" width="60" height="70"/>
    <use href="#secShieldBright" x="1280" y="460" width="60" height="70" class="sc-bright"/>
    <use href="#secShield" x="1440" y="460" width="60" height="70"/>
  </g>

  <!-- Row 5 -->
  <g class="sc-row-a">
    <use href="#secShield" x="80"   y="580" width="60" height="70"/>
    <use href="#secShield" x="240"  y="580" width="60" height="70"/>
    <use href="#secShield" x="400"  y="580" width="60" height="70"/>
    <use href="#secShield" x="560"  y="580" width="60" height="70"/>
    <use href="#secShield" x="720"  y="580" width="60" height="70"/>
    <use href="#secShieldBright" x="880" y="580" width="60" height="70" class="sc-bright"/>
    <use href="#secShield" x="1040" y="580" width="60" height="70"/>
    <use href="#secShield" x="1200" y="580" width="60" height="70"/>
    <use href="#secShield" x="1360" y="580" width="60" height="70"/>
  </g>

  <!-- Row 6 (offset) -->
  <g class="sc-row-b">
    <use href="#secShield" x="160"  y="700" width="60" height="70"/>
    <use href="#secShield" x="320"  y="700" width="60" height="70"/>
    <use href="#secShield" x="480"  y="700" width="60" height="70"/>
    <use href="#secShield" x="640"  y="700" width="60" height="70"/>
    <use href="#secShieldBright" x="800" y="700" width="60" height="70" class="sc-bright"/>
    <use href="#secShield" x="960"  y="700" width="60" height="70"/>
    <use href="#secShield" x="1120" y="700" width="60" height="70"/>
    <use href="#secShield" x="1280" y="700" width="60" height="70"/>
    <use href="#secShield" x="1440" y="700" width="60" height="70"/>
  </g>

  <!-- Scanning beam -->
  <g id="sc-beam">
    <rect x="0" y="0" width="140" height="1067" fill="url(#secBeam)" opacity="0.65"/>
    <line x1="70" y1="0" x2="70" y2="1067" stroke="#0CC9A8" stroke-width="1.2" opacity="0.65"/>
  </g>

  <!-- Sparkles -->
  <g fill="#E8F0FA">
    <circle cx="120" cy="60" r="1.4" opacity="0.45"/>
    <circle cx="380" cy="50" r="1.2" opacity="0.4"/>
    <circle cx="620" cy="60" r="1.4" opacity="0.45"/>
    <circle cx="900" cy="50" r="1.2" opacity="0.4"/>
    <circle cx="1180" cy="60" r="1.4" opacity="0.45"/>
    <circle cx="1460" cy="50" r="1.2" opacity="0.4"/>
    <circle cx="120" cy="820" r="1.4" opacity="0.45"/>
    <circle cx="380" cy="820" r="1.2" opacity="0.4"/>
    <circle cx="620" cy="820" r="1.4" opacity="0.45"/>
    <circle cx="900" cy="820" r="1.2" opacity="0.4"/>
    <circle cx="1180" cy="820" r="1.4" opacity="0.45"/>
    <circle cx="1460" cy="820" r="1.2" opacity="0.4"/>
  </g>
</svg>
