<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="csrdStep2Title" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="csrdStep2Title">CSRD Checker Step 2: Enter your turnover</title>
  <defs>
    <style>
      .bg { fill: #0A1422; }
      .c1 { fill: #0F1B2E; }
      .c2 { fill: #11243F; }
      .hair { stroke: rgba(255,255,255,0.08); stroke-width: 1; fill: none; }
      .cloud { fill: #E8EEF7; }
      .mist { fill: #8A9DB8; }
      .teal { fill: #0CC9A8; }
      .green { fill: #22C55E; }
      .amber { fill: #F59E0B; }
      .digit { font-variant-numeric: tabular-nums; }

      .digit-roll { opacity: 0; animation: digit-roll 6s cubic-bezier(0.4,0,0.2,1) infinite; animation-delay: 1.0s; }
      @keyframes digit-roll {
        0%, 16%  { opacity: 0; transform: translateY(10px); }
        30%, 95% { opacity: 1; transform: translateY(0); }
        100%     { opacity: 0; }
      }

      .threshold-bar { transform-origin: left; animation: th-grow 6s cubic-bezier(0.4,0,0.2,1) infinite; animation-delay: 0.5s; }
      @keyframes th-grow {
        0%, 8%   { transform: scaleX(0); }
        45%, 95% { transform: scaleX(0.92); }
        100%     { transform: scaleX(0.92); }
      }

      .marker-pop { opacity: 0; animation: marker-in 6s ease-out infinite; animation-delay: 2.6s; }
      @keyframes marker-in {
        0%, 38%  { opacity: 0; transform: translateY(-6px); }
        50%, 95% { opacity: 1; transform: translateY(0); }
        100%     { opacity: 0; }
      }

      .progress { transform-origin: left; animation: progress 6s cubic-bezier(0.4,0,0.2,1) infinite; }
      @keyframes progress {
        0%, 6%   { transform: scaleX(0); }
        30%, 95% { transform: scaleX(0.50); }
        100%     { transform: scaleX(0.50); }
      }

      .cursor { animation: blink 1s steps(2, end) infinite; }
      @keyframes blink {
        0%, 50%   { opacity: 1; }
        50.01%, 100% { opacity: 0; }
      }

      @media (prefers-reduced-motion: reduce) {
        .digit-roll, .threshold-bar, .marker-pop, .progress, .cursor {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
        .threshold-bar { transform: scaleX(0.92) !important; }
        .progress { transform: scaleX(0.50) !important; }
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="620"/>

  <!-- Header -->
  <g transform="translate(40, 40)">
    <text x="0" y="14" class="teal" font-size="11" font-weight="600" letter-spacing="1.5">STEP 2 OF 4, TURNOVER</text>
    <text x="0" y="46" class="cloud" font-size="22" font-weight="600">Net turnover, last financial year</text>
    <text x="0" y="68" class="mist" font-size="13">Consolidated revenue, expressed in EUR</text>
  </g>

  <!-- Wizard progress -->
  <g transform="translate(40, 120)">
    <rect x="0" y="0" width="1000" height="6" rx="3" fill="#1B2F4D"/>
    <rect class="progress" x="0" y="0" width="1000" height="6" rx="3" fill="#0CC9A8"/>
    <text x="0" y="26" class="teal digit" font-size="11" font-weight="600">Step 2 of 4</text>
    <text x="1000" y="26" class="mist digit" font-size="11" text-anchor="end">2 steps remaining</text>
  </g>

  <!-- Left, input panel -->
  <g transform="translate(40, 170)">
    <rect class="c1" x="0" y="0" width="600" height="340" rx="16" ry="16"/>
    <text x="40" y="46" class="cloud" font-size="14" font-weight="600">Consolidated net turnover</text>
    <text x="40" y="68" class="mist" font-size="11">Group revenue from the last filed annual report</text>

    <!-- Big numeric input -->
    <g transform="translate(40, 100)">
      <rect x="0" y="0" width="520" height="120" rx="14" fill="#11243F" stroke="#0CC9A8" stroke-width="1.5"/>
      <g class="digit-roll" transform="translate(40, 40)">
        <text x="0" y="64" class="cloud digit" font-size="68" font-weight="700">€ 612,000,000</text>
        <text x="430" y="64" class="cloud digit" font-size="68" font-weight="700"><tspan class="cursor">|</tspan></text>
      </g>
      <text x="500" y="106" class="mist digit" font-size="11" text-anchor="end">EUR</text>
    </g>

    <!-- Currency converter helper -->
    <g transform="translate(40, 260)">
      <rect x="0" y="0" width="520" height="44" rx="10" fill="rgba(12,201,168,0.08)"/>
      <text x="16" y="20" class="teal" font-size="11" font-weight="600" letter-spacing="0.5">FX CONVERSION</text>
      <text x="16" y="36" class="cloud" font-size="11">Auto-converted from GBP at 12-month avg rate, 1 GBP = 1.16 EUR</text>
    </g>
  </g>

  <!-- Right, threshold visual -->
  <g transform="translate(660, 170)">
    <rect class="c1" x="0" y="0" width="380" height="340" rx="16" ry="16"/>
    <text x="20" y="32" class="cloud" font-size="13" font-weight="600">Omnibus I threshold check</text>
    <text x="20" y="52" class="mist" font-size="11">Net turnover must exceed €450M to trigger</text>
    <line x1="20" y1="68" x2="360" y2="68" class="hair"/>

    <!-- Threshold scale -->
    <g transform="translate(20, 110)">
      <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.6">YOUR TURNOVER VS THRESHOLD</text>

      <!-- background scale -->
      <rect x="0" y="20" width="340" height="20" rx="10" fill="#1B2F4D"/>
      <!-- fill -->
      <rect class="threshold-bar" x="0" y="20" width="340" height="20" rx="10" fill="#0CC9A8"/>

      <!-- Threshold marker -->
      <g transform="translate(252, 0)">
        <line x1="0" y1="0" x2="0" y2="60" stroke="rgba(245,158,11,0.65)" stroke-width="2" stroke-dasharray="3 3"/>
        <rect x="-32" y="-22" width="64" height="20" rx="4" fill="rgba(245,158,11,0.18)"/>
        <text x="0" y="-8" class="amber digit" font-size="10" font-weight="700" text-anchor="middle">€450M</text>
      </g>

      <!-- Your marker -->
      <g class="marker-pop" transform="translate(312, 0)">
        <line x1="0" y1="0" x2="0" y2="60" stroke="#22C55E" stroke-width="2"/>
        <rect x="-40" y="60" width="80" height="22" rx="6" fill="rgba(34,197,94,0.18)" stroke="#22C55E" stroke-width="1"/>
        <text x="0" y="76" class="green digit" font-size="11" font-weight="700" text-anchor="middle">YOU, €612M</text>
      </g>

      <text x="0" y="56" class="mist digit" font-size="9">€0</text>
      <text x="340" y="56" class="mist digit" font-size="9" text-anchor="end">€700M</text>
    </g>

    <!-- Verdict preview -->
    <g class="marker-pop" transform="translate(20, 232)">
      <rect x="0" y="0" width="340" height="80" rx="12" fill="rgba(34,197,94,0.10)" stroke="rgba(34,197,94,0.5)" stroke-width="1"/>
      <text x="16" y="22" class="green" font-size="10" font-weight="700" letter-spacing="0.6">PRELIMINARY</text>
      <text x="16" y="44" class="cloud" font-size="13" font-weight="600">Both thresholds exceeded</text>
      <text x="16" y="64" class="mist" font-size="11">Likely in scope, full verdict in step 3</text>
    </g>
  </g>

  <line x1="40" y1="552" x2="1040" y2="552" class="hair"/>
  <g transform="translate(40, 580)">
    <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.4">CSRD applies if you exceed 2 of 3 thresholds, FTE, turnover, or balance sheet, under Directive (EU) 2026/470</text>
  </g>
</svg>
