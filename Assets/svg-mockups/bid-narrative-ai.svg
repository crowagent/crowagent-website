  <text x="772" y="426" class="b" font-size="11" font-weight="700" fill="#A78BFA">NT24 · 480 hours of SME training · £11,606 SVB proxy</text>
  <rect x="772" y="436" width="540" height="9" rx="2" fill="#E8F0FA" opacity="0.7"/>
  <rect x="772" y="450" width="600" height="9" rx="2" fill="#E8F0FA" opacity="0.7"/>

  <text x="752" y="492" class="b" font-size="12" font-weight="700" fill="#E8F0FA">Apprenticeships and equal opportunity</text>
  <rect x="752" y="508" width="756" height="9" rx="2" fill="#B8CCE0" opacity="0.85"/>
  <rect x="752" y="524" width="730" height="9" rx="2" fill="#B8CCE0" opacity="0.85"/>
  <rect x="752" y="540" width="688" height="9" rx="2" fill="#B8CCE0" opacity="0.85"/>

  <rect x="752" y="558" width="756" height="58" rx="8" fill="#A78BFA" fill-opacity="0.10" stroke="#A78BFA" stroke-opacity="0.4"/>
  <text x="772" y="580" class="b" font-size="11" font-weight="700" fill="#A78BFA">NT81 · 4 level-3 apprenticeships · £73,812 SVB proxy</text>
  <rect x="772" y="590" width="540" height="9" rx="2" fill="#E8F0FA" opacity="0.7"/>
  <rect x="772" y="604" width="600" height="9" rx="2" fill="#E8F0FA" opacity="0.7"/>

  <text x="752" y="646" class="b" font-size="12" font-weight="700" fill="#E8F0FA">Local supply chain</text>
  <rect x="752" y="662" width="756" height="9" rx="2" fill="#B8CCE0" opacity="0.85"/>
  <rect x="752" y="678" width="700" height="9" rx="2" fill="#B8CCE0" opacity="0.85"/>
  <rect x="752" y="694" width="668" height="9" rx="2" fill="#B8CCE0" opacity="0.85"/>
  <rect x="752" y="710" width="430" height="9" rx="2" fill="#B8CCE0" opacity="0.6"/>
  <!-- Cursor -->
  <rect x="1188" y="704" width="10" height="14" fill="#0CC9A8">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Footer -->
  <line x1="752" y1="780" x2="1508" y2="780" stroke="#0D2847"/>
  <text x="752" y="808" class="b" font-size="11" fill="#8A9DB8">432 words · Oxford SVB proxy total: £126,618 · Threshold met</text>
  <rect x="1340" y="792" width="80" height="32" rx="16" fill="#0D2847"/>
  <text x="1380" y="813" text-anchor="middle" class="b" font-size="11" fill="#E8F0FA">Re-draft</text>
  <rect x="1428" y="792" width="80" height="32" rx="16" fill="#0CC9A8"/>
  <text x="1468" y="813" text-anchor="middle" class="b" font-size="11" font-weight="700" fill="#040E1A">Approve</text>
