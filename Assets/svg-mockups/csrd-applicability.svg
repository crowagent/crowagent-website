<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="CSRD Checker mockup with three-step wizard, in-scope versus out-of-scope matrix, and regulatory citation panel">
  <title>CSRD Checker (Omnibus I)</title>
  <desc>Three-step wizard with progress dots, two-by-two scope matrix labelled in-scope and out-of-scope, and a regulatory citation panel for Directive EU 2026/470 Omnibus I.</desc>
  <defs>
    <linearGradient id="bgG7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#040E1A"/>
      <stop offset="1" stop-color="#061525"/>
    </linearGradient>
  </defs>
  <style>
    .f { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    .b { font-family: 'Inter', system-ui, sans-serif; }
    .m { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  </style>

  <rect width="1600" height="900" fill="url(#bgG7)"/>

  <!-- Window chrome -->
  <rect x="0" y="0" width="1600" height="44" fill="#0A1F3A"/>
  <circle cx="22" cy="22" r="6" fill="#EF4444"/>
  <circle cx="44" cy="22" r="6" fill="#F59E0B"/>
  <circle cx="66" cy="22" r="6" fill="#0CC9A8"/>
  <rect x="600" y="11" width="400" height="22" rx="11" fill="#040E1A"/>
  <text x="800" y="26" text-anchor="middle" class="b" font-size="11" fill="#8A9DB8">app.crowagent.ai/csrd</text>

  <!-- Top bar -->
  <rect x="0" y="44" width="1600" height="64" fill="#0A1F3A"/>
  <line x1="0" y1="108" x2="1600" y2="108" stroke="#0D2847"/>
  <circle cx="44" cy="76" r="14" fill="#5BC8FF"/>
  <text x="44" y="82" text-anchor="middle" class="f" font-size="14" font-weight="700" fill="#040E1A">€</text>
  <text x="68" y="81" class="f" font-size="17" font-weight="700" fill="#E8F0FA">CSRD Checker</text>
  <text x="200" y="81" class="b" font-size="13" fill="#8A9DB8">Omnibus I scope test · 60 seconds · no account required</text>

  <!-- Wizard progress dots -->
  <text x="68" y="160" class="b" font-size="11" font-weight="600" fill="#8A9DB8">STEP 2 OF 3</text>

  <circle cx="92" cy="190" r="14" fill="#0CC9A8"/>
  <path d="M86 190 L91 195 L100 186" stroke="#040E1A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="92" y="226" text-anchor="middle" class="b" font-size="11" font-weight="600" fill="#E8F0FA">Headcount</text>
  <line x1="106" y1="190" x2="172" y2="190" stroke="#0CC9A8" stroke-width="2"/>

  <circle cx="186" cy="190" r="14" fill="#0CC9A8"/>
  <text x="186" y="195" text-anchor="middle" class="f" font-size="13" font-weight="700" fill="#040E1A">2</text>
  <text x="186" y="226" text-anchor="middle" class="b" font-size="11" font-weight="600" fill="#E8F0FA">Turnover</text>
  <line x1="200" y1="190" x2="266" y2="190" stroke="#0D2847" stroke-width="2" stroke-dasharray="3 3"/>

  <circle cx="280" cy="190" r="14" fill="#0D2847" stroke="#0D2847"/>
  <text x="280" y="195" text-anchor="middle" class="f" font-size="13" font-weight="700" fill="#8A9DB8">3</text>
  <text x="280" y="226" text-anchor="middle" class="b" font-size="11" fill="#8A9DB8">Result</text>

  <!-- Question card -->
  <rect x="68" y="262" width="700" height="362" rx="14" fill="#0A1F3A" stroke="#0D2847"/>
  <text x="92" y="298" class="f" font-size="22" font-weight="700" fill="#E8F0FA">Annual turnover</text>
  <text x="92" y="324" class="b" font-size="13" fill="#8A9DB8">EU consolidated revenue for the most recent financial year</text>

  <!-- Choice 1 -->
  <rect x="92" y="350" width="652" height="60" rx="10" fill="#0D2847"/>
  <circle cx="120" cy="380" r="10" fill="none" stroke="#5BC8FF" stroke-width="2"/>
  <text x="148" y="376" class="b" font-size="14" font-weight="600" fill="#E8F0FA">Less than €50M</text>
  <text x="148" y="394" class="b" font-size="11" fill="#8A9DB8">Below the SME threshold — likely out of CSRD scope</text>

  <!-- Choice 2 -->
  <rect x="92" y="422" width="652" height="60" rx="10" fill="#0D2847"/>
  <circle cx="120" cy="452" r="10" fill="none" stroke="#5BC8FF" stroke-width="2"/>
  <text x="148" y="448" class="b" font-size="14" font-weight="600" fill="#E8F0FA">Between €50M and €450M</text>
  <text x="148" y="466" class="b" font-size="11" fill="#8A9DB8">Mid-market — below Omnibus I large-undertaking gate</text>

  <!-- Choice 3 (selected) -->
  <rect x="92" y="494" width="652" height="60" rx="10" fill="#5BC8FF" fill-opacity="0.12" stroke="#5BC8FF"/>
  <circle cx="120" cy="524" r="10" fill="#5BC8FF"/>
  <circle cx="120" cy="524" r="4" fill="#040E1A"/>
  <text x="148" y="520" class="b" font-size="14" font-weight="700" fill="#E8F0FA">More than €450M</text>
  <text x="148" y="538" class="b" font-size="11" fill="#5BC8FF">Above the Omnibus I turnover gate · headcount also required</text>

  <!-- Step navigation -->
  <rect x="92" y="574" width="120" height="36" rx="8" fill="#0D2847"/>
  <text x="152" y="597" text-anchor="middle" class="b" font-size="12" fill="#B8CCE0">← Back</text>

  <rect x="624" y="574" width="120" height="36" rx="8" fill="#0CC9A8"/>
  <text x="684" y="597" text-anchor="middle" class="b" font-size="12" font-weight="700" fill="#040E1A">Continue →</text>

  <!-- 2x2 matrix -->
  <rect x="800" y="262" width="500" height="362" rx="14" fill="#0A1F3A" stroke="#0D2847"/>
  <text x="824" y="298" class="f" font-size="14" font-weight="700" fill="#E8F0FA">Scope matrix · Omnibus I</text>
  <text x="824" y="316" class="b" font-size="11" fill="#8A9DB8">BOTH employees AND turnover must exceed for in-scope</text>

  <!-- Matrix axes labels -->
  <text x="1050" y="360" text-anchor="middle" class="b" font-size="11" font-weight="600" fill="#8A9DB8">EMPLOYEES →</text>
  <text x="824" y="500" class="b" font-size="11" font-weight="600" fill="#8A9DB8" transform="rotate(-90 824 500)">TURNOVER →</text>

  <!-- Matrix grid -->
  <!-- Top-left (out — high turnover, low employees) -->
  <rect x="850" y="376" width="200" height="100" rx="8" fill="#EF4444" fill-opacity="0.12" stroke="#EF4444" stroke-opacity="0.4"/>
  <text x="950" y="416" text-anchor="middle" class="b" font-size="11" font-weight="700" fill="#EF4444">OUT</text>
  <text x="950" y="436" text-anchor="middle" class="b" font-size="10" fill="#B8CCE0">&gt;€450M</text>
  <text x="950" y="450" text-anchor="middle" class="b" font-size="10" fill="#B8CCE0">≤1,000 staff</text>

  <!-- Top-right (in — high turnover, high employees) — your position -->
  <rect x="1054" y="376" width="200" height="100" rx="8" fill="#0CC9A8" fill-opacity="0.16" stroke="#0CC9A8" stroke-width="2"/>
  <text x="1154" y="416" text-anchor="middle" class="b" font-size="11" font-weight="700" fill="#0CC9A8">IN SCOPE</text>
  <text x="1154" y="436" text-anchor="middle" class="b" font-size="10" fill="#E8F0FA">&gt;€450M</text>
  <text x="1154" y="450" text-anchor="middle" class="b" font-size="10" fill="#E8F0FA">&gt;1,000 staff</text>
  <text x="1154" y="466" text-anchor="middle" class="b" font-size="10" font-weight="700" fill="#0CC9A8">You're here</text>

  <!-- Bottom-left (out — both low) -->
  <rect x="850" y="484" width="200" height="100" rx="8" fill="#EF4444" fill-opacity="0.12" stroke="#EF4444" stroke-opacity="0.4"/>
  <text x="950" y="524" text-anchor="middle" class="b" font-size="11" font-weight="700" fill="#EF4444">OUT</text>
  <text x="950" y="544" text-anchor="middle" class="b" font-size="10" fill="#B8CCE0">≤€450M</text>
  <text x="950" y="558" text-anchor="middle" class="b" font-size="10" fill="#B8CCE0">≤1,000 staff</text>

  <!-- Bottom-right (out — high employees, low turnover) -->
  <rect x="1054" y="484" width="200" height="100" rx="8" fill="#EF4444" fill-opacity="0.12" stroke="#EF4444" stroke-opacity="0.4"/>
  <text x="1154" y="524" text-anchor="middle" class="b" font-size="11" font-weight="700" fill="#EF4444">OUT</text>
  <text x="1154" y="544" text-anchor="middle" class="b" font-size="10" fill="#B8CCE0">≤€450M</text>
  <text x="1154" y="558" text-anchor="middle" class="b" font-size="10" fill="#B8CCE0">&gt;1,000 staff</text>

  <!-- Citation panel -->
  <rect x="68" y="650" width="1232" height="190" rx="14" fill="#0A1F3A" stroke="#0D2847"/>
  <rect x="68" y="650" width="6" height="190" fill="#5BC8FF"/>

  <text x="100" y="688" class="f" font-size="14" font-weight="700" fill="#E8F0FA">Regulatory citation</text>
  <rect x="100" y="704" width="220" height="22" rx="11" fill="#5BC8FF" fill-opacity="0.18"/>
  <text x="210" y="720" text-anchor="middle" class="m" font-size="11" font-weight="600" fill="#5BC8FF">Directive (EU) 2026/470</text>

  <text x="100" y="754" class="b" font-size="13" font-weight="600" fill="#E8F0FA">Omnibus I in force — 18 March 2026</text>
  <text x="100" y="776" class="b" font-size="12" fill="#B8CCE0">CSRD scope narrowed to large EU undertakings exceeding BOTH</text>
  <text x="100" y="794" class="b" font-size="12" fill="#B8CCE0">1,000 employees AND €450M turnover. Old 250 / €40M thresholds</text>
  <text x="100" y="812" class="b" font-size="12" fill="#B8CCE0">are superseded by Article 19a(1).</text>

  <rect x="990" y="704" width="280" height="32" rx="16" fill="#0D2847"/>
  <text x="1130" y="725" text-anchor="middle" class="b" font-size="12" fill="#E8F0FA">Read Omnibus I article</text>

  <rect x="990" y="752" width="280" height="60" rx="10" fill="#040E1A" stroke="#0D2847"/>
  <text x="1006" y="774" class="b" font-size="11" font-weight="600" fill="#8A9DB8">RESULT (PROVISIONAL)</text>
  <text x="1006" y="800" class="b" font-size="14" font-weight="700" fill="#0CC9A8">In scope · ESRS reporting required</text>

  <!-- Footer notice -->
  <rect x="1322" y="650" width="238" height="190" rx="14" fill="#0A1F3A" stroke="#0D2847"/>
  <text x="1346" y="688" class="f" font-size="13" font-weight="700" fill="#E8F0FA">Need a deeper review?</text>
  <text x="1346" y="710" class="b" font-size="11" fill="#B8CCE0">CrowESG runs the Layer 2</text>
  <text x="1346" y="724" class="b" font-size="11" fill="#B8CCE0">forward-risk and Layer 3</text>
  <text x="1346" y="738" class="b" font-size="11" fill="#B8CCE0">value-chain scope tests.</text>

  <rect x="1346" y="754" width="190" height="36" rx="8" fill="#5BC8FF"/>
  <text x="1441" y="777" text-anchor="middle" class="b" font-size="12" font-weight="700" fill="#040E1A">Open in CrowESG →</text>

  <text x="1346" y="816" class="b" font-size="10" fill="#8A9DB8">Free · no account required</text>
</svg>
