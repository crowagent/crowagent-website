<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="step2Title" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="step2Title">Step 2: AI analyses against compliance frameworks</title>
  <defs>
    <style>
      .bg { fill: #0A1422; }
      .c1 { fill: #0F1B2E; }
      .c2 { fill: #11243F; }
      .hair { stroke: rgba(255,255,255,0.08); stroke-width: 1; fill: none; }
      .cloud { fill: #E8EEF7; }
      .mist { fill: #8A9DB8; }
      .teal { fill: #0CC9A8; }
      .green-fill { fill: #22C55E; }
      .amber-fill { fill: #F59E0B; }
      .digit { font-variant-numeric: tabular-nums; }

      .central { animation: central-pulse 1.8s cubic-bezier(0.4,0,0.2,1) infinite; transform-origin: 540px 320px; transform-box: fill-box; }
      @keyframes central-pulse {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.04); }
      }

      .conn { stroke-dasharray: 2 6; stroke-dashoffset: 200; animation: conn-flow 4s linear infinite; }
      @keyframes conn-flow {
        to { stroke-dashoffset: 0; }
      }

      .node { opacity: 0; }
      .node-1 { animation: node-in 6s cubic-bezier(0.2,0.8,0.2,1) infinite; animation-delay: 0.6s; }
      .node-2 { animation: node-in 6s cubic-bezier(0.2,0.8,0.2,1) infinite; animation-delay: 0.7s; }
      .node-3 { animation: node-in 6s cubic-bezier(0.2,0.8,0.2,1) infinite; animation-delay: 0.8s; }
      .node-4 { animation: node-in 6s cubic-bezier(0.2,0.8,0.2,1) infinite; animation-delay: 0.9s; }
      .node-5 { animation: node-in 6s cubic-bezier(0.2,0.8,0.2,1) infinite; animation-delay: 1.0s; }
      .node-6 { animation: node-in 6s cubic-bezier(0.2,0.8,0.2,1) infinite; animation-delay: 1.1s; }
      @keyframes node-in {
        0%, 8%   { opacity: 0; transform: scale(0.7); }
        20%, 100% { opacity: 1; transform: scale(1); }
      }

      .check { opacity: 0; }
      .check-1 { animation: check-in 6s ease-out infinite; animation-delay: 2.4s; }
      .check-2 { animation: check-in 6s ease-out infinite; animation-delay: 2.7s; }
      .check-3 { animation: check-in 6s ease-out infinite; animation-delay: 3.0s; }
      .check-4 { animation: check-in 6s ease-out infinite; animation-delay: 3.3s; }
      .check-5 { animation: check-in 6s ease-out infinite; animation-delay: 3.6s; }
      .check-6 { animation: check-in 6s ease-out infinite; animation-delay: 3.9s; }
      @keyframes check-in {
        0%, 35%  { opacity: 0; }
        50%, 100% { opacity: 1; }
      }

      .stat { opacity: 0; animation: stat-in 6s ease-out infinite; }
      .stat-1 { animation-delay: 4.2s; }
      .stat-2 { animation-delay: 4.4s; }
      .stat-3 { animation-delay: 4.6s; }
      @keyframes stat-in {
        0%, 70%  { opacity: 0; transform: translateY(4px); }
        85%, 100% { opacity: 1; transform: translateY(0); }
      }

      @media (prefers-reduced-motion: reduce) {
        .central, .conn, .node, .node-1, .node-2, .node-3, .node-4, .node-5, .node-6,
        .check, .check-1, .check-2, .check-3, .check-4, .check-5, .check-6,
        .stat, .stat-1, .stat-2, .stat-3 {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
        .conn { stroke-dashoffset: 0 !important; }
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="620"/>

  <!-- Header -->
  <g transform="translate(40, 40)">
    <text x="0" y="14" class="teal" font-size="11" font-weight="600" letter-spacing="1.5">STEP 2, ANALYSE</text>
    <text x="0" y="46" class="cloud" font-size="22" font-weight="600">Cross-check against six frameworks</text>
    <text x="0" y="68" class="mist" font-size="13">Citation-anchored, evidence-linked, fully auditable</text>
  </g>

  <!-- Graph stage. Central node at (540, 320). Six framework nodes around it. -->

  <!-- Connecting dotted lines (drawn under nodes) -->
  <g stroke="rgba(255,255,255,0.20)" stroke-width="1.5" fill="none">
    <line class="conn" x1="540" y1="320" x2="280" y2="200"/>
    <line class="conn" x1="540" y1="320" x2="280" y2="320"/>
    <line class="conn" x1="540" y1="320" x2="280" y2="440"/>
    <line class="conn" x1="540" y1="320" x2="800" y2="200"/>
    <line class="conn" x1="540" y1="320" x2="800" y2="320"/>
    <line class="conn" x1="540" y1="320" x2="800" y2="440"/>
  </g>

  <!-- Central node -->
  <g class="central" transform="translate(540, 320)">
    <circle r="64" class="c1"/>
    <circle r="64" fill="none" stroke="#0CC9A8" stroke-width="2"/>
    <!-- Tiny portfolio icon, 3 stacked rects -->
    <rect x="-18" y="-20" width="36" height="8" rx="2" fill="#1B2F4D"/>
    <rect x="-18" y="-8" width="36" height="8" rx="2" fill="#1B2F4D"/>
    <rect x="-18" y="4" width="36" height="8" rx="2" fill="#1B2F4D"/>
    <text x="0" y="28" class="cloud" font-size="11" font-weight="600" text-anchor="middle">Portfolio</text>
  </g>

  <!-- Framework nodes -->
  <!-- Top-left: MEES (green) -->
  <g class="node node-1" transform="translate(280, 200)">
    <circle r="44" class="c2"/>
    <circle r="44" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
    <text x="0" y="0" class="cloud" font-size="13" font-weight="600" text-anchor="middle">MEES</text>
    <text x="0" y="14" class="mist" font-size="9" text-anchor="middle">SI 2015/962</text>
    <g class="check check-1">
      <circle cx="34" cy="-30" r="9" class="green-fill"/>
      <path d="M30 -30 L33 -27 L38 -33" stroke="#0A1422" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  <!-- Middle-left: PPN-002 (amber) -->
  <g class="node node-2" transform="translate(280, 320)">
    <circle r="44" class="c2"/>
    <circle r="44" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
    <text x="0" y="-2" class="cloud" font-size="12" font-weight="600" text-anchor="middle">PPN-002</text>
    <text x="0" y="14" class="mist" font-size="9" text-anchor="middle">Social Value</text>
    <g class="check check-2">
      <circle cx="34" cy="-30" r="9" class="amber-fill"/>
      <text x="34" y="-26" font-size="11" fill="#0A1422" font-weight="700" text-anchor="middle">!</text>
    </g>
  </g>
  <!-- Bottom-left: EPC reg (green) -->
  <g class="node node-3" transform="translate(280, 440)">
    <circle r="44" class="c2"/>
    <circle r="44" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
    <text x="0" y="-2" class="cloud" font-size="12" font-weight="600" text-anchor="middle">EPC reg</text>
    <text x="0" y="14" class="mist" font-size="9" text-anchor="middle">SI 2012/3118</text>
    <g class="check check-3">
      <circle cx="34" cy="-30" r="9" class="green-fill"/>
      <path d="M30 -30 L33 -27 L38 -33" stroke="#0A1422" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  <!-- Top-right: CSRD (green) -->
  <g class="node node-4" transform="translate(800, 200)">
    <circle r="44" class="c2"/>
    <circle r="44" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
    <text x="0" y="-2" class="cloud" font-size="13" font-weight="600" text-anchor="middle">CSRD</text>
    <text x="0" y="14" class="mist" font-size="9" text-anchor="middle">EU 2022/2464</text>
    <g class="check check-4">
      <circle cx="34" cy="-30" r="9" class="green-fill"/>
      <path d="M30 -30 L33 -27 L38 -33" stroke="#0A1422" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  <!-- Middle-right: Cyber Essentials (amber) -->
  <g class="node node-5" transform="translate(800, 320)">
    <circle r="44" class="c2"/>
    <circle r="44" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
    <text x="0" y="-2" class="cloud" font-size="11" font-weight="600" text-anchor="middle">Cyber Ess.</text>
    <text x="0" y="14" class="mist" font-size="9" text-anchor="middle">NCSC v3.2</text>
    <g class="check check-5">
      <circle cx="34" cy="-30" r="9" class="amber-fill"/>
      <text x="34" y="-26" font-size="11" fill="#0A1422" font-weight="700" text-anchor="middle">!</text>
    </g>
  </g>
  <!-- Bottom-right: EU 2026/470 (green) -->
  <g class="node node-6" transform="translate(800, 440)">
    <circle r="44" class="c2"/>
    <circle r="44" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
    <text x="0" y="-2" class="cloud" font-size="11" font-weight="600" text-anchor="middle">CSDDD</text>
    <text x="0" y="14" class="mist" font-size="9" text-anchor="middle">EU 2026/470</text>
    <g class="check check-6">
      <circle cx="34" cy="-30" r="9" class="green-fill"/>
      <path d="M30 -30 L33 -27 L38 -33" stroke="#0A1422" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Bottom stats row -->
  <g transform="translate(40, 540)">
    <g class="stat stat-1" transform="translate(0, 0)">
      <text x="0" y="0" class="mist" font-size="11">Properties scanned</text>
      <text x="0" y="22" class="cloud digit" font-size="20" font-weight="700">247</text>
    </g>
    <g class="stat stat-2" transform="translate(340, 0)">
      <text x="0" y="0" class="mist" font-size="11">On track to compliance</text>
      <text x="0" y="22" class="cloud digit" font-size="20" font-weight="700">78<tspan class="teal" font-size="14" font-weight="600">%</tspan></text>
    </g>
    <g class="stat stat-3" transform="translate(680, 0)">
      <text x="0" y="0" class="mist" font-size="11">Actions queued</text>
      <text x="0" y="22" class="cloud digit" font-size="20" font-weight="700">32</text>
    </g>
  </g>
</svg>
