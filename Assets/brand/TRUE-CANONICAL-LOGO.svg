<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 140" width="560" height="140">
  <defs>
    <!-- Ocean Gradient -->
    <radialGradient id="oceanGrad" cx="32%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#9bf2d4"/>
      <stop offset="22%" stop-color="#28d5a3"/>
      <stop offset="55%" stop-color="#0b8c75"/>
      <stop offset="85%" stop-color="#053a35"/>
      <stop offset="100%" stop-color="#021c19"/>
    </radialGradient>
    
    <!-- Atmospheric Halo -->
    <radialGradient id="haloGrad" cx="50%" cy="50%" r="60%">
      <stop offset="80%" stop-color="rgba(12,201,168,0)"/>
      <stop offset="95%" stop-color="rgba(52,224,168,0.55)"/>
      <stop offset="100%" stop-color="rgba(52,224,168,0)"/>
    </radialGradient>
    
    <!-- Land Tone Gradient -->
    <linearGradient id="landGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d9f5e5"/>
      <stop offset="100%" stop-color="#5bbd8d"/>
    </linearGradient>
    
    <!-- Clipping for the globe -->
    <clipPath id="globeClip">
      <circle cx="16" cy="16" r="13.5"/>
    </clipPath>

    <style>
      .wordmark { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; font-size: 42px; }
      .tagline { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 11px; letter-spacing: 2.8px; text-transform: uppercase; }
      .crow { fill: #E8F0FA; }
      .agent { fill: #0CC9A8; }
      .mist { fill: #0CC9A8; }
    </style>
  </defs>
  
  <!-- MANDATORY WHITE BOX LOGO MARK -->
  <g transform="translate(10, 20)">
    <rect width="100" height="100" rx="16" fill="#FFFFFF"/>
    <!-- 4 ascending bars -->
    <rect x="18" y="62" width="13" height="26" rx="3" fill="#0A1F3A"/> <!-- b1 -->
    <rect x="36" y="46" width="13" height="42" rx="3" fill="#0D3558"/> <!-- b2 -->
    <rect x="54" y="30" width="13" height="58" rx="3" fill="#0AA88C"/> <!-- b3 -->
    <rect x="72" y="14" width="13" height="74" rx="3" fill="#0CC9A8"/> <!-- b4 -->
    <!-- Teal baseline -->
    <rect x="14" y="90" width="72" height="3" rx="1.5" fill="#0CC9A8"/>
  </g>

  <!-- WORDMARK: CrowAgent (Split colour) -->
  <text x="130" y="75" class="wordmark">
    <tspan class="crow">Crow</tspan><tspan class="agent">Agent</tspan>
  </text>
  
  <!-- TAGLINE: Sustainability (Globe) Intelligence -->
  <text x="131" y="105" class="tagline mist">Sustainability</text>
  
  <!-- Inline high-fidelity globe -->
  <g transform="translate(255, 93) scale(0.45)">
    <!-- Halo -->
    <circle cx="16" cy="16" r="15.5" fill="url(#haloGrad)"/>
    <!-- Ocean -->
    <circle cx="16" cy="16" r="13.5" fill="url(#oceanGrad)" stroke="rgba(255,255,255,0.18)" stroke-width="0.4"/>
    <!-- Landmasses -->
    <g clip-path="url(#globeClip)" fill="url(#landGrad)" opacity="0.85">
      <path d="M19 7.5c1.6.6 2.6 2.2 2.4 4-0.2 1.8-1.6 2.4-2.6 3.2-1 0.9-0.5 2.1-0.2 3 0.5 1.4 0.1 2.8-1 3.6-1.4 0.9-2.6 0.3-3.1-0.8-0.4-0.9 0.1-2 0.9-2.5 0.7-0.4 1-1.1 0.7-1.8-0.5-1.4-2-1.3-2.7-2.5-0.7-1.2-0.2-2.7 0.8-3.4 0.9-0.7 2.4-0.5 3.2-1.4 0.6-0.7 0.9-1.6 1.6-1.4z"/>
      <path d="M9 9.5c1.2 0.4 2.1 1.5 2 2.7-0.1 1-0.9 1.6-1.6 2-0.7 0.4-0.8 1.2-0.4 1.9 0.6 1 0.4 2.2-0.4 2.9-0.9 0.8-2.1 0.6-2.7-0.3-0.5-0.8-0.3-1.8 0.4-2.4 0.5-0.4 0.6-1 0.3-1.5-0.8-1.3-1.5-2.7-0.5-4.1 0.6-0.8 1.7-1.5 2.9-1.2z"/>
      <path d="M12 22c0.9 0.2 1.4 1.1 1.1 1.9-0.3 0.8-1.1 1.4-1.9 1.3-0.7-0.1-1.1-0.8-0.9-1.5 0.2-0.7 0.9-1.3 1.7-1.7z"/>
      <ellipse cx="23" cy="21" rx="1.8" ry="0.9" transform="rotate(-15 23 21)"/>
      <ellipse cx="21" cy="11.5" rx="0.9" ry="0.5"/>
    </g>
    <!-- Lat/Long lines -->
    <g clip-path="url(#globeClip)" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="0.4">
      <path d="M3 16h26"/><ellipse cx="16" cy="16" rx="5.5" ry="13"/>
      <path d="M4 11c4 1.8 8 1.8 12 0s8-1.8 12 0"/><path d="M4 21c4-1.8 8-1.8 12 0s8 1.8 12 0"/>
    </g>
    <!-- Highlight -->
    <ellipse cx="11" cy="10" rx="3.5" ry="2" fill="rgba(255,255,255,0.40)" transform="rotate(-30 11 10)"/>
    <path d="M28 16a13.5 13.5 0 0 1-9.5 12.9 13.5 13.5 0 0 0 8-12.5 13.5 13.5 0 0 0-4.6-10.2A13.5 13.5 0 0 1 28 16z" fill="rgba(0,0,0,0.18)"/>
  </g>
  
  <text x="278" y="105" class="tagline mist">Intelligence</text>
</svg>
