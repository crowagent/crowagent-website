<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SF46 B9 — Canonical Component Demo</title>
  <link rel="stylesheet" href="/crowagent-brand-tokens.css" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body {
      background: var(--bg);
      padding: var(--space-12);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }
    .grid { display: grid; gap: var(--space-8); max-width: 720px; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="grid">
    <article class="sv-card sv-card--interactive" data-test="canonical-card">
      <h3 class="ca-card-v2__title">Canonical Card v2</h3>
      <p class="ca-card-v2__body">
        Consumes <code>--shadow-card-rest</code>, <code>--space-6</code>,
        <code>--text-h3</code>, <code>--lh-h3</code>, <code>--track-h2</code>,
        <code>--motion-base</code>, <code>--ease-out</code>.
      </p>
      <button class="sv-btn" data-test="canonical-button">Canonical Button v2</button>
    </article>
  </div>
</body>
</html>
