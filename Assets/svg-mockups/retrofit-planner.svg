    <rect x="590" y="710" width="20" height="50" rx="2" fill="#0CC9A8" fill-opacity="0.4"/>
    <rect x="616" y="695" width="20" height="65" rx="2" fill="#0CC9A8" fill-opacity="0.5"/>
    <rect x="642" y="678" width="20" height="82" rx="2" fill="#0CC9A8" fill-opacity="0.6"/>
    <rect x="668" y="660" width="20" height="100" rx="2" fill="#0CC9A8" fill-opacity="0.8"/>
    <rect x="694" y="640" width="20" height="120" rx="2" fill="#0CC9A8"/>

    <rect x="590" y="788" width="412" height="32" rx="6" fill="#0CC9A8"/>
    <text x="796" y="809" text-anchor="middle" class="b" font-size="12" font-weight="700" fill="#040E1A">Choose Balanced</text>
  </g>

  <!-- Scenario card 3: Premium -->
