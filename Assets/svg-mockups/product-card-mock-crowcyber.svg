<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360" preserveAspectRatio="xMidYMid meet" role="img" aria-label="CrowCyber dashboard preview with question counter rising from twelve to forty four">
  <title>CrowCyber dashboard preview</title>
  <defs>
    <linearGradient id="cyBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A1F3A"/>
      <stop offset="1" stop-color="#040E1A"/>
    </linearGradient>
    <linearGradient id="cyAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0CC9A8"/>
      <stop offset="1" stop-color="#5BC8FF"/>
    </linearGradient>
  </defs>
  <style>@media (prefers-reduced-motion: reduce){animate,animateTransform{display:none}}</style>
  <rect width="600" height="360" rx="14" fill="url(#cyBg)"/>
  <rect x="1" y="1" width="598" height="358" rx="13" fill="none" stroke="#0CC9A8" stroke-opacity="0.18"/>

  <!-- chrome -->
  <circle cx="24" cy="24" r="4" fill="#8A9DB8" fill-opacity="0.4"/>
  <circle cx="40" cy="24" r="4" fill="#8A9DB8" fill-opacity="0.4"/>
  <circle cx="56" cy="24" r="4" fill="#8A9DB8" fill-opacity="0.4"/>
  <rect x="80" y="18" width="170" height="12" rx="6" fill="#0F2D52"/>
  <text x="540" y="28" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8A9DB8" text-anchor="end">Cyber Essentials v3.3</text>

  <text x="32" y="78" font-family="Plus Jakarta Sans,system-ui,sans-serif" font-size="14" fill="#B8CCE0" font-weight="600">Self-assessment progress</text>
  <text x="32" y="98" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8A9DB8">Questions answered</text>

  <!-- big counter cycled via opacity stagger across stacked tspans -->
  <g font-family="Plus Jakarta Sans,system-ui,sans-serif" font-size="72" font-weight="700" fill="#E8F0FA">
    <text x="32" y="170" opacity="0">12<animate attributeName="opacity" values="1;0;0;0;0;0;0;0" dur="4s" repeatCount="indefinite"/></text>
    <text x="32" y="170" opacity="0">18<animate attributeName="opacity" values="0;1;0;0;0;0;0;0" dur="4s" repeatCount="indefinite"/></text>
    <text x="32" y="170" opacity="0">24<animate attributeName="opacity" values="0;0;1;0;0;0;0;0" dur="4s" repeatCount="indefinite"/></text>
    <text x="32" y="170" opacity="0">30<animate attributeName="opacity" values="0;0;0;1;0;0;0;0" dur="4s" repeatCount="indefinite"/></text>
    <text x="32" y="170" opacity="0">36<animate attributeName="opacity" values="0;0;0;0;1;0;0;0" dur="4s" repeatCount="indefinite"/></text>
    <text x="32" y="170" opacity="0">40<animate attributeName="opacity" values="0;0;0;0;0;1;0;0" dur="4s" repeatCount="indefinite"/></text>
    <text x="32" y="170" opacity="0">44<animate attributeName="opacity" values="0;0;0;0;0;0;1;1" dur="4s" repeatCount="indefinite"/></text>
  </g>
  <text x="180" y="170" font-family="Inter,system-ui,sans-serif" font-size="20" fill="#8A9DB8">/ 44</text>

  <!-- progress bar -->
  <rect x="32" y="190" width="320" height="10" rx="5" fill="#0F2D52"/>
  <rect x="32" y="190" width="0" height="10" rx="5" fill="url(#cyAccent)">
    <animate attributeName="width" values="86;130;174;218;262;291;320;320" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- 5 control themes ticked progressively -->
  <g font-family="Inter,system-ui,sans-serif" font-size="11" fill="#B8CCE0">
    <g transform="translate(32,230)">
      <circle cx="8" cy="8" r="8" fill="#0CC9A8"/>
      <path d="M4 8 L7 11 L12 5" stroke="#040E1A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="24" y="12">Firewalls</text>
    </g>
    <g transform="translate(32,254)">
      <circle cx="8" cy="8" r="8" fill="#0CC9A8"/>
      <path d="M4 8 L7 11 L12 5" stroke="#040E1A" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="24" y="12">Secure configuration</text>
    </g>
    <g transform="translate(32,278)">
      <circle cx="8" cy="8" r="8" fill="#0F2D52" stroke="#0CC9A8" stroke-opacity="0.3">
        <animate attributeName="fill" values="#0F2D52;#0F2D52;#0CC9A8;#0CC9A8" dur="4s" repeatCount="indefinite"/>
      </circle>
      <text x="24" y="12">User access control</text>
    </g>
    <g transform="translate(32,302)">
      <circle cx="8" cy="8" r="8" fill="#0F2D52" stroke="#0CC9A8" stroke-opacity="0.3">
        <animate attributeName="fill" values="#0F2D52;#0F2D52;#0F2D52;#0CC9A8" dur="4s" repeatCount="indefinite"/>
      </circle>
      <text x="24" y="12">Malware protection</text>
    </g>
    <g transform="translate(32,326)">
      <circle cx="8" cy="8" r="8" fill="#0F2D52" stroke="#0CC9A8" stroke-opacity="0.3">
        <animate attributeName="fill" values="#0F2D52;#0F2D52;#0F2D52;#0F2D52;#0CC9A8" dur="4s" repeatCount="indefinite"/>
      </circle>
      <text x="24" y="12">Patch management</text>
    </g>
  </g>

  <!-- right panel: ready ring -->
  <g transform="translate(478,200)">
    <circle r="64" fill="none" stroke="#0F2D52" stroke-width="10"/>
    <circle r="64" fill="none" stroke="url(#cyAccent)" stroke-width="10" stroke-linecap="round" stroke-dasharray="402" stroke-dashoffset="402" transform="rotate(-90)">
      <animate attributeName="stroke-dashoffset" values="402;280;180;105;45;25;10;10" dur="4s" repeatCount="indefinite"/>
    </circle>
    <g font-family="Plus Jakarta Sans,system-ui,sans-serif" font-size="28" font-weight="700" fill="#E8F0FA" text-anchor="middle">
      <text y="0" opacity="0">27%<animate attributeName="opacity" values="1;0;0;0;0;0;0;0" dur="4s" repeatCount="indefinite"/></text>
      <text y="0" opacity="0">41%<animate attributeName="opacity" values="0;1;0;0;0;0;0;0" dur="4s" repeatCount="indefinite"/></text>
      <text y="0" opacity="0">55%<animate attributeName="opacity" values="0;0;1;0;0;0;0;0" dur="4s" repeatCount="indefinite"/></text>
      <text y="0" opacity="0">68%<animate attributeName="opacity" values="0;0;0;1;0;0;0;0" dur="4s" repeatCount="indefinite"/></text>
      <text y="0" opacity="0">82%<animate attributeName="opacity" values="0;0;0;0;1;0;0;0" dur="4s" repeatCount="indefinite"/></text>
      <text y="0" opacity="0">91%<animate attributeName="opacity" values="0;0;0;0;0;1;0;0" dur="4s" repeatCount="indefinite"/></text>
      <text y="0" opacity="0">100%<animate attributeName="opacity" values="0;0;0;0;0;0;1;1" dur="4s" repeatCount="indefinite"/></text>
    </g>
    <text y="22" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8A9DB8">readiness</text>
  </g>

  <!-- live indicator -->
  <circle cx="556" cy="78" r="4" fill="#0CC9A8">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="546" y="82" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#8A9DB8" text-anchor="end">Live</text>
</svg>
