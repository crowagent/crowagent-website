<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="esgStep1Title" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="esgStep1Title">CrowESG Step 1: Pick your frameworks</title>
  <defs>
    <style>
      .bg { fill: #0A1422; }
      .c1 { fill: #0F1B2E; }
      .c2 { fill: #11243F; }
      .hair { stroke: rgba(255,255,255,0.08); stroke-width: 1; fill: none; }
      .cloud { fill: #E8EEF7; }
      .mist { fill: #8A9DB8; }
      .teal { fill: #0CC9A8; }
      .green { fill: #22C55E; }
      .digit { font-variant-numeric: tabular-nums; }

      .fw-card { opacity: 0; }
      .fw-1 { animation: fw-in 6s ease-out infinite; animation-delay: 0.3s; }
      .fw-2 { animation: fw-in 6s ease-out infinite; animation-delay: 0.5s; }
      .fw-3 { animation: fw-in 6s ease-out infinite; animation-delay: 0.7s; }
      .fw-4 { animation: fw-in 6s ease-out infinite; animation-delay: 0.9s; }
      .fw-5 { animation: fw-in 6s ease-out infinite; animation-delay: 1.1s; }
      @keyframes fw-in {
        0%, 4%   { opacity: 0; transform: translateY(8px); }
        16%, 95% { opacity: 1; transform: translateY(0); }
        100%     { opacity: 0; }
      }

      .check-tick { opacity: 0; }
      .ct-1 { animation: tk-in 6s ease-out infinite; animation-delay: 1.6s; }
      .ct-2 { animation: tk-in 6s ease-out infinite; animation-delay: 1.9s; }
      .ct-3 { animation: tk-in 6s ease-out infinite; animation-delay: 2.2s; }
      .ct-4 { animation: tk-in 6s ease-out infinite; animation-delay: 2.5s; }
      .ct-5 { animation: tk-in 6s ease-out infinite; animation-delay: 2.8s; }
      @keyframes tk-in {
        0%, 24%  { opacity: 0; transform: scale(0.5); }
        38%, 95% { opacity: 1; transform: scale(1); }
        100%     { opacity: 0; }
      }

      .num-roll { opacity: 0; animation: num-roll 6s ease-out infinite; animation-delay: 3.2s; }
      @keyframes num-roll {
        0%, 48%  { opacity: 0; transform: translateY(8px); }
        58%, 95% { opacity: 1; transform: translateY(0); }
        100%     { opacity: 0; }
      }

      @media (prefers-reduced-motion: reduce) {
        .fw-card, .fw-1, .fw-2, .fw-3, .fw-4, .fw-5,
        .check-tick, .ct-1, .ct-2, .ct-3, .ct-4, .ct-5, .num-roll {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="620"/>

  <!-- Header -->
  <g transform="translate(40, 40)">
    <text x="0" y="14" class="teal" font-size="11" font-weight="600" letter-spacing="1.5">STEP 1, FRAMEWORKS</text>
    <text x="0" y="46" class="cloud" font-size="22" font-weight="600">Pick any combination, one licence</text>
    <text x="0" y="68" class="mist" font-size="13">GRI, TCFD, CSRD, ISSB, UK SDR, mix and match</text>
  </g>

  <!-- Framework cards grid -->
  <g transform="translate(40, 150)">
    <g class="fw-card fw-1">
      <rect class="c1" x="0" y="0" width="190" height="200" rx="14"/>
      <rect x="-2" y="-2" width="194" height="204" rx="15" fill="none" stroke="#0CC9A8" stroke-width="2"/>
      <text x="95" y="32" class="teal" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="0.6">GRI 2021</text>
      <line x1="20" y1="48" x2="170" y2="48" class="hair"/>
      <text x="20" y="74" class="cloud" font-size="11">Universal Standards</text>
      <text x="20" y="94" class="cloud" font-size="11">Topic Standards</text>
      <text x="20" y="114" class="cloud" font-size="11">Sector Standards</text>
      <text x="20" y="158" class="mist digit" font-size="10">240 disclosures</text>
      <g class="check-tick ct-1" transform="translate(170, 180)">
        <circle cx="-10" cy="-10" r="14" fill="#0CC9A8"/>
        <path d="M-16 -10 L-12 -6 L-4 -14" stroke="#0A1422" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>
    <g class="fw-card fw-2" transform="translate(210, 0)">
      <rect class="c1" x="0" y="0" width="190" height="200" rx="14"/>
      <rect x="-2" y="-2" width="194" height="204" rx="15" fill="none" stroke="#0CC9A8" stroke-width="2"/>
      <text x="95" y="32" class="teal" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="0.6">TCFD</text>
      <line x1="20" y1="48" x2="170" y2="48" class="hair"/>
      <text x="20" y="74" class="cloud" font-size="11">Governance</text>
      <text x="20" y="94" class="cloud" font-size="11">Strategy</text>
      <text x="20" y="114" class="cloud" font-size="11">Risk management</text>
      <text x="20" y="134" class="cloud" font-size="11">Metrics &amp; targets</text>
      <text x="20" y="170" class="mist digit" font-size="10">11 recs, 4 pillars</text>
      <g class="check-tick ct-2" transform="translate(170, 180)">
        <circle cx="-10" cy="-10" r="14" fill="#0CC9A8"/>
        <path d="M-16 -10 L-12 -6 L-4 -14" stroke="#0A1422" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>
    <g class="fw-card fw-3" transform="translate(420, 0)">
      <rect class="c1" x="0" y="0" width="190" height="200" rx="14"/>
      <rect x="-2" y="-2" width="194" height="204" rx="15" fill="none" stroke="#0CC9A8" stroke-width="2"/>
      <text x="95" y="32" class="teal" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="0.6">CSRD / ESRS</text>
      <line x1="20" y1="48" x2="170" y2="48" class="hair"/>
      <text x="20" y="74" class="cloud" font-size="11">E1 to E5, Environment</text>
      <text x="20" y="94" class="cloud" font-size="11">S1 to S4, Social</text>
      <text x="20" y="114" class="cloud" font-size="11">G1, Governance</text>
      <text x="20" y="158" class="mist digit" font-size="10">~1,100 datapoints</text>
      <g class="check-tick ct-3" transform="translate(170, 180)">
        <circle cx="-10" cy="-10" r="14" fill="#0CC9A8"/>
        <path d="M-16 -10 L-12 -6 L-4 -14" stroke="#0A1422" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>
    <g class="fw-card fw-4" transform="translate(630, 0)">
      <rect class="c1" x="0" y="0" width="190" height="200" rx="14"/>
      <rect x="-2" y="-2" width="194" height="204" rx="15" fill="none" stroke="#0CC9A8" stroke-width="2"/>
      <text x="95" y="32" class="teal" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="0.6">ISSB IFRS</text>
      <line x1="20" y1="48" x2="170" y2="48" class="hair"/>
      <text x="20" y="74" class="cloud" font-size="11">S1, General</text>
      <text x="20" y="94" class="cloud" font-size="11">S2, Climate</text>
      <text x="20" y="114" class="cloud" font-size="11">Industry-specific</text>
      <text x="20" y="158" class="mist digit" font-size="10">SASB convergence</text>
      <g class="check-tick ct-4" transform="translate(170, 180)">
        <circle cx="-10" cy="-10" r="14" fill="#0CC9A8"/>
        <path d="M-16 -10 L-12 -6 L-4 -14" stroke="#0A1422" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>
    <g class="fw-card fw-5" transform="translate(840, 0)">
      <rect class="c1" x="0" y="0" width="160" height="200" rx="14"/>
      <rect x="-2" y="-2" width="164" height="204" rx="15" fill="none" stroke="#0CC9A8" stroke-width="2"/>
      <text x="80" y="32" class="teal" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="0.6">UK SDR</text>
      <line x1="20" y1="48" x2="140" y2="48" class="hair"/>
      <text x="20" y="74" class="cloud" font-size="11">Sustainability</text>
      <text x="20" y="94" class="cloud" font-size="11">Disclosure</text>
      <text x="20" y="114" class="cloud" font-size="11">Requirements</text>
      <text x="20" y="158" class="mist digit" font-size="10">FCA, 2024</text>
      <g class="check-tick ct-5" transform="translate(140, 180)">
        <circle cx="-10" cy="-10" r="14" fill="#0CC9A8"/>
        <path d="M-16 -10 L-12 -6 L-4 -14" stroke="#0A1422" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>
  </g>

  <!-- Summary footer -->
  <g transform="translate(40, 388)">
    <rect class="c1" x="0" y="0" width="1000" height="120" rx="16" ry="16"/>
    <text x="20" y="32" class="cloud" font-size="13" font-weight="600">5 frameworks selected, mapped to a single metric schema</text>
    <text x="20" y="52" class="mist" font-size="11">Add or remove frameworks any time, your data layer stays the same</text>
    <line x1="20" y1="68" x2="980" y2="68" class="hair"/>

    <g class="num-roll" transform="translate(20, 92)">
      <text x="0" y="0" class="mist" font-size="11">Total disclosures covered</text>
      <text x="980" y="0" class="teal digit" font-size="14" font-weight="700" text-anchor="end">~1,500</text>
    </g>
  </g>

  <line x1="40" y1="552" x2="1040" y2="552" class="hair"/>
  <g transform="translate(40, 580)">
    <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.4">One platform, no per-framework licences, no double-keying</text>
  </g>
</svg>
