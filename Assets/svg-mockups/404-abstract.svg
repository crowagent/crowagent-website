<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1067" role="img" aria-label="Scattered nodes with a you-are-here ring and dashed connectors in CrowAgent teal and sky" preserveAspectRatio="xMidYMid slice">
  <title>CrowAgent page not found, wayfinding constellation abstract</title>
  <desc>A loose constellation of scattered nodes joined by dashed connector lines, with one anchor node pulsing softly. Decorative; no data.</desc>
  <defs>
    <radialGradient id="nfAnchor" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0CC9A8" stop-opacity="0.6"/>
      <stop offset="0.5" stop-color="#0CC9A8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#0CC9A8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    @keyframes nf-drift{0%,100%{transform:translate(0,0)}50%{transform:translate(6px,-8px)}}
    @keyframes nf-drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-8px,6px)}}
    @keyframes nf-pulse{0%,100%{opacity:.85;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
    @keyframes nf-ring{0%{transform:scale(0.6);opacity:0}15%{opacity:0.9}100%{transform:scale(2);opacity:0}}
    @keyframes nf-tw{0%,100%{opacity:.4}50%{opacity:.9}}
    @keyframes nf-dash{to{stroke-dashoffset:-200}}
    .nf-node-a{animation:nf-drift 38s ease-in-out infinite;transform-origin:center}
    .nf-node-b{animation:nf-drift2 44s ease-in-out -10s infinite;transform-origin:center}
    #nf-anchor{transform-origin:800px 533px;animation:nf-pulse 34s ease-in-out infinite}
    .nf-ring{transform-origin:800px 533px;animation:nf-ring 36s ease-out infinite}
    .nf-ring:nth-of-type(2){animation-delay:-12s}
    .nf-ring:nth-of-type(3){animation-delay:-24s}
    .nf-tw{animation:nf-tw 34s ease-in-out infinite}
    .nf-tw:nth-child(2n){animation-duration:42s}
    .nf-link{stroke-dasharray:6 10;animation:nf-dash 46s linear infinite}
    @media (prefers-reduced-motion:reduce){*{animation:none!important;transform:none!important}}
  </style>

  <!-- Faint dashed connector lines, drifting -->
  <g fill="none" stroke-linecap="round">
    <path class="nf-link" d="M260,260 L560,360" stroke="#5BC8FF" stroke-width="1.2" stroke-opacity="0.5"/>
    <path class="nf-link" d="M560,360 L800,533" stroke="#0CC9A8" stroke-width="1.2" stroke-opacity="0.55"/>
    <path class="nf-link" d="M800,533 L1080,420" stroke="#5BC8FF" stroke-width="1.2" stroke-opacity="0.5"/>
    <path class="nf-link" d="M1080,420 L1340,300" stroke="#0CC9A8" stroke-width="1.2" stroke-opacity="0.48"/>
    <path class="nf-link" d="M800,533 L640,760" stroke="#5BC8FF" stroke-width="1.2" stroke-opacity="0.5"/>
    <path class="nf-link" d="M640,760 L380,860" stroke="#0CC9A8" stroke-width="1.2" stroke-opacity="0.48"/>
    <path class="nf-link" d="M800,533 L1120,800" stroke="#5BC8FF" stroke-width="1.2" stroke-opacity="0.5"/>
    <path class="nf-link" d="M1120,800 L1380,720" stroke="#0CC9A8" stroke-width="1.2" stroke-opacity="0.48"/>
  </g>

  <!-- Disconnected outlier nodes (drift) -->
  <g>
    <circle class="nf-node-a" cx="260" cy="260" r="7" fill="none" stroke="#5BC8FF" stroke-width="1.6" stroke-opacity="0.85"/>
    <circle class="nf-node-b" cx="560" cy="360" r="6" fill="none" stroke="#0CC9A8" stroke-width="1.6" stroke-opacity="0.85"/>
    <circle class="nf-node-a" cx="1080" cy="420" r="6" fill="none" stroke="#5BC8FF" stroke-width="1.6" stroke-opacity="0.8"/>
    <circle class="nf-node-b" cx="1340" cy="300" r="7" fill="none" stroke="#0CC9A8" stroke-width="1.6" stroke-opacity="0.85"/>
    <circle class="nf-node-a" cx="640" cy="760" r="6" fill="none" stroke="#0CC9A8" stroke-width="1.6" stroke-opacity="0.8"/>
    <circle class="nf-node-b" cx="380" cy="860" r="7" fill="none" stroke="#5BC8FF" stroke-width="1.6" stroke-opacity="0.75"/>
    <circle class="nf-node-a" cx="1120" cy="800" r="6" fill="none" stroke="#5BC8FF" stroke-width="1.6" stroke-opacity="0.75"/>
    <circle class="nf-node-b" cx="1380" cy="720" r="7" fill="none" stroke="#0CC9A8" stroke-width="1.6" stroke-opacity="0.75"/>
    <circle class="nf-node-a" cx="180" cy="540" r="5" fill="none" stroke="#5BC8FF" stroke-width="1.4" stroke-opacity="0.7"/>
    <circle class="nf-node-b" cx="1480" cy="540" r="5" fill="none" stroke="#0CC9A8" stroke-width="1.4" stroke-opacity="0.7"/>
  </g>

  <!-- Anchor "you are here" rings expanding outward -->
  <g fill="none" stroke-linecap="round">
    <circle class="nf-ring" cx="800" cy="533" r="80" stroke="#0CC9A8" stroke-width="1.8" stroke-opacity="0.85"/>
    <circle class="nf-ring" cx="800" cy="533" r="80" stroke="#5BC8FF" stroke-width="1.4" stroke-opacity="0.7"/>
    <circle class="nf-ring" cx="800" cy="533" r="80" stroke="#0CC9A8" stroke-width="1.8" stroke-opacity="0.85"/>
  </g>

  <!-- Anchor node (pulsing core) -->
  <g id="nf-anchor">
    <circle cx="800" cy="533" r="150" fill="url(#nfAnchor)"/>
    <circle cx="800" cy="533" r="46" fill="none" stroke="#0CC9A8" stroke-width="1.8" stroke-opacity="0.95"/>
    <circle cx="800" cy="533" r="22" fill="#0CC9A8" opacity="0.6"/>
    <circle cx="800" cy="533" r="8" fill="#C2FF57" opacity="0.95"/>
  </g>

  <!-- Background sparkles -->
  <g fill="#E8F0FA">
    <circle class="nf-tw" cx="220" cy="180" r="1.4" opacity="0.45"/>
    <circle class="nf-tw" cx="460" cy="140" r="1.3" opacity="0.4"/>
    <circle class="nf-tw" cx="900" cy="160" r="1.5" opacity="0.5"/>
    <circle class="nf-tw" cx="1180" cy="120" r="1.3" opacity="0.45"/>
    <circle class="nf-tw" cx="1440" cy="180" r="1.4" opacity="0.5"/>
    <circle class="nf-tw" cx="240" cy="720" r="1.3" opacity="0.4"/>
    <circle class="nf-tw" cx="520" cy="940" r="1.4" opacity="0.45"/>
    <circle class="nf-tw" cx="860" cy="900" r="1.3" opacity="0.4"/>
    <circle class="nf-tw" cx="1240" cy="940" r="1.4" opacity="0.45"/>
    <circle class="nf-tw" cx="1460" cy="860" r="1.3" opacity="0.4"/>
  </g>
</svg>
