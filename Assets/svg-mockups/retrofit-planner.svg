    <text x="1088" y="328" class="f" font-size="11" font-weight="700" fill="#A78BFA">SCENARIO C</text>
    <text x="1088" y="358" class="f" font-size="22" font-weight="700" fill="#E8F0FA">Premium</text>
    <text x="1088" y="380" class="b" font-size="12" fill="#8A9DB8">Full retrofit + solar PV + battery + BMS</text>

    <line x1="1088" y1="402" x2="1508" y2="402" stroke="#0D2847"/>
    <text x="1088" y="430" class="b" font-size="11" font-weight="600" fill="#8A9DB8">CAPEX</text>
    <text x="1088" y="462" class="f" font-size="22" font-weight="700" fill="#E8F0FA">£150,000</text>

    <text x="1088" y="498" class="b" font-size="11" font-weight="600" fill="#8A9DB8">25-YR NPV</text>
    <text x="1088" y="530" class="f" font-size="22" font-weight="700" fill="#0CC9A8">£195,000</text>

    <text x="1088" y="566" class="b" font-size="11" font-weight="600" fill="#8A9DB8">PAYBACK</text>
    <text x="1088" y="598" class="f" font-size="22" font-weight="700" fill="#F59E0B">12.6 yrs</text>

    <text x="1088" y="634" class="b" font-size="11" font-weight="600" fill="#8A9DB8">EPC OUTCOME</text>
    <g>
      <rect x="1088" y="650" width="34" height="24" rx="4" fill="#EF4444"/>
      <text x="1105" y="667" text-anchor="middle" class="f" font-size="13" font-weight="700" fill="#040E1A">F</text>
      <path d="M1128 662 L1146 662" stroke="#8A9DB8" stroke-width="1.5"/>
      <path d="M1142 658 L1146 662 L1142 666" stroke="#8A9DB8" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="1152 " y="650" width="34" height="24" rx="4" fill="#0CC9A8"/>
      <text x="1169" y="667" text-anchor="middle" class="f" font-size="13" font-weight="700" fill="#040E1A">A</text>
    </g>

    <text x="1088" y="708" class="b" font-size="11" font-weight="600" fill="#8A9DB8">CASHFLOW (5 YR)</text>
    <rect x="1088" y="720" width="20" height="40" rx="2" fill="#A78BFA" fill-opacity="0.3"/>
    <rect x="1114" y="708" width="20" height="52" rx="2" fill="#A78BFA" fill-opacity="0.45"/>
    <rect x="1140" y="690" width="20" height="70" rx="2" fill="#A78BFA" fill-opacity="0.6"/>
    <rect x="1166" y="668" width="20" height="92" rx="2" fill="#A78BFA" fill-opacity="0.75"/>
    <rect x="1192" y="640" width="20" height="120" rx="2" fill="#A78BFA"/>

    <rect x="1088" y="788" width="412" height="32" rx="6" fill="#0D2847"/>
    <text x="1294" y="809" text-anchor="middle" class="b" font-size="12" font-weight="600" fill="#A78BFA">Choose Premium</text>
