<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinetic Data Fabric Concept | CrowAgent Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    :root {
      --bg: #030617;
      --teal: #0CC9A8;
      --indigo: #6366f1;
    }
    body {
      background-color: var(--bg);
      color: white;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }
    /* Animated Grid Canvas */
    #grid-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.4;
      pointer-events: none;
    }
    .data-stream {
      position: absolute;
      width: 1px;
      height: 100px;
      background: linear-gradient(to bottom, transparent, var(--teal), transparent);
      opacity: 0;
    }
    .liquid-heading {
      font-size: 5rem;
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 0.9;
      background: linear-gradient(135deg, #fff 0%, #a5f3fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 30px rgba(165, 243, 252, 0.2));
    }
    .premium-dot {
      width: 6px;
      height: 6px;
      background: var(--teal);
      border-radius: 50%;
      box-shadow: 0 0 15px var(--teal);
    }
  </style>
</head>
<body>
  <canvas id="grid-canvas"></canvas>
  <div id="streams-container"></div>

  <main class="relative z-10 h-screen flex items-center px-12">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-24 items-center w-full max-w-7xl mx-auto">
      <div>
        <div class="flex items-center gap-4 mb-12">
          <div class="premium-dot"></div>
          <span class="text-xs font-black uppercase tracking-[0.3em] text-white/40">Statute-Cited Intelligence</span>
        </div>
        
        <h1 class="liquid-heading mb-12">
          UK Compliance<br>
          Deterministic<br>
          <span class="text-teal-400">Intelligence.</span>
        </h1>

        <p class="text-xl text-white/50 mb-12 leading-relaxed max-w-lg">
          Level the playing field with incumbent consultancies. CrowAgent translates complex UK statutes into actionable, auditable workflows.
        </p>

        <div class="flex gap-4">
          <button class="px-8 py-4 bg-white text-black font-black rounded-lg hover:bg-teal-400 transition-colors">
            Get Started
          </button>
          <button class="px-8 py-4 bg-white/5 border border-white/10 font-bold rounded-lg hover:bg-white/10">
            View Statutes
          </button>
        </div>
      </div>

      <div class="relative hidden lg:block">
        <!-- Abstract Data Visualization Representative -->
        <div class="w-full aspect-square border border-white/5 rounded-full relative flex items-center justify-center">
            <div class="absolute inset-0 border border-teal-500/20 rounded-full animate-ping" style="animation-duration: 4s;"></div>
            <div class="w-3/4 aspect-square border border-white/10 rounded-full flex items-center justify-center">
                <div class="w-1/2 aspect-square bg-teal-500/10 rounded-full backdrop-blur-3xl border border-teal-500/30 flex items-center justify-center">
                    <div class="text-4xl font-black text-teal-400">£150K</div>
                </div>
            </div>
            <!-- Rotating markers -->
            <div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 px-4 py-2 bg-white/5 border border-white/10 backdrop-blur-md rounded-full text-[10px] font-bold">SI 2015/962</div>
            <div class="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2 px-4 py-2 bg-white/5 border border-white/10 backdrop-blur-md rounded-full text-[10px] font-bold">PPN 002</div>
        </div>
      </div>
    </div>
  </main>

  <script>
    // Simple Grid Animation
    const canvas = document.getElementById('grid-canvas');
    const ctx = canvas.getContext('2d');
    let width, height;

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    function draw() {
      ctx.clearRect(0, 0, width, height);
      ctx.strokeStyle = 'rgba(12, 201, 168, 0.05)';
      ctx.lineWidth = 1;

      const step = 60;
      for(let x = 0; x < width; x += step) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, height);
        ctx.stroke();
      }
      for(let y = 0; y < height; y += step) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(width, y);
        ctx.stroke();
      }
      requestAnimationFrame(draw);
    }
    draw();

    // Spawn Streams
    function createStream() {
      const stream = document.createElement('div');
      stream.className = 'data-stream';
      stream.style.left = Math.random() * 100 + 'vw';
      stream.style.top = '-100px';
      document.getElementById('streams-container').appendChild(stream);

      gsap.to(stream, {
        top: '110vh',
        opacity: 0.5,
        duration: 2 + Math.random() * 3,
        ease: "none",
        onComplete: () => stream.remove()
      });
    }

    setInterval(createStream, 500);

    gsap.from(".liquid-heading", { opacity: 0, x: -50, duration: 1.5, ease: "expo.out" });
  </script>
</body>
</html>
