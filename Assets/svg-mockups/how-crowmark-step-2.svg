<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="markStep2Title" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="markStep2Title">CrowMark Step 2: Select TOMs measures</title>
  <defs>
    <style>
      .bg { fill: #0A1422; }
      .c1 { fill: #0F1B2E; }
      .c2 { fill: #11243F; }
      .hair { stroke: rgba(255,255,255,0.08); stroke-width: 1; fill: none; }
      .cloud { fill: #E8EEF7; }
      .mist { fill: #8A9DB8; }
      .teal { fill: #0CC9A8; }
      .green { fill: #22C55E; }
      .digit { font-variant-numeric: tabular-nums; }

      .check-row { opacity: 0; }
      .row-1 { animation: row-in 6s ease-out infinite; animation-delay: 0.4s; }
      .row-2 { animation: row-in 6s ease-out infinite; animation-delay: 0.7s; }
      .row-3 { animation: row-in 6s ease-out infinite; animation-delay: 1.0s; }
      .row-4 { animation: row-in 6s ease-out infinite; animation-delay: 1.3s; }
      .row-5 { animation: row-in 6s ease-out infinite; animation-delay: 1.6s; }
      .row-6 { animation: row-in 6s ease-out infinite; animation-delay: 1.9s; }
      @keyframes row-in {
        0%, 4%   { opacity: 0; transform: translateX(-4px); }
        15%, 95% { opacity: 1; transform: translateX(0); }
        100%     { opacity: 0; }
      }

      .check-tick { opacity: 0; }
      .tk-1 { animation: tk-in 6s ease-out infinite; animation-delay: 0.6s; }
      .tk-2 { animation: tk-in 6s ease-out infinite; animation-delay: 0.9s; }
      .tk-3 { animation: tk-in 6s ease-out infinite; animation-delay: 1.2s; }
      .tk-4 { animation: tk-in 6s ease-out infinite; animation-delay: 1.5s; }
      .tk-5 { animation: tk-in 6s ease-out infinite; animation-delay: 1.8s; }
      .tk-6 { animation: tk-in 6s ease-out infinite; animation-delay: 2.1s; }
      @keyframes tk-in {
        0%, 9%   { opacity: 0; transform: scale(0.5); }
        20%, 95% { opacity: 1; transform: scale(1); }
        100%     { opacity: 0; }
      }

      .score-count { opacity: 0; animation: score-in 6s ease-out infinite; animation-delay: 2.6s; }
      @keyframes score-in {
        0%, 38%  { opacity: 0; transform: translateY(6px); }
        50%, 95% { opacity: 1; transform: translateY(0); }
        100%     { opacity: 0; }
      }

      .bar-grow { transform-origin: left; animation: bar-grow 6s cubic-bezier(0.4,0,0.2,1) infinite; animation-delay: 2.4s; }
      @keyframes bar-grow {
        0%, 38%   { transform: scaleX(0); }
        70%, 100% { transform: scaleX(1); }
      }

      @media (prefers-reduced-motion: reduce) {
        .check-row, .row-1, .row-2, .row-3, .row-4, .row-5, .row-6,
        .check-tick, .tk-1, .tk-2, .tk-3, .tk-4, .tk-5, .tk-6,
        .score-count, .bar-grow {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
        }
        .bar-grow { transform: scaleX(1) !important; }
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="620"/>

  <!-- Header -->
  <g transform="translate(40, 40)">
    <text x="0" y="14" class="teal" font-size="11" font-weight="600" letter-spacing="1.5">STEP 2, SELECT</text>
    <text x="0" y="46" class="cloud" font-size="22" font-weight="600">Pick TOMs measures from the library</text>
    <text x="0" y="68" class="mist" font-size="13">Oxford SVB 2023-24 proxy values, score updates live</text>
  </g>

  <!-- Measure list -->
  <g transform="translate(40, 140)">
    <rect class="c1" x="0" y="0" width="660" height="370" rx="16" ry="16"/>
    <text x="20" y="32" class="cloud" font-size="13" font-weight="600">TOMs measures, 6 selected of 32</text>
    <text x="20" y="52" class="mist" font-size="11">Theme 1 to 5, weighting reflected in proxy values</text>
    <line x1="20" y1="68" x2="640" y2="68" class="hair"/>

    <g transform="translate(20, 86)">
      <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.6">MEASURE</text>
      <text x="440" y="0" class="mist" font-size="10" letter-spacing="0.6">PROXY VALUE</text>
      <text x="620" y="0" class="mist" font-size="10" letter-spacing="0.6" text-anchor="end">PICK</text>
      <line x1="0" y1="12" x2="620" y2="12" class="hair"/>
    </g>

    <g transform="translate(20, 110)">
      <g class="check-row row-1">
        <text x="0" y="14" class="cloud" font-size="12">NT1, Local employment</text>
        <text x="440" y="14" class="cloud digit" font-size="12">£32,640</text>
        <g class="check-tick tk-1" transform="translate(610, 7)">
          <circle cx="0" cy="0" r="9" fill="#0CC9A8"/>
          <path d="M-4 0 L-1 3 L4 -3" stroke="#0A1422" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
      </g>
      <g class="check-row row-2" transform="translate(0, 30)">
        <text x="0" y="14" class="cloud" font-size="12">NT3, Local supply chain spend</text>
        <text x="440" y="14" class="cloud digit" font-size="12">£82,000</text>
        <g class="check-tick tk-2" transform="translate(610, 7)">
          <circle cx="0" cy="0" r="9" fill="#0CC9A8"/>
          <path d="M-4 0 L-1 3 L4 -3" stroke="#0A1422" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
      </g>
      <g class="check-row row-3" transform="translate(0, 60)">
        <text x="0" y="14" class="cloud" font-size="12">NT7, Apprenticeship starts</text>
        <text x="440" y="14" class="cloud digit" font-size="12">£18,180</text>
        <g class="check-tick tk-3" transform="translate(610, 7)">
          <circle cx="0" cy="0" r="9" fill="#0CC9A8"/>
          <path d="M-4 0 L-1 3 L4 -3" stroke="#0A1422" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
      </g>
      <g class="check-row row-4" transform="translate(0, 90)">
        <text x="0" y="14" class="cloud" font-size="12">NT11, Carbon emissions reduced (tCO2e)</text>
        <text x="440" y="14" class="cloud digit" font-size="12">£24,400</text>
        <g class="check-tick tk-4" transform="translate(610, 7)">
          <circle cx="0" cy="0" r="9" fill="#0CC9A8"/>
          <path d="M-4 0 L-1 3 L4 -3" stroke="#0A1422" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
      </g>
      <g class="check-row row-5" transform="translate(0, 120)">
        <text x="0" y="14" class="cloud" font-size="12">NT17, Volunteer hours, community</text>
        <text x="440" y="14" class="cloud digit" font-size="12">£11,260</text>
        <g class="check-tick tk-5" transform="translate(610, 7)">
          <circle cx="0" cy="0" r="9" fill="#0CC9A8"/>
          <path d="M-4 0 L-1 3 L4 -3" stroke="#0A1422" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
      </g>
      <g class="check-row row-6" transform="translate(0, 150)">
        <text x="0" y="14" class="cloud" font-size="12">NT22, Mental health initiatives</text>
        <text x="440" y="14" class="cloud digit" font-size="12">£9,840</text>
        <g class="check-tick tk-6" transform="translate(610, 7)">
          <circle cx="0" cy="0" r="9" fill="#0CC9A8"/>
          <path d="M-4 0 L-1 3 L4 -3" stroke="#0A1422" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </g>
      </g>
    </g>

    <line x1="20" y1="316" x2="640" y2="316" class="hair"/>
    <g class="score-count" transform="translate(20, 340)">
      <text x="0" y="0" class="mist" font-size="11">Selected measures</text>
      <text x="620" y="0" class="cloud digit" font-size="12" font-weight="700" text-anchor="end">6</text>
    </g>
  </g>

  <!-- Right: live social value score -->
  <g transform="translate(720, 140)">
    <rect class="c1" x="0" y="0" width="320" height="370" rx="16" ry="16"/>
    <text x="20" y="32" class="cloud" font-size="13" font-weight="600">Social value, live</text>
    <text x="20" y="52" class="mist" font-size="11">Across themes 1 to 5</text>
    <line x1="20" y1="68" x2="300" y2="68" class="hair"/>

    <g class="score-count" transform="translate(20, 90)">
      <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.6">TOTAL SOCIAL VALUE</text>
      <text x="0" y="42" class="teal digit" font-size="38" font-weight="700">£178,320</text>
      <text x="0" y="62" class="mist digit" font-size="11">1.44% of contract value</text>
    </g>

    <!-- bar chart per theme -->
    <g transform="translate(20, 192)">
      <text x="0" y="0" class="cloud" font-size="11">Theme 1, Climate</text>
      <rect x="0" y="8" width="280" height="8" rx="4" fill="#1B2F4D"/>
      <rect class="bar-grow" x="0" y="8" width="232" height="8" rx="4" fill="#0CC9A8"/>
      <text x="280" y="0" class="mist digit" font-size="10" text-anchor="end">£24,400</text>
    </g>
    <g transform="translate(20, 224)">
      <text x="0" y="0" class="cloud" font-size="11">Theme 2, Economic</text>
      <rect x="0" y="8" width="280" height="8" rx="4" fill="#1B2F4D"/>
      <rect class="bar-grow" x="0" y="8" width="260" height="8" rx="4" fill="#0CC9A8"/>
      <text x="280" y="0" class="mist digit" font-size="10" text-anchor="end">£114,640</text>
    </g>
    <g transform="translate(20, 256)">
      <text x="0" y="0" class="cloud" font-size="11">Theme 3, Equal opp</text>
      <rect x="0" y="8" width="280" height="8" rx="4" fill="#1B2F4D"/>
      <rect class="bar-grow" x="0" y="8" width="184" height="8" rx="4" fill="#0CC9A8"/>
      <text x="280" y="0" class="mist digit" font-size="10" text-anchor="end">£18,180</text>
    </g>
    <g transform="translate(20, 288)">
      <text x="0" y="0" class="cloud" font-size="11">Theme 4, Wellbeing</text>
      <rect x="0" y="8" width="280" height="8" rx="4" fill="#1B2F4D"/>
      <rect class="bar-grow" x="0" y="8" width="92" height="8" rx="4" fill="#0CC9A8"/>
      <text x="280" y="0" class="mist digit" font-size="10" text-anchor="end">£9,840</text>
    </g>
    <g transform="translate(20, 320)">
      <text x="0" y="0" class="cloud" font-size="11">Theme 5, Community</text>
      <rect x="0" y="8" width="280" height="8" rx="4" fill="#1B2F4D"/>
      <rect class="bar-grow" x="0" y="8" width="110" height="8" rx="4" fill="#0CC9A8"/>
      <text x="280" y="0" class="mist digit" font-size="10" text-anchor="end">£11,260</text>
    </g>
  </g>

  <line x1="40" y1="552" x2="1040" y2="552" class="hair"/>
  <g transform="translate(40, 580)">
    <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.4">Proxy values are Oxford SVB 2023-24, refreshed annually, audit trail preserved</text>
  </g>
</svg>
