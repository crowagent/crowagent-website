name: OG image rebuild — issue #108

# Rebuilds Assets/og/*.png whenever a commit on main touches:
#   - any *.html (titles / descriptions feed the OG renderer)
#   - changelog.xml (per-release OG cards)
#   - scripts/generate-og-images.js (renderer logic)
#   - crowagent-brand-tokens.css (brand colours)
#
# After a successful render, commits the resulting PNGs back to main so the
# Cloudflare Pages deployment hash includes them. CrowAgent.ai is a static
# site with no build step on the CDN, so the PNGs MUST be present in the
# git tree before Pages picks them up.
#
# Cost discipline (Rule 0): this workflow only runs on `main` AND only when
# the trigger paths above actually changed. It never runs on PRs to avoid
# wasting Actions minutes on preview-only branches.

on:
  push:
    branches: [main]
    paths:
      - '**/*.html'
      - 'changelog.xml'
      - 'scripts/generate-og-images.js'
      - 'crowagent-brand-tokens.css'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: og-image-rebuild
  cancel-in-progress: true

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so the auto-commit doesn't create a shallow
          # ref that conflicts with the pages branch.
          fetch-depth: 0
          # Use the default token; the contents:write permission above lets
          # us push the regenerated PNGs back.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=optional || npm install

      - name: Render OG images
        run: npm run build:og

      - name: Detect changes
        id: detect
        run: |
          if [ -n "$(git status --porcelain Assets/og)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git status --porcelain Assets/og
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No OG image changes detected."
          fi

      - name: Commit and push
        if: steps.detect.outputs.changed == 'true'
        run: |
          git config user.name  "crowagent-platform[bot]"
          git config user.email "crowagent.platform@gmail.com"
          git add Assets/og
          git commit -m "chore(og): regenerate OG images [skip ci]"
          git push origin main
