<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 620" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="markStep1Title" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title id="markStep1Title">CrowMark Step 1: Profile your contract</title>
  <defs>
    <style>
      .bg { fill: #0A1422; }
      .c1 { fill: #0F1B2E; }
      .c2 { fill: #11243F; }
      .hair { stroke: rgba(255,255,255,0.08); stroke-width: 1; fill: none; }
      .cloud { fill: #E8EEF7; }
      .mist { fill: #8A9DB8; }
      .teal { fill: #0CC9A8; }
      .green { fill: #22C55E; }
      .digit { font-variant-numeric: tabular-nums; }

      .typed { stroke-dasharray: 200; stroke-dashoffset: 200; animation: typed 6s cubic-bezier(0.4,0,0.2,1) infinite; }
      .typed-1 { animation-delay: 0.4s; }
      .typed-2 { animation-delay: 1.0s; }
      .typed-3 { animation-delay: 1.6s; }
      @keyframes typed {
        0%, 10%   { stroke-dashoffset: 200; }
        45%, 100% { stroke-dashoffset: 0; }
      }

      .pill { opacity: 0; }
      .pill-1 { animation: pill-in 6s ease-out infinite; animation-delay: 2.4s; }
      .pill-2 { animation: pill-in 6s ease-out infinite; animation-delay: 2.7s; }
      .pill-3 { animation: pill-in 6s ease-out infinite; animation-delay: 3.0s; }
      .pill-4 { animation: pill-in 6s ease-out infinite; animation-delay: 3.3s; }
      .pill-5 { animation: pill-in 6s ease-out infinite; animation-delay: 3.6s; }
      @keyframes pill-in {
        0%, 36%  { opacity: 0; transform: scale(0.85); }
        50%, 95% { opacity: 1; transform: scale(1); }
        100%     { opacity: 0; }
      }

      .cursor { animation: blink 1s steps(2, end) infinite; }
      @keyframes blink {
        0%, 50%   { opacity: 1; }
        50.01%, 100% { opacity: 0; }
      }

      @media (prefers-reduced-motion: reduce) {
        .typed, .typed-1, .typed-2, .typed-3, .pill, .pill-1, .pill-2, .pill-3, .pill-4, .pill-5, .cursor {
          animation: none !important;
          opacity: 1 !important;
          transform: none !important;
          stroke-dashoffset: 0 !important;
        }
      }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1080" height="620"/>

  <!-- Header -->
  <g transform="translate(40, 40)">
    <text x="0" y="14" class="teal" font-size="11" font-weight="600" letter-spacing="1.5">STEP 1, PROFILE</text>
    <text x="0" y="46" class="cloud" font-size="22" font-weight="600">Tell us about the contract</text>
    <text x="0" y="68" class="mist" font-size="13">Value, sector, geography, we map to PPN 002 themes automatically</text>
  </g>

  <!-- Left form panel -->
  <g transform="translate(40, 140)">
    <rect class="c1" x="0" y="0" width="580" height="370" rx="16" ry="16"/>
    <text x="20" y="32" class="cloud" font-size="13" font-weight="600">New bid profile</text>
    <line x1="20" y1="50" x2="560" y2="50" class="hair"/>

    <!-- Field 1: Contract title -->
    <g transform="translate(20, 76)">
      <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.6">CONTRACT TITLE</text>
      <rect x="0" y="10" width="540" height="40" rx="8" fill="#11243F"/>
      <text x="12" y="35" class="cloud" font-size="13">Borough of Camden, Highways Maintenance 2026-30</text>
    </g>

    <!-- Field 2: Value -->
    <g transform="translate(20, 144)">
      <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.6">CONTRACT VALUE</text>
      <rect x="0" y="10" width="260" height="40" rx="8" fill="#11243F"/>
      <text x="12" y="35" class="cloud digit" font-size="13">£12,400,000</text>
    </g>

    <!-- Field 3: Duration -->
    <g transform="translate(300, 144)">
      <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.6">DURATION</text>
      <rect x="0" y="10" width="260" height="40" rx="8" fill="#11243F"/>
      <text x="12" y="35" class="cloud digit" font-size="13">48 months</text>
    </g>

    <!-- Field 4: Sector -->
    <g transform="translate(20, 212)">
      <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.6">SECTOR</text>
      <rect x="0" y="10" width="260" height="40" rx="8" fill="#11243F"/>
      <text x="12" y="35" class="cloud" font-size="13">Local government, highways</text>
    </g>

    <!-- Field 5: Region -->
    <g transform="translate(300, 212)">
      <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.6">REGION</text>
      <rect x="0" y="10" width="260" height="40" rx="8" fill="#11243F"/>
      <text x="12" y="35" class="cloud" font-size="13">Greater London</text>
    </g>

    <!-- Field 6: Notes -->
    <g transform="translate(20, 280)">
      <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.6">NOTES</text>
      <rect x="0" y="10" width="540" height="60" rx="8" fill="#11243F"/>
      <text x="12" y="32" class="cloud" font-size="12">PPN 002 mandatory, 10% social value weighting<tspan class="cursor" dx="2" font-size="14" font-weight="700">|</tspan></text>
      <text x="12" y="54" class="mist digit" font-size="11">Bid due 28 June 2026</text>
    </g>
  </g>

  <!-- Right side: auto-mapped themes -->
  <g transform="translate(640, 140)">
    <rect class="c1" x="0" y="0" width="400" height="370" rx="16" ry="16"/>
    <text x="20" y="32" class="cloud" font-size="13" font-weight="600">PPN 002 themes, mapped</text>
    <text x="20" y="52" class="mist" font-size="11">Auto-selected based on sector and region</text>
    <line x1="20" y1="68" x2="380" y2="68" class="hair"/>

    <g class="pill pill-1" transform="translate(20, 92)">
      <rect x="0" y="0" width="360" height="40" rx="10" fill="rgba(12,201,168,0.10)" stroke="#0CC9A8" stroke-width="1.2"/>
      <circle cx="20" cy="20" r="6" class="teal"/>
      <text x="36" y="24" class="cloud" font-size="12" font-weight="600">Fighting climate change</text>
      <text x="340" y="24" class="teal digit" font-size="11" text-anchor="end" font-weight="600">T1</text>
    </g>
    <g class="pill pill-2" transform="translate(20, 144)">
      <rect x="0" y="0" width="360" height="40" rx="10" fill="rgba(12,201,168,0.10)" stroke="#0CC9A8" stroke-width="1.2"/>
      <circle cx="20" cy="20" r="6" class="teal"/>
      <text x="36" y="24" class="cloud" font-size="12" font-weight="600">Tackling economic inequality</text>
      <text x="340" y="24" class="teal digit" font-size="11" text-anchor="end" font-weight="600">T2</text>
    </g>
    <g class="pill pill-3" transform="translate(20, 196)">
      <rect x="0" y="0" width="360" height="40" rx="10" fill="rgba(12,201,168,0.10)" stroke="#0CC9A8" stroke-width="1.2"/>
      <circle cx="20" cy="20" r="6" class="teal"/>
      <text x="36" y="24" class="cloud" font-size="12" font-weight="600">Equal opportunity</text>
      <text x="340" y="24" class="teal digit" font-size="11" text-anchor="end" font-weight="600">T3</text>
    </g>
    <g class="pill pill-4" transform="translate(20, 248)">
      <rect x="0" y="0" width="360" height="40" rx="10" fill="rgba(12,201,168,0.10)" stroke="#0CC9A8" stroke-width="1.2"/>
      <circle cx="20" cy="20" r="6" class="teal"/>
      <text x="36" y="24" class="cloud" font-size="12" font-weight="600">Wellbeing</text>
      <text x="340" y="24" class="teal digit" font-size="11" text-anchor="end" font-weight="600">T4</text>
    </g>
    <g class="pill pill-5" transform="translate(20, 300)">
      <rect x="0" y="0" width="360" height="40" rx="10" fill="rgba(12,201,168,0.10)" stroke="#0CC9A8" stroke-width="1.2"/>
      <circle cx="20" cy="20" r="6" class="teal"/>
      <text x="36" y="24" class="cloud" font-size="12" font-weight="600">Community integration</text>
      <text x="340" y="24" class="teal digit" font-size="11" text-anchor="end" font-weight="600">T5</text>
    </g>
  </g>

  <line x1="40" y1="552" x2="1040" y2="552" class="hair"/>
  <g transform="translate(40, 580)">
    <text x="0" y="0" class="mist" font-size="10" letter-spacing="0.4">Sector and region drive theme weighting, 10 percent social value scoring assumed</text>
  </g>
</svg>
