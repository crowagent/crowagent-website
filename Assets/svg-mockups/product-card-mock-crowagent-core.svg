<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360" preserveAspectRatio="xMidYMid meet" role="img" aria-label="CrowAgent Core MEES dashboard with EPC band trajectory line ascending from F to B">
  <title>CrowAgent Core dashboard preview</title>
  <defs>
    <linearGradient id="coBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A1F3A"/>
      <stop offset="1" stop-color="#040E1A"/>
    </linearGradient>
    <linearGradient id="coAcc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0CC9A8"/>
      <stop offset="1" stop-color="#5BC8FF"/>
    </linearGradient>
  </defs>
  <style>@media (prefers-reduced-motion: reduce){animate,animateTransform{display:none}}</style>
  <rect width="600" height="360" rx="14" fill="url(#coBg)"/>
  <rect x="1" y="1" width="598" height="358" rx="13" fill="none" stroke="#0CC9A8" stroke-opacity="0.18"/>

  <!-- chrome -->
  <circle cx="24" cy="24" r="4" fill="#8A9DB8" fill-opacity="0.4"/>
  <circle cx="40" cy="24" r="4" fill="#8A9DB8" fill-opacity="0.4"/>
  <circle cx="56" cy="24" r="4" fill="#8A9DB8" fill-opacity="0.4"/>
  <rect x="80" y="18" width="170" height="12" rx="6" fill="#0F2D52"/>
  <text x="540" y="28" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8A9DB8" text-anchor="end">MEES · SI 2015/962</text>

  <text x="32" y="74" font-family="Plus Jakarta Sans,system-ui,sans-serif" font-size="14" fill="#B8CCE0" font-weight="600">EPC band trajectory</text>
  <text x="32" y="92" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8A9DB8">2024 to proposed Band C by 2028</text>

  <!-- chart area -->
  <g transform="translate(32,108)">
    <!-- y labels (EPC bands G..A top→bottom inverted) -->
    <g font-family="Inter,system-ui,sans-serif" font-size="10" fill="#8A9DB8">
      <text x="0" y="6">A</text>
      <text x="0" y="34">B</text>
      <text x="0" y="62">C</text>
      <text x="0" y="90">D</text>
      <text x="0" y="118">E</text>
      <text x="0" y="146">F</text>
      <text x="0" y="174">G</text>
    </g>

    <!-- gridlines -->
    <g stroke="#0F2D52" stroke-width="1">
      <line x1="20" y1="2" x2="520" y2="2"/>
      <line x1="20" y1="30" x2="520" y2="30"/>
      <line x1="20" y1="58" x2="520" y2="58"/>
      <line x1="20" y1="86" x2="520" y2="86"/>
      <line x1="20" y1="114" x2="520" y2="114"/>
      <line x1="20" y1="142" x2="520" y2="142"/>
      <line x1="20" y1="170" x2="520" y2="170"/>
    </g>

    <!-- proposed C 2028 threshold band -->
    <rect x="20" y="58" width="500" height="28" fill="#0CC9A8" opacity="0.06"/>
    <line x1="20" y1="58" x2="520" y2="58" stroke="#0CC9A8" stroke-dasharray="4 4" stroke-opacity="0.4"/>
    <text x="520" y="54" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#0CC9A8" text-anchor="end">Proposed Band C threshold</text>

    <!-- ascending polyline (data revealed left-to-right) -->
    <!-- baseline -->
    <polyline points="40,150 130,140 220,128 310,108 400,82 490,44" fill="none" stroke="#0F2D52" stroke-width="2"/>

    <!-- animated path: same points, animate stroke-dashoffset to reveal -->
    <polyline points="40,150 130,140 220,128 310,108 400,82 490,44" fill="none" stroke="url(#coAcc)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="600" stroke-dashoffset="600">
      <animate attributeName="stroke-dashoffset" values="600;400;220;90;0;0" dur="4.5s" repeatCount="indefinite"/>
    </polyline>

    <!-- nodes with year labels, fade in sequentially -->
    <g font-family="Inter,system-ui,sans-serif" font-size="9" fill="#8A9DB8" text-anchor="middle">
      <g opacity="0"><animate attributeName="opacity" values="1;1;1;1;1;1" dur="4.5s" repeatCount="indefinite"/>
        <circle cx="40" cy="150" r="4" fill="#0CC9A8"/>
        <text x="40" y="170">2024</text>
      </g>
      <g opacity="0"><animate attributeName="opacity" values="0;1;1;1;1;1" dur="4.5s" repeatCount="indefinite"/>
        <circle cx="130" cy="140" r="4" fill="#0CC9A8"/>
        <text x="130" y="160">2025</text>
      </g>
      <g opacity="0"><animate attributeName="opacity" values="0;0;1;1;1;1" dur="4.5s" repeatCount="indefinite"/>
        <circle cx="220" cy="128" r="4" fill="#0CC9A8"/>
        <text x="220" y="148">2026</text>
      </g>
      <g opacity="0"><animate attributeName="opacity" values="0;0;0;1;1;1" dur="4.5s" repeatCount="indefinite"/>
        <circle cx="310" cy="108" r="4" fill="#0CC9A8"/>
        <text x="310" y="128">2027</text>
      </g>
      <g opacity="0"><animate attributeName="opacity" values="0;0;0;0;1;1" dur="4.5s" repeatCount="indefinite"/>
        <circle cx="400" cy="82" r="5" fill="#C2FF57"/>
        <text x="400" y="68" fill="#C2FF57">C · 2028</text>
      </g>
      <g opacity="0"><animate attributeName="opacity" values="0;0;0;0;0;1" dur="4.5s" repeatCount="indefinite"/>
        <circle cx="490" cy="44" r="4" fill="#0CC9A8"/>
        <text x="490" y="30">B · 2030</text>
      </g>
    </g>
  </g>

  <!-- KPI strip at bottom -->
  <g transform="translate(32,304)" font-family="Inter,system-ui,sans-serif" font-size="11">
    <g>
      <text fill="#8A9DB8">Penalty exposure</text>
      <g font-family="Plus Jakarta Sans,system-ui,sans-serif" font-size="22" font-weight="700" fill="#E8F0FA">
        <text y="26" opacity="0">£148k<animate attributeName="opacity" values="1;0;0;0;0;0" dur="4.5s" repeatCount="indefinite"/></text>
        <text y="26" opacity="0">£124k<animate attributeName="opacity" values="0;1;0;0;0;0" dur="4.5s" repeatCount="indefinite"/></text>
        <text y="26" opacity="0">£96k<animate attributeName="opacity" values="0;0;1;0;0;0" dur="4.5s" repeatCount="indefinite"/></text>
        <text y="26" opacity="0">£64k<animate attributeName="opacity" values="0;0;0;1;0;0" dur="4.5s" repeatCount="indefinite"/></text>
        <text y="26" opacity="0">£28k<animate attributeName="opacity" values="0;0;0;0;1;0" dur="4.5s" repeatCount="indefinite"/></text>
        <text y="26" opacity="0">£0<animate attributeName="opacity" values="0;0;0;0;0;1" dur="4.5s" repeatCount="indefinite"/></text>
      </g>
    </g>
    <g transform="translate(200,0)">
      <text fill="#8A9DB8">Units compliant</text>
      <g font-family="Plus Jakarta Sans,system-ui,sans-serif" font-size="22" font-weight="700" fill="#E8F0FA">
        <text y="26" opacity="0">14/48<animate attributeName="opacity" values="1;0;0;0;0;0" dur="4.5s" repeatCount="indefinite"/></text>
        <text y="26" opacity="0">20/48<animate attributeName="opacity" values="0;1;0;0;0;0" dur="4.5s" repeatCount="indefinite"/></text>
        <text y="26" opacity="0">27/48<animate attributeName="opacity" values="0;0;1;0;0;0" dur="4.5s" repeatCount="indefinite"/></text>
        <text y="26" opacity="0">34/48<animate attributeName="opacity" values="0;0;0;1;0;0" dur="4.5s" repeatCount="indefinite"/></text>
        <text y="26" opacity="0">42/48<animate attributeName="opacity" values="0;0;0;0;1;0" dur="4.5s" repeatCount="indefinite"/></text>
        <text y="26" opacity="0">48/48<animate attributeName="opacity" values="0;0;0;0;0;1" dur="4.5s" repeatCount="indefinite"/></text>
      </g>
    </g>
    <g transform="translate(400,0)">
      <text fill="#8A9DB8">Retrofit ROI</text>
      <g font-family="Plus Jakarta Sans,system-ui,sans-serif" font-size="22" font-weight="700" fill="#0CC9A8">
        <text y="26" opacity="0">2.4yr<animate attributeName="opacity" values="1;0;0;0;0;0" dur="4.5s" repeatCount="indefinite"/></text>
        <text y="26" opacity="0">2.1yr<animate attributeName="opacity" values="0;1;0;0;0;0" dur="4.5s" repeatCount="indefinite"/></text>
        <text y="26" opacity="0">1.9yr<animate attributeName="opacity" values="0;0;1;0;0;0" dur="4.5s" repeatCount="indefinite"/></text>
        <text y="26" opacity="0">1.7yr<animate attributeName="opacity" values="0;0;0;1;0;0" dur="4.5s" repeatCount="indefinite"/></text>
        <text y="26" opacity="0">1.5yr<animate attributeName="opacity" values="0;0;0;0;1;0" dur="4.5s" repeatCount="indefinite"/></text>
        <text y="26" opacity="0">1.3yr<animate attributeName="opacity" values="0;0;0;0;0;1" dur="4.5s" repeatCount="indefinite"/></text>
      </g>
    </g>
  </g>

  <!-- live indicator -->
  <circle cx="556" cy="78" r="4" fill="#0CC9A8">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="546" y="82" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#8A9DB8" text-anchor="end">Live</text>
</svg>
