<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360" preserveAspectRatio="xMidYMid meet" role="img" aria-label="CSRD Checker three step pill row activating left to right with applicability gate">
  <title>CSRD Checker preview</title>
  <defs>
    <linearGradient id="csrBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A1F3A"/>
      <stop offset="1" stop-color="#040E1A"/>
    </linearGradient>
    <linearGradient id="csrAcc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0CC9A8"/>
      <stop offset="1" stop-color="#5BC8FF"/>
    </linearGradient>
  </defs>
  <style>@media (prefers-reduced-motion: reduce){animate,animateTransform{display:none}}</style>
  <rect width="600" height="360" rx="14" fill="url(#csrBg)"/>
  <rect x="1" y="1" width="598" height="358" rx="13" fill="none" stroke="#0CC9A8" stroke-opacity="0.18"/>

  <!-- chrome -->
  <circle cx="24" cy="24" r="4" fill="#8A9DB8" fill-opacity="0.4"/>
  <circle cx="40" cy="24" r="4" fill="#8A9DB8" fill-opacity="0.4"/>
  <circle cx="56" cy="24" r="4" fill="#8A9DB8" fill-opacity="0.4"/>
  <rect x="80" y="18" width="170" height="12" rx="6" fill="#0F2D52"/>
  <text x="540" y="28" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8A9DB8" text-anchor="end">Omnibus I · 60 sec</text>

  <text x="32" y="74" font-family="Plus Jakarta Sans,system-ui,sans-serif" font-size="14" fill="#B8CCE0" font-weight="600">CSRD applicability check</text>

  <!-- 3-step pill row -->
  <g font-family="Inter,system-ui,sans-serif" font-size="12">
    <!-- pill 1 -->
    <g transform="translate(32,98)">
      <rect width="170" height="56" rx="28" fill="#0F2D52" stroke="#0CC9A8" stroke-opacity="0.25"/>
      <rect width="170" height="56" rx="28" fill="#0CC9A8" opacity="0">
        <animate attributeName="opacity" values="0.18;0.18;0.18;0.18" dur="4.5s" repeatCount="indefinite"/>
      </rect>
      <circle cx="28" cy="28" r="14" fill="#0CC9A8"/>
      <text x="28" y="32" text-anchor="middle" font-weight="700" fill="#040E1A">1</text>
      <text x="52" y="26" fill="#E8F0FA" font-weight="600">Headcount</text>
      <text x="52" y="42" fill="#8A9DB8">&gt; 1,000 staff</text>
    </g>

    <!-- arrow 1->2 -->
    <g transform="translate(210,126)">
      <line x1="0" y1="0" x2="20" y2="0" stroke="#0CC9A8" stroke-width="2" stroke-linecap="round"/>
      <polyline points="14,-4 20,0 14,4" fill="none" stroke="#0CC9A8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- pill 2 -->
    <g transform="translate(238,98)">
      <rect width="170" height="56" rx="28" fill="#0F2D52" stroke="#0CC9A8" stroke-opacity="0.25"/>
      <rect width="170" height="56" rx="28" fill="#0CC9A8" opacity="0">
        <animate attributeName="opacity" values="0;0.18;0.18;0.18" dur="4.5s" repeatCount="indefinite"/>
      </rect>
      <circle cx="28" cy="28" r="14" fill="#0F2D52" stroke="#0CC9A8" stroke-opacity="0.4">
        <animate attributeName="fill" values="#0F2D52;#0CC9A8;#0CC9A8;#0CC9A8" dur="4.5s" repeatCount="indefinite"/>
      </circle>
      <text x="28" y="32" text-anchor="middle" font-weight="700" fill="#E8F0FA">2</text>
      <text x="52" y="26" fill="#E8F0FA" font-weight="600">Turnover</text>
      <text x="52" y="42" fill="#8A9DB8">&gt; €450M</text>
    </g>

    <!-- arrow 2->3 -->
    <g transform="translate(416,126)">
      <line x1="0" y1="0" x2="20" y2="0" stroke="#0CC9A8" stroke-width="2" stroke-linecap="round"/>
      <polyline points="14,-4 20,0 14,4" fill="none" stroke="#0CC9A8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- pill 3 -->
    <g transform="translate(444,98)">
      <rect width="124" height="56" rx="28" fill="#0F2D52" stroke="#0CC9A8" stroke-opacity="0.25"/>
      <rect width="124" height="56" rx="28" fill="#0CC9A8" opacity="0">
        <animate attributeName="opacity" values="0;0;0.22;0.22" dur="4.5s" repeatCount="indefinite"/>
      </rect>
      <circle cx="28" cy="28" r="14" fill="#0F2D52" stroke="#0CC9A8" stroke-opacity="0.4">
        <animate attributeName="fill" values="#0F2D52;#0F2D52;#0CC9A8;#0CC9A8" dur="4.5s" repeatCount="indefinite"/>
      </circle>
      <path d="M22 28 L26 32 L34 24" stroke="#0CC9A8" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1" dur="4.5s" repeatCount="indefinite"/>
      </path>
      <text x="52" y="26" fill="#E8F0FA" font-weight="600">Result</text>
      <text x="52" y="42" fill="#8A9DB8">In scope</text>
    </g>
  </g>

  <!-- result panel -->
  <g transform="translate(32,184)">
    <rect width="536" height="148" rx="10" fill="#0F2D52" stroke="#0CC9A8" stroke-opacity="0.2"/>
    <text x="20" y="28" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8A9DB8">Result</text>
    <text x="20" y="62" font-family="Plus Jakarta Sans,system-ui,sans-serif" font-size="24" font-weight="700" fill="#E8F0FA" opacity="0">
      Calculating
      <animate attributeName="opacity" values="1;1;0;0" dur="4.5s" repeatCount="indefinite"/>
    </text>
    <text x="20" y="62" font-family="Plus Jakarta Sans,system-ui,sans-serif" font-size="24" font-weight="700" fill="#0CC9A8" opacity="0">
      In scope, reporting in FY2026
      <animate attributeName="opacity" values="0;0;1;1" dur="4.5s" repeatCount="indefinite"/>
    </text>

    <text x="20" y="92" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#8A9DB8">Cite</text>
    <text x="20" y="110" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#B8CCE0">EU Directive 2024/1760 (Omnibus I), Article 19a</text>

    <!-- sweeping scan line -->
    <line x1="20" y1="130" x2="516" y2="130" stroke="#0F2D52" stroke-width="6" stroke-linecap="round"/>
    <line x1="20" y1="130" x2="120" y2="130" stroke="url(#csrAcc)" stroke-width="6" stroke-linecap="round">
      <animate attributeName="x1" values="20;220;420;516;516" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="120;320;516;516;516" dur="4.5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- live indicator -->
  <circle cx="556" cy="78" r="4" fill="#0CC9A8">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="546" y="82" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#8A9DB8" text-anchor="end">Live</text>
</svg>
